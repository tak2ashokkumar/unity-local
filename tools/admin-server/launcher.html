    <style>
        /* Reset and Structural Parity */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100%;
            width: 100%;
            overflow-x: hidden !important;
        }

        #wrapper { width: 100%; height: 100%; }

        .sidebar {
            z-index: 1000 !important;
            background-color: #333 !important;
            box-shadow: 0 2px 2px 0 rgb(0, 0, 0) !important;
            height: 100vh !important;
            position: fixed !important;
            width: 250px !important;
            margin-top: 0 !important;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar .navbar-brand {
            height: 64px !important;
            width: 250px !important;
            padding: 11px 15px !important;
            background-color: #333 !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #444;
        }

        #logo {
            max-height: 42px !important;
            max-width: 220px !important;
        }

        /* Content Area */
        #page-wrapper {
            margin-left: 250px !important;
            padding: 0 !important;
            min-height: 100vh;
            background-color: #f8f8f8;
            position: relative;
        }

        /* Top Navbar - use Bootstrap's own float layout, NOT flexbox */
        .navbar-static-top {
            background-color: rgba(39, 155, 108, 0.7) !important;
            border: none !important;
            margin: 0 !important;
            width: 100% !important;
            min-height: 64px !important;
            box-shadow: 0 2px 5px 0 rgba(0, 0, 0, .14) !important;
        }

        /* Title on the left */
        .navbar-header.navbar-left {
            padding-left: 20px !important;
            line-height: 64px;
            float: left !important;
        }

        .navbar-title {
            color: white !important;
            font-size: 18px !important;
            font-weight: 400 !important;
            margin: 0 !important;
            line-height: 64px;
            display: inline-block;
        }

        /* Right-side nav links */
        .navbar-top-links {
            float: right !important;
        }
        .navbar-top-links li a {
            color: white !important;
            padding: 20px 15px !important;
            line-height: 24px !important;
            display: inline-block;
        }

        /* Dashboard/Table Area */
        #pageview.container-fluid {
            width: 100% !important;
            padding: 20px 30px !important;
            margin: 0 !important;
        }

        /* 
           UNIVERSAL TAG-DEPTH INDENTATION
           Guarantees Level 2, 3, and 4 items are progressively indented.
        */

        /* Remove ALL borders from sidebar list items at every level */
        .sidebar ul li {
            border-bottom: none !important;
        }

        .sidebar ul li a { 
            padding-top: 12px; 
            padding-bottom: 12px; 
            font-size: 13px; 
            border-bottom: none !important; 
            color: #ddd !important; 
        }
        
        /* Level 2 Submenu (Direct children of root li) */
        .sidebar ul ul li a { padding-left: 52px !important; }
        
        /* Level 3 Submenu (Nested inside Level 2) */
        .sidebar ul ul ul li a { padding-left: 86px !important; }
        
        /* Level 4 Submenu (Nested inside Level 3) */
        .sidebar ul ul ul ul li a { padding-left: 120px !important; }

        .sidebar-nav .nav > li > a:hover {
            background-color: rgba(103, 184, 151, 0.8) !important;
            color: white !important;
        }
        
        .sidebar .arrow { margin-top: 4px; }

        [ng-cloak] { display: none !important; }
        #drop-down-div { position: absolute; z-index: 9999; }
    </style>
</head>

<body class="wrapperbody" ng-cloak>
    <div id="wrapper" ng-controller="ShellController">

            </div>
        </div>

        <!-- Page Wrapper -->
        <div id="page-wrapper">
            <nav class="navbar navbar-default navbar-static-top" role="navigation">
                <div class="navbar-header navbar-left" id="notificationArea">
                    <h4 class="navbar-title">{{ title.plural }}</h4>
                </div>
                <ul class="nav navbar-top-links navbar-right">
                    <li><a href="#">Home</a></li>
                    <li><a href="#/account">Account</a></li>
                    <li class="dropdown">
                        <a class="dropdown-toggle" data-toggle="dropdown" href="#">
                            <span class="username_span">admin@unitedlayer.com</span>
                            <b class="caret"></b>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a href="#"><i class="fa fa-check-square-o fa-fw"></i> About</a></li>
                            <li class="divider"></li>

        </div>
    </div>

    <!-- Clean Recursive Menu Template -->
    <script type="text/ng-template" id="menuItem.html">
        <a ng-if="!item.submenu" ng-href="{{item.href}}" class="menu-item">
            <i ng-if="item.fa" class="fa {{item.fa}} fa-fw fa-lg"></i>
            <i ng-if="item.glyphicon" class="{{item.glyphicon}} fa-fw fa-lg"></i>
            <span class="menu-item-text">{{item.title || item.name}}</span>
        </a>
        <a ng-if="item.submenu" href="" class="menu-item">
            <i ng-if="item.fa" class="fa {{item.fa}} fa-fw fa-lg"></i>
            <i ng-if="item.glyphicon" class="{{item.glyphicon}} fa-fw fa-lg"></i>
            <span class="menu-item-text">{{item.title || item.name}}</span>
            <span class="fa arrow fa-lg"></span>
        </a>
        <ul ng-if="item.submenu" class="nav nav-second-level">
            <li ng-repeat="item in item.submenu" ng-include="'menuItem.html'"></li>
        </ul>
    </script>

    <script>
        (function() {
            $(document).ready(function () {
                var sidebar = $(".sidebar");
                var page_wrapper = $("#page-wrapper");

                var resizeMain = function () {
                    var winHeight = $(window).innerHeight();
                    sidebar.height(winHeight);
                    // Allow page_wrapper to grow with content but stay at least full height
                    page_wrapper.css('min-height', winHeight + 'px');
                };

                resizeMain();
                $(window).resize(resizeMain);
            });

            fetch('/api/scripts')
                .then(r => r.json())
                .then(scripts => {
                    const filteredScripts = scripts.filter(src => {
                        return !src.includes('clientApp.js') && !src.includes('/client/');
                    });

                    filteredScripts.sort((a, b) => {
                        if (a.includes('adminApp.js')) return -1;
                        if (b.includes('adminApp.js')) return 1;
                        return 0;
                    });

                    let index = 0;
                    function loadNext() {
                        if (index >= filteredScripts.length) {
                             bootstrapApp();
                            return;
                        }
                        const src = filteredScripts[index++];
                        const s = document.createElement('script');
                        s.src = src;
                        s.onload = loadNext;
                        s.onerror = loadNext;
                        document.body.appendChild(s);
                    }
                    loadNext();
                });

            function bootstrapApp() {
                angular.module('uldb').config(['$httpProvider', function ($httpProvider) {
                    $httpProvider.defaults.withCredentials = true;
                    $httpProvider.defaults.cache = false;
                }]);

                angular.module('uldb')
                .controller('ShellController', ['$scope', '$http', '$timeout', function($scope, $http, $timeout) {
                    $scope.menu = [];
                    $http.get('/api/menu').then(function(response) {
                        $scope.menu = response.data;
                        $timeout(function() { $('#side-menu').metisMenu(); }, 1000);
                    });
                }]);
                angular.bootstrap(document, ['uldb']);
            }
        })();
    </script>
