{% load staticfiles %}
<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Unity</title>
		<script src="{% static 'bower_components/angular/angular.min.js' %}"></script>
		<link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap1.min.css' %}">
		<link rel="stylesheet" type="text/css" href="{% static 'css/font-awesome.min.css' %}">
		<link rel="stylesheet" type="text/css" href="{% static 'css/account.css' %}">
		<style>
			.exp-pass-span-err {
			margin: 1%;
			color: red;
			font-size: 13px;
			}

			.successdiv {
			color: green;
			font-size: 13px;
			margin: 1%;
			}
		</style>
	</head>
	<body ng-app="uldbLogin">

		<!-- Top content -->
		<div class="login-content" ng-controller="ChangePasswordController">
			<form id="password_data" method="post" action="" autocomplete="off">
				<input type='hidden' name='csrfmiddlewaretoken' id="csrf_token" value={{ csrf_token }}/>
				<div class="login-bg">
					<div class="container">

						<div class="row">
							<div class="col-sm-6 col-sm-offset-3 form-box">
								<div class="form-top">
									<div class="form-top-left">
										<h1 style="color:#fff;">Change Password</h1>
									</div>
								<div class="form-top-right">
									<i class="fa fa-key fa-1x"></i>
								</div>
							</div>

							<div class="form-bottom" id="pwddatadiv" ng-if="!passwordChanged">
								<h5 class="text">Please change your password.</h5>
								<h5 class="text">To change your password, specify and confirm your password.</h5>
								<input type="hidden" name="is_uladmin" id="is_uladmin" ng-model="passwordForm.is_uladmin" 				 									ng-init="passwordForm.is_uladmin='{{user.is_uladmin}}'">
								<div class="form-group">
									<label for="id_old_password" class="required text">Current password:</label>
									<!-- to prevent password autocomplete -->
									<input style="display:none">
									<input id="id_old_password" class="form-control ch-pass-textbox" name="old_password"
									type="password" ng-model="passwordForm.old_password" autofocus>
								</div>
								<div class="form-group">
									<label for="id_new_password1" class="required text">New password:</label>
									<input id="id_new_password1" class="form-control ch-pass-textbox" name="new_password1"
									type="password" ng-model="passwordForm.new_password1" ng-blur="check()">
								</div>
								<div class="form-group">
									<label for="id_new_password2" class="required text">Confirm New Password:</label>
									<input id="id_new_password2" class="form-control ch-pass-textbox" name="new_password2"
									type="password" ng-model="passwordForm.new_password2" ng-blur="check()">
								</div>
								<center>
									<span id="err-span" class="exp-pass-span-err" ng-cloak>
									{% verbatim %}
									{{ error }}
									{% endverbatim %}
									</span>
								</center>
								<button type="button" class="btn btn-danger" id="cancelbutton" ng-click="cancel()">Cancel</button>
								<button class="btn btn-success" id="change-password-button" type="button" ng-click="changePassword()">
									Change Password
								</button>
							</div>

							<div class="form-bottom" id="updatesuccessdiv" ng-if="passwordChanged" ng-cloak>
								<div>
									<p class="text" style="text-align:center;">Password updated successfully.</p>
									<center><a href="/">
										<button class="btn btn-success" type="button">Continue to Unity</button>
									</a>
									</center>
								</div>
							</div>
						</div>
					</div>
				</div>
			</form>
		</div>


		{% include 'base/snippets/js/angular_base.html' %}
		<script src="{% static 'rest/app/login/loginApp.js' %}"></script>
		<script>
			angular.module('uldbLogin').config(['$httpProvider', function ($httpProvider) {
			$httpProvider.defaults.xsrfCookieName = 'csrftoken';
			$httpProvider.defaults.xsrfHeaderName = 'X-CSRFToken';
			$httpProvider.defaults.withCredentials = true;
			$httpProvider.defaults.headers.common['X-CSRF-Token'] = '{{ csrf_token | escapejs }}';
			}]);
		</script>
	</body>
</html>
