<!DOCTYPE html>
<html>

<body>
    <script>
        var userId = '{{ user | escapejs }}';
        var uid = '{{ uuid | escapejs }}';
        setTimeout(test, 10);

        function test() {
            if (!userId) {
                redirectBack();
            } else {
                const url = window.location.origin + "/customhijack/" + userId + "/";
                var token = '{{ csrf_token | escapejs }}';
                let formData = new FormData()
                formData.append("csrfmiddlewaretoken", token)
                fetch(url, {
                    method: "POST",
                    body: formData,
                }).then(function (response) {
                    if (response.status === 200) {
                        var impersonateUrl = `${window.location.protocol}//${window.location.host}/`;
                        window.location.assign(impersonateUrl);
                    } else {
                        redirectBack();
                    }
                });
            }
        }
    </script>
</body>

</html>
