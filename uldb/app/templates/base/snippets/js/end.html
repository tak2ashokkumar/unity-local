  (function () {
      // hold onto the drop down menu
      var dropdownMenu;

      // and when you show it, move it to the body
      $(window).on('show.bs.dropdown', function (e) {

          // grab the menu
          dropdownMenu = $(e.target).find('.actions_menu');
          //dmParent = dropdownMenu.parent().parent().parent().parent().parent().parent().parent()
          // dmParent.addClass("overflowHidden")
          var $nonScrollable = $("body");
          $nonScrollable.disablescroll();

          // detach it and append it to the body
          $('#drop-down-div').append(dropdownMenu.detach());

          // grab the new offset position
          var eOffset = $(e.target).offset();

          // make sure to place it where it would normally go (this could be improved)
          dropdownMenu.css({
              'display': 'block',
              'top': eOffset.top + $(e.target).outerHeight(),
              'left': eOffset.left,
              'width': "200"
          });
      });

      // and when you hide it, reattach the drop down, and hide it normally
      $(window).on('hide.bs.dropdown', function (e) {
          $(e.target).append(dropdownMenu.detach());
          dropdownMenu.hide();
          var $nonScrollable = $("body");
          $nonScrollable.disablescroll("undo");
          $('#drop-down-div').empty();
      });

  })();

  function credentials_checkPass(password,confirmpassword){
      var credentials_secret = document.getElementById(password);
      var credentials_confirm_secret = document.getElementById(confirmpassword);
      var message = document.getElementById('confirmMessage');
      message.innerHTML="";
      var btnStatus = jQuery(".btn-primary");
      var goodColor = "#66cc66";
      var badColor = "#ff6666";
      if(credentials_secret.value == credentials_confirm_secret.value){
          message.style.color = goodColor;
          message.innerHTML = "Passwords Match!"
          btnStatus.removeAttr("disabled");
      }
      else{
          message.style.color = badColor;
          message.innerHTML = "Passwords Do Not Match!";
          btnStatus.attr("disabled", "true");
      }
  };
  $(document).ready(function () {
    var W_COLLAPSE_WIDTH = 768;
    var sidebar = $(".sidebar");
    var footer_height = function () {
      return $("#footer").outerHeight();
    };

    var page_wrapper = $("#page-wrapper");

    var resizeSidebar = function () {
{#      if (sidebar.children().first().hasClass('collapse')) {#}
      if ($(window).width() <= W_COLLAPSE_WIDTH) {
        sidebar.css("height", '');
      } else {
        sidebar.css("height", $(window).innerHeight() + 'px');
      }
    };

    page_wrapper.css("overflow", "auto");
    var resizeMain = function () {
{#      page_wrapper.css("height",#}
{#          $(window).innerHeight() - footer_height() - 200#}
{#          + 'px'#}
{#      );#}
      page_wrapper.height($(window).innerHeight() - footer_height());
{#      console.log(page_wrapper.height());#}
    };

    resizeMain();

    $(".main").css("height", $(window).height() - 50 + 'px');
    $(".wrapperbody").css("overflow", "hidden");


    sidebar.css("overflow-y", "auto");
    sidebar.css("overflow-x", "hidden");
    resizeSidebar();
    $(window).resize(function () {
      resizeMain();
      resizeSidebar();
    });
    $(".menu-item").click(function () {
      $(".main").css("height", $(window).height() - 50 + 'px');
    });
  });

<script>
  angular.module('uldb').config(['$httpProvider', function ($httpProvider) {
    $httpProvider.defaults.xsrfCookieName = 'csrftoken';
    $httpProvider.defaults.xsrfHeaderName = 'X-CSRFToken';
    $httpProvider.defaults.withCredentials = true;
    $httpProvider.defaults.headers.common['X-CSRF-Token'] = '{{ csrf_token | escapejs }}';

    // disable caching
    $httpProvider.defaults.cache = false;
    $httpProvider.defaults.headers.common['Cache-Control'] = 'no-cache';
  }]);
</script>
