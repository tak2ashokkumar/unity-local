{% load staticfiles %}
{% load hijack_tags %}
{% load pipeline %}

<!DOCTYPE html>
<html lang="en" ng-app="uldb">
<head>
  <title ng-bind="header || 'Unity'">Unity</title>
  {% include 'base/snippets/header.html' %}
  <link href="{% static 'css/xterm.css' %}" rel="stylesheet" type="text/css">
  <script src="{% static 'bower_components/angular/angular.min.js' %}"></script>
  
  <script src="{% static 'bower_components/angular-animate/angular-animate.min.js' %}"></script>
  <script src="{% static 'bower_components/angular-aria/angular-aria.min.js' %}"></script>
  <script src="{% static 'bower_components/angular-messages/angular-messages.min.js' %}"></script>
  <script src="{% static 'bower_components/angular-material/angular-material.min.js' %}"></script>

  <script src="{% static 'bower_components/vis/dist/vis.min.js' %}"></script>
  <script src="{% static 'bower_components/angular-visjs/angular-vis.js' %}"></script>
  <script src="{% static 'bower_components/angular-local-storage/dist/angular-local-storage.min.js' %}"></script>
  <script type="text/javascript" src="{% static 'bower_components/angular-google-maps/dist/angular-google-maps.min.js' %}" charset="utf-8"></script>
</head>

<body class="wrapperbody">
{% hijack_notification %}
<div id="pageview" class="container" ng-view></div>
{% include 'base/snippets/js/angular_base.html' %}

<script src="{% static 'rest/app/adminApp.js' %}"></script>
<script src="{% static 'rest/app/filters.js' %}"></script>
<script src="{% static 'rest/app/filters/v3/format_filters.js' %}"></script>
<script src="{% static 'rest/app/api/admin-api.js' %}"></script>
<script src="{% static 'bower_components/ng-tags-input/ng-tags-input.js' %}"></script>
<script src="{% static 'bower_components/angular-floatThead-master/angular-floatThead.js' %}"></script>
<script src="{% static 'bower_components/ng-file-upload/ng-file-upload-all.js' %}"></script>
<script src="{% static 'bower_components/angular-bootstrap-multiselect/dist/angular-bootstrap-multiselect.js' %}"></script>
<script src="{% static 'bower_components/angular-animate/angular-animate.js' %}"></script>
<script src="{% static 'bower_components/angular-material/angular-material.js' %}"></script>


<script src="{% static 'rest/app/services/DjangoService.js' %}"></script>
<script src="{% static 'rest/app/controllers/cloud.js' %}"></script>


<script src="{% static 'lib/wmks.js' %}"></script>

<!-- Terraform Console  -->
<script src="{% static 'lib/xterm.js' %}"></script>
<script src="{% static 'lib/fit.js' %}"></script>
<script src="{% static 'lib/socket.io.js' %}"></script>
<link rel="stylesheet" type="text/css" href="{% static 'css/custom-terminal.css' %}">
<style type="text/css">
  body {
        overflow:hidden;
    }
</style>
<!-- Terraform Console  -->

<!-- {# include 'base/snippets/js/end.html' #} -->
<script>
    angular.module('uldb').config(['$httpProvider', function ($httpProvider) {
      $httpProvider.defaults.xsrfCookieName = 'csrftoken';
      $httpProvider.defaults.xsrfHeaderName = 'X-CSRFToken';
      $httpProvider.defaults.withCredentials = true;
      $httpProvider.defaults.headers.common['X-CSRF-Token'] = '{{ csrf_token | escapejs }}';
    }]);
</script>
</body>
</html>
