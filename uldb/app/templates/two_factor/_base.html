{% load staticfiles %}
<!DOCTYPE html>
<html>
<head>
  <title>Unity {% block title %}{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
  <link href="/static/css/bootstrap1.min.css" rel="stylesheet" media="screen">
  <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap-newapp2.min.css' %}">
  <link rel="stylesheet" type="text/css" href="{% static 'css/client-layout.css' %}">
  <link href='https://fonts.googleapis.com/css?family=Roboto:400,700' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <link rel="stylesheet" href="{% static 'css/common/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
  {% block style %}
  <style>
    /* A few custom rules for Django Forms beyond our control. */
    #custom-form th {
      padding: 0 10px;
    }
    #custom-form td>input {
      padding: 0 10px;
      margin-bottom: 10px;
    }
    #id_method-method {
      width: 200px;
    }
 
    #login_logo {
      width: 100%;
    }
    .vcenter {
    display: flex;
    align-items: center;
      margin-top: 100px;
    }
    .form-title {
      font-family: 'Open Sans', "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      font-weight: 300;
      margin-top: 0px;
      margin-bottom: 0px;
    }
  </style>
  {% endblock %}
  <!--[if lt IE 9]>
    <script src="//cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7/html5shiv.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/respond.js/1.3.0/respond.js"></script>
  <![endif]-->
</head>
<body>

  {% block content_wrapper %}
{#    <nav class="navbar navbar-default navbar-static-top" role="navigation">#}
{#    </nav>#}
    <div class="container-fluid full-height no-padding">
      {% block content %}{% endblock %}
    </div>
  {% endblock %}

  <script src="{% static 'bower_components/jquery/dist/jquery.min.js' %}"></script>
  <script src="{% static 'bower_components/bootstrap/dist/js/bootstrap.min.js' %}"></script>

</body>
</html>
