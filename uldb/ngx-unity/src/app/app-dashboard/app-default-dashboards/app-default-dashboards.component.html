<div class="container-fluid mt-3">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col">
                <div class="card round-edge">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                        <div class="d-flex justify-content-center align-items-center font-500">
                            <span class="badge badge-secondary font-sm">{{count}}</span>
                            <span class="ml-1 font-lg">Default Dashboards</span>
                        </div>
                        <div class="d-flex justify-content-end align-items-center">
                            <data-refresh-btn [page]="currentCriteria.pageNo"
                                (refresh)="refreshData($event)"></data-refresh-btn>
                        </div>
                    </div>
                    <div class="card-body py-2">
                        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                            <div class="w-20">
                                <search-box [searchValue]="currentCriteria.searchValue"
                                    (searched)="onSearched($event)"></search-box>
                            </div>
                        </div>
                        <table class="table table-sm text-left">
                            <thead class="bg-light">
                                <th>Name</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Created By</th>
                                <th class="text-center">Actions</th>
                            </thead>
                            <tbody>
                                <tr *ngFor="let view of viewData" truncateText>
                                    <td class="tdw-25">
                                        <button class="btn btn-link text-decoration-none p-0 table-column-btn"
                                            type="button" [tooltip]="view.name" (click)="goToDefaultDashboard(view)"
                                            accessControl moduleName="Dashboard" accessType="View Dashboard"
                                            elementType="div"
                                            [modulePermissions]="view.applicableModulePermissions">{{view.name}}</button>
                                    </td>
                                    <td class="tdw-15">
                                        <div [tooltip]="view.type">{{view.type}}</div>
                                    </td>
                                    <td class="tdw-15 text-capitalize">
                                        <div [tooltip]="view.status">{{view.status}}</div>
                                    </td>
                                    <td class="tdw-15">
                                        <div [tooltip]="view.createdBy">{{view.createdBy}}</div>
                                    </td>
                                    <td class="action-icons-column text-center">
                                        <button class="action-icons mb-0 fas fa-eye font-sm" [tooltip]="'View Details'"
                                            (click)="goToDefaultDashboard(view)" accessControl moduleName="Dashboard"
                                            accessType="View Dashboard" elementType="actionbtn"
                                            [modulePermissions]="view.applicableModulePermissions">
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No Default Dashboards
                            available.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
