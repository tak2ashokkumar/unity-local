<div class="card-header bg-white border-bottom-0 py-2 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center w-60">
        <a class="nav-link tabs-level1-link border-0 text-success">Application Dashboard - </a>
        <select class="ml-2 form-control w-30" [(ngModel)]="selectedApplication" *ngIf="selectedApplication">
            <option value="AstronomyShop">AstronomyShop</option>
            <option value="EasyTrade">EasyTrade</option>
        </select>
    </div>
    <button class="btn btn-pill btn-warning btn-sm ml-2" type="button" (click)="goToExectiveAiSummary()"
        container="body" *ngIf="selectedApplication=='AstronomyShop' && applicationId">
        Executive AI Summary
    </button>
    <div class="d-flex align-items-center" *ngIf="dateDropdownOptions">
        <custom-date-dropdown [options]="dateDropdownOptions.options" [enableCustomDateRange]="false"
            [customClass]="'form-control-sm'" [default]="dateDropdownOptions.defaultSelected"
            (onSubmit)="onFilterChange($event)">
        </custom-date-dropdown>
        <button class="btn btn-pill btn-warning pull-right btn-sm ml-2" type="button" (click)="goBack()"
            [tooltip]="'Go Back'" container="body">
            <i class="fa fa-arrow-left"></i>
        </button>
        <!-- <data-refresh-btn (refresh)="refreshData()"></data-refresh-btn> -->
    </div>
</div>

<ng-container *ngIf="applicationId">
    <div [ngSwitch]="selectedApplication">
        <!-- load child components here -->
        <div *ngSwitchCase="'AstronomyShop'">
            <astronomy-shop-application-dashboard [appId]="applicationId"
                [filters]="dateDropdownOptions?.formData"></astronomy-shop-application-dashboard>
        </div>
        <ng-container *ngSwitchCase="'EasyTrade'">
            <easy-trade-application-dashboard [appId]="applicationId"
                [filters]="dateDropdownOptions?.formData"></easy-trade-application-dashboard>
        </ng-container>
    </div>
</ng-container>

<ng-container *ngIf="!applicationId">
    <div class="card-body d-flex justify-content-center align-items-center h-100" style="min-height: 240px;">
        No Applications found.
    </div>
</ng-container>
