<div class="row">
    <div class="col-12">
        <div class="card round-edge mb-0">
            <app-spinner [name]="alertsLoader"></app-spinner>
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2">
                <div class="d-flex justify-content-center align-items-center font-500">
                    <span class="badge badge-secondary font-sm">{{count}}</span>
                    <span class="ml-1 font-lg">Top 10 Critical Alerts</span>
                </div>
            </div>
            <div class="card-body py-2">
                <div class="row mx-0 d-flex justify-content-between align-items-center py-2">
                    <div class="w-25">
                        <search-box [searchValue]="currentCriteria.searchValue"
                            (searched)="onSearched($event)"></search-box>
                    </div>
                    <div class="d-flex">
                        <div class="mt-2">
                            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                                (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                        </div>
                    </div>
                </div>
                <table class="table table-sm text-left">
                    <thead class="bg-light">
                        <tr>
                            <th>Id</th>
                            <th>Device Name</th>
                            <th>Status</th>
                            <th>Description</th>
                            <th>Source</th>
                            <th>Acknowledged</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let alerts of alertsViewData" truncateText>
                            <td class="tdw-15">
                                <div [tooltip]="alerts.id">
                                    {{alerts.id}}</div>
                            </td>
                            <td class="tdw-20">
                                <div [tooltip]="alerts.deviceName">{{alerts.deviceName}}</div>
                            </td>
                            <td class="w-12">
                                <span [ngClass]="alerts.icon" [tooltip]="alerts.tooltipMessage">
                                </span>
                            </td>
                            <td class="tdw-20">
                                <div [tooltip]="alerts.description">{{alerts.description}}</div>
                            </td>
                            <td class="tdw-12">
                                <div [tooltip]="alerts.source">{{alerts.source}}</div>
                            </td>
                            <td class="tdw-12">
                                <div [tooltip]="alerts.isAck">{{alerts.isAck}}</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                    [totalCount]="count">
                </table-entries>
                <table-pager *ngIf="alertsViewData.length" [pageNo]="currentCriteria.pageNo"
                    [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                    (pageChange)="pageChange($event)"></table-pager>
                <div class="text-center text-muted py-4" *ngIf="!alertsViewData.length">No records to display</div>
            </div>
        </div>
    </div>
</div>
