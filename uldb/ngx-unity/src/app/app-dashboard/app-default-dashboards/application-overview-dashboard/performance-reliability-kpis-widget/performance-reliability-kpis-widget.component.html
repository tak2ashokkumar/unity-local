
<div class="card round-edge equalize-card p-0">
    <div class="card-header bg-white d-flex justify-content-between align-items-center border-bottom p-2 ">
        <span class="font-lg font-500">Performance & Reliability KPI's</span>
    </div>
    <div class="card-body">
        <div class="row mb-2">
            <div class="col-4">
                <div class="card round-edge equalize-card border-0" style="min-height: 220px;">
                    <app-spinner [name]="'ApplicationResponseTimeLoader'"></app-spinner>
                    <!-- <div class="card-header bg-white d-flex justify-content-between align-items-center border-bottom p-2 ">
                        <span class="font-lg font-500">Application Response Time (ms)</span>
                    </div> -->
                    <div class="card-body p-0">
                        <ng-container *ngIf="applicationResponseTimeViewData">
                            <div echarts [options]="applicationResponseTimeViewData.options"
                                [extentions]="applicationResponseTimeViewData.extensions" [defaultHeight]="260"></div>
                        </ng-container>
                        <ng-container *ngIf="!applicationResponseTimeViewData">
                            <div class="d-flex justify-content-center align-items-center h-100">
                                No Data found.
                            </div>
                        </ng-container>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card round-edge equalize-card border-0" style="min-height: 220px;">
                    <app-spinner [name]="'ErrorRateLoader'"></app-spinner>
                    <!-- <div
                        class="card-header bg-white d-flex justify-content-between align-items-center border-bottom p-2 ">
                        <span class="font-lg font-500">Error Rate (% of Failed Interactions)</span>
                    </div> -->
                    <div class="card-body p-0">
                        <ng-container *ngIf="errorRateViewData">
                            <div echarts [options]="errorRateViewData.options"
                                [extentions]="errorRateViewData.extensions" [defaultHeight]="260"></div>
                        </ng-container>                        
                        <ng-container *ngIf="!errorRateViewData">
                            <div class="d-flex justify-content-center align-items-center h-100">
                                No Data found.
                            </div>
                        </ng-container>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card round-edge equalize-card border-0" style="min-height: 220px;">
                    <app-spinner [name]="'PyamentFailureRateLoader'"></app-spinner>
                    <!-- <div
                        class="card-header bg-white d-flex justify-content-between align-items-center  border-bottom p-2 ">
                        <span class="font-lg font-500">Payment Failure Rate (%)</span>
                    </div> -->
                    <div class="card-body p-0">
                        <ng-container *ngIf="paymentFailureViewData">
                            <div echarts [options]="paymentFailureViewData.options"
                                [extentions]="paymentFailureViewData.extensions" [defaultHeight]="260"></div>
                        </ng-container>                        
                        <ng-container *ngIf="!paymentFailureViewData">
                            <div class="d-flex justify-content-center align-items-center h-100">
                                No Data found.
                            </div>
                        </ng-container>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mb-2">                    
            <div class="col-12">
                <div class="card round-edge equalize-card border-0" style="min-height: 280px;">
                    <app-spinner [name]="'PaymentGatewayLatencyLoader'"></app-spinner>
                    <!-- <div
                        class="card-header bg-white d-flex justify-content-between align-items-center  border-bottom p-2 ">
                        <span class="font-lg font-500">Payment Gateway Latency (ms)</span>
                    </div> -->
                    <div class="card-body p-0">
                        <ng-container *ngIf="paymentGatewayLatencyViewData">
                            <div echarts [options]="paymentGatewayLatencyViewData.options"
                                [extentions]="paymentGatewayLatencyViewData.extensions" [defaultHeight]="260"></div>
                        </ng-container>                        
                        <ng-container *ngIf="!paymentGatewayLatencyViewData">
                            <div class="d-flex justify-content-center align-items-center h-100">
                                No Data found.
                            </div>
                        </ng-container>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
