<div class="row">
    <div class="col-6">
        <div class="card round-edge equalize-card h-100">
            <div class="card-header bg-white d-flex justify-content-between align-items-center border-bottom p-2 ">
                <span class="font-lg font-500">Revenue & Customer Value KPIs</span>
            </div>
            <div class="card-body">
                <div class="row mb-2">
                    <div class="col-6">
                        <div class="card round-edge equalize-card border-0" style="min-height: 230px;">
                            <app-spinner [name]="'RevenueByCategoryLoader'"></app-spinner>
                            <!-- <div class="card-header bg-white d-flex justify-content-between align-items-center border-bottom p-2 ">
                        <span class="font-lg font-500">Revenue By Category</span>
                    </div> -->
                            <div class="card-body p-0">
                                <ng-container *ngIf="revenueByCategoryViewData">
                                    <div echarts [options]="revenueByCategoryViewData.options"
                                        [extentions]="revenueByCategoryViewData.extensions" [defaultHeight]="280"></div>
                                </ng-container>
                                <ng-container *ngIf="!revenueByCategoryViewData">
                                    <div class="d-flex justify-content-center align-items-center h-100 text-center">
                                        No revenue by category data found.
                                    </div>
                                </ng-container>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card round-edge equalize-card border-0" style="min-height: 230px;">
                            <app-spinner [name]="'RevenueByTrafficSourceLoader'"></app-spinner>
                            <!-- <div
                        class="card-header bg-white d-flex justify-content-between align-items-center border-bottom p-2 ">
                        <span class="font-lg font-500">Error Rate (% of Failed Interactions)</span>
                    </div> -->
                            <div class="card-body p-0">
                                <ng-container *ngIf="revenueByTrafficSourceViewData">
                                    <div echarts [options]="revenueByTrafficSourceViewData.options"
                                        [extentions]="revenueByTrafficSourceViewData.extensions" [defaultHeight]="280">
                                    </div>
                                </ng-container>
                                <ng-container *ngIf="!revenueByTrafficSourceViewData">
                                    <div class="d-flex justify-content-center align-items-center h-100 text-center">
                                        No revenue by traffic source data found.
                                    </div>
                                </ng-container>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-6 pl-0">
        <div class="card round-edge equalize-card -100">
            <div class="card-header bg-white d-flex justify-content-between align-items-center border-bottom p-2 ">
                <span class="font-lg font-500">Operational / Anomaly Detection KPIs</span>
            </div>
            <div class="card-body">
                <div class="row mb-2">
                    <div class="col-12">
                        <div class="card round-edge equalize-card border-0" style="min-height: 230px;">
                            <app-spinner [name]="'OperationalAnomalyDetectionLoader'"></app-spinner>
                            <!-- <div
                        class="card-header bg-white d-flex justify-content-between align-items-center  border-bottom p-2 ">
                        <span class="font-lg font-500">Payment Failure Rate (%)</span>
                    </div> -->
                            <div class="card-body p-0">
                                <ng-container *ngIf="operationalAnomalyDetectionViewData">
                                    <div echarts [options]="operationalAnomalyDetectionViewData.options"
                                        [extentions]="operationalAnomalyDetectionViewData.extensions"
                                        [defaultHeight]="280">
                                    </div>
                                </ng-container>
                                <ng-container *ngIf="!operationalAnomalyDetectionViewData">
                                    <div class="d-flex justify-content-center align-items-center h-100 text-center">
                                        No operation anomaly data found.
                                    </div>
                                </ng-container>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
