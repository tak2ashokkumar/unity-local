<div class="card round-edge equalize-card">
    <div class="card-header d-flex justify-content-between align-items-center bg-white py-2 pl-2">
        <span class="font-lg font-500">Traffic & Engagement KPIs</span>
    </div>
    <div class="card-body px-2" style="min-height:200px;max-height:441px;overflow-y: auto;overflow-x: hidden;">
        <div class="row mx-0">
            <div class="col-4 px-2"
                style="min-height:170px;max-height:441px;overflow-y: auto;overflow-x: hidden;">
                <div class="card equalize-card border-0">
                    <app-spinner [name]="categoriesViewedWidgetViewData?.loader"></app-spinner>
                    <div class="card-body p-0 d-flex flex-column justify-content-around">
                        <ng-container *ngIf="categoriesViewedWidgetViewData?.chartData">
                            <div echarts [options]="categoriesViewedWidgetViewData?.chartData?.options"
                                [extentions]="categoriesViewedWidgetViewData?.chartData?.extensions"
                                [defaultHeight]="300"></div>
                        </ng-container>
                        <ng-container *ngIf="!categoriesViewedWidgetViewData?.chartData">
                            <div class="d-flex justify-content-center align-items-center h-100">
                                No Categories Viewed data found.
                            </div>
                        </ng-container>
                    </div>
                </div>
            </div>
            <div class="col-4 px-2"
                style="min-height:170px;max-height:441px;overflow-y: auto;overflow-x: hidden;">
                <div class="card equalize-card border-0">
                    <app-spinner [name]="trafficSourceOverGivenPeriodWidgetViewData?.loader"></app-spinner>
                    <div class="card-body p-0 d-flex flex-column justify-content-around">
                        <ng-container *ngIf="trafficSourceOverGivenPeriodWidgetViewData?.chartData">
                            <div echarts [options]="trafficSourceOverGivenPeriodWidgetViewData?.chartData?.options"
                                [extentions]="trafficSourceOverGivenPeriodWidgetViewData?.chartData?.extensions"
                                [defaultHeight]="300">
                            </div>
                        </ng-container>
                        <ng-container *ngIf="!trafficSourceOverGivenPeriodWidgetViewData?.chartData">
                            <div class="d-flex justify-content-center align-items-center h-100">
                                No Traffic Source data found.
                            </div>
                        </ng-container>
                    </div>
                </div>
            </div>
            <div class="col-4 px-2" style="min-height:170px;max-height:441px;overflow-y: auto;overflow-x: hidden;">
                <div class="card equalize-card border-0">
                    <app-spinner [name]="uniqueVisitorsWidgetViewData?.loader"></app-spinner>
                    <div class="card-body p-0 d-flex flex-column justify-content-around">
                        <ng-container *ngIf="uniqueVisitorsWidgetViewData?.chartData">
                            <div echarts [options]="uniqueVisitorsWidgetViewData?.chartData?.options"
                                [extentions]="uniqueVisitorsWidgetViewData?.chartData?.extensions"
                                [defaultHeight]="300">
                            </div>
                        </ng-container>
                        <ng-container *ngIf="!uniqueVisitorsWidgetViewData?.chartData">
                            <div class="d-flex justify-content-center align-items-center h-100">
                                No Unique Visitors data found.
                            </div>
                        </ng-container>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
