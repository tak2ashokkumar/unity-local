<header class="app-header navbar">
  <ng-template [ngIf]="mobileSidebarToggler != false">
    <button class="navbar-toggler d-lg-none" type="button" appSidebarToggler>
      <span class="navbar-toggler-icon"></span>
    </button>
  </ng-template>
  <a class="navbar-brand px-1" (click)="goTo()" accessControl moduleName="Dashboard" accessType="View Dashboard"
    elementType="div">
    <ng-template [ngIf]="navbarBrandImg">
      <img *ngIf="navbarBrand" [appHtmlAttr]="navbarBrand" [ngClass]="'navbar-brand'">
      <img *ngIf="navbarBrandFull" [appHtmlAttr]="navbarBrandFull" [ngClass]="'navbar-brand-full'">
      <img *ngIf="navbarBrandMinimized" [appHtmlAttr]="navbarBrandMinimized" [ngClass]="'navbar-brand-minimized'">
    </ng-template>
    <ng-template [ngIf]="!navbarBrandImg">
      <div class="navbar-brand-full">{{navbarBrandText.text}}</div>
      <div class="navbar-brand-minimized">{{navbarBrandText.icon}}</div>
    </ng-template>
  </a>
  <ng-content></ng-content>
</header>
