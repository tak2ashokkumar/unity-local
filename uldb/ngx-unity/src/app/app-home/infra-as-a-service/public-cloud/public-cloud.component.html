<h5 *ngIf="showPublicClouds" appWidgetLazyLoader (lazyLoad)="onLazyLoad($event)">Public Cloud</h5>
<div class="row">

  <div class="col-6 col-card-height" *ngIf="azureViewData?.subscriptions">
    <public-cloud-widget [widgetData]="azureViewData"></public-cloud-widget>
  </div>

  <div class="col-6 col-card-height" *ngIf="awsViewData?.subscriptions">
    <public-cloud-widget [widgetData]="awsViewData"></public-cloud-widget>
  </div>

  <div class="col-6 col-card-height" *ngIf="gcpViewData?.subscriptions">
    <public-cloud-widget [widgetData]="gcpViewData"></public-cloud-widget>
  </div>

  <div class="col-6 col-card-height" *ngIf="oracleViewData?.subscriptions">
    <public-cloud-widget [widgetData]="oracleViewData"></public-cloud-widget>
  </div>
  
</div>
