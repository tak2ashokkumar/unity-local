<div class="row mx-3 mt-4">
    <div class="col-12 px-0 mt--3">
        <div class="card" style="min-height: 600px">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2">
                <span class="h6 mb-0 font-500">{{action}} Model</span>
                <button class="btn btn-pill btn-warning btn-sm" tooltip="Back" (click)="goBack()">
                    <i class="fa fa-arrow-left"></i>
                </button>
            </div>
            <div class="card-body py-2 text-muted">
                <form *ngIf="form" [formGroup]="form">

                    <!-- Non Field Error -->
                    <div class="form-group col-12 text-center">
                        <div class="invalid-credentials" *ngIf="nonFieldErr">
                            {{nonFieldErr}}
                        </div>
                    </div>

                    <!-- Model + Provider Dropdown -->
                    <div class="form-group row">
                        <label class="col-2 text-right col-form-label">
                            Provider & Model<em>*</em> :
                        </label>
                        <div class="col-4">
                            <!-- <select class="form-control text-dark" formControlName="model_and_provider"
                                [class.is-invalid]="formErrors.model_and_provider">
                                <option value="">Select Model</option>
                                <option *ngFor="let item of availableModels" [ngValue]="item">
                                    {{ item.provider | uppercase }} {{ item.model_name }}
                                </option>
                            </select> -->
                            <div class="col-8 pl-0">
                                <image-dropdown [values]="availableModels" [defaultLabel]="'Model'"
                                    [imageWithText]="true" [editCaseImageValue]="form.get('model_and_provider')?.value"
                                    (selectedDropdownValue)="onModelSelected($event)">
                                </image-dropdown>

                                <div class="invalid-feedback d-block" *ngIf="formErrors.model_and_provider">
                                    {{formErrors.model_and_provider}}
                                </div>
                            </div>
                            <div class="invalid-feedback" *ngIf="formErrors.model_and_provider">
                                {{formErrors.model_and_provider}}
                            </div>
                        </div>
                    </div>

                    <div class="form-group row" *ngIf="form.get('active_for_applications')">
                        <label class="col-2 text-right col-form-label"> Activate for<em>*</em> :</label>
                        <div class="col-4">
                            <!-- <select class="form-control text-dark" formControlName="active_for"
                                [class.is-invalid]="formErrors.active_for">
                                <option value="" disabled>Select Applications</option>
                                <option *ngFor="let app of form.get('model_and_provider')?.value?.compatible_applications | keyvalue" [value]="app.key">
                                    {{ app.value }}
                                </option>
                            </select> -->
                            <multiselect-dropdown [options]="compatibleApplications" [settings]="appSettings" [texts]="appTexts"
                                class="form-control p-0" style="height:auto;" formControlName="active_for_applications"
                                [ngClass]="{'is-invalid' : formErrors.active_for_applications}"></multiselect-dropdown>
                            <div class="invalid-feedback" *ngIf="formErrors.active_for_applications">
                                {{formErrors.active_for_applications}}
                            </div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-2 text-right col-form-label">
                            Description :
                        </label>
                        <div class="col-8">
                            <textarea id="c_description" rows="2" class="form-control text-dark"
                                formControlName="description" placeholder="Enter Description"
                                [class.is-invalid]="formErrors.description"></textarea>
                            <div class="invalid-feedback" *ngIf="formErrors.description">
                                {{formErrors.description}}
                            </div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-2 text-right col-form-label">
                            API Key<em>*</em> :
                        </label>
                        <div class="col-4">
                            <custom-password-field formControlName="api_key"
                                [options]="{errors:formErrors.api_key, placeholder:'Enter API Key'}"></custom-password-field>
                            <div class="invalid-feedback" *ngIf="formErrors.api_key">
                                {{formErrors.api_key}}</div>
                        </div>
                    </div>

                    <!-- Endpoint URL -->
                    <div class="form-group row">
                        <label class="col-2 text-right col-form-label">
                            Endpoint URL :
                        </label>
                        <div class="col-6">
                            <input id="c_endpoint_url" type="text" class="form-control text-dark"
                                formControlName="endpoint_url" placeholder="Enter Endpoint URL"
                                [class.is-invalid]="formErrors.endpoint_url">
                            <div class="invalid-feedback" *ngIf="formErrors.endpoint_url">
                                {{formErrors.endpoint_url}}
                            </div>
                        </div>
                    </div>

                </form>
                <div class="d-flex justify-content-center">
                    <button class="btn btn-md btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
                    <button class="btn btn-md btn-success ml-2" type="button"
                        (click)="confirmAddOrEditModel()">{{action}}
                        Model</button>
                </div>
            </div>
        </div>
    </div>
</div>
