<div class="container-fluid pt-3">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col">
                <ng-container [ngTemplateOutlet]='filterFormRef'></ng-container>
                <ng-container [ngTemplateOutlet]='searchResultsRef'></ng-container>
            </div>
        </div>
    </div>
</div>

<ng-template #filterFormRef>
    <div class="card">
        <div class="card-body pb-0">
            <form *ngIf="filterForm" [formGroup]="filterForm">
                <accordion [isAnimated]="true">
                    <accordion-group [isOpen]="isFiltersOpen">
                        <div class="row" accordion-heading (click)="$event.stopPropagation();$event.preventDefault();">
                            <div class="form-group col-4">
                                <label class="font-col-form-label" for="device_type">Device Type</label>
                                <select id="device_type" class="form-control" formControlName="device_type">
                                    <option value="null">Select Device Type</option>
                                    <option *ngFor="let deviceType of deviceTypes" [value]="deviceType.name">
                                        {{deviceType.displayName}}</option>
                                </select>
                            </div>
                            <div class="form-group col-4">
                                <label class="form-col-form-label" for="name">Device Name</label>
                                <input id="name" class="form-control" type="text" formControlName="name"
                                    placeholder="Enter device name">
                            </div>
                            <div class="form-group col-4">
                                <label class="font-col-form-label" for="os">OS</label>
                                <select id="os" class="form-control" formControlName="os">
                                    <option value="null">Select Operating System</option>
                                    <option *ngFor="let operatingSystem of operatingSystems"
                                        [value]="operatingSystem.name">
                                        {{operatingSystem.full_name}}</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="form-group col-4">
                                <label class="form-col-form-label" for="ip_address">IP Address</label>
                                <input id="ip_address" class="form-control" type="text" formControlName="ip_address"
                                    placeholder="IP">
                            </div>
                            <div class="form-group col-4">
                                <label class="form-col-form-label" for="tag">Tag</label>
                                <input id="tag" class="form-control" type="text" formControlName="tag"
                                    placeholder="Tag name">
                            </div>
                        </div>
                    </accordion-group>
                </accordion>
                <div class="row">
                    <div class="form-group col-12">
                        <button *ngIf="isFiltersOpen" class="btn btn-pill btn-sm btn-warning px-4"
                            (click)="getSearchResults()" type="button">Search</button>
                        <button *ngIf="isFiltersOpen"
                            class="btn btn-pill btn-sm btn-warning bg-white text-warning ml-2 px-4"
                            (click)="resetFilterForm()" type="button">Clear</button>
                        <a class="text-warning ml-2" (click)="isFiltersOpen = !isFiltersOpen">
                            <span *ngIf="isFiltersOpen">Hide Filters <i class="fas fa-chevron-up"></i></span>
                            <span *ngIf="!isFiltersOpen">Show All Filters <i class="fas fa-chevron-down"></i></span>
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</ng-template>

<ng-template #searchResultsRef>
    <div class="card" *ngIf="viewData.length">
        <div class="card-header bg-transparent border-bottom-0 pb-0">
            <div class="row">
                <div class="col-3 h4 mb-0">
                    Search Result
                </div>
                <div class="col ">
                    <span class="text-muted ml-2 font-sm float-right align-middle"><span
                            class="badge badge-pill badge-secondary">{{viewData.length}}</span>&nbsp;Search
                        Results</span>
                </div>
            </div>
        </div>
        <div class="card-body pb-0">
            <table class="table text-left">
                <thead>
                    <tr>
                        <th>Search Result</th>
                        <th>Device Type</th>
                        <th>Operating System</th>
                        <th>Management IP</th>
                        <th>Tags</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let view of viewData" setTableColumnWidth>
                        <td>
                            <!-- <div *ngIf="!view.deviceName"></div> -->
                            <button class="btn btn-link text-decoration-none p-0 table-column-btn" type="button"
                                (click)="goToSelectedRecord(view)"
                                [tooltip]="view.deviceName">{{view.deviceName}}</button>
                        </td>
                        <td>
                            <div>{{view.deviceMapping}}</div>
                        </td>
                        <td>
                            <div>{{view.os}}</div>
                        </td>
                        <td>
                            <div>{{view.managementIp}}</div>
                        </td>
                        <td>
                            <ng-container [ngTemplateOutlet]='tagsList'
                                [ngTemplateOutletContext]="{tags:view.tags}"></ng-container>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="card" *ngIf="!viewData.length">
        <div class="text-center text-muted py-5">No search results found.</div>
    </div>
</ng-template>

<ng-template #tagsList let-tags="tags">
    <div [popoverContext]="{ tags: tags }" [popover]="tagsTooltipTmpl" triggers="mouseenter:mouseleave" placement="top">
        <span *ngFor="let tag of tags" class="badge badge-pill badge-primary">{{tag}}</span>
    </div>
    <div *ngIf="!tags.length">N/A</div>
</ng-template>

<ng-template #tagsTooltipTmpl let-tags="tags">
    <div class="font-weight-bold">
        <span *ngFor="let tag of tags" class="badge badge-pill badge-primary m-1 font-sm">{{tag}}</span>
    </div>
</ng-template>
