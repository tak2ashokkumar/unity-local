<div *ngIf="onboardStatusViewData && onboardStatusViewData.showOnboardStatus">
  <h5>Devices On-boarding Status</h5>
  <div class="card-group rounded mb-4 border border-secondary">
    <div class="card border-0 pl-3">
      <div class="card-body px-0">
        <div class="row align-items-center justify-content-center">
          <div class="col-12">
            <div class="onb-wrap mb-2">
              <div class="onb-links">
                <button class="btn active" [ngClass]="onboardStatusViewData.vpnBtnClass" (click)="goToOnBoarding()"
                  type="button"><i class="far fa-envelope"></i></button>
              </div>
            </div>
            <small class="text-muted text-uppercase font-weight-bold d-flex justify-content-center">Connect to Unity</small>
          </div>
        </div>
      </div>
    </div>
    <div class="card border-0">
      <div class="card-body px-0">
        <div class="row align-items-center justify-content-center">
          <div class="col-12">
            <div class="row align-items-center justify-content-center">
              <div class="col-12">
                <div class="onb-wrap mb-2">
                  <div class="onb-links">
                    <button class="btn active" [ngClass]="onboardStatusViewData.excelBtnClass" (click)="goToOnBoarding()"
                      type="button"><i class="fas fa-cloud-upload-alt"></i></button>
                  </div>
                </div>
                <small class="text-muted text-uppercase font-weight-bold d-flex justify-content-center">Onboard Assets
                </small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="card border-0">
      <div class="card-body px-0">
        <div class="row align-items-center justify-content-center">
          <div class="col-12">
            <div class="row align-items-center justify-content-center">
              <div class="col-12">
                <div class="onb-wrap mb-2">
                  <div class="onb-links">
                    <button class="btn active" [ngClass]="onboardStatusViewData.monitoringBtnClass" (click)="goToOnBoarding()"
                      type="button"><i class="fas fa-chart-line"></i></button>
                  </div>
                </div>
                <small class="text-muted text-uppercase font-weight-bold d-flex justify-content-center">Monitoring</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="card border-0 pr-3">
      <div class="card-body px-0">
        <div class="row align-items-center justify-content-center">
          <div class="col-12">
            <div class="row align-items-center justify-content-center">
              <div class="col-12">
                <div class="onb-wrap mb-2">
                  <div class="onb-links">
                    <button class="btn active" [ngClass]="onboardStatusViewData.proxyBtnClass" (click)="goToOnBoarding()"
                      type="button"><i class="fas fa-tv"></i></button>
                  </div>
                </div>
                <small class="text-muted text-uppercase font-weight-bold d-flex justify-content-center">Management</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
