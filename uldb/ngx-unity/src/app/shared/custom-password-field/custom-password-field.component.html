<div class="input-group">
    <input [id]="options.id" [type]="hidden?'password':'text'" [placeholder]="options.placeholder" class="form-control rounded-left"
        [ngModel]="value" (ngModelChange)="onChange($event)" [disabled]="isDisabled" (blur)="onTouched()"
        [ngClass]="getClass()">
    <div class="input-group-append" (click)="toggleView()">
        <span class="input-group-text bg-white">
            <i class="fas" [ngClass]="[icon]"></i>
        </span>
    </div>
    <div class="invalid-feedback" *ngIf="options.errors">{{options.errors}}</div>
</div>
