<ng-template #helpModal>
  <div class="card mb-0">
    <div class="card-header">
      {{heading}}
      <div class="card-header-actions">
        <a class="card-header-action btn-close" (click)="closePopup()">
          <i class="fas fa-times"></i>
        </a>
      </div>
    </div>
    <div class="card-body">
      <ol class="px-3 text-muted">
        <li *ngFor="let msg of steps">{{msg}}</li>
      </ol>
    </div>
    <div class="card-footer">
      <button class="btn btn-sm btn-success pull-right ml-1" type="button" (click)="closePopup()">OK</button>
    </div>
  </div>
</ng-template>
