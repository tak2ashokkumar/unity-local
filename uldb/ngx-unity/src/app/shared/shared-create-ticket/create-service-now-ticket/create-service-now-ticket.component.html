<form *ngIf="ticketForm" [formGroup]="ticketForm">
    <div class="form-group">
        <label for="subject">Subject<em>*</em></label>
        <input class="form-control" id="subject" type="text" formControlName="subject" placeholder="Subject"
            [ngClass]="{'is-invalid' : formErrors.subject}">
        <div class="invalid-feedback" *ngIf="formErrors.subject">{{formErrors.subject}}</div>
    </div>
    <div class="form-group">
        <label for="collaborators">CC</label>
        <input class="form-control" id="cc" type="text" formControlName="collaborators" placeholder="example@unity.com"
            [ngClass]="{'is-invalid' : formErrors.collaborators}">
    </div>
    <div class="form-group" *ngIf="!metadata.type">
        <label for="type">Type<em>*</em></label>
        <select class="form-control text-capitalize" id="type" name="type" formControlName="type"
            [ngClass]="{'is-invalid' : formErrors.type}">
            <option [value]="''" disabled>Select Ticket Type</option>
            <option [value]="ticketType" *ngFor="let ticketType of ticketTypeList">
                {{getReadableTicketType(ticketType)}}</option>
        </select>
        <div class="invalid-feedback" *ngIf="formErrors.type">{{formErrors.type}}</div>
    </div>
    <div class="form-group" *ngIf="showPriority">
        <label for="priority">Priority<em>*</em></label>
        <select class="form-control text-capitalize" id="priority" name="priority" formControlName="priority"
            [ngClass]="{'is-invalid' : formErrors.priority}">
            <option [value]="''" disabled>Select Priority</option>
            <option *ngFor="let prt of ticketPriorityList">{{prt}}</option>
        </select>
        <div class="invalid-feedback" *ngIf="formErrors.priority">{{formErrors.priority}}</div>
    </div>
    <div class="form-group" *ngIf="showSvcCategory">
        <label for="service">Category</label>
        <select class="form-control text-capitalize" id="category" name="category"
            (change)="serviceCategorySelected($event)">
            <option [value]="''">Select Category</option>
            <option *ngFor="let cat of svcCategories" [value]="cat">{{cat}}</option>
        </select>
    </div>
    <div class="form-group" *ngIf="svcCatalog.length">
        <div class="row">
            <div [ngClass]="svcCatalogTerms.length ? 'col-6' : 'col-12'">
                <label for="service">Service</label>
                <select class="form-control text-capitalize" id="service" name="service"
                    (change)="serviceCatalogSelected($event)">
                    <option [value]="''">Select Service</option>
                    <option *ngFor="let svc of svcCatalog" [value]="svc.description">{{svc.description}}</option>
                </select>
            </div>
            <div class="col-3" *ngIf="svcCatalogTerms.length">
                <label for="serviceTerm">Term</label>
                <select class="form-control text-capitalize" id="serviceTerm" name="serviceTerm"
                    (change)="serviceCatalogTermSelected($event)">
                    <option *ngFor="let term of svcCatalogTerms" [selected]="selectedTerm.id == term.id"
                        [value]="term.name">{{term.displayName}}</option>
                </select>
            </div>
            <div class="col-3" *ngIf="svcCatalogTerms.length">
                <label for="serviceTermCharge">Charge</label>
                <input class="form-control" id="serviceTermCharge" type="text" [value]="selectedTerm.charge" readonly
                    disabled>
            </div>
        </div>
    </div>
    <div class="form-group" *ngIf="ticketForm.controls.description">
        <label for="description">Description<em>*</em></label>
        <textarea class="form-control" id="description" name="description" rows="5" formControlName="description"
            [ngClass]="{'is-invalid' : formErrors.description}" placeholder="Describe your issue here"></textarea>
        <div class="invalid-feedback" *ngIf="formErrors.description">{{formErrors.description}}</div>
    </div>
    <div class="form-group" *ngIf="ticketForm.controls.weburl">
        <label for="weburl">Web URL<em>*</em></label>
        <input trpe=text id="weburl" name="weburl" formControlName="weburl" class="form-control"
            [ngClass]="{'is-invalid' : formErrors.weburl}">
        <div class="invalid-feedback" *ngIf="formErrors.weburl">{{formErrors.weburl}}</div>
    </div>
    <div class="form-group" *ngIf="metadata.metadata">
        <label for="metadata">Metadata (Uneditable)</label>
        <textarea class="form-control" id="metadata" name="metadata" formControlName="metadata" readonly></textarea>
    </div>
</form>
