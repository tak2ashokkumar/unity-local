<table class="table text-left">
    <thead class="">
        <tr>
            <th>Ticket Number</th>
            <th>Type</th>
            <th>Title</th>
            <th class="state">Status</th>
            <th>Status Reason</th>
            <th>Priority</th>
            <th>Created On</th>
            <th>Updated On</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let ticket of viewData" setTableColumnWidth>
            <td>
                <a class="btn btn-link text-decoration-none p-0 table-column-btn"
                    [routerLink]="ticket.detailsUrl"
                    [tooltip]="ticket.ticketNumber">{{ticket.ticketNumber}}</a>
            </td>
            <td>
                <div [tooltip]="ticket.ticketType">{{ticket.ticketType}}</div>
            </td>
            <td>
                <div [tooltip]="ticket.title">{{ticket.title}}</div>
            </td>
            <td>
                <div [tooltip]="ticket.status">{{ticket.status}}</div>
            </td>
            <td>
                <div [tooltip]="ticket.statusReason">{{ticket.statusReason}}</div>
            </td>
            <td>
                <div [tooltip]="ticket.priority">{{ticket.priority}}</div>
            </td>
            <td>
                <div [tooltip]="ticket.openedAt">{{ticket.openedAt}}</div>
            </td>
            <td>
                <div [tooltip]="ticket.updatedOn">{{ticket.updatedOn}}</div>
            </td>
        </tr>
    </tbody>
</table>
<div class="text-center text-muted py-5" *ngIf="!viewData.length">No Tickets To Display.</div>
