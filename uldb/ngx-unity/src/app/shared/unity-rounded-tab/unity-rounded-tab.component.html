<div class="row">
    <div class="col-12">
        <div class="tabs-wrap d-inline-block">
            <ul class="mb-0 pl-0">
                <li *ngFor="let tab of tabItems"><span [ngClass]="isActive(tab.url)" (click)="goTo(tab)">{{tab.name}}</span>
                </li>
            </ul>
        </div>
        <ng-template [ngTemplateOutlet]="templateRef"></ng-template>
    </div>
</div>
