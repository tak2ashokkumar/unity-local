<div class="card rounded-5 mb-0">
    <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-1">
        <div class="d-flex align-items-center font-500 w-40">
            <span class="badge badge-secondary font-xs-sm">{{count}}</span>
            <span class="ml-1">Options</span>
        </div>
        <!-- <div class="d-flex align-items-center font-500 w-60">
            <search-box [searchValue]="metricsCriteria.searchValue" [customClass]="'form-control-sm'"
                (searched)="onSearched($event)" class="w-100"></search-box>
        </div> -->
    </div>
    <div class="card-body p-0 scrollable-list">
        <div *ngIf="count" class="h-100 w-100">
            <virtual-scroller #scroll [items]="optionsList" (vsEnd)="fetchMore($event)" class="h-100 w-100">
                <div class="d-flex align-items-center border-bottom px-2 py-1 pointer-link"
                    *ngFor="let m of scroll.viewPortItems" (click)="selectOption(m)">
                    <span class="mt-1 text-primary"></span>
                    <span class="font-sm ml-1">{{m?.item_name}}</span>
                </div>
                <div *ngIf="isLoading" class="loader px-3 text-primary font-lg-xl font-500"></div>
            </virtual-scroller>
        </div>
    </div>
</div>
