<a class="nav-link nav-dropdown-toggle" appNavDropdownToggle>
  <i *ngIf="isIcon()" [ngClass]="['nav-icon', link.icon]" aria-hidden="true"></i>
  {{ link.name }}
  <span *ngIf="isBadge()" [ngClass]="'badge badge-' + link.badge.variant">{{ link.badge.text }}</span>
</a>
<ul class="nav-dropdown-items" [class.tree]="isBranched()">
  <ng-template ngFor let-child [ngForOf]="link.children" [ngForTrackBy]="trackByUrl">
    <app-sidebar-nav-item [item]='child'></app-sidebar-nav-item>
  </ng-template>
</ul>
