<div class="row">
  <div class="col-12">
    <div class="card rounded-0 border-top-0">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
          <span class="badge badge-secondary font-sm">{{count}}</span>
          <span class="ml-1 font-lg">Cloud Controllers</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
          <div class="w-25">
            <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
          </div>
          <div>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
        <table class="table table-sm text-left">
          <thead class="bg-light">
            <tr>
              <th>Name</th>
              <th>Virtualization Platform</th>
              <th>Hypervisors</th>
              <th>Manage</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of viewData" setTableColumnWidth>
              <td>
                <div [tooltip]="view.name">{{view.name}}</div>
              </td>
              <td>
                <div [tooltip]="view.platformType">{{view.platformType}}</div>
              </td>
              <td>
                <div [tooltip]="view.hypervisors">{{view.hypervisors}}</div>
              </td>
              <td class="action-icons-column">
                <!-- <button class="action-icons mb-0 fas fa-external-link-square-alt font-sm ml-1" (click)="webAccessSameTab(view)"
                  [tooltip]="view.sameTabTootipMessage" [ngClass]="{'action-icons-disabled':!view.isSameTabEnabled}"></button> -->

                <button class="action-icons mb-0 fas fa-external-link-alt font-sm ml-1" (click)="webAccessNewTab(view)"
                  [tooltip]="view.newTabTootipMessage" [ngClass]="{'action-icons-disabled':!view.isNewTabEnabled}"
                  accessControl moduleName="Private Cloud" accessType="Remote Management"
                  elementType="actionbtn"></button>

                <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1" (click)="createTicket(view)"
                  tooltip="Manage by creating support ticket">
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="count"></table-entries>
        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No associated Cloud Controllers were found!!
        </div>
      </div>
    </div>
  </div>
</div>
