<div class="row">
  <div class="col-12">
    <div class="card rounded-0 border-top-0">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
          <span class="badge badge-secondary font-sm">{{count}}</span>
          <span class="ml-1 font-lg">Mobile Devices</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <button class="btn btn-pill btn-sm btn-warning font-500" type="button" (click)="addMobile()"
            *ngIf="addMobileEnabled" accessControl moduleName="Datacenter" accessType="Manage Datacenter"
            elementType="btn">
            <span class="fas fa-plus"></span>
            <span class="font-xs-sm mx-1">Mobile Device</span>
          </button>
          <button class="btn btn-sm btn-pill btn-warning font-500 ml-2" type="button" (click)="downlaodList()"
            *ngIf="viewData.length" accessControl moduleName="Datacenter" accessType="Manage Datacenter"
            elementType="btn">
            <span class="fa fa-download"></span>
            <span class="font-xs-sm mx-1">Download</span>
          </button>
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
          <div class="w-25">
            <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
          </div>
          <div>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
        <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
          <thead class="bg-light">
            <tr>
              <th sortable-column="name">Name</th>
              <th>Serial Number</th>
              <th>Device Type</th>
              <th>Platform</th>
              <th>Model</th>
              <th>IP Address</th>
              <th>Tagged Device</th>
              <th>Tags</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of viewData;let i = index" setTableColumnWidth>
              <td>
                <div [tooltip]="view.name">{{view.name}}</div>
              </td>
              <td>
                <div [tooltip]="view.serialNumber">{{view.serialNumber}}</div>
              </td>
              <td>
                <div [tooltip]="view.deviceType">{{view.deviceType}}</div>
              </td>
              <td>
                <div [tooltip]="view.deviceType">{{view.platform}}</div>
              </td>
              <td>
                <div [tooltip]="view.model">{{view.model}}</div>
              </td>
              <td>
                <div [tooltip]="view.ipAddress">{{view.ipAddress}}</div>
              </td>
              <td>
                <div [tooltip]="view.deviceTagged">{{view.deviceTagged}}</div>
              </td>
              <td>
                <ng-container [ngTemplateOutlet]='tagsList' [ngTemplateOutletContext]="{tags:view.tags}"></ng-container>
              </td>
              <td class="action-icons-column">
                <button class="action-icons mb-0 fas fa-external-link-alt font-sm ml-1" [tooltip]="'Manage Via MDM'"
                  (click)="consoleNewTab(view.id,i)" accessControl moduleName="Datacenter"
                  accessType="Remote Management" elementType="actionbtn"></button>
                <button class="action-icons mt-1 fas fa-pencil-alt font-sm ml-1" tooltip="Edit"
                  (click)="editMobile(view.id)" accessControl moduleName="Datacenter" accessType="Manage Datacenter"
                  elementType="actionbtn"></button>
                <button class="action-icons mt-1 far fa-trash-alt font-sm ml-1" tooltip="Delete"
                  (click)="deleteMobile(view.id)" accessControl moduleName="Datacenter" accessType="Manage Datacenter"
                  elementType="actionbtn"></button>
                <!-- <button class="action-icons mt-1 fas fa-bell font-sm ml-1" tooltip="Alert Notification" (click)="notifyMobile(view.id)"></button> -->
                <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1"
                  tooltip="Manage by creating support ticket" (click)="createTicket(view)"></button>
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="count">
        </table-entries>
        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No Mobile Device available to display.</div>
      </div>
    </div>
  </div>
</div>
<ng-template #tagsList let-tags="tags">
  <div [popoverContext]="{ tags: tags }" [popover]="tagsTooltipTmpl" triggers="mouseenter:mouseleave" placement="top">
    <span *ngFor="let tag of tags" class="badge badge-pill badge-primary">{{tag}}</span>
  </div>
  <div *ngIf="!tags.length">N/A</div>
</ng-template>

<ng-template #tagsTooltipTmpl let-tags="tags">
  <div class="font-weight-bold">
    <span *ngFor="let tag of tags" class="badge badge-pill badge-primary m-1 font-sm">{{tag}}</span>
  </div>
</ng-template>

<assets-mobile-device-crud (onCrud)="onCrud($event)"></assets-mobile-device-crud>
<device-zabbix-email-notification></device-zabbix-email-notification>
