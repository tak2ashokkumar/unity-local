<div class="row">
  <div class="col-6">
    <div class="row">
      <div class="col">
        <datacenter-pdus-overview-details [deviceId]="deviceId"></datacenter-pdus-overview-details>
      </div>
    </div>
  </div>
  <div class="col-6">
    <div class="row">
      <div class="col" *ngIf="deviceStatus">
        <device-status [input]="deviceStatus"></device-status>
      </div>
    </div>
    <div class="row" *ngFor="let sensor of sensors">
      <div class="col">
        <device-sensor [input]="sensor"></device-sensor>
      </div>
    </div>
  </div>
</div>
