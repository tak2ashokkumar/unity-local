<div class="row">
  <div class="col-12">
    <div class="tab-content">
      <div class="tab-pane active p-1">
        <!-- <ul class="nav">
          <li class="nav-item">
            <a class="nav-link py-0 pl-0 text-success">fw1-302-sf10</a>
          </li>
        </ul> -->
        <scrollable-tab [selector]="'active'" *ngIf="tabItems.length">
          <div class="nav-item " #scrollLeft>
            <a class="nav-link "><i class="fa fa-angle-left"></i></a>
          </div>
          <ul class="nav custom-nav-container w-100 border-bottom-0" #tabContent role="tablist">
            <li class="nav-item " *ngFor="let tab of tabItems">
              <a class="nav-link " [ngClass]="isPCTabActive(tab)" (click)="goToPCTab(tab)">
                {{tab.name}}</a>
            </li>
          </ul>
          <div class="nav-item " #scrollRight>
            <a class="nav-link "><i class="fa fa-angle-right"></i></a>
          </div>
          <div class="nav-item ">
            <a class="nav-link p-0">
              <div dropdown placement="bottom right" container="body" accessControl moduleName="Private Cloud"
                accessType="Manage Private Cloud" elementType="btn">
                <div class="nav-item" data-toggle="dropdown" aria-controls="dropdown-container" dropdownToggle>
                  <a class="nav-link rounded-top border-0 "><i class="fa fa-ellipsis-v align-middle"></i></a>
                </div>
                <div id="dropdown-container" class="dropdown-menu dropdown-menu-right mt-0" *dropdownMenu
                  aria-labelledby="button-container">
                  <a class="dropdown-item" (click)="addPrivateCloud()"><i class="fa fa-plus-square"></i>Add</a>
                </div>
              </div>
            </a>
          </div>
        </scrollable-tab>
        <div class="col-12" *ngIf="!tabItems.length">
          <div class="empty-clouds text-center py-3" accessControl moduleName="Private Cloud"
            accessType="Manage Private Cloud" elementType="div">No Private Cloud Configured for this datacenter. <span
              class="btn-link pointer-link" (click)="addPrivateCloud()">Click
              here</span> to add.</div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-12 mt-3" *ngIf="tabItems.length">
    <scrollable-tab [selector]="'active'">
      <div class="nav-item border-right border-light" #scrollLeft>
        <a class="nav-link bg-secondary rounded-top border-bottom-0"><i class="fa fa-angle-left"></i></a>
      </div>
      <ul class="nav nav-tabs nav-tabs custom-nav-container border-bottom-0" #tabContent role="tablist">
        <li class="nav-item bg-secondary rounded-top" *ngFor="let tab of tabData">
          <a class="nav-link" [ngClass]="isActive(tab)" (click)="goTo(tab)">
            <i class="fa" [ngClass]="tab.icon"></i> {{tab.name}}</a>
        </li>
      </ul>
      <div class="nav-item border-left border-light" #scrollRight>
        <a class="nav-link bg-secondary rounded-top border-bottom-0"><i class="fa fa-angle-right"></i></a>
      </div>
    </scrollable-tab>
    <router-outlet></router-outlet>
  </div>
  <pc-crud [isAddorEditEnabled]="false" (onCrud)="onCrud($event)"></pc-crud>
</div>
