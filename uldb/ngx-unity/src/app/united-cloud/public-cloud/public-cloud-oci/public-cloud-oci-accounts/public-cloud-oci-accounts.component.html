<div class="card rounded-0">
  <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
    <div class="d-flex justify-content-center align-items-center font-500">
      <!-- <span class="badge badge-secondary font-sm">{{count}}</span> -->
      <span class="font-lg">OCI Accounts</span>
    </div>
    <div class="d-flex justify-content-end align-items-center">
      <button class="btn btn-pill btn-sm btn-warning mx-2 px-3 font-500" type="button" (click)="addAccount()">
        <span class="font-sm">Add Account</span>
      </button>
      <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
    </div>
  </div>
  <div class="card-body py-2">
    <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
      <div class="w-25">
        <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
      </div>
      <div>
        <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
          (pageSizeChange)="pageSizeChange($event)"></table-page-size>
      </div>
    </div>
    <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
      <thead class="bg-light">
        <tr>
          <th sortable-column="name">Name</th>
          <th>Region</th>
          <th>user ID</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let view of viewData" truncateText>
          <td class="tdw-25">
            <div [tooltip]="view.name">{{view.name}}</div>
          </td>
          <td class="tdw-20">
            <div [tooltip]="view.region">{{view.region}}</div>
          </td>
          <td class="tdw-55">
            <div [tooltip]="view.userOcid">{{view.userOcid}}</div>
          </td>
          <td class="action-icons-column">
            <button class="action-icons mb-0 fa fa-list-ul font-sm ml-1" tooltip="Show Inventory" (click)="goToInventory(view)">
            </button>
            <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" tooltip="Edit" (click)="editAccount(view)">
            </button>
            <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1" tooltip="Manage by creating support ticket"
              (click)="createTicket(view)">
            </button>
            <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" tooltip="Delete Account" (click)="deleteAccount(view)">
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="count"></table-entries>
    <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
      [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
    <div class="text-center text-muted py-4" *ngIf="!viewData.length">No accounts were found.</div>
  </div>
</div>

<public-cloud-oci-crud (onCrud)="onCrud($event)"></public-cloud-oci-crud>
