<div class="card border-top-0">
  <app-spinner [name]="'allcon'"></app-spinner>
  <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
    <div class="d-flex justify-content-center align-items-center font-500">
      <span class="badge badge-secondary font-sm">{{count}}</span>
      <span class="ml-1 font-lg">Containers</span>
    </div>
    <div class="d-flex justify-content-end align-items-center w-30">
      <table-search-box class="w-100" (searched)="onSearched($event)"></table-search-box>
    </div>
  </div>
  <div class="card-body p-0">
    <table class="table table-sm text-left mb-0">
      <thead>
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>Cluster Name</th>
          <th>Pod IP</th>          
          <th>Name Space</th>
          <th>Start Time</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let view of viewData" setTableColumnWidth>
          <td class="w-25">
            <button class="btn btn-link text-decoration-none p-0 table-column-btn" [tooltip]="view.name" type="button">{{view.name}}</button>
          </td>
          <td class="w-15">
            <div [tooltip]="view.status" class="text-capitalize">
              <i class="fa status-icon" [ngClass]="view.statusIcon"></i> {{view.status}}
            </div>
          </td>
          <td class="w-15">
            <div [tooltip]="view.clusterName">{{view.clusterName}}</div>
          </td>
          <td class="w-15">
            <div [tooltip]="view.podIp">{{view.podIp}}</div>
          </td>
          <td class="w-15">
            <div [tooltip]="view.namespace">{{view.namespace}}</div>
          </td>
          <td class="w-15">
            <div [tooltip]="view.startTime">{{view.startTime}}</div>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="text-center text-muted py-4" *ngIf="!viewData.length">No pods were found.</div>
  </div>
</div>
