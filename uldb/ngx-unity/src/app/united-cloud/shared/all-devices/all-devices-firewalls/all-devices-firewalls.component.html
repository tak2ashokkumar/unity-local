<div class="card border-top-0">
  <app-spinner [name]="'allfw'"></app-spinner>
  <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
    <div class="d-flex justify-content-center align-items-center font-500">
      <span class="badge badge-secondary font-sm">{{count}}</span>
      <span class="ml-1 font-lg">Firewalls</span>
    </div>
    <div class="d-flex justify-content-end align-items-center w-30">
      <table-search-box class="w-100" [searchValue]="currentCriteria.searchValue"
        (searched)="onSearched($event)"></table-search-box>
    </div>
  </div>
  <div class="card-body p-0">
    <table class="table table-sm text-left mb-0">
      <thead>
        <tr>
          <th>Device Name</th>
          <th>Status</th>
          <th>Events</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let view of viewData">
          <td class="w-40">
            <button class="btn btn-link text-decoration-none p-0 table-column-btn" type="button">{{view.name}}</button>
          </td>
          <td class="w-20">
            <shared-device-status [status]="view.deviceStatus"></shared-device-status>
          </td>
          <td class="w-20">
            <span *ngIf="!view.eventsCount"><i class="fa fa-spinner fa-spin">&nbsp;</i></span>
            <button *ngIf="view.showEvents" class="btn btn-link text-decoration-none p-0" type="button"
              (click)="showAlerts(view)">{{view.eventsCount}}</button>
            <span *ngIf="!view.showEvents">{{view.eventsCount}}</span>
          </td>
          <td class="w-20">
            <button class="action-icons mb-0 fas fa-chart-line font-sm ml-1"
              [ngClass]="{'action-icons-disabled':!view.isStatsButtonEnabled}" (click)="goToStats(view)"
              [tooltip]="view.statsTooltipMessage" accessControl moduleName="Monitoring" accessType="View Monitoring"
              elementType="actionbtn">
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="text-center text-muted py-4" *ngIf="!viewData.length">No associated Firewalls were found.</div>
  </div>
</div>
