<div class="card text-center">
  <div class="card-header ">
    <ul class="nav nav-tabs card-header-tabs">
      <li class="nav-item">
        <a class="nav-link text-warning font-lg border-0">Server Sensor Data</a>
      </li>
    </ul>
  </div>
  <div class="card border-0 rounded-0 p-0 mb-0">
    <app-spinner [name]="'bmsstats'"></app-spinner>
    <table class="table text-left">
      <thead class="">
        <tr>
          <th>Sensor</th>
          <th>Sensor ID</th>
          <th>Status</th>
          <th>Entity ID</th>
          <th>Reading</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let stat of stats">
          <td>{{stat.sensor}}</td>
          <td>{{stat.sensorId}}</td>
          <td>{{stat.status}}</td>
          <td>{{stat.entityId}}</td>
          <td>{{stat.reading}}</td>
        </tr>
      </tbody>
    </table>
    <div class="text-center text-muted mb-2" *ngIf="!stats">No Sensor data to display!!</div>
  </div>
</div>
