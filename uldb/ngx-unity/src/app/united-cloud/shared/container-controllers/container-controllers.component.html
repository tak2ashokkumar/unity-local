<div class="row">
  <div class="col-12">
    <div class="card rounded-0 border-top-0">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
          <span class="badge badge-secondary font-sm">{{viewData.length}}</span>
          <span class="ml-1 font-lg">Controllers</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <button class="btn btn-pill btn-sm btn-warning font-500" type="button" (click)="addController()"
            *ngIf="addControllerEnabled" accessControl moduleName="Private Cloud" accessType="Manage Private Cloud"
            elementType="btn">
            <span class="fas fa-plus"></span>
            <span class="font-xs-sm mx-1">Controller</span>
          </button>
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
          <div class="w-25">
            <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
          </div>
          <div>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="viewData.length"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
        <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
          <thead class="bg-light">
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Host URL</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of viewData; let i = index;" truncateText>
              <td class="tdw-25">
                <div [tooltip]="view.name">{{view.name}}</div>
              </td>
              <td class="tdw-20">
                <div [tooltip]="view.displayType">{{view.displayType}}</div>
              </td>
              <td class="tdw-35">
                <div [tooltip]="view.hostname">{{view.hostname}}</div>
              </td>
              <td class="tdw-20">
                <shared-device-status [status]="view.deviceStatus"></shared-device-status>
              </td>
              <td class="action-icons-column">
                <button class="action-icons mb-0 fa fa-list-ul font-sm ml-1" tooltip="Show Details"
                  (click)="goTo(view)">
                </button>
                <button class="action-icons mb-0 fa fa-key font-sm ml-1" tooltip="Change Password"
                  (click)="changePassword(view)" accessControl moduleName="Private Cloud"
                  accessType="Manage Private Cloud" elementType="actionbtn">
                </button>
                <button class="action-icons mb-0 fas fa-chart-line font-sm ml-1" (click)="goToStats(view)"
                  [tooltip]="view.statsTooltipMessage" accessControl moduleName="Monitoring"
                  accessType="View Monitoring" elementType="actionbtn">
                </button>
                <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" tooltip="Edit"
                  (click)="editController(view)" accessControl moduleName="Private Cloud"
                  accessType="Manage Private Cloud" elementType="actionbtn">
                </button>
                <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" tooltip="Delete Controller"
                  (click)="deleteController(view)" accessControl moduleName="Private Cloud"
                  accessType="Manage Private Cloud" elementType="actionbtn">
                </button>
                <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1"
                  tooltip="Manage by creating support ticket" (click)="createTicket(view)">
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="viewData.length"></table-entries>
        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="viewData.length" (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No controllers were found.</div>
      </div>
    </div>
  </div>
</div>
<container-controller-crud (onCrud)="onCrud($event)"></container-controller-crud>
