<div class="row">
  <div class="col-12">
    <div class="card rounded-0">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
          <span class="badge badge-secondary font-sm">{{count}}</span>
          <span class="ml-1 font-lg">Docker Nodes</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
          <div class="w-25">
            <search-box (searched)="onSearched($event)"></search-box>
          </div>
          <div>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
        <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
          <thead class="bg-light">
            <tr>
              <th sortable-column="hostname">Hostname</th>
              <th sortable-column="short_id">Node ID</th>
              <th sortable-column="status">Status</th>
              <th sortable-column="ip_address">IP Address</th>
              <th sortable-column="cpus">CPU</th>
              <th sortable-column="memory">Memory</th>
              <th sortable-column="os">Operating System</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of viewData" setTableColumnWidth>
              <td>
                <div [tooltip]="view.hostname">{{view.hostname}}</div>
              </td>
              <td>
                <div [tooltip]="view.shortId" class="text-capitalize">
                  {{view.shortId}}
                </div>
              </td>
              <td>
                <div [tooltip]="view.status" class="text-capitalize">
                  <i class="fa status-icon" [ngClass]="view.statusIcon"></i> {{view.status}}
                </div>
              </td>
              <td>
                <div [tooltip]="view.ipAddress">{{view.ipAddress}}</div>
              </td>
              <td>
                <div [tooltip]="view.cpus">{{view.cpus}}</div>
              </td>
              <td>
                <div [tooltip]="view.memory">{{view.memory}}</div>
              </td>
              <td>
                <div [tooltip]="view.memory">{{view.os}}</div>
              </td>
              <td class="action-icons-column">
                <button class="action-icons mb-0 fas fa-external-link-square-alt font-sm ml-1"
                  [tooltip]="view.sameTabTootipMessage" [ngClass]="{'action-icons-disabled':!view.isSameTabEnabled}"
                  (click)="consoleSameTab(view)" accessControl moduleName="Private Cloud" accessType="Remote Management"
                  elementType="actionbtn"></button>
                <button class="action-icons mb-0 fas fa-external-link-alt font-sm ml-1"
                  [tooltip]="view.newTabTootipMessage" [ngClass]="{'action-icons-disabled':!view.isNewTabEnabled}"
                  (click)="consoleNewTab(view)" accessControl moduleName="Private Cloud" accessType="Remote Management"
                  elementType="actionbtn"></button>
                <!-- <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" tooltip="Delete Node"
                  (click)="deleteNode(view)" accessControl moduleName="Private Cloud" accessType="Manage Private Cloud"
                  elementType="actionbtn">
                </button> -->
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="count"></table-entries>
        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No nodes were found.</div>
      </div>
    </div>
  </div>
</div>
