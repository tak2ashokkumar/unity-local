<div class="row" *ngIf="controllerId">
  <div class="col-12">
    <div class="tab-content">
      <div class="tab-pane active p-2">
        <ul class="nav">
          <li class="nav-item" *ngFor="let tab of tabData">
            <a class="nav-link py-0" [ngClass]="isActive(tab)" (click)="goTo(tab)">{{tab.name}}</a>
          </li>
          <li class="nav-item ml-auto text-warning">
            <a class="nav-link py-0 " (click)="goBack()"><i class="fa fa-arrow-left">&nbsp;</i>Controllers List</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
  <div class="col-12 mt-3">
    <router-outlet></router-outlet>
  </div>
</div>

<div class="container-fluid" *ngIf=!controllerId>
  <div class="animated fadeIn">
    <div class="row">
      <div class="col-12">
        <scrollable-tab [selector]="'active'">
          <div class="nav-item border-right border-light" #scrollLeft>
            <a class="nav-link bg-secondary rounded-top border-bottom-0"><i class="fa fa-angle-left"></i></a>
          </div>
          <ul class="nav nav-tabs nav-tabs custom-nav-container border-bottom-0" #tabContent role="tablist">
            <li class="nav-item bg-secondary rounded-top" *ngFor="let tab of tabData">
              <a class="nav-link" [ngClass]="isActive(tab)" (click)="goTo(tab)">
                {{tab.name}}</a>
            </li>
          </ul>
          <div class="nav-item border-left border-light" #scrollRight>
            <a class="nav-link bg-secondary rounded-top border-bottom-0"><i class="fa fa-angle-right"></i></a>
          </div>
        </scrollable-tab>
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
