<div class="row">
  <div class="col-12">
    <div class="tab-content">
      <div class="tab-pane active p-2">
        <ul class="nav">
          <li class="nav-item ml-auto text-warning">
            <a class="nav-link py-0 " (click)="goBack()"><i class="fa fa-arrow-left">&nbsp;</i>Pods List</a>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="col-12 mt-3">
    <div class="card rounded-0 border-top-0">
      <div class="card-header bg-transparent border-bottom-0 mt-3">
        <div class="row">
          <div class="col-3">
            <table-search-box (searched)="onSearched($event)"></table-search-box>
          </div>
          <div class="col">
            <span class="text-muted font-sm float-right align-middle ml-2"><span
                class="badge badge-pill badge-secondary">{{count}}</span>&nbsp;
              Containers</span>
            <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
            <!-- <button class="btn btn-pill btn-warning pull-right btn-sm" type="button" (click)="addController()"
              accessControl moduleName="Private Cloud" accessType="Manage Private Cloud" elementType="btn">Add
              Controller</button> -->
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
      </div>
      <div class="card-body">
        <table class="table text-left" sortableTable (sorted)="onSorted($event)" *ngIf="viewData.length">
          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Image</th>
              <th>CPU Request</th>
              <th>Memory Request</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of viewData" setTableColumnWidth>
              <td>
                <div [tooltip]="view.name">{{view.name}}</div>
              </td>
              <td>
                <div [tooltip]="view.status" class="text-capitalize">
                  <i class="fa status-icon" [ngClass]="view.statusIcon"></i> {{view.status}}
                </div>
              </td>
              <td>
                <div [tooltip]="view.image">{{view.image}}</div>
              </td>
              <td>
                <div [tooltip]="view.cpuRequest">{{view.cpuRequest}}</div>
              </td>
              <td>
                <div [tooltip]="view.memoryRequest">{{view.memoryRequest}}</div>
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="count"></table-entries>
        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted" *ngIf="!viewData.length">No containers were found.</div>
      </div>
    </div>
  </div>
</div>
