<div class="row">
  <div class="col-12">
    <div class="card rounded-0 border-top-0">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
          <span class="badge badge-secondary font-sm">{{count}}</span>
          <span class="ml-1 font-lg">Database Servers</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <devices-file-upload [deviceType]="'database_servers'" [uuids]="selectedDbIds" accessControl
            moduleName="Datacenter" accessType="Manage Datacenter" elementType="btn"></devices-file-upload>

          <ng-container *ngIf="selectedDbIds?.length">
            <button class="btn btn-sm btn-pill btn-warning ml-1 font-500" type="button"
              (click)="bulkUpdate()">Update</button>
            <!-- <button class="btn btn-sm btn-pill btn-danger ml-1 font-500" type="button"
              (click)="bulkDelete()">Delete</button> -->
          </ng-container>

          <button class="btn btn-pill btn-sm btn-warning ml-1 font-500" type="button" (click)="addDBServer()"
            *ngIf="isCrudEnabled" accessControl moduleName="Datacenter" accessType="Manage Datacenter"
            elementType="btn">
            <span class="fas fa-plus"></span>
            <span class="font-xs-sm mx-1">Database Server</span>
          </button>
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
          <div class="w-25">
            <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
          </div>
          <div>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
        <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
          <thead class="bg-light">
            <tr>
              <th scope="col">
                <span class="bg-white text-primary">
                  <i class="fa-check-square" [ngClass]="selectedAll? 'fas':'far'"
                    (click)="$event.stopPropagation();selectAll()"></i>
                </span>
              </th>
              <th sortable-column="db_instance_name">Instance Name</th>
              <th>Status</th>
              <th>Type</th>
              <th>Port</th>
              <th>Server Name</th>
              <th>Management Ip</th>
              <th>Operating System</th>
              <th *ngIf="showDevicesColumns">Cloud</th>
              <th>Tags</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of viewData; let i = index" setTableColumnWidth truncateText>
              <td class="tdw-2">
                <span class="bg-white mr-1 text-primary" (click)="$event.stopPropagation();select(view);" accessControl
                  moduleName="Datacenter" accessType="Manage Datacenter" elementType="actionbtn"
                  [modulePermissions]="view.applicableModulePermissions">
                  <i [ngClass]="view.isSelected? 'fas fa-check-square': 'far fa-square'"></i>
                </span>
              </td>
              <td class="tdw-15">
                <button class="btn btn-link text-decoration-none p-0 table-column-btn" type="button"
                  [tooltip]="view.instanceName" (click)="goToDetails(view)">{{view.instanceName}}</button>
              </td>
              <td class="tdw-7">
                <shared-device-status [status]="view.deviceStatus"></shared-device-status>
              </td>
              <td class="tdw-10">
                <div [tooltip]="view.type">{{view.type}}</div>
              </td>
              <td class="tdw-7">
                <div [tooltip]="view.port">{{view.port}}</div>
              </td>
              <td class="tdw-15">
                <div [tooltip]="view.serverName">{{view.serverName}}</div>
              </td>
              <td class="tdw-13">
                <div [tooltip]="view.managementIP">{{view.managementIP}}</div>
              </td>
              <td class="tdw-13">
                <div [tooltip]="view.os">{{view.os}}</div>
              </td>
              <td *ngIf="showDevicesColumns" class="tdw-10">
                <div [tooltip]="view.cloud">{{view.cloud}}</div>
              </td>
              <td class="tdw-10">
                <ng-container [ngTemplateOutlet]='tagsList' [ngTemplateOutletContext]="{tags:view.tags}"></ng-container>
              </td>
              <td class="action-icons-column">
                <button class="action-icons mb-0 fas fa-external-link-square-alt font-sm ml-1"
                  [tooltip]="view.sshOptions.sameTabTooltipMessage"
                  [ngClass]="{'action-icons-disabled':!view.sshOptions.isSameTabEnabled}" (click)="consoleSameTab(view)"
                  accessControl moduleName="Datacenter" accessType="Remote Management" elementType="actionbtn"></button>

                <button class="action-icons mb-0 fas fa-external-link-alt font-sm ml-1"
                  [tooltip]="view.sshOptions.newTabTooltipMessage"
                  [ngClass]="{'action-icons-disabled':!view.sshOptions.isNewTabEnabled}" (click)="consoleNewTab(view)"
                  accessControl moduleName="Datacenter" accessType="Remote Management" elementType="actionbtn"></button>

                <button class="action-icons mb-0 fas fa-chart-line font-sm ml-1" (click)="goToStats(view)"
                  [tooltip]="view.statsTooltipMessage" accessControl moduleName="Monitoring"
                  accessType="View Monitoring" elementType="actionbtn">
                </button>

                <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1"
                  tooltip="Manage by creating support ticket" (click)="createTicket(view)"></button>

                <span dropdown placement="bottom right" container="body" *ngIf="isCrudEnabled">
                  <button id="button-container" class="action-icons mb-0 fa fa-ellipsis-h font-sm ml-1"
                    data-toggle="dropdown" aria-controls="icons-dropdown-container" dropdownToggle (click)="false"
                    [tooltip]="'More Actions'" container="body"></button>
                  <div container="body" id="icons-dropdown-container"
                    class="dropdown-menu dropdown-menu-right text-center mt-2" *dropdownMenu
                    aria-labelledby="button-container">
                    <button class="action-icons mt-2 mb-1 fas fa-bell font-sm" (click)="notifyDBServer(view)"
                      [tooltip]="'Alert Notification'" container="body"
                      [ngClass]="{'action-icons-disabled': view.isShared}" accessControl moduleName="Notifications"
                      accessType="Manage Notifications" elementType="actionbtn"></button>
                    <button class="action-icons mt-1 mb-1 fas fa-pencil-alt font-sm" (click)="editDBServer(view)"
                      [tooltip]="view.editBtnTooltipMsg" container="body"
                      [ngClass]="{'action-icons-disabled': view.isShared}" accessControl moduleName="Datacenter"
                      accessType="Manage Datacenter" elementType="actionbtn"></button>
                    <button class="action-icons mt-1 mb-2 far fa-trash-alt font-sm" (click)="deleteDBServer(view)"
                      [tooltip]="view.deleteBtnTooltipMsg" container="body"
                      [ngClass]="{'action-icons-disabled': view.isShared}" accessControl moduleName="Datacenter"
                      accessType="Manage Datacenter" elementType="actionbtn"></button>
                  </div>
                </span>
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="count"></table-entries>
        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No associated Databases were found.</div>
      </div>
    </div>
  </div>
</div>
<ng-template #tagsList let-tags="tags">
  <div [popoverContext]="{ tags: tags }" [popover]="tagsTooltipTmpl" triggers="mouseenter:mouseleave" placement="top">
    <span *ngFor="let tag of tags" class="badge badge-pill badge-primary">{{tag}}</span>
  </div>
  <div *ngIf="!tags.length">N/A</div>
</ng-template>

<ng-template #tagsTooltipTmpl let-tags="tags">
  <div class="font-weight-bold">
    <span *ngFor="let tag of tags" class="badge badge-pill badge-primary m-1 font-sm">{{tag}}</span>
  </div>
</ng-template>
<ng-template #popTemplate>
  <devices-popover [data]="popData"></devices-popover>
</ng-template>

<ng-template #bulkEditModel>
  <device-details-bulk-update-popup [deviceType]="'database_servers'" [fieldsList]="fields" (close)="cancelButton()"
    (onSubmit)="submit($event)"></device-details-bulk-update-popup>
</ng-template>

<database-server-crud (onCrud)="onCrud($event)"></database-server-crud>
<device-zabbix-email-notification></device-zabbix-email-notification>
