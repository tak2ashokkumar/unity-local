<div class="card border-0 rounded-0" *ngIf="found">
  <app-spinner [name]="data.graphType"></app-spinner>
  <div class="card-body" *ngIf="!graphSet">
    <h5 class="card-title text-warning">{{data?.label}}</h5>
  </div>
  <div class="card-body" *ngIf="graphSet">
    <h5 class="card-title text-warning">{{data?.label}}</h5>
    <div class="row">
      <div class="col-3"><img class="img-fluid pointer-link" [src]="'data:image/png;base64,'+graphSet.graph_by_day"
          (click)="goToGraphDetail('graph_by_day')"></div>
      <div class="col-3">
        <img class="img-fluid pointer-link" [src]="'data:image/png;base64,'+graphSet.graph_by_week" (click)="goToGraphDetail('graph_by_week')">
      </div>
      <div class="col-3">
        <img class="img-fluid pointer-link" [src]="'data:image/png;base64,'+graphSet.graph_by_month" (click)="goToGraphDetail('graph_by_month')">
      </div>
      <div class="col-3"><img class="img-fluid pointer-link" [src]="'data:image/png;base64,'+graphSet.graph_by_year"
          (click)="goToGraphDetail('graph_by_year')"></div>
    </div>
  </div>
</div>
