<div class="card">
  <div class="card-header bg-transparent border-bottom-0 ml-0 card-title ">
    <h4 class="card-title font-lg text-capitalize">{{input?.sensorType}}</h4>
  </div>
  <div class="card-body pt-0">
    <div class="row align-items">
      <div class="col">
        <table class="table text-left table-responsive-sm mb-0">
          <tbody>
            <tr *ngFor="let item of input.sensors">
              <td>{{item.sensorName}}</td>
              <td><img [src]="'data:image/png;base64,'+item.sensorDetail.graph"></td>
              <td>{{item.sensorDetail.sensor_value}}<span [innerHTML]="item.sensorDetail.sensor_unit"></span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
