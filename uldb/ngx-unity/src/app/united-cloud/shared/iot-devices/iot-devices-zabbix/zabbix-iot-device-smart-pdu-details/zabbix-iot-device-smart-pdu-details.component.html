<div class="row">
    <div class="col-12">
        <form *ngIf="detailForm" [formGroup]="detailForm">
            <div class="card">
                <div class="card-header d-flex align-items-center justify-content-between font-weight-bold px-2 py-1">
                    <div class="w-75 py-1">
                        <span> Details</span>
                    </div>
                    <div>
                        <button class="action-icons fas fa-angle-down font-sm pull-right mr-2"
                            [tooltip]="isDetailsFormOpen ? 'Minimize' : 'Expand'" (click)="toggleDetailsFormAccordion()"
                            [attr.aria-expanded]="isDetailsFormOpen"></button>
                        <button class="action-icons fas fa-pencil-alt font-sm pull-right mb-0 mr-2"
                            (click)="manageDetailsForm()" [tooltip]="'Edit'" container="body" accessControl
                            moduleName="Monitoring" accessType="Manage Monitoring" elementType="actionbtn"></button>
                    </div>
                </div>
                <div class="card-body" [collapse]="!isDetailsFormOpen">
                    <div class="row text-right">
                        <div class="col-6">
                            <div class="form-group row">
                                <label for="name" class="col-3 col-form-label">Name</label>
                                <div class="col-9">
                                    <input id="name" class="form-control" type="text" formControlName="name">
                                </div>
                            </div>

                            <div class="form-group row">
                                <label for="serial_number" class="col-3 col-form-label">Serial Number</label>
                                <div class="col-9">
                                    <input id="serial_number" class="form-control" type="text"
                                        formControlName="serial_number">
                                </div>
                            </div>

                            <div class="form-group row">
                                <label for="uptime" class="col-3 col-form-label">Uptime</label>
                                <div class="col-9">
                                    <input id="uptime" class="form-control" type="text" formControlName="uptime">
                                </div>
                            </div>

                            <div class="form-group row">
                                <label for="current" class="col-3 col-form-label">Average Current(A)</label>
                                <div class="col-9">
                                    <input id="current" class="form-control" type="text" formControlName="current">
                                </div>
                            </div>

                            <div class="form-group row">
                                <label for="manufacturer" class="col-3 col-form-label">Manufacturer</label>
                                <div class="col-9">
                                    <input id="manufacturer" class="form-control" type="text"
                                        formControlName="manufacturer">
                                </div>
                            </div>

                            <div class="form-group row" formGroupName="collector">
                                <label class="col-3 col-form-label" for="collectoruuid">Collector<em>*</em></label>
                                <div class="col-9">
                                    <select id="collectoruuid" class="form-control" formControlName="uuid"
                                        [class.is-invalid]="detailFormErrors.collector.uuid">
                                        <option value="" disabled>Select Collector</option>
                                        <option *ngFor="let collector of collectors" [value]="collector.uuid">
                                            {{collector.name}}</option>
                                    </select>
                                    <div class="invalid-feedback text-left" *ngIf="detailFormErrors.collector.uuid">
                                        {{detailFormErrors.collector.uuid}}</div>
                                </div>
                            </div>

                            <div class="form-group row">
                                <label for="description" class="col-3 col-form-label">Description</label>
                                <div class="col-9">
                                    <textarea id="description" class="form-control static" rows='4'
                                        formControlName="description"
                                        [class.is-invalid]="detailFormErrors.description"></textarea>
                                    <div class="invalid-feedback text-left" *ngIf="detailFormErrors.description">
                                        {{detailFormErrors.description}}</div>
                                </div>
                            </div>

                        </div>
                        <div class="col-6">
                            <div class="form-group row">
                                <label for="ip_address" class="col-3 col-form-label">IP Address</label>
                                <div class="col-9">
                                    <input id="ip_address" class="form-control" type="text"
                                        formControlName="ip_address">
                                </div>
                            </div>

                            <div class="form-group row">
                                <label for="asset_tag" class="col-3 col-form-label">Asset Tag</label>
                                <div class="col-9">
                                    <input id="asset_tag" class="form-control" type="text" formControlName="asset_tag"
                                        [class.is-invalid]="detailFormErrors.asset_tag">
                                    <div class="invalid-feedback text-left" *ngIf="detailFormErrors.asset_tag">
                                        {{detailFormErrors.asset_tag}}</div>
                                </div>
                            </div>

                            <div class="form-group row">
                                <label for="power" class="col-3 col-form-label">Average Power(W)</label>
                                <div class="col-9">
                                    <input id="power" class="form-control" type="text" formControlName="power">
                                </div>
                            </div>

                            <div class="form-group row">
                                <label for="voltage" class="col-3 col-form-label">Average Voltage(V)</label>
                                <div class="col-9">
                                    <input id="voltage" class="form-control" type="text" formControlName="voltage">
                                </div>
                            </div>

                            <div class="form-group row">
                                <label for="model" class="col-3 col-form-label">Model</label>
                                <div class="col-9">
                                    <input id="model" class="form-control" type="text" formControlName="model">
                                </div>
                            </div>

                            <div class="form-group row">
                                <label for="firmware" class="col-3 col-form-label">Firmware</label>
                                <div class="col-9">
                                    <input id="firmware" class="form-control" type="text" formControlName="firmware">
                                </div>
                            </div>

                        </div>

                        <div class="col-12 text-center" *ngIf="detailForm.dirty">
                            <button type="button" class="btn btn-primary" (click)="submitDetailForm()">Update</button>
                            <button type="button" class="btn btn-danger ml-2" (click)="buildDetailForm()">Reset</button>
                        </div>

                    </div>
                </div>
            </div>
        </form>

        <form *ngIf="locationForm" [formGroup]="locationForm">
            <div class="card">
                <div class="card-header d-flex align-items-center justify-content-between font-weight-bold px-2 py-1">
                    <div class="w-75 py-1">
                        <span>Location</span>
                    </div>
                    <div>
                        <button class="action-icons fas fa-angle-down font-sm pull-right mr-2"
                            [tooltip]="isLocationFormOpen ? 'Minimize' : 'Expand'"
                            (click)="toggleLocationFormAccordion()" [attr.aria-expanded]="isLocationFormOpen"></button>
                        <button class="action-icons fas fa-pencil-alt font-sm pull-right mb-0 mr-2"
                            (click)="manageLocationForm()" [tooltip]="'Edit'" container="body" accessControl
                            moduleName="Monitoring" accessType="Manage Monitoring" elementType="actionbtn"></button>
                    </div>
                </div>
                <div class="card-body" [collapse]="!isLocationFormOpen">
                    <div class="row text-right">
                        <div class="col-6">
                            <div class="form-group row" formGroupName="datacenter">
                                <label for="dcId" class="col-3 col-form-label">Datacenter<em>*</em></label>
                                <div class="col-9">
                                    <select id="dcId" class="form-control" formControlName="uuid"
                                        [class.is-invalid]="locationFormErrors.datacenter.uuid">
                                        <option value="" disabled>Select Datacenter</option>
                                        <option *ngFor="let dc of datacenters" [value]="dc.uuid">{{dc.name}}</option>
                                    </select>
                                    <div class="invalid-feedback text-left" *ngIf="locationFormErrors.datacenter.uuid">
                                        {{locationFormErrors.datacenter.uuid}}</div>
                                </div>
                            </div>
                        </div>

                        <div class="col-6">
                            <div class="form-group row" formGroupName="cabinet">
                                <label for="cabinetid" class="col-3 col-form-label">Cabinet</label>
                                <div class="col-9">
                                    <select id="cabinetid" class="form-control" formControlName="id">
                                        <option value="">Select Cabinet</option>
                                        <option *ngFor="let cabinet of cabinets" [value]="cabinet.id">
                                            {{cabinet.name}}</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 text-center" *ngIf="locationForm.dirty">
                            <button type="button" class="btn btn-primary" (click)="submitLocationForm()">Update</button>
                            <button type="button" class="btn btn-danger ml-2"
                                (click)="buildLocationForm()">Reset</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
