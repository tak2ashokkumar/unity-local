<div class="row">
    <div class="col-12">
        <div class="card rounded border-top-0">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                <div class="d-flex justify-content-center align-items-center font-500">
                    <span class="badge badge-secondary font-sm">{{count}}</span>
                    <span class="ml-1 font-lg">IOT Devices</span>
                </div>
                <div class="d-flex justify-content-end align-items-center">
                    <data-refresh-btn [page]="currentCriteria.pageNo"
                        (refresh)="refreshData($event)"></data-refresh-btn>
                </div>
            </div>
            <div class="card-body py-2">
                <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                    <div class="w-22">
                        <search-box [searchValue]="currentCriteria.searchValue"
                            (searched)="onSearched($event)"></search-box>
                    </div>
                    <div class="d-flex justify-content-between align-items-center w-54">
                        <select name="device_type" id="device_type" class="form-control w-21 p-1 h-80"
                            [(ngModel)]="currentCriteria.params[0].device_type"
                            (ngModelChange)="onDeviceTypeOrManufacturerFilterChange()">
                            <option value="null">Select Device Type</option>
                            <option [value]="dt.value" *ngFor="let dt of deviceTypeList">{{dt.label}}</option>
                        </select>
                        <multiselect-dropdown class="form-control p-0 w-21" style="height:auto;"
                            [options]="manufacturerList" [settings]="manufacturerSettings" [texts]="manufacturerTexts"
                            (dropdownClosed)="onDeviceTypeOrManufacturerFilterChange()"
                            [(ngModel)]="currentCriteria.multiValueParam.manufacturer">
                        </multiselect-dropdown>
                        <multiselect-dropdown class="form-control p-0 w-21" style="height:auto;" [options]="modelList"
                            [settings]="modelSettings" [texts]="modelTexts" (dropdownClosed)="onModelFilterChange()"
                            [(ngModel)]="currentCriteria.multiValueParam.model"></multiselect-dropdown>
                        <multiselect-dropdown class="form-control p-0 w-21" style="height:auto;" [options]="statusList"
                            [settings]="statusSettings" [texts]="statusTypeTexts" (dropdownClosed)="onFilterChange()"
                            [(ngModel)]="currentCriteria.multiValueParam.status"></multiselect-dropdown>
                        <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                            (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                    </div>
                </div>
                <table class="table table-sm text-left">
                    <thead class="bg-light">
                        <tr>
                            <th>Name</th>
                            <th>Device Type</th>
                            <th>Manufacturer</th>
                            <th>Model</th>
                            <th>IP Address</th>
                            <th>Tags</th>
                            <th class="text-center">Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let view of viewData" truncateText>
                            <td class="tdw-15">
                                <button class="btn btn-link text-decoration-none p-0 table-column-btn" type="button"
                                    [tooltip]="view.name" (click)="goToDetails(view)" accessControl
                                    moduleName="Monitoring" accessType="View Monitoring"
                                    elementType="div">{{view.name}}</button>
                            </td>
                            <td class="tdw-15">
                                <div [tooltip]="view.displayDeviceType">{{view.displayDeviceType}}
                                </div>
                            </td>
                            <td class="tdw-15">
                                <div [tooltip]="view.manufacturer">{{view.manufacturer}}</div>
                            </td>
                            <td class="tdw-15">
                                <div [tooltip]="view.model">{{view.model}}</div>
                            </td>
                            <td class="tdw-10">
                                <div [tooltip]="view.ipaddress">{{view.ipaddress}}</div>
                            </td>
                            <td class="tdw-8">
                                <ng-container [ngTemplateOutlet]='tagsList'
                                    [ngTemplateOutletContext]="{tags:view.tags}"></ng-container>
                            </td>
                            <td class="w-8 text-center">
                                <shared-device-status [status]="view.deviceStatus"></shared-device-status>
                            </td>
                            <td class="action-icons-column text-center">
                                <button class="action-icons mb-0 fas fa-eye font-sm mr-1" tooltip="View Details"
                                    (click)="goToDetails(view)"></button>
                                <button class="action-icons mb-0 fas fa-chart-line font-sm"
                                    [ngClass]="{'action-icons-disabled': !view.isStatsButtonEnabled}"
                                    (click)="goToStats(view)" [tooltip]="view.statsTooltipMessage" accessControl
                                    moduleName="Monitoring" accessType="View Monitoring" elementType="actionbtn">
                                </button>
                                <button class="action-icons fas fa-tag font-sm ml-1" (click)="updateTags(view)"
                                    tooltip="Update Tags"></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                    [totalCount]="count">
                </table-entries>
                <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                    [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                    (pageChange)="pageChange($event)"></table-pager>
                <div class="text-center text-muted py-4" *ngIf="!viewData.length">No associated IOT Devices were
                    found.</div>
            </div>
        </div>
    </div>
</div>

<ng-template #tagsList let-tags="tags">
    <div [popoverContext]="{ tags: tags }" [popover]="tagsTooltipTmpl" triggers="mouseenter:mouseleave" placement="top">
        <span *ngFor="let tag of tags" class="badge badge-pill badge-primary">{{tag}}</span>
    </div>
    <div *ngIf="!tags.length">N/A</div>
</ng-template>

<ng-template #tagsTooltipTmpl let-tags="tags">
    <div class="font-weight-bold">
        <span *ngFor="let tag of tags" class="badge badge-pill badge-primary m-1 font-sm">{{tag}}</span>
    </div>
</ng-template>

<ng-template #tagsFormRef>
    <div class="card mb-0">
        <div class="card-header">
            Update Tags
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="tagsFormModelRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            <form *ngIf="tagsForm" [formGroup]="tagsForm">
                <div class="form-group">
                    <div class="invalid-credentials" *ngIf="nonFieldErr">{{nonFieldErr}}</div>
                </div>
                <div class="row">
                    <div class="form-group col">
                        <tag-input [clearOnBlur]="true" formControlName="tags" [modelAsStrings]="true">
                            <tag-input-dropdown [autocompleteItems]="tagsAutocompleteItems" [zIndex]="2200">
                            </tag-input-dropdown>
                        </tag-input>
                    </div>
                </div>
            </form>
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button" (click)="submitTags()">Submit</button>
            <button class="btn btn-sm btn-danger pull-right" (click)="tagsFormModelRef.hide()"
                type="button">Cancel</button>
        </div>
    </div>
</ng-template>
