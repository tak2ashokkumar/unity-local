<div class="row">
    <div class="col-12">
        <div class="card rounded border-top-0">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                <div class="d-flex justify-content-center align-items-center font-500">
                    <span class="badge badge-secondary font-sm">10</span>
                    <span class="ml-1 font-lg">Account-name1</span>
                </div>
                <div class="d-flex justify-content-end align-items-center">
                    <unity-rounded-tab [tabItems]="tabItems"></unity-rounded-tab>
                    <button class="btn btn-pill btn-warning pull-right ml-2 btn-sm" type="button" container="body"
                        (click)="goBack()" tooltip="Back"><i class="fa fa-arrow-left"></i>
                    </button>
                    <!-- <data-refresh-btn [page]="currentCriteria.pageNo"
                        (refresh)="refreshData($event)"></data-refresh-btn> -->
                </div>
            </div>
            <div class="card-body py-2">
                <router-outlet></router-outlet>
                <!-- <ng-container [ngSwitch]="view">
                    <ng-container *ngSwitchCase="'organizations'">
                        <ng-container [ngTemplateOutlet]='organizations'></ng-container>
                    </ng-container>

                    <ng-container *ngSwitchCase="'devices'">
                        <ng-container [ngTemplateOutlet]='devices'></ng-container>
                    </ng-container>
                </ng-container> -->
            </div>
        </div>
    </div>
</div>

<ng-template #devices>
    <network-controllers-cisco-meraki-devices></network-controllers-cisco-meraki-devices>
</ng-template>
<ng-template #organizations>
    <network-controllers-cisco-meraki-organizations></network-controllers-cisco-meraki-organizations>
</ng-template>










<ng-template>
    <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
        <div class="w-25">
            <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
        </div>
        <div class="d-flex justify-content-between align-items-center w-20">
            <multiselect-dropdown class="form-control p-0 w-60" style="height:auto;" [options]="statusList"
                [settings]="statusSettings" [texts]="statusTypeTexts" (dropdownClosed)="onFilterChange()"
                [(ngModel)]="currentCriteria.multiValueParam.status"></multiselect-dropdown>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                (pageSizeChange)="pageSizeChange($event)"></table-page-size>
        </div>
    </div>
    <table class="table table-sm text-left">
        <thead class="bg-light">
            <tr>
                <th>Name</th>
                <th>Controller</th>
                <th>Account URL</th>
                <th>Port</th>
                <th>Devices</th>
                <th>Tags</th>
                <th class="text-center">Status</th>
                <th class="text-center">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let view of viewData" truncateText>
                <td class="tdw-17">
                    <div [tooltip]="view.name">{{view.name}}</div>
                </td>
                <td class="tdw-10">
                    <div [tooltip]="view.controllerType" class="text-capitalize">{{view.controllerType}}
                    </div>
                </td>
                <td class="tdw-17">
                    <div [tooltip]="view.accountUrl">{{view.accountUrl}}</div>
                </td>
                <td class="tdw-10">
                    <div [tooltip]="view.port">{{view.port}}</div>
                </td>
                <td class="tdw-10">
                    <div [tooltip]="view.devicesCount">{{view.devicesCount}}</div>
                </td>
                <td class="tdw-11">
                    <ng-container [ngTemplateOutlet]='tagsList'
                        [ngTemplateOutletContext]="{tags:view.tags}"></ng-container>
                </td>
                <td class="w-6 text-center">
                    <shared-device-status [status]="view.deviceStatus"></shared-device-status>
                </td>
                <td class="action-icons-column text-center">
                    <button class="action-icons mb-0 fas fa-eye font-sm ml-1" tooltip="View Details"
                        (click)="viewDeviceDetials(view)"></button>
                    <button class="action-icons mb-0 fas fa-external-link-alt font-sm ml-1"
                        [tooltip]="view.proxyTooltip" [ngClass]="{'action-icons-disabled':!view.proxyUrl}"
                        (click)="webAccessNewTab(view)"></button>
                    <button class="action-icons mb-0 fas fa-chart-line font-sm ml-1" (click)="goToStats(view)"
                        [tooltip]="'View statistics'" accessControl moduleName="Monitoring" accessType="View Monitoring"
                        elementType="actionbtn">
                    </button>
                    <span dropdown placement="bottom right" container="body">
                        <button id="button-container" class="action-icons mb-0 fa fa-ellipsis-h font-sm ml-1"
                            data-toggle="dropdown" aria-controls="icons-dropdown-container" dropdownToggle
                            (click)="false" [tooltip]="'More Actions'" container="body"></button>
                        <div container="body" id="icons-dropdown-container"
                            class="dropdown-menu dropdown-menu-right text-center mt-2" *dropdownMenu
                            aria-labelledby="button-container">
                            <button class="action-icons mt-2 mb-1 fas fa-pencil-alt font-sm" (click)="goToEdit(view)"
                                tooltip="Edit" container="body"></button>
                            <button class="action-icons fas fa-tag font-sm mt-1 mb-1" (click)="updateTags(view)"
                                tooltip="Update Tags" container="body"></button>
                            <button class="action-icons mt-1 mb-1 far fa-trash-alt font-sm" (click)="delete(view)"
                                tooltip="Delete" container="body"></button>
                            <button class="action-icons mt-1 mb-2 fas fa-ticket-alt font-sm" tooltip="Create Ticket"
                                (click)="createTicket(view)" container="body"></button>
                        </div>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>
    <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="count">
    </table-entries>
    <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
        [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
    <div class="text-center text-muted py-4" *ngIf="!viewData.length">No associated Network Controllers were
        found.</div>
</ng-template>
