<div class="row">
    <div class="col-12">
        <div class="card rounded-0 border-top-0">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                <div class="d-flex justify-content-center align-items-center font-500">
                    <span class="badge badge-secondary font-sm">{{count}}</span>
                    <span class="ml-1 font-lg">Disks</span>
                </div>
                <div class="d-flex justify-content-end align-items-center">
                    <data-refresh-btn [page]="currentCriteria.pageNo"
                        (refresh)="refreshData($event)"></data-refresh-btn>
                </div>
            </div>
            <div class="card-body py-2">
                <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                    <div class="w-25">
                        <!-- <search-box [searchValue]="currentCriteria.searchValue"
                            (searched)="onSearched($event)"></search-box> -->
                    </div>
                    <div>
                        <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                            (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                    </div>
                </div>
                <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
                    <thead class="bg-light">
                        <tr>
                            <th>Name</th>
                            <th>Flash Mode</th>
                            <th>Total Capacity</th>
                            <th>Read IOPS</th>
                            <th>Read Latency</th>
                            <th>Write IOPS</th>
                            <th>Write Latency</th>
                            <th>Write B/W</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let view of viewData" truncateText>
                            <td class="tdw-15">
                                <button class="btn btn-link text-decoration-none p-0 table-column-btn" type="button"
                                    [tooltip]="view.name" (click)="goToDetails(view)">{{view.name}}</button>
                            </td>
                            <td class="tdw-10">
                                <div [tooltip]="view.flashMode">{{view.flashMode}}</div>
                            </td>
                            <td class="tdw-10">
                                <div [tooltip]="view.totalCapacity">{{view.totalCapacity}}</div>
                            </td>
                            <td class="tdw-10">
                                <div [tooltip]="view.readIOPS">{{view.readIOPS}}</div>
                            </td>
                            <td class="tdw-10">
                                <div [tooltip]="view.readLatency">{{view.readLatency}}</div>
                            </td>
                            <td class="tdw-10">
                                <div [tooltip]="view.writeIOPS">{{view.writeIOPS}}</div>
                            </td>
                            <td class="tdw-10">
                                <div [tooltip]="view.writeLatency">{{view.writeLatency}}</div>
                            </td>
                            <td class="tdw-10">
                                <div [tooltip]="view.writeBW">{{view.writeBW}}</div>
                            </td>
                            <td class="action-icons-column">
                                <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1"
                                    tooltip="Manage by creating support ticket" (click)="createTicket(view)"></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="count">
                </table-entries>
                <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                    [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                    (pageChange)="pageChange($event)"></table-pager>
                <div class="text-center text-muted py-4" *ngIf="!viewData.length">No associated Virtual Disks found.
                </div>
            </div>
        </div>
    </div>
</div>
<device-zabbix-email-notification></device-zabbix-email-notification>
