<div class="row">
    <div class="col-12">
        <div class="tab-content">
            <div class="tab-pane active p-2">
                <ul class="nav d-flex align-items-center">
                    <li class="nav-item">
                        <a class="nav-link py-0 pl-0 border-right text-success">{{entity?.name}}</a>
                    </li>
                    <li class="nav-item" *ngFor="let tab of tabData">
                        <a class="nav-link py-0" [ngClass]="isActive(tab)" (click)="goTo(tab.url)">{{tab.name}}</a>
                    </li>
                    <li class="nav-item text-warning ml-auto">
                        <a class="nav-link py-0 text-warning" (click)="goBack()">
                            <i class="fas fa-reply">&nbsp;</i>
                            <span>Back</span>
                        </a>
                    </li>
                    <li class="nav-item float-right">
                        <data-refresh-btn></data-refresh-btn>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <div class="col-12 mt-3">
        <router-outlet></router-outlet>
    </div>
</div>
