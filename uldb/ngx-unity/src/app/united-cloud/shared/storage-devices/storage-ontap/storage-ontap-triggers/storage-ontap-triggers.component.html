    <div class="col-12">

            <div class="card-header bg-transparent border-bottom-0 d-flex justify-content-between">
                <div class="d-flex justify-content-center align-items-center font-500">
                    <span class="badge badge-secondary font-lg">{{viewData.length}}</span>
                    <span class="ml-1">Triggers</span>
                </div>

            </div>
            <div class="card-body pt-0">
                <table class="table text-left">
                    <thead>
                        <tr>
                            <th>Trigger Name</th>
                            <th>Severity</th>
                            <th>State</th>
                            <th>Status</th>
                            <th>Mode</th>
                            <!-- <th>Action</th> -->
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let view of viewData">
                            <td>
                                <div>{{view.name}}</div>
                            </td>
                            <td>
                                <div class="font-weight-bold text-capitalize" [class]="view.severityColorClass">{{view.severity}}</div>
                            </td>
                            <td>
                                <div class="font-weight-bold" [class]="view.stateColorClass">{{view.state}}</div>
                            </td>
                            <td>
                                <div>{{view.status}}</div>
                            </td>
                            <td>
                                <div>{{view.mode}}</div>
                            </td>
                            <!-- <td class="action-icons-column">
                                <button class="action-icons mb-0 font-sm ml-1" [class]="view.statusIconClass" [tooltip]="view.statusSwitchIconTooltip"

                                <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" tooltip="Edit trigger"
                                    (click)="editTrigger(view)" [ngClass]="{'action-icons-disabled': !view.canEdit}"></button>
                                <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" tooltip="Delete trigger"
                                    (click)="deleteTrigger(view)" [ngClass]="{'action-icons-disabled': !view.canDelete}"></button>
                            </td> -->
                        </tr>
                    </tbody>
                </table>
                <div class="text-center text-muted py-5" *ngIf="!viewData.length">No associated Triggers found!!</div>
                <!-- <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"></table-entries>

            </div>
        </div>
