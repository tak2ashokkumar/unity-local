<div class="card mb-0 minvh-50" *ngIf="!selectedView">
    <app-spinner [name]="loaderName"></app-spinner>
    <div class="card-header d-flex justify-content-between align-items-center py-1">
        <div class="d-flex justify-content-center align-items-center font-500">
            <span class="badge badge-secondary font-sm">{{count}}</span>
            <span class="ml-1 font-lg">Protection Group Snapshots</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
            <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData()"></data-refresh-btn>
        </div>
    </div>
    <div class="card-body px-2 py-0">
        <table class="table table-sm text-left">
            <thead class="">
                <tr>
                    <th>Name</th>
                    <th>Snapshot Time</th>
                    <th>Protection Group</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let view of viewData; let i = index;" truncateText>
                    <td class="tdw-40">
                        <div [tooltip]="view.name">{{view.name}}</div>
                    </td>
                    <td class="tdw-30">
                        <div [tooltip]="view.snapshotTime">{{view.snapshotTime}}</div>
                    </td>
                    <td class="tdw-30">
                        <div [tooltip]="view.protectionGroup">{{view.protectionGroup}}</div>
                    </td>
                </tr>
            </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
            [totalCount]="count"></table-entries>
        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
            [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No associated Protection Group Snapshots found.</div>
    </div>
</div>
