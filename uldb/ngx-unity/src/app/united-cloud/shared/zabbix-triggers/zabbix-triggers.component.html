<div class="row">
    <div class="col-12">
        <div class="card rounded-0 border-top-0">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                <div class="d-flex justify-content-center align-items-center font-500">
                    <span class="badge badge-secondary font-sm">{{filteredViewData.length}}</span>
                    <span class="ml-1 font-lg">Triggers</span>
                </div>
                <div class="d-flex justify-content-end align-items-center" *ngIf="deviceId">
                    <button class="btn btn-pill btn-sm btn-warning font-500" type="button" (click)="createTrigger()"
                        accessControl moduleName="Monitoring" accessType="Manage Monitoring" elementType="btn">
                        <span class="fas fa-plus"></span>
                        <span class="font-xs-sm mx-1">Add Trigger</span>
                    </button>
                </div>
            </div>
            <div class="card-body py-2">
                <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                    <div class="w-25">
                        <search-box [searchValue]="currentCriteria.searchValue"
                            (searched)="onSearched($event)"></search-box>
                    </div>
                    <div>
                        <table-page-size [currentPageSize]="currentCriteria.pageSize"
                            [totalCount]="filteredViewData.length"
                            (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                    </div>
                </div>
                <table class="table table-sm text-left">
                    <thead class="bg-light">
                        <tr>
                            <th>Trigger Name</th>
                            <th>Severity</th>
                            <th>State</th>
                            <th>Status</th>
                            <th>Mode</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let view of pagedviewData" truncateText>
                            <td class="tdw-50">
                                <div [tooltip]="view.name">{{view.name}}</div>
                            </td>
                            <td class="tdw-15">
                                <div class="font-weight-bold text-capitalize" [class]="view.severityColorClass">
                                    {{view.severity}}</div>
                            </td>
                            <td class="tdw-10">
                                <div class="font-weight-bold" [class]="view.stateColorClass">{{view.state}}</div>
                            </td>
                            <td class="tdw-15">
                                <div>{{view.status}}</div>
                            </td>
                            <td class="tdw-10">
                                <div>{{view.mode}}</div>
                            </td>
                            <td class="action-icons-column">
                                <button class="action-icons mb-0 font-sm ml-1" [class]="view.statusIconClass"
                                    [tooltip]="view.statusSwitchIconTooltip" (click)="switchTriggerStatus(view)"
                                    accessControl moduleName="Monitoring" accessType="Manage Monitoring"
                                    elementType="actionbtn"></button>
                                <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" tooltip="Edit Trigger"
                                    (click)="editTrigger(view)" [ngClass]="{'action-icons-disabled': !view.canEdit}"
                                    accessControl moduleName="Monitoring" accessType="Manage Monitoring"
                                    elementType="actionbtn"></button>
                                <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" tooltip="Delete Trigger"
                                    (click)="deleteTrigger(view)" [ngClass]="{'action-icons-disabled': !view.canDelete}"
                                    accessControl moduleName="Monitoring" accessType="Manage Monitoring"
                                    elementType="actionbtn"></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                    [totalCount]="filteredViewData.length"></table-entries>
                <table-pager *ngIf="filteredViewData.length" [pageNo]="currentCriteria.pageNo"
                    [pageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"
                    (pageChange)="pageChange($event)"></table-pager>
                <div class="text-center text-muted py-4" *ngIf="!filteredViewData.length">No associated Triggers were
                    found!!</div>
            </div>
        </div>
    </div>
</div>

<ng-template #confirmdelete>
    <div class="card mb-0">
        <div class="card-header">
            Confirm Delete
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="confirmDeleteModalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            This Trigger will be deleted. Are you sure you want to delete?
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button" (click)="confirmDelete()">Yes</button>
            <button class="btn btn-sm btn-danger pull-right" (click)="confirmDeleteModalRef.hide()"
                type="button">No</button>
        </div>
    </div>
</ng-template>
