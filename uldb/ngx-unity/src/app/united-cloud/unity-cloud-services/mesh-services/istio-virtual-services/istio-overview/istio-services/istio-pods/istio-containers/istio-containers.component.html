<div class="row">
  <div class="col-12  mb-3">
    <div class="tab-content">
      <div class="tab-pane active p-2">
        <ul class="nav">
          <li class="nav-item ml-auto text-warning">
            <a class="nav-link py-0 " (click)="goBack()"><i class="fa fa-arrow-left">&nbsp;</i>Pods List</a>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="col-12">
    <div class="card rounded-0 border-top-0">
      <div class="card-header bg-transparent border-bottom-0 mt-3">
        <div class="row">
          <div class="col-3">
            <table-search-box (searched)="onSearched($event)"></table-search-box>
          </div>
          <div class="col">
            <span class="text-muted font-sm float-right align-middle ml-2"><span class="badge badge-pill badge-secondary">{{filteredViewData.length}}</span>&nbsp;
              Containers</span>
            <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
      </div>
      <div class="card-body">
        <table class="table text-left" *ngIf="filteredViewData.length">
          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Image</th>
              <th>CPU Request</th>
              <th>Memory Request</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of pagedviewData" setTableColumnWidth>
              <td>
                <div [tooltip]="view.name">{{view.name}}</div>
              </td>
              <td class="action-icons-column">
                <div [tooltip]="view.status" class="text-capitalize">
                  <i class="fa status-icon" [ngClass]="view.statusIcon"></i> {{view.status}}
                </div>
              </td>
              <td>
                <div [tooltip]="view.image">{{view.image}}</div>
              </td>
              <td>
                <div [tooltip]="view.cpuRequest">{{view.cpuRequest}}</div>
              </td>
              <td>
                <div [tooltip]="view.memoryRequest">{{view.memoryRequest}}</div>
              </td>
              <td class="action-icons-column">
                <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1" (click)="createTicket(view)" tooltip="Manage by creating support ticket">
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"></table-entries>
        <table-pager *ngIf="filteredViewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="filteredViewData.length" (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted" *ngIf="!filteredViewData.length">No containers were found.</div>
      </div>
    </div>
  </div>
</div>
