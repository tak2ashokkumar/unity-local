<div class="row">
  <div class="col-12  mb-3">
    <div class="tab-content">
      <div class="tab-pane active p-2">
        <ul class="nav">
          <li class="nav-item ml-auto text-warning">
            <a class="nav-link py-0 " (click)="goBack()"><i class="fa fa-arrow-left">&nbsp;</i>Services List</a>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="col-12">
    <div class="card rounded-0 border-top-0">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
          <span class="badge badge-secondary font-sm">{{filteredViewData.length}}</span>
          <span class="ml-1 font-lg">Pods</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
          <div class="w-25">
            <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
          </div>
          <div>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
        <table class="table text-left">
          <thead class="bg-light">
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Namespace</th>
              <th>Pod IP</th>
              <th>Host IP</th>
              <th>Start Time</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of pagedviewData" setTableColumnWidth>
              <td>
                <div [tooltip]="view.name">{{view.name}}</div>
              </td>
              <td>
                <div [tooltip]="view.phase" class="text-capitalize">
                  <i class="fa status-icon" [ngClass]="view.statusIcon"></i> {{view.phase}}
                </div>
              </td>
              <td>
                <div [tooltip]="view.namespace">{{view.namespace}}</div>
              </td>
              <td>
                <div [tooltip]="view.podIp">{{view.podIp}}</div>
              </td>
              <td>
                <div [tooltip]="view.hostIp">{{view.hostIp}}</div>
              </td>
              <td>
                <div [tooltip]="view.startTime">{{view.startTime}}</div>
              </td>
              <td class="action-icons-column">
                <button class="action-icons mb-0 fa fa-list-ul font-sm ml-1" tooltip="Show Containers"
                  (click)="goTo(view)">
                </button>
                <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1" (click)="createTicket(view)"
                  tooltip="Manage by creating support ticket">
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="filteredViewData.length"></table-entries>
        <table-pager *ngIf="filteredViewData.length" [pageNo]="currentCriteria.pageNo"
          [pageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"
          (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted py-4" *ngIf="!filteredViewData.length">No pods were found.</div>
      </div>
    </div>
  </div>
</div>
