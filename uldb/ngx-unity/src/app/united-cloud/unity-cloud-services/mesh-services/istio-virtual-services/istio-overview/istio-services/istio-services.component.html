<div class="card rounded-0 border-top-0">
  <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
    <div class="d-flex justify-content-center align-items-center font-500">
      <span class="badge badge-secondary font-sm">{{filteredViewData.length}}</span>
      <span class="ml-1 font-lg">Services</span>
    </div>
    <div class="d-flex justify-content-end align-items-center">
      <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
    </div>
  </div>
  <div class="card-body py-2">
    <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
      <div class="w-25">
        <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
      </div>
      <div>
        <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"
          (pageSizeChange)="pageSizeChange($event)"></table-page-size>
      </div>
    </div>
    <table class="table text-left">
      <thead class="bg-light">
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>Namespace</th>
          <th>Cluster IP</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let view of pagedviewData; let i = index;" setTableColumnWidth>
          <td>
            <div [tooltip]="view.name">{{view.name}}</div>
          </td>
          <td>
            <div [tooltip]="view.status" class="text-capitalize">
              <span *ngIf="!view.status"><i class="fa fa-spinner fa-spin">&nbsp;</i></span>
              <span *ngIf="view.status"><i class="fa status-icon" [ngClass]="view.statusIcon"></i>
                {{view.status}}</span>
            </div>
          </td>
          <td>
            <div [tooltip]="view.namespace">{{view.namespace}}</div>
          </td>
          <td>
            <div [tooltip]="view.clusterIp">{{view.clusterIp}}</div>
          </td>
          <td class="action-icons-column">
            <button class="action-icons mb-0 fa fa-list-ul font-sm ml-1" (click)="goTo(view)" tooltip="Show Pods">
            </button>
            <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1" (click)="createTicket(view)"
              tooltip="Manage by creating support ticket">
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
      [totalCount]="filteredViewData.length"></table-entries>
    <table-pager *ngIf="filteredViewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
      [totalCount]="filteredViewData.length" (pageChange)="pageChange($event)"></table-pager>
    <div class="text-center text-muted py-4" *ngIf="!filteredViewData.length">No services were found.</div>
  </div>
</div>
