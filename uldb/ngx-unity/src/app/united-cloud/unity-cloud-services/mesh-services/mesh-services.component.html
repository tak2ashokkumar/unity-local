<div class="row">
  <div class="col-12">
    <div class="card rounded-0 border-top-0">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
          <span class="badge badge-secondary font-sm">{{filteredViewData.length}}</span>
          <span class="ml-1 font-lg">Mesh Managers</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <button class="btn btn-pill btn-warning pull-right btn-sm ml-2" type="button" (click)="addService()"
            accessControl moduleName="Services" accessType="Manage Services" elementType="btn">Add</button>
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
          <div class="w-25">
            <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
          </div>
          <div>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
        <table class="table text-left">
          <thead class="bg-light">
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of pagedviewData; let i = index;">
              <td>{{view.name}}</td>
              <td>{{view.displayType}}</td>
              <td>
                <button class="action-icons mb-0 fa fa-list-ul font-sm ml-1" (click)="goTo(view.url)"
                  [tooltip]="view.drillDownTollitipMsg">
                </button>
                <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" (click)="editService(view)"
                  tooltip="Edit" accessControl moduleName="Services" accessType="Manage Services"
                  elementType="actionbtn">
                </button>
                <button class="action-icons mb-0 fa fa-key font-sm ml-1" [tooltip]="view.changePasswordTooltipMessage"
                  (click)="changePassword(view)" accessControl moduleName="Services" accessType="Manage Services"
                  elementType="actionbtn"></button>
                <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" (click)="deleteService(view)"
                  tooltip="Delete" accessControl moduleName="Services" accessType="Manage Services"
                  elementType="actionbtn">
                </button>
                <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1"
                  tooltip="Manage by creating support ticket" (click)="createTicket(view)">
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="filteredViewData.length"></table-entries>
        <table-pager *ngIf="filteredViewData.length" [pageNo]="currentCriteria.pageNo"
          [pageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"
          (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted py-4" *ngIf="!filteredViewData.length">No mesh managers were found.</div>
      </div>
    </div>
  </div>
</div>
<mesh-services-crud (onCrud)="onCrud($event)"></mesh-services-crud>
