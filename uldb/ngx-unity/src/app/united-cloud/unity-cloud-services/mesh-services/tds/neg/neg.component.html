<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-body p-0">
        <form class="form-horizontal">
          <div class="form-group row mb-0">
            <div class="col py-2 text-warning text-right">
              <a class="nav-link py-0 align-middle" (click)="goBack()"><i class="fa fa-arrow-left">&nbsp;</i>Traffic
                Director List</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="col-12 mt-3">
    <div class="card rounded-0 border-top-0">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
          <span class="badge badge-secondary font-sm">{{filteredViewData.length}}</span>
          <span class="ml-1 font-lg">Network Endpoint Groups</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
          <div class="w-25">
            <search-box (searched)="onSearched($event)"></search-box>
          </div>
          <div>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
        <table class="table text-left">
          <thead class="bg-light">
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Zone</th>
              <th>Healthy</th>
              <th>Max RPS</th>
              <th>Capacity</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of pagedviewData; let i = index;" setTableColumnWidth>
              <td>
                <div [tooltip]="view.name">{{view.name}}</div>
              </td>
              <td>
                <div [tooltip]="view.networkEndpointType">{{view.networkEndpointType}}</div>
              </td>
              <td>
                <div [tooltip]="view.zone">{{view.zone}}</div>
              </td>
              <td>
                <div [tooltip]="view.health" class="text-capitalize">
                  <span *ngIf="!view.health"><i class="fa fa-spinner fa-spin">&nbsp;</i></span>
                  <span *ngIf="view.health"><i class="fa status-icon" [ngClass]="view.statusIcon"></i></span>
                </div>
              </td>
              <td>
                <div [tooltip]="view.maxRps">{{view.maxRps}}</div>
              </td>
              <td>
                <div [tooltip]="view.capacity">{{view.capacity}}</div>
              </td>
              <td class="action-icons-column">
                <button class="action-icons mb-0 fa fa-list-ul font-sm ml-1" (click)="goTo(view)" tooltip="Backends">
                </button>
                <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1"
                  tooltip="Manage by creating support ticket" (click)="createTicket(view)">
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="filteredViewData.length"></table-entries>
        <table-pager *ngIf="filteredViewData.length" [pageNo]="currentCriteria.pageNo"
          [pageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"
          (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted py-4" *ngIf="!filteredViewData.length">No services were found.</div>
      </div>
    </div>
  </div>
</div>
