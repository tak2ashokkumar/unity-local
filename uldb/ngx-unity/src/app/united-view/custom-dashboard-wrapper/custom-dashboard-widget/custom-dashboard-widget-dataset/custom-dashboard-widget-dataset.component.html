<div class="card equalize-card">
    <div class="card-header bg-white p-2">
        <div class="row">
            <div class="col-8">
                <div class="row text-truncate mr-2 text-capitalize">
                    <div class="col-auto"
                        style="max-width: 150px; border-image:linear-gradient(transparent 20%, #c8ced3 20% 80%, transparent 80%) 0 1 0 0 / 1px">
                        <div class="small text-muted">Dataset Name</div>
                        <div class="font-xs-sm font-500 text-truncate">
                            <span>{{data.dataset_name}}</span>
                        </div>
                    </div>
                    <div class="col-auto"
                        style="border-image:linear-gradient(transparent 20%, #c8ced3 20% 80%, transparent 80%) 0 1 0 0 / 1px">
                        <div class="small text-muted">Items</div>
                        <div class="font-xs-sm font-500">{{data.items.length}}</div>
                    </div>
                    <div class="col-auto">
                        <div class="small text-muted">Aggregation</div>
                        <div class="font-xs-sm font-500">
                            <span>{{data.aggregation}}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col">

            </div>
        </div>
    </div>
    <div class="card-body p-2">
        <div class="row">
            <div class="col-12" *ngIf="data.show_graph">
                <div style="display:flex; flex-direction:column">
                    <div style="flex-grow:1; height: 250px; position:relative">
                        <canvas [id]="'chart-id-'+data.dataset_name" baseChart class="chart" [chartType]="'line'"
                            [options]="lineChartOptions" [datasets]="lineChartDatasets"
                            [labels]="lineChartlabels"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-12" *ngIf="data.show_value">
                <div class="d-flex justify-content-center">
                    <span class="h6">Latest Value {{data.values}}</span>
                </div>
            </div>
            <ng-container *ngFor="let l of data.legend;let i = index">
                <div class="col-6 text-truncate small" *ngIf="i < 2 || viewAllLegend" [tooltip]="l.device_name+':'+l.name">
                    {{l.device_name}} : {{l.name}}
                </div>
            </ng-container>
            <div class="col-12" *ngIf="data.legend.length > 2">
                <span class="font-xs-sm font-500 text-primary pull-right pointer-link" (click)="viewAllLegend = !viewAllLegend">View
                    <span *ngIf="!viewAllLegend">All</span>
                    <span *ngIf="viewAllLegend">Less</span></span>
            </div>
            <!-- <div class="col-6 text-truncate small">
                This is some very long string to test the text truncate feature
            </div> -->
        </div>
    </div>
</div>
