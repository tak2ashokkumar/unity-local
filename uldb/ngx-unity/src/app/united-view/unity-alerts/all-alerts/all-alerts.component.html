<div class="row">
  <div class="col-12">
    <div class="card text-center">
      <div class="card-header bg-transparent border-bottom-0 mt-3">
        <div class="row">
          <div class="col-3">
            <table-search-box (searched)="onSearched($event)"></table-search-box>
          </div>
          <div class="col ">
            <span class="ml-2 text-muted font-sm float-right align-middle"><span class="badge badge-pill badge-secondary">{{filteredAllFailedAlerts.length}}</span>&nbsp;{{tabItem.deviceName}}</span>
            <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="filteredAllFailedAlerts.length"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
      </div>
      <div class="card-body">
        <table class="table text-left" *ngIf="filteredAllFailedAlerts.length">
          <thead>
            <tr>
              <th>Device Name</th>
              <th>Device Type</th>
              <th>Alert</th>
              <th>Severity</th>
              <th>Changed</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of pagedviewData">
              <td>{{view.deviceName}}</td>
              <td>{{view.deviceType}}</td>
              <td>{{view.alertDesc}}</td>
              <td>
                <div class="badge badge-pill p-2 text-capitalize" [class]="view.colorClass">
                  {{view.severity}} </div>
              </td>
              <td>{{view.alertTime}}</td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="filteredAllFailedAlerts.length"></table-entries>

        <table-pager *ngIf="filteredAllFailedAlerts.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="filteredAllFailedAlerts.length" (pageChange)="pageChange($event)"></table-pager>
        <div *ngIf="!filteredAllFailedAlerts.length" class="text-center text-muted">
          No failed alerts for the devices !!
        </div>
      </div>
    </div>
  </div>
</div>
