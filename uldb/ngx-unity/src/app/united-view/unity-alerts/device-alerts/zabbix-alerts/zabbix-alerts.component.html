<div class="row">
    <div class="col-12">
        <div class="card text-center">
            <div class="card-header bg-transparent border-bottom-0 mt-3">
                <div class="row">
                    <div class="col-3">
                        <table-search-box (searched)="onSearched($event)"></table-search-box>
                    </div>
                    <div class="col">
                        <span class="ml-2 text-muted font-sm float-right align-middle"><span
                                class="badge badge-pill badge-secondary">{{filteredViewData.length}}</span>&nbsp;{{tabItem.deviceName}}</span>
                        <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)">
                        </data-refresh-btn>
                        <table-page-size [currentPageSize]="currentCriteria.pageSize"
                            [totalCount]="filteredViewData.length" (pageSizeChange)="pageSizeChange($event)">
                        </table-page-size>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <table class="table text-left" *ngIf="filteredViewData.length">
                    <thead>
                        <tr>
                            <th>Device Name</th>
                            <th>Description</th>
                            <th>Severity</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let view of pagedviewData">
                            <td>{{view.deviceName}}</td>
                            <td>{{view.alertDesc}}</td>
                            <td>
                                <div class="badge badge-pill p-2 text-capitalize" [class]="view.colorClass">
                                    {{view.severity}} </div>
                            </td>
                            <td>{{view.alertTime}}</td>
                        </tr>
                    </tbody>
                </table>
                <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                    [totalCount]="filteredViewData.length"></table-entries>
                <table-pager *ngIf="filteredViewData.length" [pageNo]="currentCriteria.pageNo"
                    [pageSize]="currentCriteria.pageSize" [totalCount]="filteredViewData.length"
                    (pageChange)="pageChange($event)"></table-pager>
                <div *ngIf="!filteredViewData.length" class="text-muted text-center">
                    No alerts for {{tabItem.deviceName}}
                </div>
            </div>
        </div>
    </div>
</div>
