<!-- <unity-topology-view (toggleShowMultiselect)="receiveMultiselectValue($event)"></unity-topology-view> -->
<div class="container-fluid">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col-12 px-0">
                <div class="card border-0 mt-2 mb-0">
                    <div class="card-body d-flex justify-content-between border-0 px-2 pt-2 pb-0 w-100">
                        <div class="w-40">
                            <form class="form-inline" [formGroup]="form" *ngIf="form">
                                <div class="form-group mb-2">
                                    <label for="topologyView">View</label>
                                    <select class="form-control ml-2" id="topologyView" name="topologyView"
                                        formControlName="view">
                                        <option [ngValue]="type" *ngFor="let type of viewTypes">{{type.viewToRender}}
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group mb-2 mx-2" *ngIf="form.get('view').value.view === 'public_cloud' && form.get('cloudtype')">
                                    <select class="form-control" id="cloudtype" name="cloudtype" formControlName="cloudtype">
                                        <option [value]="''">Select Cloud</option>
                                        <option [value]="'azure'">Azure</option>
                                        <option [value]="'oci'">OCI</option>
                                        <option [value]="'gcp'">GCP</option>
                                    </select>
                                </div>
                                <div class="form-group mb-2" *ngIf="form.get('account')">
                                    <select class="form-control" id="account" name="account" formControlName="account">
                                        <option [value]="''">Select Account</option>
                                        <option [value]="account.uuid" *ngFor="let account of accounts">
                                            {{account.name}}
                                        </option>
                                    </select>
                                </div>
                            </form>
                        </div>
                        <div class="d-flex w-40 align-items-center" *ngIf="this.showMulitselect">
                            <i class="fas fa-info-circle text-secondary" tooltip="Add / update the border devices for this Datacenter"></i>
                            <label class="w-70 mt-1 mx-2 font-md-lg">Select Border Devices :</label>
                            <form [formGroup]="borderDevicesForm" *ngIf="borderDevicesForm" class="w-100">
                                <multiselect-dropdown [options]="borderDevices" [settings]="borderDevicesSettings" [texts]="myTexts"class="form-control p-0" style="height:auto;" formControlName="allDevices" (onAdded)="handleDeviceSelection($event)" (onRemoved)="handleDeviceSelection($event)"></multiselect-dropdown>
                            </form>
                            <button class="btn btn-warning mx-2 pt-1 px-1" style="max-height:fit-content;" (click)="submitBorderDevices()">Save</button>
                            <div class="w-10 ml-2">
                                <data-refresh-btn (refresh)="refreshData()"></data-refresh-btn>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 p-0">
                <ng-container [ngSwitch]="selectedViewType.view">
                    <ng-container *ngSwitchCase="'colocloud'">
                        <unity-topology-view [viewType]="selectedViewType" (toggleShowMultiselect)="receiveMultiselectValue($event)"></unity-topology-view>
                    </ng-container>
                    <ng-container *ngSwitchCase="'private_cloud'">
                        <unity-topology-view [viewType]="selectedViewType"></unity-topology-view>
                    </ng-container>
                    <ng-container *ngSwitchCase="'public_cloud'">
                        <ng-container *ngIf="form.value.cloudtype === 'azure' && form.value.account !== ''">
                            <unity-azure-topology-view [viewType]="selectedViewType"></unity-azure-topology-view>
                        </ng-container>
                        <ng-container *ngIf="form.value.cloudtype === 'oci' && form.value.account !== ''">
                            <unity-oci-topology-view [viewType]="selectedViewType"></unity-oci-topology-view>
                        </ng-container>
                        <ng-container *ngIf="form.value.cloudtype === 'gcp' && form.value.account !== ''">
                            <unity-gcp-topology-view [viewType]="selectedViewType"></unity-gcp-topology-view>
                        </ng-container>
                    </ng-container>
                </ng-container>
            </div>
        </div>
    </div>
</div>
