<!-- ═══════════════════════════════════════════ -->
<!--   ROW 1 — 3 Chart Panels                    -->
<!-- ═══════════════════════════════════════════ -->
<div class="row mx-0 mt-2">

    <!-- ── Overall Memory Usage ──── -->
    <div class="col-4 pl-2 pr-1">
        <div class="card lc-chart-card">
            <div class="card-header lc-card-header">
                <span class="font-md font-500">Overall Memory Usage</span>
            </div>
            <div class="card-body p-0" style="min-height: 260px;">
                <ng-container *ngIf="memoryUsageChart">
                    <div echarts [options]="memoryUsageChart.options" [extentions]="memoryUsageChart.extensions"
                        [defaultHeight]="260">
                    </div>
                </ng-container>
            </div>
        </div>
    </div>

    <!-- ── GPU Thermal ─────────────── -->
    <div class="col-4 px-1">
        <div class="card lc-chart-card">
            <div class="card-header lc-card-header">
                <span class="font-md font-500">GPU Thermal</span>
            </div>
            <div class="card-body p-0" style="min-height: 260px;">
                <ng-container *ngIf="gpuThermalChart">
                    <div echarts [options]="gpuThermalChart.options" [extentions]="gpuThermalChart.extensions"
                        [defaultHeight]="260">
                    </div>
                </ng-container>
            </div>
        </div>
    </div>

    <!-- ── CPU Load ────────────────── -->
    <div class="col-4 px-2">
        <div class="card lc-chart-card">
            <div class="card-header lc-card-header">
                <span class="font-md font-500">CPU Load</span>
            </div>
            <div class="card-body p-0" style="min-height: 260px;">
                <ng-container *ngIf="cpuLoadChart">
                    <div echarts [options]="cpuLoadChart.options" [extentions]="cpuLoadChart.extensions"
                        [defaultHeight]="260">
                    </div>
                </ng-container>
            </div>
        </div>
    </div>

</div>

<!-- ═══════════════════════════════════════════ -->
<!--   ROW 2 — Summary KPI Cards                 -->
<!-- ═══════════════════════════════════════════ -->
<div class="row mx-0 mt-2">
    <div class="col pl-2 pr-1" *ngFor="let kpi of summaryKpis; let last = last" [ngClass]="{'pr-2': last}">
        <div class="card lc-kpi-card mb-0">
            <div class="card-body px-3 py-2">
                <div class="font-xs text-muted font-500 mb-1">{{kpi.label}}</div>
                <div class="font-xl font-500" [ngClass]="kpi.valueClass || 'text-primary'">{{kpi.value}}</div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!--   ROW 3 — Instance Table                    -->
<!-- ═══════════════════════════════════════════ -->
<div class="row mx-0 mt-2 mb-2">
    <div class="col-12 px-2">
        <div class="card lc-table-card">

            <!-- Table Header -->
            <div class="card-header lc-card-header d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <span class="badge badge-secondary font-sm mr-2">{{count}}</span>
                    <span class="font-md font-500">Instances</span>
                </div>
                <table-page-size [currentPageSize]="pageSize" [totalCount]="count"
                    (pageSizeChange)="pageSizeChange($event)">
                </table-page-size>
            </div>

            <!-- Table Body -->
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-sm font-sm text-left mb-0">
                        <thead class="lc-thead">
                            <tr>
                                <th>Instance Name</th>
                                <th>Status</th>
                                <th style="min-width: 200px;">Specs &amp; Load</th>
                                <th>Last Patched <i class="fa fa-sort text-muted ml-1"></i></th>
                                <th class="text-center">Compliance</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let item of viewInstances">

                                <!-- Instance Name -->
                                <td class="align-middle">
                                    <a href="javascript:void(0)" class="text-primary font-500">{{item.name}}</a>
                                </td>

                                <!-- Status -->
                                <td class="align-middle">
                                    <span class="font-500" [ngClass]="getStatusClass(item)">{{item.statusLabel}}</span>
                                </td>

                                <!-- Specs & Load -->
                                <td class="align-middle">
                                    <div class="specs-cell">
                                        <div class="font-xs text-muted mb-1">Capacity: {{item.capacityGB}}GB</div>
                                        <div class="progress lc-progress mb-1">
                                            <div class="progress-bar"
                                                [style.width.%]="getUsedPercent(item)"
                                                [style.background-color]="getUsedBarColor(item.freePercent)">
                                            </div>
                                        </div>
                                        <div class="d-flex justify-content-between font-xs text-muted">
                                            <span>Used: {{item.usedGB}}</span>
                                            <span>Free: {{item.freePercent}}%</span>
                                        </div>
                                    </div>
                                </td>

                                <!-- Last Patched -->
                                <td class="align-middle text-muted">{{item.lastPatched}}</td>

                                <!-- Compliance -->
                                <td class="align-middle text-center">
                                    <span *ngIf="item.compliance === 'meeting'" class="text-success">
                                        <i class="fa fa-check-circle fa-lg"></i>
                                    </span>
                                    <span *ngIf="item.compliance === 'not-meeting'" class="text-danger">
                                        <i class="fa fa-exclamation-triangle fa-lg"></i>
                                    </span>
                                </td>

                                <!-- Action -->
                                <td class="action-icons-column">
                                    <button class="action-icons fas fa-eye font-sm" tooltip="View"></button>
                                    <button class="action-icons fas fa-pencil-alt font-sm ml-1" tooltip="Edit"></button>
                                    <button class="action-icons far fa-trash-alt font-sm ml-1" tooltip="Delete"></button>
                                </td>

                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Footer -->
                <div class="d-flex justify-content-between align-items-center px-3 py-2 border-top">
                    <table-entries [pageNo]="pageNo" [pageSize]="pageSize" [totalCount]="count"></table-entries>
                    <table-pager *ngIf="viewInstances.length" [pageNo]="pageNo" [pageSize]="pageSize"
                        [totalCount]="count" (pageChange)="pageChange($event)">
                    </table-pager>
                </div>

            </div>
        </div>
    </div>
</div>
