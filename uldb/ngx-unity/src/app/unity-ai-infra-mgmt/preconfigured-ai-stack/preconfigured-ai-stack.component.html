<div class="container-fluid mt-2 px-2 ai-stack-catalog">
    <div class="animated fadeIn">

        <!-- Header -->
        <div class="row mb-2 align-items-center">
            <div class="col">
                <h4 class="mb-0 font-weight-bold catalog-title">AI Stack Catalog</h4>
                <small class="catalog-subtitle">Pre-configured software stacks for one-click deployment</small>
            </div>
        </div>

        <!-- Search -->
        <div class="row mb-2">
            <div class="col-md-7 col-lg-6 col-xl-5">
                <div class="search-wrap">
                    <i class="fa fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Search stacks..." [value]="searchQuery"
                        (input)="onSearchInput($event)">
                </div>
            </div>
        </div>

        <!-- Category filter pills -->
        <div class="row mb-3">
            <div class="col-12 d-flex flex-wrap filters-row">
                <button *ngFor="let cat of categories" class="btn btn-sm filter-pill mr-2 mb-1"
                    [ngClass]="{ 'active': activeCategory === cat }" (click)="selectCategory(cat)">
                    {{ cat }}
                </button>
            </div>
        </div>

        <!-- Cards grid -->
        <div class="row">
            <div class="col-12 text-center py-5" *ngIf="loading">
                <i class="fa fa-spinner fa-spin fa-2x" style="color: var(--unity-spinner-color);"></i>
            </div>
            <div class="col-12" *ngIf="!loading && filteredStacks.length === 0">
                <div class="alert alert-info text-center">No AI stacks found matching your criteria.</div>
            </div>
            <ng-container *ngIf="!loading">
                <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 mb-3 d-flex align-items-stretch"
                    *ngFor="let stack of filteredStacks">
                    <div class="card mb-0 w-100 stack-card">
                        <div class="card-body d-flex flex-column align-items-center text-center p-3">
                            <div class="icon-wrap mb-2">
                                <img [src]="stack.icon" alt="{{stack.title}}" class="stack-icon"
                                    onerror="this.onerror=null; this.src='/static/assets/images/external-brand/ai-stacks/default-ai.svg';">
                            </div>
                            <h6 *ngIf="stack.showTitle !== false" class="font-weight-bold mb-1 stack-title">{{ stack.title }}</h6>
                            <p class="stack-desc flex-grow-1 mb-2" [title]="stack.description">{{ stack.description }}
                            </p>
                            <div class="stack-version mb-2">{{ stack.version }}</div>
                            <button class="btn btn-block btn-deploy font-weight-bold" (click)="deploy(stack)">
                                <i class="fa fa-rocket mr-1"></i> Deploy
                            </button>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>

    </div>
</div>
