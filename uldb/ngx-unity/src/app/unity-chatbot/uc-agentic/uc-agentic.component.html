<div class="container custom-gradient-bg d-flex flex-column h-100 overflow-hidden pb-0 pt-1 px-1 border-top"
  *ngIf="showHotKeys">
  <div class="row m-0 p-0">
    <div class="col-12 m-0 p-0">
      <div id="defaultQueries" class="d-flex flex-column mt-2">
        <div *ngIf="workflowNames && workflowNames.length; else noWorkflows">
          <div *ngFor="let wfn of workflowNames" class="card round-edge mb-2">
            <div class="card-body p-2 default-query" style="cursor: pointer" (click)="selectHotKey(wfn)">
              <div class="d-flex align-items-center justify-content-between">
                <div>
                  <div class="text-muted font-sm ml-2 hover-text">{{ wfn?.name }}</div>
                </div>
                <div class="d-flex align-items-center justify-content-center rounded-circle angle-icon"
                  [ngClass]="{'disable': isTyping}">
                  <i class="fas fa-angle-right font-sm"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
        <ng-template #noWorkflows>
          <ng-conatiner *ngIf="moduleSpinner">
            <div class="d-flex align-items-center justify-content-center p-5">
              <span class="fas fa-spinner fa-spin fa-lg"></span>
              <span class="ml-2 ">Loading</span>
            </div>
          </ng-conatiner>
          <div class="text-center text-muted" *ngIf="!moduleSpinner">
            There are no agentic workflows found
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</div>

<div class="custom-gradient-bg d-flex flex-column h-100 overflow-hidden pb-0 pt-1 px-1 border-top"
  *ngIf="chatbotData?.entityId && !showHotKeys">
  <div class="d-flex justify-content-between align-items-center" style="color: #73818f;">
    <div class="font-weight-bold">{{chatbotData?.entity}}</div>
    <div>
      <button class="btn btn-pill pull-right btn-sm ml-2" type="button" container="body" (click)="returnAgentic()"><i
          class="fa fa-arrow-left text-muted"></i>
      </button>
    </div>
  </div>
  <div #messagesContainer class="messages-container d-flex flex-column justify-content-between">
    <div class="d-flex flex-column w-100" style="max-width: 100%;">
      <ng-container *ngFor="let msg of chatHistoryData" class="d-flex flex-column w-100" style="max-width: 100%;">
        <div class="message-row mb-2" [ngClass]="{ 'user pr-3': msg.sender === 'user', 'bot': msg.sender === 'bot' }">
          <div class="message-box mb-2" [ngClass]="{ 'user-message': msg.sender === 'user' }">
            <markdown *ngIf="msg.sender === 'bot'" [data]="msg.message"></markdown>
            <div *ngIf="msg.sender === 'user'" class="user-text">{{ msg.message }}</div>
            <span class="dots" *ngIf="msg.sender === 'bot' && (!msg.message || msg.status === 'Running')"></span>
          </div>
        </div>
      </ng-container>

      <div *ngIf="isTyping" class="d-flex justify-content-start mb-2">
        <div class="message-box bot-message d-flex">
          <div class="pulse-loader ml-1 align-self-end mb-1">
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <div class="w-100 mt-auto p-2">
    <div class="round-edge bg-white w-100 form-wrapper">
      <div class="row">
        <div class="col">
          <input class="form-control round-edge" type="text" placeholder="Ask me anything..." [(ngModel)]="newMessage"
            (keydown.enter)="onEnter($event)" style="height:2.7rem; border: 0 !important;">
        </div>
      </div>
      <div class="d-flex justify-content-end mb-2 pt-1">
        <button type="button" class="btn btn-sm mx-2 mt-4 query-button btn-success query-button-success"
          (click)="send(newMessage)">
          <i class="fas fa-arrow-up font-md text-white"></i>
        </button>

        <!-- <button *ngIf="showStopButton" type="button"
            class="btn btn-danger stop-button btn-sm mx-2 query-button d-flex align-items-center justify-content-center"
            (click)="stopResponse()">
            <i class="fas fa-square text-white"></i>
          </button> -->
      </div>
    </div>
  </div>
</div>
