<div class="container">
  <div class="row m-0 p-0">
    <div class="col-12 m-0 p-0" *ngIf="showHotKeys">
      <div id="defaultQueries" class="d-flex flex-column mt-2">
        <div *ngIf="workflowNames && workflowNames.length; else noWorkflows">
          <div *ngFor="let wfn of workflowNames" class="card round-edge mb-2">
            <div class="card-body p-2 default-query" style="cursor: pointer" (click)="selectHotKey(wfn)">
              <div class="d-flex align-items-center justify-content-between">
                <div>
                  <div class="text-muted font-sm ml-2 hover-text">{{ wfn?.name }}</div>
                </div>
                <div class="d-flex align-items-center justify-content-center rounded-circle angle-icon"
                  [ngClass]="{'disable': isTyping}">
                  <i class="fas fa-angle-right font-sm"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
        <ng-template #noWorkflows>
          <ng-conatiner *ngIf="moduleSpinner">
            <div class="d-flex align-items-center justify-content-center p-5">
              <span class="fas fa-spinner fa-spin fa-lg"></span>
              <span class="ml-2 ">Loading</span>
            </div>
          </ng-conatiner>
          <div class="text-center text-muted" *ngIf="!moduleSpinner">
            There are no agentic workflows found
          </div>
        </ng-template>
      </div>
    </div>
    <div class="col-12 m-0 p-0" *ngIf="chatbotData?.entityId && !showHotKeys">
      <div class="row m-0 p-0">
        <div class="col-12 m-0 p-0">
          <div class="d-flex justify-content-between align-items-center" style="color: #73818f;">
            <div class="font-weight-bold">{{chatbotData?.entity}}</div>
            <div>
              <button class="btn btn-pill pull-right btn-sm ml-2" type="button" container="body"
                (click)="returnAgentic()"><i class="fa fa-arrow-left text-muted"></i>
              </button>
            </div>
          </div>
          <div class="card chat-card">
            <div class="chat-content">
              <ng-container>
                <div #chatBody class="chat-body">
                  <div class="chat-messages">
                    <ng-container *ngFor="let msg of chatHistoryData">
                      <div class="message-row"
                        [ngClass]="{ 'user pr-3': msg.sender === 'user', 'bot': msg.sender === 'bot' }">
                        <div class="message-box" [ngClass]="{ 'user-message': msg.sender === 'user' }">
                          <markdown *ngIf="msg.sender === 'bot'" [data]="msg.message"></markdown>
                          <div *ngIf="msg.sender === 'user'" class="user-text">{{ msg.message }}</div>
                          <span class="dots"
                            *ngIf="msg.sender === 'bot' && (!msg.message || msg.status === 'Running')"></span>
                        </div>
                      </div>
                    </ng-container>
                    <div *ngIf="isTyping" class="d-flex mb-2 mx-3 typing-indicator">
                      <div class="pulse-loader">
                        <div></div>
                        <div></div>
                        <div></div>
                      </div>
                    </div>
                  </div>
                </div>

              </ng-container>
            </div>
            <div class="chat-input-bottom" aria-hidden="false">
              <div class="chat-input-container mt-3 mb-3">
                <div class="chat-input-box pb-0">
                  <textarea aria-label="type your message" class="chat-input" placeholder="Type your message..."
                    [(ngModel)]="newMessage" (keydown.enter)="onEnter($event)" rows="3"></textarea>
                  <!-- <button class="send-btn mr-2 mt-5" (click)="send(newMessage)" aria-label="send"
                        [ngClass]="{ 'active-send': newMessage?.trim().length > 0 }">
                        <i class="fas fa-paper-plane"></i>
                      </button> -->
                  <button type="button" class="btn btn-sm mx-2 mt-4 query-button btn-success query-button-success"
                    (click)="send(newMessage)">
                    <i class="fas fa-arrow-up font-md text-white"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
