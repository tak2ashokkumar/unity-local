<div class="custom-gradient-bg d-flex flex-column overflow-hidden pb-0 pt-1 px-1 border-top"
    style="height: calc(100%);">
    <div class="d-flex align-items-center m-2">
        <button class="action-icons action-icon-small fa fa-arrow-left" container="body" tooltip="Back"
            (click)="backToHistoryList()"></button>
        <h6 class="ml-2 mb-1">History Chat</h6>
    </div>
    <div #messagesContainer class="d-flex flex-column justify-content-between h-100 overflow-hidden scroll-container">
        <ng-container *ngIf="!chatHistoryData?.length">
            <div class="d-flex align-items-center justify-content-center p-5">
                <span class="fas fa-spinner fa-spin fa-lg"></span>
                <span class="ml-2 ">Loading</span>
            </div>
        </ng-container>
        <div #chatContainer class="h-100 w-100" style="overflow-y: auto; overflow-x: hidden;" (scroll)="onScroll()">
            <div *ngFor="let chat of chatHistoryData; let i = index; trackBy: trackByMessage"
                class="d-flex flex-column w-100" style="max-width: 100%;">
                <div *ngIf="chat.user == 'bot'" class="d-flex flex-column justify-content-start mb-1 w-100"
                    style="max-width: 100%;">
                    <ng-container *ngIf="chat.type == 'text'">
                        <div class="message-box bot-message ml-2">
                            <markdown [data]="chat.message"></markdown>
                            <ng-container *ngIf="chat.suggestedPrompt">
                                <div class="mt-2 font-500">Suggested Question:</div>
                                <div class="text-primary suggested-action" (click)="submitQuery(chat.suggestedPrompt)">
                                    {{chat.suggestedPrompt}}
                                </div>
                            </ng-container>
                        </div>
                    </ng-container>
                </div>
                <div *ngIf="chat.user == 'user'" class="d-flex justify-content-end mb-1" style="max-width: 100%;">
                    <div class="message-box user-message mr-2">
                        {{ chat.message }}
                    </div>
                </div>
            </div>
            <div *ngIf="isTyping" class="d-flex justify-content-start mb-2">
                <div class="message-box bot-message d-flex ml-2">
                    <span>{{waitMessage}}</span>
                    <div class="pulse-loader ml-1 align-self-end mb-1">
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                </div>
            </div>
        </div>

        <form *ngIf="form" [formGroup]="form" class="w-100 mt-auto p-2">
            <div class="round-edge bg-white w-100 form-wrapper">
                <div class="row">
                    <div class="col">
                        <input class="form-control round-edge" type="text" formControlName="chat"
                            placeholder="Ask me anything..." (keyup.enter)="onSubmit()"
                            style="height:2.7rem; border: 0 !important;">
                    </div>
                </div>
                <div class="d-flex justify-content-end mb-2 pt-1">
                    <div class="active-ai-modal-model-selector">
                        <button type="button" class="btn btn-pill active-ai-modal-model-btn d-flex align-items-center"
                            (click)="toggleDropdown()">
                            <img *ngIf="activeModel?.image" [src]="activeModel?.image"
                                class="active-ai-modal-model-icon mr-1">
                            {{activeModel?.text || 'Select Model'}}
                            <i class="fas fa-chevron-down ml-1"></i>
                        </button>
                        <div *ngIf="showModelDropdown" class="active-ai-modal-model-dropdown">
                            <div *ngFor="let model of llmModels" class="active-ai-modal-model-option"
                                (click)="changeActiveModel(model)" [ngClass]="getModelItemClass(model)">
                                <img [src]="model?.image" class="active-ai-modal-model-icon mr-2">
                                <div style="min-width: 0; flex: 1;">
                                    <div class="d-flex align-items-center justify-content-between font-sm">
                                        <div class="font-500 text-truncate" style="min-width: 0; flex: 1;">
                                            {{model?.text}}
                                        </div>
                                        <div *ngIf="!model.is_user_owned"
                                            class="ml-1 flex-shrink-0 text-primary font-sm-xs"
                                            style="cursor: pointer; text-decoration: underline;"
                                            (click)="goToConfig(model); $event.stopPropagation()">
                                            Configure
                                        </div>
                                    </div>
                                    <div class="text-muted font-sm-xs">
                                        {{model?.description}}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <ng-container *ngIf="chatHistoryData.length > 1">
                        <button type="button" class="btn btn-sm ml-2 new-chat-button no-hover query-button"
                            (click)="onNewChat()">
                            <i class="fas fa-comment-medical font-md text-muted"></i>
                        </button>
                    </ng-container>
                    <button *ngIf="!showStopButton" type="button" class="btn btn-sm mx-2 query-button"
                        [ngClass]="!typingQueue.length ? 'btn-success query-button-success' : 'btn-secondary'"
                        (click)="onSubmit()">
                        <i class="fas fa-arrow-up font-md text-white"></i>
                    </button>
                    <button *ngIf="showStopButton" type="button"
                        class="btn btn-danger stop-button btn-sm mx-2 query-button d-flex align-items-center justify-content-center"
                        (click)="stopResponse()">
                        <i class="fas fa-square text-white"></i>
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
