<h5 class="font-weight-bold">{{cloud.displayName}}</h5>

<div class="card mb-2">
  <app-spinner [name]="'aws-instance-prices'"></app-spinner>
  <form class="awsInstanceFiltersForm px-2" *ngIf="awsInstanceFiltersForm" [formGroup]="awsInstanceFiltersForm">
    <div class="row">
      <div class="form-group col-6 pr-1 mb-1">
        <label class="font-weight-bold mb-0" for="awsregion">Region:</label>
        <select id="awsregion" class="form-control form-control-sm" formControlName="region">
          <option *ngFor="let regionData of regionList" [value]="regionData.name"> {{regionData.name}}</option>
        </select>
      </div>
      <div class="form-group col-6 pl-1 mb-1">
        <label class="font-weight-bold mb-0" for="nw_performance">N/W Bandwidth:</label>
        <select id="nw_performance" class="form-control form-control-sm" formControlName="nw_performance">
          <option *ngFor="let bandwidth of bandwidthValues" [value]="bandwidth"> {{bandwidth}}</option>
        </select>
      </div>
      <div class="form-group col-6 pr-1 mb-2">
        <label class="font-weight-bold mb-0" for="aws_storage_type">Storage Type:</label>
        <select id="aws_storage_type" class="form-control form-control-sm" formControlName="storage_type">
          <option *ngFor="let storageType of storageTypes" [value]="storageType.code"> {{storageType.name}}</option>
        </select>
      </div>
      <div class="form-group col-6 pl-1 mb-2" *ngIf="awsInstanceFiltersForm.controls.iops">
        <label class="font-weight-bold mb-0" for="iops">IOPS:</label>
        <input id="iops" type="text" class="form-control form-control-sm" formControlName="iops" placeholder="IOPS">
      </div>
    </div>
  </form>
  <ul class="list-group instances">
    <li class="list-group-item d-flex list-group-item-action justify-content-between align-items-center px-2 py-1"
      *ngFor="let instance of instances; let i = index" (click)="selectInstance(i)" [ngClass]="instance.bgClass"
      [tooltip]="instance.description">
      <span class="col-5"> {{instance.instanceType}} - {{instance.OS}}</span>
      <span class="badge badge-pill" [ngClass]="instance.badgeClass">{{instance.cpu | number}}vCPU</span>
      <span class="badge badge-pill" [ngClass]="instance.badgeClass">{{instance.ram | number: '1.0-2'}}GB
        RAM</span>
      <span class="badge badge-pill" [ngClass]="instance.badgeClass">
        &#36;{{instance.instanceRate | number: '1.0-2'}}</span>
    </li>
    <li *ngIf="!instances.length">
      <p class="text-center text-muted pt-5">
        No instances for Criteria
      </p>
    </li>
  </ul>
</div>
