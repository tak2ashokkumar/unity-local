<div class="container-fluid px-3 pt-3 pb-0">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col-12">
                <div class="card round-edge m-0" style="min-height: 260px;">
                  <div class="card-header d-flex justify-content-between align-items-center bg-transparent py-2 pl-2">
                    <div class="d-flex justify-content-center align-items-center font-500">
                      <span class="badge badge-secondary font-sm">{{count}}</span>
                      <span class="ml-1 font-lg">Cost Details</span>
                    </div>
                    <div class="d-flex align-items-center justify-content-end w-16">
                        <button class="btn btn-pill btn-warning pull-right btn-sm ml-2" type="button" (click)="goBack()"
                            [tooltip]="'Go Back'"><i class="fa fa-arrow-left"></i>
                        </button>
                        <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
                    </div>
                  </div>
                  <div class="card-body py-2"> 
                    <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                      <div class="w-25">
                        <!-- <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box> -->
                      </div>
                      <div>
                        <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                          (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                      </div>
                    </div>
                    <table class="table table-sm font-sm text-left" sortableTable (sorted)="onSorted($event)">
                      <thead class="bg-light">
                        <tr>
                          <th sortable-column="deviceName">Name</th>
                          <th>IP</th>
                          <th>Core Cost</th>
                          <th>Management Cost</th>
                          <th>Storage Cost</th>
                          <th>Backup Cost</th>
                          <th>Network Cost</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr *ngFor="let view of detailsViewData; let i = index;" setTableColumnWidth truncateText>
                          <td class="tdw-20">
                            <div [tooltip]="view.deviceName">{{view.deviceName}}</div>
                          </td>
                          <td class="tdw-15">
                            <div [tooltip]="view.deviceIp">{{view.deviceIp}}</div>
                          </td>
                          <td class="tdw-10">
                            <div [tooltip]="view.coreCost">{{view.coreCost}}</div>
                          </td>
                          <td class="tdw-15">
                            <div [tooltip]="view.managementCost">{{view.managementCost}}</div>
                          </td>
                          <td class="tdw-15">
                            <div [tooltip]="view.storageCost">{{view.storageCost}}</div>
                          </td>
                          <td class="tdw-15">
                            <div [tooltip]="view.backupCost">{{view.backupCost}}</div>
                          </td>
                          <td class="tdw-10">
                            <div [tooltip]="view.networkCost">{{view.networkCost}}</div>
                          </td>          
                        </tr>
                      </tbody>
                    </table>
                    <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="count">
                    </table-entries>
                    <table-pager *ngIf="detailsViewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                      [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
                    <ng-container *ngIf="!detailsViewData.length">
                      <div class="d-flex justify-content-center align-items-center text-muted py-5">
                        No details available.
                      </div>
                    </ng-container>
                  </div>
                </div>
            </div>
        </div>
    </div>
</div>
