<form *ngIf="form" [formGroup]="form">
    <div class="border position-relative rounded mt-4 p-3">
        <div class="bg-white font-md font-500 section-name-one">ITSM Details</div>
        <div class="row">
            <div class="form-group col-4">
                <label class="form-col-form-label">Type<em>*</em></label>
                <select class="form-control" formControlName="report_type" [class.is-invalid]="formErrors.report_type">
                    <option [value]="''">Select Module</option>
                    <option [value]="'dynamic_crm'">Microsoft Dynamics CRM</option>
                </select>
                <div class="invalid-feedback" *ngIf="formErrors.report_type">{{formErrors.report_type}}</div>
            </div>
            <div class="form-group col-4">
                <label class="form-col-form-label">Status</label>
                <select class="form-control" formControlName="duration" [class.is-invalid]="formErrors.duration">
                    <option [value]="''">Select Status</option>
                    <option [value]="'all'">All</option>
                    <option [value]="'active'">Active</option>
                    <option [value]="'Resolved'">Resolved</option>
                    <option [value]="'cancelled'">Cancelled</option>
                </select>
                <div class="invalid-feedback" *ngIf="formErrors.duration">
                    {{formErrors.duration}}</div>
            </div>
        </div>
    </div>
</form>
