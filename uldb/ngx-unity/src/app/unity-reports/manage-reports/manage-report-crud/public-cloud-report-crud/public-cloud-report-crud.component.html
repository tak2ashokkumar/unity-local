<form *ngIf="form" [formGroup]="form">
    <div class="border position-relative rounded mt-4 p-3">
        <div class="bg-white font-md font-500 section-name-one">Public Cloud Details</div>
        <div class="row">
            <div class="form-group col-4">
                <label class="form-col-form-label">Cloud<em>*</em></label>
                <multiselect-dropdown [options]="clouds" [settings]="cloudSettings" class="form-control p-0"
                    (dropdownClosed)="cloudChanged()" formControlName="cloud"
                    [isDisabled]="!form.controls.cloudType.value"
                    [ngClass]="{'is-invalid' : formErrors.cloud}"></multiselect-dropdown>
                <div class="invalid-feedback" *ngIf="formErrors.cloud">
                    {{formErrors.cloud}}</div>
            </div>
            <div class="form-group col-4" *ngIf="names.length">
                <label class="form-col-form-label">Account Name<em>*</em></label>
                <multiselect-dropdown *ngIf="!names.length" [options]="names" [settings]="namesSettings"
                    class="form-control p-0" formControlName="cloudName" [isDisabled]="!selectedClouds.length"
                    [ngClass]="{'is-invalid' : formErrors.cloudName}"></multiselect-dropdown>
                <multiselect-dropdown *ngIf="names.length" [options]="names" [settings]="namesSettings"
                    class="form-control p-0" formControlName="cloudName" [isDisabled]="!selectedClouds.length"
                    [ngClass]="{'is-invalid' : formErrors.cloudName}"></multiselect-dropdown>
                <div class="invalid-feedback" *ngIf="formErrors.cloudName">
                    {{formErrors.cloudName}}</div>
            </div>
        </div>
    </div>
</form>
