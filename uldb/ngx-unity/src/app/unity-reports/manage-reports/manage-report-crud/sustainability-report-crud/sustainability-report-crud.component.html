<form *ngIf="form" [formGroup]="form">
    <div class="row">
        <div class="form-group col-4">
            <label class="form-col-form-label">Status</label>
            <select class="form-control" formControlName="report_type"
                [ngClass]="{'is-invalid' : formErrors.report_type}">
                <option [value]="''">Select Service</option>report_type
                <option [value]="'sustainability_gcp'">GCP</option>
                <option [value]="'sustainability_aws'">AWS</option>
                <option [value]="'sustainability_devices'">Datacenter Devices</option>
            </select>
            <div class="invalid-feedback" *ngIf="formErrors.report_type">
                {{formErrors.report_type}}</div>
        </div>
        <ng-container [ngSwitch]="form.get('report_type').value">
            <ng-container *ngSwitchCase="'sustainability_devices'">
                <div class="form-group col-4">
                    <label class="form-col-form-label">Datacenter<em>*</em></label>
                    <multiselect-dropdown [options]="datacenters" [settings]="dcSettings" class="form-control p-0"
                        (dropdownClosed)="dcChange()" formControlName="dc_uuids"
                        [ngClass]="{'is-invalid' : formErrors.dc_uuids}"></multiselect-dropdown>
                    <div class="invalid-feedback" *ngIf="formErrors.dc_uuids">{{formErrors.dc_uuids}}</div>
                </div>
                <div class="form-group col-4">
                    <label class="form-col-form-label">Cabinets</label>
                    <multiselect-dropdown [options]="datacenterCabinets" [settings]="cabinetSettings"
                        class="form-control p-0" formControlName="cabinet_uuids" [isDisabled]="!selectedDCIds.length"
                        [ngClass]="{'is-invalid' : formErrors.cabinet_uuids}"></multiselect-dropdown>
                    <div class="invalid-feedback" *ngIf="formErrors.cabinet_uuids">
                        {{formErrors.cabinet_uuids}}</div>
                </div>
                <div class="col-3 form-group">
                    <div class="input-group-prepend">
                        <label class="col-form-label col-form-label-sm"
                            for="inputGroupSelect02">Duration<em>*</em>:&nbsp;&nbsp;&nbsp;</label>
                    </div>
                    <select class="custom-select" id="inputGroupSelect02" formControlName="period"
                        [ngClass]="{'is-invalid' : formErrors.period}">
                        <option [value]="duration.CURRENT_YEAR">Current Year</option>
                        <option [value]="duration.CURRENT_QUARTER">Current Quarter</option>
                        <option [value]="duration.LAST_QUARTER">Last Quarter</option>
                        <option [value]="duration.LAST_TWO_QUARTERS">Last 2 Quarters</option>
                        <option [value]="duration.LAST_THREE_QUARTERS">Last 3 Quarters</option>
                        <option [value]="duration.LAST_YEAR">Last Year</option>
                        <option [value]="duration.CUSTOM">Custom</option>
                    </select>
                    <div class="invalid-feedback" *ngIf="formErrors.period">{{formErrors.period}}</div>
                </div>
                <div class="col-3">
                    <label class="form-col-form-label" for="from">From :&nbsp;</label>
                    <input type="text" id="from" class="form-control" formControlName="from" #from="bsDatepicker"
                        bsDatepicker
                        [bsConfig]="{ minMode : 'month', dateInputFormat: 'MMMM YYYY', containerClass: 'theme-dark-blue' }"
                        [outsideClick]="false" [maxDate]="now" [ngClass]="{'is-invalid' : formErrors.from}" />
                </div>
                <div class="col-3">
                    <label class="form-col-form-label" for="to">To :&nbsp;</label>
                    <input type="text" id="to" class="form-control" formControlName="to" #to="bsDatepicker" bsDatepicker
                        [bsConfig]="{ minMode : 'month', dateInputFormat: 'MMMM YYYY', containerClass: 'theme-dark-blue' }"
                        [outsideClick]="false" [minDate]="form.controls.from.value" [maxDate]="now"
                        [ngClass]="{'is-invalid' : formErrors.to}" />
                </div>
                <div class="col-3">
                    <label for="deviceTypes" class="form-col-form-label">Device
                        Types:&nbsp;</label>
                    <multiselect-dropdown [options]="deviceTypes" [settings]="deviceTypeSettings"
                        class="form-control p-0" formControlName="device_types"
                        [ngClass]="{'is-invalid' : formErrors.device_types}"></multiselect-dropdown>
                    <div class="invalid-feedback" *ngIf="formErrors.device_types">
                        {{formErrors.device_types}}</div>
                </div>
            </ng-container>
            <ng-container *ngSwitchCase="'sustainability_aws'">
                <div class="form-group col-4">
                    <label class="form-col-form-label">Accounts<em>*</em></label>
                    <multiselect-dropdown [options]="awsAccounts" [settings]="awsAccountSettings"
                        class="form-control p-0" formControlName="account"
                        [ngClass]="{'is-invalid' : formErrors.account}"></multiselect-dropdown>
                    <div class="invalid-feedback" *ngIf="formErrors.account">{{formErrors.account}}</div>
                </div>
            </ng-container>
            <ng-container *ngSwitchCase="'sustainability_gcp'">
                <div class="form-group col-4">
                    <label class="form-col-form-label">Accounts<em>*</em></label>
                    <multiselect-dropdown [options]="gcpAccounts" [settings]="gcpAccountSettings"
                        class="form-control p-0" formControlName="uuid"
                        [ngClass]="{'is-invalid' : formErrors.uuid}"></multiselect-dropdown>
                    <div class="invalid-feedback" *ngIf="formErrors.uuid">{{formErrors.uuid}}</div>
                </div>
            </ng-container>
        </ng-container>
    </div>
</form>
