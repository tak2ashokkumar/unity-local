<div class="card mb-2">
    <div class="card-header d-flex justify-content-between align-items-center bg-transparent py-1 px-2">
        <div class="d-flex align-items-center">
            <i
                class="far fa-file-alt text-primary step-icon rounded-circle d-flex align-items-center justify-content-center mr-2"></i>
            <div class="font-500">Document & Close</div>
        </div>
        <button type="button" class="btn p-0 border-0 bg-transparent shadow-none text-muted"
            [tooltip]="documentAndCloseOpen ? 'Minimize' : 'Expand'" (click)="toggleDocumentAndClose()"
            [attr.aria-expanded]="documentAndCloseOpen">
            <i class="fas fa-lg" [ngClass]="documentAndCloseOpen ? 'fa-chevron-up' : 'fa-chevron-down'">
            </i>
        </button>
    </div>

    <div [collapse]="!documentAndCloseOpen">
        <div class="card-body">
            <ng-container *ngIf="documentAndCloseViewData">
                <div>
                    <div class="font-500">Generated Report:</div>
                    <span><i class="fas fa-file-alt text-primary mr-1"></i>
                        <p class="d-inline"> {{documentAndCloseViewData?.filename || 'NA'}}</p>
                    </span>
                </div>

                <div class="mt-2">
                    <span class="font-500">Postmortem Summary</span>
                    <p>{{documentAndCloseViewData?.description || 'NA'}}</p>
                </div>
            </ng-container>

            <ng-container *ngIf="!documentAndCloseViewData">
                <div class="text-center text-muted py-5">No Document & Close data found.</div>
            </ng-container>
        </div>
    </div>
</div>
