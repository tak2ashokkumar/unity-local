<div class="card mb-2">

    <!-- Card Header -->
    <div class="card-header d-flex justify-content-between align-items-center bg-transparent py-1 px-2">

        <div class="d-flex align-items-center">
            <i class="fas fa-shield-alt text-primary step-icon rounded-circle pt-2 pl-2 mr-2"></i>
            <div class="font-500">Verify & Audit</div>
        </div>
        <button type="button" class="btn p-0 border-0 bg-transparent shadow-none text-muted"
            [tooltip]="isVerifyAndAuditOpen ? 'Minimize' : 'Expand'" (click)="toggleVerifyAndAuditAccordion()"
            [attr.aria-expanded]="isVerifyAndAuditOpen">
            <i class="fas fa-lg" [ngClass]="isVerifyAndAuditOpen ? 'fa-chevron-up' : 'fa-chevron-down'">
            </i>
        </button>
    </div>

    <!-- Collapsible Body -->
    <div [collapse]="!isVerifyAndAuditOpen">
        <div class="card-body">
            <div>Executed Command: $ {{verifyAuditViewData?.data?.executed_command}}</div>
            <pre class="mb-0" style="color: white;"
                *ngIf="verifyAuditViewData?.data?.validation_findings?.length">{{verifyAuditViewData?.data?.validation_findings[0]?.details}}</pre>

        </div>
    </div>

</div>
