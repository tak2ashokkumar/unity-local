  <div class="row">
    <div class="col-12 mt-2" *ngIf="stageTitle==stageTitleMapping.BASIC_CLI_CHECK">
      <ccs-verify-and-audit-step [chatResponse]="chatResponse">
      </ccs-verify-and-audit-step>
    </div>
    <div class="col-12 mt-2" *ngIf="stageTitle==stageTitleMapping.RCA">
      <ccs-root-cause-analysis-step [chatResponse]="chatResponse"></ccs-root-cause-analysis-step>
    </div>
    <div class="col-12 mt-2" *ngIf="stageTitle==stageTitleMapping.REMEDIATION_SCRIPT">
      <ccs-remediation-script-step [chatResponse]="chatResponse"></ccs-remediation-script-step>
    </div>
    <div class="col-12 mt-2" *ngIf="stageTitle==stageTitleMapping.VALIDATE_FIX">
      <ccs-validate-fix-step [chatResponse]="chatResponse"></ccs-validate-fix-step>
    </div>
    <div class="col-12 mt-2" *ngIf="stageTitle==stageTitleMapping.DOCUMENT_AND_CLOSE">
      <ccs-document-and-close-step [chatResponse]="chatResponse"></ccs-document-and-close-step>
