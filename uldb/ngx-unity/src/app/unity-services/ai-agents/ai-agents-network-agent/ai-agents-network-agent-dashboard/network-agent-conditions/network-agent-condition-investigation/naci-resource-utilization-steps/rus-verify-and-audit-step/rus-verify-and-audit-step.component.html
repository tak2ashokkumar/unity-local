<div class="card mb-0">
    <div class="card-header d-flex justify-content-between align-items-center bg-transparent py-1 px-2">
        <div class="d-flex align-items-center">
            <i class="fas fa-shield-alt text-primary step-icon rounded-circle pt-2 pl-2 mr-2"></i>
            <div class="font-500">Verify & Audit</div>
        </div>
        <button type="button" class="btn p-0 border-0 bg-transparent shadow-none text-muted"
            [tooltip]="isVerifyAndAuditOpen ? 'Minimize' : 'Expand'" (click)="toggleVerifyAndAuditAccordion()"
            [attr.aria-expanded]="isVerifyAndAuditOpen">
            <i class="fas fa-lg" [ngClass]="isVerifyAndAuditOpen ? 'fa-chevron-up' : 'fa-chevron-down'">
            </i>
        </button>
    </div>

    <div class="card-body" [collapse]="!isVerifyAndAuditOpen">
        <div class="card round-edge equalize-card mb-2">
            <div class="card-header d-flex justify-content-between align-items-center bg-white py-2 pl-2">
                <span class="font-lg font-500">Resource Utilization</span>
            </div>
            <div class="card-body px-2" style="min-height:200px;max-height:441px;overflow-y: auto;overflow-x: hidden;">
                <div class="row mx-0">
                    <div class="col-6 px-2"
                        style="min-height:170px;max-height:441px;overflow-y: auto;overflow-x: hidden;">
                        <div class="card equalize-card border-0">
                            <div class="card-body p-0 d-flex flex-column justify-content-around">
                                <ng-container *ngIf="resourceUtilizationWidgetViewData?.cpuChartData">
                                    <div echarts [options]="resourceUtilizationWidgetViewData?.cpuChartData?.options"
                                        [extentions]="resourceUtilizationWidgetViewData?.cpuChartData?.extensions"
                                        [defaultHeight]="300"></div>
                                </ng-container>
                                <ng-container *ngIf="!resourceUtilizationWidgetViewData?.cpuChartData">
                                    <div class="d-flex justify-content-center align-items-center h-100">
                                        No CPU usage data found.
                                    </div>
                                </ng-container>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 px-2"
                        style="min-height:170px;max-height:441px;overflow-y: auto;overflow-x: hidden;">
                        <div class="card equalize-card border-0">
                            <div class="card-body p-0 d-flex flex-column justify-content-around">
                                <ng-container *ngIf="resourceUtilizationWidgetViewData?.memoryChartData">
                                    <div echarts [options]="resourceUtilizationWidgetViewData?.memoryChartData?.options"
                                        [extentions]="resourceUtilizationWidgetViewData?.memoryChartData?.extensions"
                                        [defaultHeight]="300"></div>
                                </ng-container>
                                <ng-container *ngIf="!resourceUtilizationWidgetViewData?.memoryChartData">
                                    <div class="d-flex justify-content-center align-items-center h-100">
                                        No Memory usage data found.
                                    </div>
                                </ng-container>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 px-2 mb-2"
                *ngFor="let interfaceChartData of interfaceWidgetViewData?.chartData; let last = last;">
                <div class="card equalize-card">
                    <div class="card-body pb-0">
                        <ng-container *ngIf="interfaceChartData">
                            <div echarts [options]="interfaceChartData?.options"
                                [extentions]="interfaceChartData?.extensions" [defaultHeight]="300"></div>
                        </ng-container>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
