<div class="card">
    <div class="card-header bg-transparent d-flex justify-content-between align-items-center border-bottom-0 py-2">
        <div id="count" class="d-flex justify-content-start text-muted">
            <span class="badge badge-pill badge-secondary">{{count}}</span>
            <span class="ml-1">Events</span>
        </div>
        <div class="col-8 d-flex justify-content-center align-items-center">
            <form *ngIf="filterForm" [formGroup]="filterForm" class="row w-100">
                <div class="col-3 pr-0">
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-search"></i>
                            </span>
                        </div>
                        <input type="text" class="form-control form-control-sm" formControlName="search_key"
                            id="search_key" placeholder="Enter Keyword">
                    </div>
                </div>
                <div class="col-4 form-group mb-0 pr-0">
                    <multiselect-dropdown [options]="deviceTypes" [settings]="deviceTypeSettings"
                        class="form-control w-100 p-0" style="height:auto;"
                        formControlName="device_type"></multiselect-dropdown>
                </div>
                <div class="col-2 form-group mb-0 pr-0">
                    <select class="form-control form-control-sm" id="severity" formControlName="severity">
                        <option value="" disabled>Severity</option>
                        <option value="Critical">Critical</option>
                        <option value="Information">Information</option>
                        <option value="Warning">Warning</option>
                    </select>
                </div>
                <div class="col-2 form-group mb-0 pr-0">
                    <select class="form-control form-control-sm" id="status" formControlName="status">
                        <option value="" disabled>Status</option>
                        <option value="Open">Open</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </div>
                <div class="col-1 pr-0">
                    <button class="btn btn-sm btn-pill btn-warning" [tooltip]="'Filter'" container="body"
                        (click)="filterEvents()">
                        <i class="fas fa-filter font-xs"></i>
                    </button>
                </div>
            </form>
        </div>
        <div class="d-flex" *ngIf="viewData.length" style="min-width:200px;">
            <form *ngIf="columnForm" class="col-12" [formGroup]="columnForm">
                <div class="form-group mb-0">
                    <multiselect-dropdown class="form-control p-0" style="height:auto;" formControlName="columns"
                        [options]="tableColumns" [settings]="columnSelectionSettings" [texts]="columnSelectionTexts"
                        (dropdownClosed)="columnChange()"></multiselect-dropdown>
                </div>
            </form>
        </div>
        <div class="d-flex justify-content-end">
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count" [isLargeSize]="true"
                (pageSizeChange)="pageSizeChange($event)"></table-page-size>
        </div>
    </div>
    <div class="card-body pt-0">
        <!-- <div class="table-responsive"> -->
        <table class="table table-sm font-xs-sm font-500">
            <thead>
                <!-- <tr>
                    <th>ID</th>
                    <th>Device Name</th>
                    <th>Device Type</th>
                    <th>IP Address</th>
                    <th>Description</th>
                    <th>Event Time</th>
                    <th class="text-center">Severity</th>
                    <th class="text-center">Status</th>
                    <th>Acknowledged</th>
                    <th>Source Account</th>
                    <th class="text-center">Duration</th>
                    <th>Recovery Time</th>
                    <th>Actions</th>
                </tr> -->
                <tr>
                    <th>ID</th>
                    <th>Device Name</th>
                    <th *ngFor="let col of columnsSelected">{{col.name}}</th>
                    <th>Acknowledged</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let view of viewData;let i = index;" truncateText>
                    <td class="tdw-5">
                        <div [tooltip]="view.id">{{view.id}}</div>
                    </td>
                    <td class="tdw-9 text-primary">
                        <div [tooltip]="view.deviceName">{{view.deviceName}}</div>
                    </td>
                    <td *ngFor="let col of columnsSelected">
                        <ng-container *ngIf="col.type == 'btn-link'">
                            <button class="btn btn-link text-decoration-none p-0 table-column-btn" type="button"
                                [tooltip]="col.name" (click)="loadDetails(view)">{{view[col.key]}}</button>
                        </ng-container>
                        <ng-container *ngIf="col.type == 'status_field'">
                            <shared-device-status [status]="view.state"></shared-device-status>
                        </ng-container>
                        <ng-container *ngIf="!col.type || col.type=='text'">
                            <div [tooltip]="view[col.key]"
                                *ngIf="col.key !== 'status' && col.key !== 'severity' && col.key !== 'eventMetric'">
                                {{view[col.key]}}</div>
                            <div [tooltip]="view[col.key]" [ngClass]="[view.statusTextColor, 'text-capitalize']"
                                *ngIf="col.key == 'status'">{{view[col.key]}}</div>
                            <div *ngIf="col.key == 'eventMetric'" [tooltip]="view[col.key]" class="text-truncate"
                                style="max-width: 200px; overflow: hidden; text-overflow: ellipsis;">{{view[col.key]}}
                            </div>
                            <div *ngIf="col.key == 'severity'"><i class="fa status-icon" [ngClass]="view.severityIcon"
                                    [tooltip]="view.severity" container="body"></i></div>
                        </ng-container>
                    </td>
                    <!-- <td class="tdw-9">
                        <div [tooltip]="view.deviceType">{{view.deviceType}}</div>
                    </td>
                    <td class="tdw-10">
                        <div>{{view.ipAddress}}</div>
                    </td>
                    <td class="tdw-13">
                        <div [tooltip]="view.description">{{view.description}}</div>
                    </td>
                    <td class="tdw-10">
                        <div [tooltip]="view.eventDatetime">{{view.eventDatetime}}</div>
                    </td>
                    <td class="tdw-5">
                        <div class="text-center">
                            <i class="fa status-icon" [ngClass]="view.severityIcon" [tooltip]="view.severity"
                                container="body"></i>
                        </div>
                    </td>
                    <td class="tdw-5">
                        <div class="text-center" [ngClass]="[view.statusTextColor, 'text-capitalize']"
                            [tooltip]="view.status">{{view.status}}</div>
                    </td>
                    <td class="tdw-5">
                        <div class="text-capitalize">{{view.sourceAccount}}</div>
                    </td>
                    <td class="tdw-9">
                        <div class="text-center" [tooltip]="view.duration">{{view.duration}}</div>
                    </td>
                    <td class="tdw-10">
                        <div class="text-center" [tooltip]="view.recoveredTime">{{view.recoveredTime}}</div>
                    </td> -->
                    <td class="tdw-5 no-truncate">
                        <div class="pl-3 tooltip-wrapper" *ngIf="view.isAcknowledged">
                            <span *ngIf="view.acknowledgedTime" class="fas fa-check-circle fa-lg text-success"
                                container="body" (mouseenter)="onMouseEnterTooltip(i, $event.target)"
                                (mouseleave)="hoveredIndex = -1">
                                <div #tooltipRef class="tooltip-box" *ngIf="hoveredIndex === i"
                                    [ngClass]="tooltipDirection === 'bottom' ? 'tooltip-bottom' : 'tooltip-top'"
                                    [innerHTML]="view.acknowledgedTooltipMsg"></div>
                            </span>
                            <span *ngIf="!view.acknowledgedTime">
                                <i class="fa fa-spinner fa-spin">&nbsp;</i>
                            </span>
                        </div>
                        <div class="pl-2" *ngIf="!view.isAcknowledged">
                            <button class="action-icons mb-0 fas fa-comment-dots font-sm"
                                (click)="onCloseAcknowledge(); acknowledge(i); $event.stopPropagation();$event.preventDefault();"
                                [popover]="acknowledgeFormRef" [tooltip]="'Acknowledge'" container="body"
                                [outsideClick]="true" accessControl moduleName="AIML Event Management"
                                accessType="Manage AIML Event Management" elementType="actionbtn"></button>
                        </div>
                    </td>
                    <td class="action-icons-column">
                        <span dropdown placement="bottom right" container="body">
                            <button id="button-container" class="action-icons mb-0 fa fa-ellipsis-h font-sm ml-1"
                                data-toggle="dropdown" aria-controls="icons-dropdown-container" dropdownToggle
                                (click)="false" [tooltip]="'More Actions'" container="body" accessControl
                                moduleName="AIML Event Management" accessType="Manage AIML Event Management"
                                elementType="actionbtn"></button>
                            <div container="body" id="icons-dropdown-container"
                                class="dropdown-menu dropdown-menu-right text-center mt-2" *dropdownMenu
                                aria-labelledby="button-container">
                                <button class="action-icons mb-0 fas fa-toggle-on font-sm mt-1 mb-1"
                                    [tooltip]="view.triggerDisableBtnTooltipMsg" container="body"
                                    [ngClass]="{'action-icons-disabled':view.isStatusResolved || !view.isSourceUnity}"
                                    (click)="disable(view)"></button>
                                <button class="action-icons mb-0 fa fa-times font-sm mt-1 mb-1"
                                    [tooltip]="view.resolveBtnTooltipMsg" container="body"
                                    [ngClass]="{'action-icons-disabled':view.isStatusResolved}"
                                    (click)="resolve(view)"></button>
                                <!-- <button class="action-icons mb-0 fas fa-edit font-sm mt-1 mb-1"
                                    [tooltip]="'Coming Soon'" container="body"
                                    [ngClass]="{'action-icons-disabled':true}"></button>
                                <button class="action-icons mb-0 fas fa-external-link-alt font-sm mt-1 mb-1"
                                    [tooltip]="'Coming Soon'" container="body"
                                    [ngClass]="{'action-icons-disabled':true}"></button>
                                <button class="action-icons mb-0 fas fa-ticket-alt font-sm mt-1 mb-2"
                                    tooltip="Manage by creating support ticket" container="body"
                                    [ngClass]="{'action-icons-disabled':true}"></button> -->
                            </div>
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="text-center text-muted py-5" *ngIf="!viewData.length">No associated events found.</div>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="count">
        </table-entries>
        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
            [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
        <!-- </div> -->
    </div>
</div>

<ng-container>
    <ng-template #acknowledgeFormRef>
        <form *ngIf="acknowledgeForm" [formGroup]="acknowledgeForm" [style.width.px]="250">
            <div class="form-group">
                <label for="comments" class="form-col-form-label">Comments</label>
                <textarea id="comments" class="form-control static" rows='3' formControlName="ack_comment"
                    [class.is-invalid]="acknowledgeFormErrors.ack_comment" placeholder="Enter Comments"></textarea>
                <div class="invalid-feedback d-flex mb-3" *ngIf="acknowledgeFormErrors.ack_comment">
                    {{acknowledgeFormErrors.ack_comment}}
                </div>
            </div>
            <div class="form-group">
                <button class="btn btn-sm btn-primary pull-right ml-2" type="button"
                    (click)="onAcknowledge()">Acknowledge</button>
                <button class="btn btn-sm btn-danger pull-right mb-2" type="button"
                    (click)="onCloseAcknowledge()">Cancel</button>
            </div>
        </form>
    </ng-template>
</ng-container>
