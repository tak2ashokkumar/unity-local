<div class="row">
  <div class="col-12">
    <div class="card rounded-0">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2 py-2">
        <div class="col-3 d-flex justify-content-between align-items-center p-0">
          <span class="text-left align-middle">
            <span class="badge badge-secondary font-sm">{{count}}</span>&nbsp;
            <span class="font-lg font-500">Graphs</span>
          </span>
        </div>
        <div class="col-3 d-flex justify-content-end align-items-center p-0">
          <button class="btn btn-pill btn-sm btn-warning font-500" type="button" (click)="addGraph()">
            <span class="fas fa-plus"></span>
            <span class="font-xs-sm mx-1">Graph</span>
          </button>
        </div>
      </div>
      <div class="card-body p-2">
        <div class="row d-flex justify-content-between pb-2 mx-0">
          <div class="col-12 d-flex justify-content-between align-items-center p-0 pb-2 mx-0">
            <table-search-box (searched)="onSearched($event)"></table-search-box>
            <div class="ml-2">
              <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                [isAllEnabled]="isPageSizeAll" (pageSizeChange)="pageSizeChange($event)"></table-page-size>
            </div>
          </div>
          <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
            <thead class="bg-light">
              <tr>
                <th sortable-column="name">Graph Name</th>
                <th>Metric Items</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let view of viewData; let i = index" truncateText>
                <td class="tdw-40">{{view.name}}</td>
                <td class="tdw-60">
                  <div class="has-sub">
                    <div class="tdsw-100 d-flex align-items-center">
                      <div [tooltip]="view.items">{{ view.items }}</div>
                      <span *ngIf="view.extraItemsLength"
                        class="badge bg-primary group-count rounded-3 ml-1 pointer-link" [popover]="popTemplate"
                        [popoverContext]="{ dataList: popOverList }" container="body" (click)="showExtraItems(view)"
                        [outsideClick]="true">+{{
                        view.extraItemsLength }}</span>
                    </div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
          <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
            [totalCount]="count"></table-entries>
          <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
            [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
          <div *ngIf="!viewData.length" class="col-12 d-flex py-5 justify-content-center align-items-center">
            No Graphs were found.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #popTemplate let-list="dataList">
  <div *ngFor="let name of list">{{ name }}</div>
</ng-template>

<ng-template #graphFormRef>
  <div class="card mb-0">
    <div class="card-header">
      {{action}} Graph
      <div class="card-header-actions">
        <a class="card-header-action btn-close" (click)="graphModelRef.hide()">
          <i class="fas fa-times"></i>
        </a>
      </div>
    </div>
    <div class="card-body">
      <form *ngIf="graphForm" [formGroup]="graphForm">
        <div class="form-group">
          <div class="invalid-credentials" *ngIf="nonFieldErr">{{nonFieldErr}}</div>
        </div>
        <div class="row">
          <div class="form-group col-12">
            <label class="form-col-form-label" for="name">Graph Name<em>*</em></label>
            <input id="name" class="form-control" type="text" formControlName="name"
              [class.is-invalid]="graphFormErrors.name">
            <div class="invalid-feedback" *ngIf="graphFormErrors.name">{{graphFormErrors.name}}</div>
          </div>
          <div class="form-group col-12">
            <label class="form-col-form-label">Items<em>*</em></label>
            <i class="fa fa-info-circle text-muted ml-2" container="body" containerClass="info-multi-line"
              [tooltip]="'Maximim of 10 items can be selected for a graph'"></i>
            <multiselect-dropdown [options]="graphItems" [settings]="itemSettings" class="form-control p-0"
              style="height:auto;" formControlName="metric_names"
              [ngClass]="{'is-invalid' : graphFormErrors.metric_names}"></multiselect-dropdown>
            <div class="invalid-feedback" *ngIf="graphFormErrors.metric_names">{{graphFormErrors.metric_names}}</div>
          </div>
        </div>
      </form>
    </div>
    <div class="card-footer">
      <button class="btn btn-sm btn-success pull-right ml-1" type="button" (click)="confirmCreate()">Submit</button>
      <button class="btn btn-sm btn-danger pull-right" (click)="graphModelRef.hide()" type="button">Cancel</button>
    </div>
  </div>
</ng-template>
