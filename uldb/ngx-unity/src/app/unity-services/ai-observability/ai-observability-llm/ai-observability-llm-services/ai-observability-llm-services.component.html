<div class="row mt--3">
  <div class="col-12">
    <div class="card round-edge">
      <div class="card-header bg-transparent px-0 d-flex justify-content-between align-items-center py-2">
        <div class="col-2 d-flex justify-content-between align-items-center">
            <span class="ml-2 text-left align-middle">
                <span class="badge badge-secondary font-sm">{{count}}</span>&nbsp;
                <span class="font-lg font-500">LLM</span>
            </span>
        </div>
        <div class="col d-flex justify-content-end align-items-center">
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row d-flex justify-content-between pb-2 mx-0">
          <div class="col-12 p-0 d-flex justify-content-between align-items-center pb-2 mx-0">
            <table-search-box (searched)="onSearched($event)"></table-search-box>
            <div class="ml-2">
              <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                [isAllEnabled]="isPageSizeAll" (pageSizeChange)="pageSizeChange($event)"></table-page-size>
            </div>
          </div>
          <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
            <thead class="bg-light">
              <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Total Token Usage</th>
                <th>Average Response Time</th>
                <th>Prompt</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let view of viewData" truncateText>
                <td class="tdw-20">{{view.name}}</td>
                <td class="tdw-20">
                    <div class="has-sub">
                        <div class="tdsw-100 d-flex align-items-center">
                            <div [tooltip]="view.type">{{ view.type }}</div>
                            <span *ngIf="view.extraTypesLength"
                                class="badge bg-primary group-count rounded-3 ml-1 pointer-link"
                                [popover]="popTemplate"
                                [popoverContext]="{ dataList: popOverList }" container="body"
                                (click)="showExtraTypes(view)" [outsideClick]="true">+{{
                                view.extraTypesLength }}</span>
                        </div>
                    </div>
                </td>
                <td class="tdw-15">{{view.totalTokenUsage}}</td>
                <td class="tdw-15">{{view.averageRespTime}}</td>
                <td class="tdw-20">{{view.prompt}}</td>                
                <td class="action-icons-column text-center">
                    <button class="action-icons mb-0 fas fa-eye font-sm" tooltip="View Details" (click)="goToDetails(view)"></button>
                </td>
              </tr>
            </tbody>
          </table>
          <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
            [totalCount]="count"></table-entries>
          <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
            [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
          <div *ngIf="!viewData.length" class="col-12 d-flex py-5 justify-content-center align-items-center">
            No LLM's available.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #popTemplate let-list="dataList">
    <div *ngFor="let name of list">{{ name }}</div>
</ng-template>
