<ng-container>
    <ng-template #eventTypeKeywordRef>
        <form *ngIf="selectedEventType" [formGroup]="eventKeywordForm">
            <div class="form-group mb-2">
                <input class="form-control" type="text" formControlName="keywords"
                    [ngClass]="{'is-invalid' : eventKeywordFormErrors.keywords}">
            </div>
            <div class="invalid-feedback d-flex mb-3" *ngIf="eventKeywordFormErrors.keywords">
                {{eventKeywordFormErrors.keywords}}
            </div>
            <div class="form-group">
                <button class="btn btn-sm btn-primary" type="button" (click)="onSubmitEventTypeKeyword()">Add</button>
            </div>
        </form>
    </ng-template>

    <ng-template #eventCategoryListRef>
        <div class="col-12 py-2">
            <table-search-box (searched)="onSearchedEvent($event)"></table-search-box>
        </div>
        <div class="form-check checkbox" *ngFor="let s of eventCategories; let a=index">
            <label *ngIf="!selectedEventType.name.includes(s.name)">
                <input class="form-check-input" type="checkbox" [value]="s.name"
                    (change)="onEventCategoryChecked($event, s.name)">{{
                s.name }}
            </label>
        </div>
        <div class="form-group">
            <button class="btn btn-sm btn-primary" type="button" (click)="onSubmitEventCategory()">Add</button>
        </div>

    </ng-template>

    <div class="row">
        <div class="col">
            <div class="row">
                <div class="col-12">
                    <div class="card rounded-0 border-top-0">
                        <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                            <div class="d-flex justify-content-center align-items-center font-500">
                                <span class="badge badge-secondary font-sm">{{eventTypes.length}}</span>
                                <span class="ml-1 font-lg">Event Types</span>
                            </div>
                            <div class="d-flex justify-content-end align-items-center">
                                <button class="btn btn-pill btn-sm btn-warning mx-2 px-3 font-500" type="button"
                                    (click)="addEventType()">
                                    <span class="font-sm">Add Event Type</span>
                                </button>
                                <data-refresh-btn [page]="currentCriteria.pageNo"
                                    (refresh)="refreshData()"></data-refresh-btn>
                            </div>
                        </div>
                        <div class="card-body py-2">
                            <table class="table table-sm mb-0">
                                <thead class="bg-light">
                                    <th>Event Type</th>
                                    <th>Keyword</th>
                                    <th>Action</th>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let view of eventTypes; let i = index" setTableColumnWidth>
                                        <td>
                                            <div class="row" *ngIf="view.onForm">
                                                <div class="col-10">
                                                    <form *ngIf="view.eventForm" [formGroup]="view.eventForm">
                                                        <div class="form-group mb-0">
                                                            <input id="name" type="text" formControlName="name"
                                                                placeholder="Enter Event Name"
                                                                class="form-control p-0 inline-form-control">
                                                        </div>
                                                    </form>
                                                    <div class="d-flex invalid-feedback"
                                                        *ngIf="view.eventFormErrors.name">
                                                        {{view.eventFormErrors.name}}
                                                    </div>
                                                </div>
                                                <div class="col-2 px-0 pt-2 text-center">
                                                    <a class="fas fa-check text-muted"
                                                        (click)="onSubmitEvent(view)"></a>
                                                    <a class="card-header-action btn-close text-muted ml-3"
                                                        (click)="resetEventName(view)">
                                                        <i class="fas fa-times"></i>
                                                    </a>
                                                </div>
                                            </div>
                                            <div *ngIf="!view.onForm" (click)="onEditEvent(i)">
                                                <span class="text-primary">{{view.name}}</span>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="keywords-container" *ngIf="view.name">
                                                <div *ngFor="let keyword of view.keywords; let j = index"
                                                    class="btn btn-pill btn-light btn-sm ml-2 w-auto text-muted">
                                                    {{ keyword }}
                                                    <a class="card-header-action btn-close text-muted"
                                                        (click)="deleteKeyword(i,j)">
                                                        <i class="fas fa-times ml-1"></i>
                                                    </a>
                                                </div>
                                                <span class="fas fa-plus-circle text-primary fa-lg pointer-link ml-1"
                                                    (click)="addEventTypeKeyword(i); $event.stopPropagation();$event.preventDefault();"
                                                    [popover]="eventTypeKeywordRef" container="body" placement="right"
                                                    [outsideClick]="true" [isOpen]="view.isAddkeywordsPopover"></span>
                                            </div>
                                        </td>
                                        <td class="action-icons-column">
                                            <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1"
                                                *ngIf="view.name" tooltip="Delete"
                                                (click)="eventDelete(view.uuid, i)"></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <div *ngIf="!eventTypes.length"
                                class="d-flex py-4 justify-content-center align-items-center">
                                No Event Types available.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <ng-template #confirmdelete>
        <div class="card mb-0">
            <div class="card-header">
                Confirm Delete
                <div class="card-header-actions">
                    <a class="card-header-action btn-close" (click)="confirmEventDeleteModalRef.hide()">
                        <i class="fas fa-times"></i>
                    </a>
                </div>
            </div>
            <div class="card-body">
                This event will be deleted. Are you sure you want to delete?
            </div>
            <div class="card-footer">
                <button class="btn btn-sm btn-success pull-right ml-1" type="button"
                    (click)="confirmEventDelete()">Yes</button>
                <button class="btn btn-sm btn-danger pull-right" (click)="confirmEventDeleteModalRef.hide()"
                    type="button">No</button>
            </div>
        </div>
    </ng-template>

</ng-container>
