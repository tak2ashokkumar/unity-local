<div class="row">
  <div class="col-12">
    <div class="card rounded">
      <div class="card-header py-2 bg-transparent d-flex justify-content-between align-items-center">
        <div>
          <span class="badge badge-rounded badge-secondary font-lg">{{viewData.length}}</span>
          <span class="ml-1 font-lg font-500"> Noisy Events </span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <div>
            <table-search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)">
            </table-search-box>
          </div>
          <div class="pl-2">
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="viewData.length" [isLargeSize]="true"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
          <div class="pl-4">
            <a class="text-warning" (click)="goTo('event-analytics')">
              <i class="fa fa-arrow-left">&nbsp;</i>To Analytics
            </a>
          </div>
        </div>
      </div>
      <div class="card-body p-0">
        <table class="table text-left" *ngIf="viewData.length">
          <thead>
            <tr>
              <th>Event</th>
              <th class="text-center">Count</th>
              <th>Event Time</th>
              <th class="text-center">Severity</th>
              <th>Status</th>
              <th>Source</th>
              <th>Acknowledged</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of viewData" truncateText>
              <td class="tdw-30 text-primary">
                <div [tooltip]="view.event">{{view.event}}</div>
              </td>
              <td class="tdw-5 text-primary">
                <div class="text-center" [tooltip]="view.count">{{view.count}}</div>
              </td>
              <td class="tdw-15">
                <div [tooltip]="view.eventTime">{{view.eventTime}}</div>
              </td>
              <td class="tdw-10">
                <div class="text-center" [tooltip]="view.severity">
                  <span [class]="view.severityClass"></span>
                </div>
              </td>
              <td class="tdw-10">
                <div [ngClass]="[view.statusClass, 'text-capitalize']" [tooltip]="view.status">{{view.status}}</div>
              </td>
              <td class="tdw-15">
                <div [tooltip]="view.source">{{view.source}}</div>
              </td>
              <td class="tdw-10">
                <div [tooltip]="view.acknowledged">{{view.acknowledged}}</div>
              </td>
            </tr>
          </tbody>
        </table>
        <!-- <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="1000">
        </table-entries>
        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="1000" (pageChange)="pageChange($event)"></table-pager> -->
        <div class="text-center text-muted py-5" *ngIf="!viewData.length">No noisy events found.</div>
      </div>
    </div>
  </div>
</div>
