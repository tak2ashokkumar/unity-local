<div class="container-fluid mt-2 px-2">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2">
                        <span class="mb-0 font-500">{{actionMessage}} Resource</span>
                        <button class="btn btn-pill btn-warning btn-sm" tooltip="Back" (click)="goBack()">
                            <i class="fa fa-arrow-left"></i>
                        </button>
                    </div>
                    <div class="card-body">
                        <form *ngIf="form" [formGroup]="form">
                            <div class="row form-group">
                                <label class="col-2 text-right pt-1">File Upload<em>*</em> : </label>
                                <div class="col-5">
                                    <ngx-file-drop class="ngx-file-drop-box"
                                        [ngClass]="{ 'is-invalid': formErrors.files }" (onFileDrop)="dropped($event)"
                                        (onFileOver)="fileOver($event)" (onFileLeave)="fileLeave($event)"
                                        [accept]="'text/plain,.txt'">
                                        <ng-template ngx-file-drop-content-tmp let-openFileSelector="openFileSelector">
                                            <div class="d-flex align-items-center w-100 justify-content-between">
                                                <div class="text-wq">Drag files here</div>
                                                <div class="d-flex align-items-center justify-content-center browse p-1 font-sm align-self-stretch"
                                                    (click)="openFileSelector()">
                                                    Browse</div>
                                            </div>
                                        </ng-template>
                                    </ngx-file-drop>
                                    <div class="text-danger font-xs mt-1 text-left" *ngIf="formErrors.files">
                                        {{formErrors.files}}</div>
                                    <ng-container *ngIf="fileNames.length">
                                        <div class="d-flex flex-wrap align-items mt-1">
                                            <div class="m-1 file border" *ngFor="let file of droppedFiles">
                                                <span class="mx-1 font-sm">{{file.name}}</span>
                                                <i class="fas fa-times fa-sm border-left p-1" (click)="removeFile(file)"
                                                    style="cursor: pointer;"></i>
                                            </div>
                                        </div>
                                    </ng-container>
                                </div>
                            </div>
                            <div class="row form-group">
                                <label class="col-2 text-right pt-1">Category<em>*</em> : </label>
                                <div class="col-3">
                                    <ng-select [items]="categories" formControlName="category" [multiple]="false"
                                        [closeOnSelect]="true" [hideSelected]="false"
                                        [addTag]="addCustomValue('category')" [class.is-invalid]="formErrors.category"
                                        placeholder="Select Category"></ng-select>
                                    <div class="text-danger font-xs mt-1 text-left" *ngIf="formErrors.category">
                                        {{formErrors.category}}</div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div
                        class="card-footer d-flex justify-content-center align-items-center bg-transparent border-0 px-0 pb-4">
                        <button class="btn btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
                        <button class="btn btn-success ml-2" type="button" (click)="onSubmit()">Submit</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
