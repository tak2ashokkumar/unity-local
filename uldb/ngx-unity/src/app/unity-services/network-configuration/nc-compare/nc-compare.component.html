<div class="card">
    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <span class="font-500">Compare Changes</span>
        <div class="d-flex justify-content-end align-items-center">
            <data-refresh-btn (refresh)="refreshData()"></data-refresh-btn>
            <button class="btn btn-pill btn-warning btn-sm text-right ml-2" (click)="goBack()" tooltip="Back">
                <i class="fa fa-arrow-left"></i>
            </button>
        </div>
    </div>
    <div class="card-body pl-4">
        <form *ngIf="form" [formGroup]="form">
            <div class="row mx-0">
                <div class="form-group col-4">
                    <div class="row">
                        <label for="device_name" class="control-label col-4 px-0 text-right mt-2">Device Name : </label>
                        <div class="col-8">
                            <input id="device_name" type="text" class="form-control" formControlName="device_name">
                        </div>
                    </div>
                </div>
            </div>
            <div class="row mx-0">
                <div class="form-group col-4">
                    <div class="row">
                        <label for="version1" class="control-label col-4 px-0 text-right mt-2">Version ID 1 : </label>
                        <div class="col-8">
                            <select id="version1" class="form-control" formControlName="version1">
                                <option [value]="null" disabled>Select Version</option>
                                <option *ngFor="let v of deviceVersions" [ngValue]="v">{{v.displayName}}</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group col-4">
                    <div class="row">
                        <label for="version2" class="control-label col-4 px-0 text-right mt-2">Version ID 2 : </label>
                        <div class="col-8">
                            <select id="version2" class="form-control" formControlName="version2">
                                <option [value]="null" disabled>Select Version</option>
                                <option *ngFor="let v of deviceVersions" [ngValue]="v">{{v.displayName}}</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group col-4">
                    <button type="button" class="btn btn-success" (click)="onSubmit()">Compare</button>
                </div>
            </div>
        </form>

        <div class="row">
            <div class="col-12 d-flex justify-content-between align-items-center font-500 codeLine" *ngIf="diffReport">
                <span>
                    <span class="badge badge-secondary font-sm">{{diffReport.totalDiffCount}}</span>
                    <span class="ml-1 font-lg">Total Differences</span>
                </span>
                <span>
                    <span>
                        <span class="badge badge-success font-sm-xs">{{diffReport.missingProperties}}</span>
                        <span class="text-success ml-1 font-sm">Missing Properties</span>
                    </span>
                    <span class="ml-2">
                        <span class="badge badge-secondary font-sm-xs">{{diffReport.unequalValues}}</span>
                        <span class="text-muted ml-1 font-sm">Unequal Values</span>
                    </span>
                    <span class="ml-2">
                        <span class="badge badge-danger font-sm-xs">{{diffReport.incorrectTypes}}</span>
                        <span class="text-danger ml-1 font-sm">Incorrect Types</span>
                    </span>
                </span>
            </div>
            <div class="col-12"
                *ngIf="selectedVersions.length && selectedVersions.length == 2 && selectedVersions[0].versionData && selectedVersions[1].versionData">
                <app-json-comparison class="w-100" [leftTree]="selectedVersions[0].versionData"
                    [rightTree]="selectedVersions[1].versionData" [hideInitialStep]="true" [hideReport]="true"
                    (differenceReport)="differenceReport($event)"></app-json-comparison>
            </div>
        </div>
    </div>
</div>
