<div class="row mt--3">
    <div class="col-12 p-0">
        <div class="card">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2">
                <span class="h6 mb-0 font-500">{{action}} Template</span>
                <button class="btn btn-pill btn-warning btn-sm" tooltip="Back" (click)="goBack()">
                    <i class="fa fa-arrow-left"></i>
                </button>
            </div>
            <div class="card-body py-2">
                <form *ngIf="form" [formGroup]="form">
                    <div class="form-group col-12 text-center">
                        <div class="invalid-credentials" *ngIf="nonFieldErr">{{nonFieldErr}}</div>
                    </div>
                    <div class="form-group row">
                        <label for="task_name" class="col-2 text-right col-form-label">Name :<em>* </em></label>
                        <div class="col-5">
                            <input id="task_name" class="form-control" type="text" formControlName="name"
                                [class.is-invalid]="formErrors.name" placeholder="Enter Name">
                            <div class="invalid-feedback" *ngIf="formErrors.name">
                                {{formErrors.name}}</div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="description" class="col-2 text-right col-form-label">Description :</label>
                        <div class="col-8">
                            <textarea id="description" class="form-control static" rows='2'
                                formControlName="description" [class.is-invalid]="formErrors.description"
                                placeholder="Description"></textarea>
                            <div class="invalid-feedback" *ngIf="formErrors.description">
                                {{formErrors.description}}</div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="category" class="col-2 text-right col-form-label">Category :<em>* </em></label>
                        <div class="col-4">
                            <div class="custom-dropdown-container" #dropdownContainer (click)="toggleDropdown()">
                                <select id="category" class="form-control" formControlName="category"
                                    [class.is-invalid]="formErrors.category" (click)="onCategoryChange($event)">
                                    <option [value]="''" disabled>Select Category</option>
                                    <option *ngFor="let c of categoryList" [value]="c.uuid">{{c.name}}</option>
                                    <option value="addNew" class="add-new-option border-top border-top-2">+ Add New
                                    </option>
                                </select>
                                <!-- <div class="add-new-option" *ngIf="dropdownOpen">
                                    <button type="button" class="add-new-button" (click)="addNewCategory($event)">
                                        <i class="fas fa-plus"></i> Add New
                                    </button>
                                </div> -->
                            </div>
                            <div class="invalid-feedback" *ngIf="formErrors.category">
                                {{formErrors.category}}
                            </div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="input_type" class="col-2 text-right col-form-label">Input Type<em>* </em>:</label>
                        <div class="col-5">
                            <select id="input_type" class="form-control" type="text" formControlName="input_type"
                                [class.is-invalid]="formErrors.input_type">
                                <option [value]="'List'">List</option>
                            </select>
                            <div class="invalid-feedback" *ngIf="formErrors.input_type">
                                {{formErrors.input_type}}</div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="input_name" class="col-2 text-right col-form-label">Input Field Name:<em>*
                            </em>:</label>
                        <div class="col-5">
                            <input id="input_name" class="form-control" type="text" formControlName="input_name"
                                [class.is-invalid]="formErrors.name" placeholder="Enter Name">
                            <div class="invalid-feedback" *ngIf="formErrors.input_name">
                                {{formErrors.input_name}}</div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="dependency" class="col-2 text-right col-form-label">Dependent Field:</label>
                        <div class="col-5">
                            <select id="dependency" class="form-control" type="text" formControlName="dependency"
                                [class.is-invalid]="formErrors.dependency">
                                <option [value]="''">Select dependency</option>
                                <option *ngFor="let d of dependencyList" [value]="d.uuid">{{d.name}}</option>
                            </select>
                            <div class="invalid-feedback" *ngIf="formErrors.dependency">
                                {{formErrors.dependency}}</div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="type" class="col-2 text-right col-form-label">Type<em>* </em>:</label>
                        <div class="col-5">
                            <select id="type" class="form-control" type="text" formControlName="type"
                                [class.is-invalid]="formErrors.type">
                                <option [value]="'Manual'">Manual</option>
                            </select>
                            <div class="invalid-feedback" *ngIf="formErrors.type">
                                {{formErrors.type}}</div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="options" class="col-2 text-right col-form-label">Options :</label>
                        <div class="col-8">
                            <textarea id="options" class="form-control static" rows='4' formControlName="options"
                                [class.is-invalid]="formErrors.options"
                                placeholder="Each Value should be in a seperate line"></textarea>
                            <div class="invalid-feedback" *ngIf="formErrors.options">
                                {{formErrors.options}}</div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="options" class="col-2 text-right col-form-label">Status :</label>
                        <div class="col-4">
                            <div class="d-inline-block">
                                <ul class="d-flex px-0 mb-0">
                                    <li>
                                        <label class="pointer-link"
                                            [class.active]="this.form.get('template_status').value === 'Enabled'">
                                            <input type="radio" [value]="true" (click)="toggleStatus(true)">
                                            <span class="font-sm">Enable</span>
                                        </label>
                                    </li>
                                    <li>
                                        <label class="pointer-link"
                                            [class.active]="this.form.get('template_status').value === 'Disabled'">
                                            <input type="radio" [value]="false" (click)="toggleStatus(false)">
                                            <span class="font-sm">Disable</span>
                                        </label>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </form>
                <div class="d-flex justify-content-center">
                    <button class="btn btn-md btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
                    <button class="btn btn-md btn-success ml-2" type="button"
                        (click)="confirmTemplateCreate()">Submit</button>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #createcategory>
    <div class="card mb-0">
        <div class="card-header">
            Add Category
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="taskModalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            <form *ngIf="categoryForm" [formGroup]="categoryForm">
                <div class="form-group">
                    <div class="invalid-credentials" *ngIf="nonFieldErr">{{nonFieldErr}}</div>
                </div>
                <div class="row">
                    <div class="form-group col-12">
                        <label class="form-col-form-label">Category Name<em>* </em></label>
                        <input id="name" class="form-control" type="text" formControlName="name"
                            [class.is-invalid]="categoryFormErrors.name">
                        <div class="invalid-feedback" *ngIf="categoryFormErrors.name">
                            {{categoryFormErrors.name}}</div>
                    </div>
                </div>
            </form>
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button"
                (click)="confirmCategoryCreate()">Submit</button>
            <button class="btn btn-sm btn-outline-danger pull-right" type="button"
                (click)="taskModalRef.hide()">Cancel</button>
        </div>
    </div>
</ng-template>
