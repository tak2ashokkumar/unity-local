<div class="col-12 px-0">
    <div class="row mt--3">
        <div class="col p-0">
            <div class="card">
                <div class="card-header bg-white d-flex justify-content-between align-items-center pl-0 py-2">
                    <div class=" d-flex justify-content-between ml-2">
                        <div class="d-flex align-items-center justify-content-center">
                            <span class="ml-2 text-left align-middle"><span
                                    class="badge badge-secondary font-sm">{{count}}</span>&nbsp;<span
                                    class="font-lg font-500">Activity Logs
                                </span></span>
                        </div>
                    </div>
                    <div class="d-flex align-items-center justify-content-end">
                        <button class="btn btn-pill btn-warning btn-sm" (click)="goBack()" tooltip="Back">
                            <i class="fa fa-arrow-left"></i>
                        </button>
                    </div>
                </div>
                <div class="card-body pt-2">
                    <div class="row pb-2 d-flex justify-content-between">
                        <div class="col-2">
                            <search-box [searchValue]="currentCriteria.searchValue"
                                (searched)="onSearched($event)"></search-box>
                        </div>
                        <div class="col-3 d-flex justify-content-end">

                        </div>
                    </div>
                    <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
                        <thead class="bg-light">
                            <tr>
                                <th>Username</th>
                                <th>Timestamp</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let view of viewData" truncateText>
                                <td class="tdw-40">
                                    <div [tooltip]="view.username">{{view.username}}</div>
                                </td>
                                <td class="tdw-40">
                                    <div [tooltip]="view.timestamp">{{view.timestamp}}</div>
                                </td>
                                <td class="tdw-20">
                                    <div [tooltip]="view.action">{{view.action}}</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                        [totalCount]="count"></table-entries>
                    <table-pager *ngIf="viewData?.length" [pageNo]="currentCriteria.pageNo"
                        [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                        (pageChange)="pageChange($event)"></table-pager>
                    <div class="text-center text-muted" *ngIf="!viewData?.length">No associated data found.</div>
                </div>
            </div>
        </div>
    </div>
</div>
