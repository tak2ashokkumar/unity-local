<div class="row mt--3">
    <div class="col-12 p-0">
        <div class="card">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2">
                <span class="h6 mb-0 font-500">Execute Workflow - {{workflowName}}</span>
                <button class="btn btn-pill btn-warning btn-sm" tooltip="Back" (click)="goBack()">
                    <i class="fa fa-arrow-left"></i>
                </button>
            </div>
            <div class="card-body py-2">
                <form *ngIf="aimlTriggerForm" [formGroup]="aimlTriggerForm">
                    <div class="form-group row">
                        <label for="id" class="col-2 text-right col-form-label">Select Event<em>*</em> :</label>
                        <div class="col-3">
                            <select class="text-dark form-control mb-2" formControlName="id"
                                [class.is-invalid]="aimlTriggerFormErrors.id">
                                <option value="" disabled>Select Event</option>
                                <option *ngFor="let i of aimlData" [ngValue]="i.id">{{i.id}} - {{ i.status}} - {{
                                    i.description
                                    }}
                                </option>
                            </select>
                            <div class="invalid-feedback d-block" *ngIf="aimlTriggerFormErrors.id">
                                {{ aimlTriggerFormErrors.id }}
                            </div>
                        </div>
                    </div>
                </form>
                <div class="d-flex justify-content-center">
                    <button class="btn btn-md btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
                    <button class="btn btn-md btn-success ml-2" type="button" (click)="onSubmit()">Submit</button>
                </div>
            </div>
        </div>
    </div>
</div>
