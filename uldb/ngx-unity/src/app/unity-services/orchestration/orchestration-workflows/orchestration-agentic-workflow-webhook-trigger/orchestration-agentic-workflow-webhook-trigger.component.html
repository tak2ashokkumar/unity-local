<div class="row mt--3">
    <div class="col-12 p-0">
        <div class="card">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2">
                <span class="h6 mb-0 font-500">Execute Workflow - {{workflowName}}</span>
                <button class="btn btn-pill btn-warning btn-sm" tooltip="Back" (click)="goBack()">
                    <i class="fa fa-arrow-left"></i>
                </button>
            </div>
            <div class="card-body py-2">
                <form *ngIf="webhookTriggerForm" [formGroup]="webhookTriggerForm">
                    <!-- <div class="form-group col-12 text-center">
                        <div class="invalid-credentials" *ngIf="nonFieldErr">{{nonFieldErr}}</div>
                    </div> -->
                    <div class="form-group row">
                        <label for="webhook_url" class="col-2 text-right col-form-label">Webhook Url :</label>
                        <div class="col-5">
                            <input id="webhook_url" class="form-control text-dark" type="text"
                                formControlName="webhook_url">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="payload" class="col-2 text-right col-form-label">Payload :</label>
                        <div class="col-8">
                            <textarea class="form-control text-dark" rows="8" formControlName="payload"
                                placeholder="Enter Payload"
                                [class.is-invalid]="webhookTriggerFormErrors.payload"></textarea>
                            <div class="invalid-feedback d-block" *ngIf="webhookTriggerFormErrors.payload">
                                {{ webhookTriggerFormErrors.payload }}
                            </div>
                        </div>
                    </div>

                </form>
                <div class="d-flex justify-content-center">
                    <button class="btn btn-md btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
                    <button class="btn btn-md btn-success ml-2" type="button" (click)="onSubmit()">Submit</button>
                </div>
            </div>
        </div>
    </div>
</div>
