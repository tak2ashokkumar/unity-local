<div class="row">
  <div class="col-12">
    <div class="card text-center">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
          <span class="badge badge-secondary font-sm">{{viewData.length}}</span>
          <span class="ml-1 font-lg">Services</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
          <div class="w-25">
            <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
          </div>
          <div>
            <form *ngIf="terms.length">
              <div class="form-row">
                <div class="col-auto my-0">
                  <select class="custom-select mr-sm-2 py-0 view-type-dropdown" [ngModel]="selectedTerm"
                    (ngModelChange)="changeTerm($event)" name="term">
                    <option [ngValue]="term" *ngFor="let term of terms">{{term.displayName}}</option>
                  </select>
                </div>
              </div>
            </form>
          </div>
        </div>
        <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
          <thead class="bg-light">
            <tr>
              <th dropdown dropdownToggle aria-controls="category-dropdown" class="dropdown-toggle" container="body"
                [insideClick]="true" (isOpenChange)="onOpenChange($event)">Service
                Category
                <div class="btn-group">
                  <div class="col col-form-label dropdown-menu" id="category-dropdown" *dropdownMenu role="menu"
                    aria-labelledby="button-custom-html">
                    <div class="form-check ml-2 mb-1" role="menuitem">
                      <input class="form-check-input" id="all_checkbox" type="checkbox"
                        [checked]="svcCategories.length==selectedSvcCategories.length"
                        (change)="toggleCategoryCheck('all', $event.target.checked)">
                      <label class="form-check-label" for="all_checkbox">
                        Select All</label>
                    </div>
                    <div class="form-check ml-2 mb-1" role="menuitem" *ngFor="let svc of svcCategories">
                      <input class="form-check-input" id="{{svc}}_checkbox" type="checkbox"
                        [checked]="isCategoryChecked(svc)" (change)="toggleCategoryCheck(svc, $event.target.checked)">
                      <label class="form-check-label" for="{{svc}}_checkbox">
                        {{svc}} </label>
                    </div>
                  </div>
                </div>
              </th>
              <th *ngIf="svcProviders.length" dropdown dropdownToggle aria-controls="providers-dropdown"
                class="dropdown-toggle" container="body" [insideClick]="true" (isOpenChange)="onOpenChange($event)">
                Provider
                <div class="btn-group">
                  <div class="col col-form-label dropdown-menu" id="providers-dropdown" *dropdownMenu role="menu"
                    aria-labelledby="button-custom-html">
                    <div class="form-check ml-2 mb-1" role="menuitem">
                      <input class="form-check-input" id="all_checkbox" type="checkbox"
                        [checked]="svcProviders.length==selectedSvcProviders.length"
                        (change)="toggleProviderCheck('all', $event.target.checked)">
                      <label class="form-check-label" for="all_checkbox">
                        Select All</label>
                    </div>
                    <div class="form-check ml-2 mb-1" role="menuitem" *ngFor="let svc of svcProviders">
                      <input class="form-check-input" id="{{svc}}_checkbox" type="checkbox"
                        [checked]="isProviderChecked(svc)" (change)="toggleProviderCheck(svc, $event.target.checked)">
                      <label class="form-check-label" for="{{svc}}_checkbox">
                        {{svc}} </label>
                    </div>
                  </div>
                </div>
              </th>
              <th *ngIf="!svcProviders.length">Provider</th>
              <th>Service Name</th>
              <th>Charge </th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of viewData" setTableColumnWidth>
              <td>
                <div [tooltip]="view.serviceCategory">{{view.serviceCategory}}</div>
              </td>
              <td>
                <div [tooltip]="view.provider">{{view.provider}}</div>
              </td>
              <td>
                <div [tooltip]="view.serviceName">{{view.serviceName}}</div>
              </td>
              <td>
                <div [tooltip]="view.charge">{{view.charge}}</div>
              </td>
              <td class="action-icons-column">
                <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1"
                  tooltip="Manage by creating support ticket" (click)="createTicket(view)"></button>
              </td>
            </tr>
          </tbody>
        </table>
        <div *ngIf="!viewData.length" class="text-center text-muted py-4"> No Service Catalogues available.</div>
      </div>
    </div>
  </div>
</div>
