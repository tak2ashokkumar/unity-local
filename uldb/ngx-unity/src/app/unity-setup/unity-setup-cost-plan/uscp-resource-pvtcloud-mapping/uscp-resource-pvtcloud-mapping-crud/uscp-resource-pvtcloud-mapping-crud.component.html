<div class="container-fluid mt-4">
    <div class="animated fadeIn">
        <div class="card">
            <div class="card-header bg-white d-flex justify-content-between align-items-center py-2">
                <span class="font-lg font-500">Assign Clouds</span>
                <button class="btn btn-pill btn-warning pull-right btn-sm ml-2" tooltip="Back" (click)="goBack()"><i
                        class="fa fa-arrow-left"></i></button>
            </div>
            <div class="card-body py-2">
                <div *ngIf="nonFieldErr" class="col-12 form-group offset-1">
                    <div class="invalid-credentials text-left">{{nonFieldErr}}</div>
                </div>

                <div class="col-12 form-group d-flex align-items-center">
                    <label for="name" class="col-2 text-right col-form-label">Resource Name<em>*</em> :</label>
                    <div class="col">
                        <input id="name" class="col-3 form-control" type="text" [(ngModel)]="resourceName"
                            placeholder="Enter Name" disabled>
                    </div>
                </div>

                <form *ngIf="form" [formGroup]="form">
                    <div class="">
                        <div class="col-12 form-group d-flex">
                            <label for="cloud_type" class="col-2 text-right col-form-label">Private Cloud <em>* </em>
                                :</label>
                            <div class="col">
                                <multiselect-dropdown class="form-control col-3 p-0" style="height:auto;"
                                    [options]="pvtCloudAccountList" [settings]="cloudTypeSettings"
                                    [texts]="cloudTypeSelectionTexts" (ngModelChange)="selectPvtAcc()"
                                    formControlName="private_cloud_list"
                                    [class.is-invalid]="formErrors.private_cloud_list"></multiselect-dropdown>
                                <div class="invalid-feedback" *ngIf="formErrors.private_cloud_list">
                                    {{formErrors.private_cloud_list}}</div>
                                <div *ngIf="selectedPvClouds.length" class="d-flex mt-2">
                                    <span *ngFor="let tmpl of selectedPvClouds; let i = index;"
                                        class="badge badge-pill bg-light-blue text-primary font-xs py-2 mb-2 mr-2">
                                        {{tmpl}}
                                        <span class="fas fa-times pointer-link pl-1" (click)="unSelectPvtAcc(i)"></span>
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 form-group d-flex align-items-center">
                            <div class="col-2 text-right col-form-label ">Status :</div>
                            <div class="col d-inline-block">
                                <ul class="d-flex px-0 mb-0">
                                    <li>
                                        <label class="pointer-link"
                                            [class.active]="form.get('is_active').value == true">
                                            <input type="radio" [value]="true" formControlName="is_active">
                                            <span class="font-sm mr-2"
                                                [ngClass]="form.get('is_active').value == true ? 'mr-3' : 'mr-2'">Enable</span>
                                        </label>
                                    </li>
                                    <li>
                                        <label class="pointer-link"
                                            [class.active]="form.get('is_active').value == false"
                                            [ngClass]="form.get('is_active').value == false ? 'pl-2' : 'pl-0'">
                                            <input type="radio" [value]="false" formControlName="is_active">
                                            <span class="font-sm mr-2">Disable</span>
                                        </label>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-white d-flex justify-content-center py-2">
                <button class="btn btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
                <button class="btn btn-success ml-3" type="button" (click)="onSubmit()" accessControl
                    moduleName="Cost Plan" accessType="Manage Cost Plan" elementType="btn">Create</button>
            </div>
        </div>
    </div>
</div>
