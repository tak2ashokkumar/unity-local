<div class="container-fluid mt-4">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                        <span class="font-lg font-500">{{action}} FINOPs Building Block</span>
                        <button class="btn btn-pill btn-warning btn-sm" tooltip="Back" (click)="goBack()">
                            <i class="fa fa-arrow-left"></i>
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="col-6 m-auto stepper">
                            <div class="step" *ngFor="let step of steps; let i = index"
                                [class.active]="activeForm === step.form" [class.disabled]="step.disabled"
                                [class.succuss]="isValid(step.form)">
                                <div class="icon" (click)="manageActiveForm(step.form)">
                                    <i class="{{'font-xl '+ step.icon }}"></i>
                                </div>
                                <div class="label">{{ step.label }}</div>
                            </div>
                        </div>
                        <div class="col-12 mt-4">
                            <ng-container [ngSwitch]="activeForm">
                                <ng-container *ngIf="(instanceId && onBasic) || !instanceId">
                                    <usf-basic *ngSwitchCase="'basic'" [dropdownData]="dropDownOptions"></usf-basic>
                                </ng-container>
                                <ng-container *ngIf="(instanceId && onComponent) || !instanceId">
                                    <usf-components *ngSwitchCase="'components'"
                                        [dropdownData]="dropDownOptions"></usf-components>
                                </ng-container>
                            </ng-container>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top-0 d-flex justify-content-center py-3">
                        <button class="btn btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
                        <!-- <button class="btn btn-primary ml-3" type="button" (click)="onSave()">Save as Draft</button> -->
                        <button class="btn btn-success ml-3" type="button" (click)="onSubmit()">Save & Next</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
