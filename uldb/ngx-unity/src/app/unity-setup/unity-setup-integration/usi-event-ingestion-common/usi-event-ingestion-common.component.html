<div class="container-fluid mt-4" *ngIf="isAddorEditEnabled">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                        <span class="font-lg font-500">{{eventSourceForDisplay}} Integration</span>
                    </div>
                    <div class="card-body">
                        <div class="row mt-4">
                            <div class="col-10 offset-1">
                                <ng-container *ngTemplateOutlet="formRef"></ng-container>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #formRef>
    <div class="card border-0">
        <div class="card-body">
            <div class="row">
                <div class="col">
                    <form *ngIf="basicDetailsForm" [formGroup]="basicDetailsForm">
                        <div class="form-group" *ngIf="nonFieldErr">
                            <div class="invalid-credentials">{{nonFieldErr}}</div>
                        </div>
                        <div class="row">
                            <div class="col-6 form-group">
                                <label for="name" class="form-col-form-label">Account Name<em>*</em></label>
                                <input id="name" class="form-control" type="text" formControlName="name"
                                    placeholder="Enter Account Name" [class.is-invalid]="basicDetailsFormErrors.name">
                                <div class="invalid-feedback" *ngIf="basicDetailsFormErrors.name">
                                    {{basicDetailsFormErrors.name}}</div>
                            </div>
                        </div>
                        <div class="row form-group">
                            <div class="col d-flex align-items-center justify-content-start">
                                <div class="w-20">
                                    <input id="ingest_event" class="ut-checkbox" type="checkbox"
                                        formControlName="ingest_event">
                                    <label for="ingest_event" class="primary mb-0">Event Ingestion</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <usi-event-ingestion-crud [paramList]="paramList" [instance]="instance"
                [eventIngestionCheck]="basicDetailsForm?.get('ingest_event').value"
                [eventAttribute]="eventSourceForDisplay" [defaultEventIngestionValues]="defaultEventIngestionValues"
                (formUpdate)="onFormUpdate($event)"></usi-event-ingestion-crud>
        </div>
        <div class="card-footer bg-white border-top-0 d-flex justify-content-center py-3">
            <button class="btn btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
            <button class="btn btn-success ml-3" type="button" (click)="onSubmit()">Submit</button>
        </div>
    </div>
</ng-template>

<ng-template #confirm>
    <div class="card mb-0">
        <div class="card-header">
            Confirm Delete
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="modalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            Are you sure you want to delete?
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button" (click)="confirmDelete()">Yes</button>
            <button class="btn btn-sm btn-danger pull-right" (click)="modalRef.hide()" type="button">No</button>
        </div>
    </div>
</ng-template>
