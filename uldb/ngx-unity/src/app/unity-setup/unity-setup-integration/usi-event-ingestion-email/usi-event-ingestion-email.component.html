<div class="container-fluid mt-3">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col">
                <div class="card round-edge">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                        <div class="d-flex justify-content-center align-items-center font-500">
                            <span class="badge badge-secondary font-sm">{{count}}</span>
                            <span class="ml-1 font-lg">Accounts</span>
                        </div>
                        <div class="d-flex justify-content-end align-items-center">
                            <button class="btn btn-pill btn-sm btn-warning mx-2 px-3 font-500" type="button"
                                (click)="goToAddAccount()" accessControl moduleName="Integrations"
                                accessType="Add Integrations" elementType="btn">
                                <span class="font-sm">Create Account</span>
                            </button>
                            <button class="btn btn-pill btn-warning pull-right btn-sm" type="button" container="body"
                                (click)="goBack()"><i class="fa fa-arrow-left"></i>
                            </button>
                            <data-refresh-btn [page]="currentCriteria.pageNo"
                                (refresh)="refreshData($event)"></data-refresh-btn>
                        </div>
                    </div>
                    <div class="card-body py-2">
                        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                            <div class="w-20">
                                <search-box [searchValue]="currentCriteria.searchValue"
                                    (searched)="onSearched($event)"></search-box>
                            </div>
                            <div class="d-flex justify-content-between align-items-center w-30">
                                <multiselect-dropdown class="form-control p-0 w-35" style="height:auto;"
                                    [options]="accountTypesList" [settings]="accountTypeSettings"
                                    [texts]="accountTypeTexts" (dropdownClosed)="onFilterChange()"
                                    [(ngModel)]="currentCriteria.multiValueParam.account_type"></multiselect-dropdown>

                                <multiselect-dropdown class="form-control p-0 w-35" style="height:auto;"
                                    [options]="statusList" [settings]="statusSettings" [texts]="statusTypeTexts"
                                    (dropdownClosed)="onFilterChange()"
                                    [(ngModel)]="currentCriteria.multiValueParam.status"></multiselect-dropdown>
                                <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                                    (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                            </div>
                        </div>
                        <table class="table table-sm text-left">
                            <thead class="bg-light">
                                <th>Name</th>
                                <th>Account Type</th>
                                <th>Client Id</th>
                                <th>Email Address</th>
                                <th class="text-center">Status</th>
                                <th class="text-center">Actions</th>
                            </thead>
                            <tbody>
                                <tr *ngFor="let view of viewData" truncateText>
                                    <td class="tdw-15">
                                        <div [tooltip]="view.name">{{view.name}}</div>
                                    </td>
                                    <td class="tdw-15">
                                        <div [tooltip]="view.accountType">{{view.accountType}}</div>
                                    </td>
                                    <td class="tdw-15">
                                        <div [tooltip]="view.clientId">{{view.clientId}}</div>
                                    </td>
                                    <td class="tdw-15">
                                        <div [tooltip]="view.emailAddress">{{view.emailAddress}}</div>
                                    </td>
                                    <td class="text-center tdw-15">
                                        <div class="d-inline-block">
                                            <div class="btn-group rounded-pill border cus-btn">
                                                <button class="btn btn-pill btn-sm rounded-pill border-0" type="button"
                                                    [ngClass]="view.isEnabled ? 'active btn-outline-primary' :  ''"
                                                    (click)="toggleStatus(view,true)">Enable</button>
                                                <button class="btn btn-pill btn-sm rounded-pill border-0" type="button"
                                                    [ngClass]="!view.isEnabled ? 'active btn-outline-primary' :  ''"
                                                    (click)="toggleStatus(view,false)">Disable</button>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="action-icons-column text-center">
                                        <button class="action-icons fas fa-history font-sm mr-1" tooltip="History"
                                            (click)="goToHistory(view)"></button>
                                        <button class="action-icons mr-1 fas fa-pencil-alt font-sm"
                                            (click)="goToEditAccount(view)" tooltip="Edit Account" accessControl
                                            moduleName="Integrations" accessType="Manage Integrations"
                                            elementType="actionbtn">
                                        </button>
                                        <button class="action-icons mr-1 fas fa-trash-alt font-sm"
                                            tooltip="Delete Account" (click)="deleteAccount(view)" accessControl
                                            moduleName="Integrations" accessType="Manage Integrations"
                                            elementType="actionbtn">
                                        </button>
                                        <button class="action-icons fas fa-magic font-sm" tooltip="Test Payload"
                                            container="body" (click)="testPayloadModal(view)" accessControl
                                            moduleName="Integrations" accessType="Manage Integrations"
                                            elementType="actionbtn">
                                        </button>
                                        <!-- <span dropdown placement="bottom right" container="body">
                                            <button id="button-container"
                                                class="action-icons mb-0 fa fa-ellipsis-h font-sm ml-1"
                                                data-toggle="dropdown" aria-controls="icons-dropdown-container"
                                                dropdownToggle (click)="false" [tooltip]="'More Actions'"
                                                container="body"></button>
                                            <div container="body" id="icons-dropdown-container"
                                                class="dropdown-menu dropdown-menu-right text-center mt-2" *dropdownMenu
                                                aria-labelledby="button-container">
                                                <button class="action-icons mt-1 fas fa-key font-sm" tooltip="Copy Key"
                                                    (click)="copyKeyOrUrl(view.token,'Key')" container="body"
                                                    accessControl moduleName="Integrations"
                                                    accessType="Manage Integrations" elementType="actionbtn">
                                                </button>
                                                <button class="action-icons mt-1 mb-1 fas fa-link font-sm"
                                                    tooltip="Copy URL" (click)="copyKeyOrUrl(view.url, 'URL')"
                                                    container="body" accessControl moduleName="Integrations"
                                                    accessType="Manage Integrations" elementType="actionbtn">
                                                </button>
                                                <button class="action-icons mb-1 fas fa-magic font-sm"
                                                    tooltip="Test Payload" container="body"
                                                    (click)="testPayloadModal(view)" accessControl
                                                    moduleName="Integrations" accessType="Manage Integrations"
                                                    elementType="actionbtn">
                                                </button>
                                            </div>
                                        </span> -->
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <table-entries *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                            [pageSize]="currentCriteria.pageSize" [totalCount]="count"></table-entries>
                        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                            [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                            (pageChange)="pageChange($event)"></table-pager>
                        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No Accounts available.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #confirmdelete>
    <div class="card mb-0">
        <div class="card-header">
            Confirm Delete
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="modalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            Are you sure you want to delete?
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button" (click)="confirmDelete()">Yes</button>
            <button class="btn btn-sm btn-danger pull-right" (click)="modalRef.hide()" type="button">No</button>
        </div>
    </div>
</ng-template>

<ng-template #payload>
    <div class="card mb-0">
        <div class="card-header">
            Test Payload
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="payloadModalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            <form *ngIf="payloadForm" [formGroup]="payloadForm">
                <div class="form-group">
                    <div class="invalid-credentials" *ngIf="nonFieldErr">{{nonFieldErr}}</div>
                </div>
                <div class="row form-group">
                    <div class="col">
                        <label class="form-col-form-label">Payload<em>*</em></label>
                        <textarea class="form-control" name="payload" id="payload" formControlName="payload"
                            [ngClass]="{'is-invalid' : payloadFormErrors.payload}"
                            placeholder="Enter Payload"></textarea>
                        <div class="invalid-feedback" *ngIf="payloadFormErrors.payload">{{payloadFormErrors.payload}}
                        </div>
                    </div>
                </div>
                <div *ngIf="!isSubmit" class="row form-group">
                    <div class="col">
                        <label class="form-col-form-label">Response</label>
                        <textarea class="form-control" name="payload" id="payload" rows="3" formControlName="response"
                            readonly></textarea>
                    </div>
                </div>
            </form>
        </div>
        <div class="card-footer">
            <button *ngIf="isSubmit" class="btn btn-sm btn-success pull-right ml-1" type="button"
                (click)="submitPayload()">Submit</button>
            <button class="btn btn-sm btn-danger pull-right" (click)="payloadModalRef.hide()"
                type="button">Cancel</button>
        </div>
    </div>
</ng-template>
