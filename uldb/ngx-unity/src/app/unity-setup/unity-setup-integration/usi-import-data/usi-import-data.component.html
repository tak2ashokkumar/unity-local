<app-main-tab [tabItems]="tabItems"></app-main-tab>
<div class="container-fluid">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col">
                <div class="card rounded border-top-0">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                        <div class="d-flex justify-content-center align-items-center font-500">
                            <span class="badge badge-secondary font-sm">{{count}}</span>
                            <span class="ml-1 font-lg">File Upload</span>
                        </div>
                        <div class="d-flex justify-content-end align-items-center">
                            <button class="btn btn-pill btn-warning pull-right btn-sm" type="button" container="body"
                                (click)="goBack()"><i class="fa fa-arrow-left"></i>
                            </button>
                            <data-refresh-btn [page]="currentCriteria.pageNo"
                                (refresh)="refreshData($event)"></data-refresh-btn>
                        </div>
                    </div>
                    <div class="card-body py-2">
                        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                            <div class="w-25">
                                <search-box [searchValue]="currentCriteria.searchValue"
                                    (searched)="onSearched($event)"></search-box>
                            </div>
                            <div>
                                <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                                    (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                            </div>
                        </div>
                        <table class="table text-left" *ngIf="viewData.length">
                            <thead class="bg-light">
                                <tr>
                                    <th>Platform</th>
                                    <th>accountId</th>
                                    <th>File Name</th>
                                    <th class="text-center">Status</th>
                                    <th>Import Date</th>
                                    <th>Description</th>
                                    <th>Imported By</th>
                                    <th>action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let view of viewData; let i = index" setTableColumnWidth>
                                    <td>
                                        <div>{{view.platform}}</div>
                                    </td>
                                    <td>
                                        <div>{{view.accountId}}</div>
                                    </td>
                                    <td>
                                        <div [tooltip]="view.fileName">{{view.fileName}}</div>
                                    </td>
                                    <td>
                                        <div class="text-center">
                                            <i class="fa status-icon" [ngClass]="view.statusIcon"
                                                [tooltip]="view.fileTooltip" container="body"></i>
                                        </div>
                                    </td>
                                    <td>
                                        <div [tooltip]="view.importDate">{{view.importDate}}</div>
                                    </td>
                                    <td>
                                        <div [tooltip]="view.description">{{view.description}}</div>
                                    </td>
                                    <td>
                                        <div>{{view.importedBy}}</div>
                                    </td>
                                    <td class="action-icons-column">
                                        <button class="action-icons mb-0 fas fa-download font-sm ml-1"
                                            tooltip="Download" (click)="downloadFile(i)" accessControl
                                            moduleName="Integrations" accessType="Manage Integrations"
                                            elementType="actionbtn"></button>
                                        <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" tooltip="Delete"
                                            (click)="deleteFile(i)" accessControl moduleName="Integrations"
                                            accessType="Manage Integrations" elementType="actionbtn"></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                            [totalCount]="count"></table-entries>
                        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                            [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                            (pageChange)="pageChange($event)"></table-pager>
                        <div class="text-center text-muted" *ngIf="!viewData.length">No Data available.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #confirm>
    <div class="card mb-0">
        <div class="card-header">
            Confirm Delete
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="confirmDeleteModalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            Are you sure you want to delete?
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button" (click)="confirmDelete()">Yes</button>
            <button class="btn btn-sm btn-danger pull-right" (click)="confirmDeleteModalRef.hide()"
                type="button">No</button>
        </div>
    </div>
</ng-template>
