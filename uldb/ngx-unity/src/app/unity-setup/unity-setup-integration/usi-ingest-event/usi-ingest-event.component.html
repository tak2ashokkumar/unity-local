<h5 class="mt-4">Event Ingestion</h5>
<div class="row mb-1">
    <div class="col-3 mb-3">
        <div class="card round-edge equalize-card">
            <div class="card-body p-1">
                <div class="row mx-0">
                    <div class="col-6">
                        <img [src]="eventIngestion.nagios.imageURL" class="w-100" [alt]="'Nagios'" loading="eager"
                            style="height: 36px; max-width: -webkit-fill-available; max-height: -webkit-fill-available;" />
                    </div>
                </div>
                <div class="row border-top pt-1 pb-0 mx-0">
                    <div class="col-6 d-flex align-items-center">
                        <ng-container *ngIf="eventIngestion.nagios.length">
                            <button class="btn btn-pill btn-sm btn-primary font-xs">{{eventIngestion.nagios.length}}
                                Instances</button>
                        </ng-container>
                    </div>
                    <div class="col-6">
                        <ng-container *ngIf="eventIngestion.nagios.length">
                            <button class="action-icons mb-0 fas fa-eye font-sm ml-1 pull-right"
                                [tooltip]="viewtooltipMsg" (click)="viewNagiosInstanceDetails()" accessControl
                                [moduleName]="'Integrations'" [accessType]="'View Integrations'"
                                [elementType]="'actionbtn'">
                            </button>
                        </ng-container>
                        <button class="action-icons mb-0 fas fa-tools font-sm ml-1 pull-right" [tooltip]="addtooltipMsg"
                            (click)="addNagiosInsatnce()" accessControl [moduleName]="'Integrations'"
                            [accessType]="'Add Integrations'" [elementType]="'actionbtn'">
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <usi-event-ingestion-nagios-crud (onCrud)="onNagiosCrud($event)"></usi-event-ingestion-nagios-crud>
    </div>
