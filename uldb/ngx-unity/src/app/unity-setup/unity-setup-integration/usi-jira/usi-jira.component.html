<app-main-tab [tabItems]="tabItems"></app-main-tab>
<div class="container-fluid">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col">
                <div class="card rounded-0 border-top-0">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                        <div class="d-flex justify-content-center align-items-center font-500">
                            <span class="badge badge-secondary font-sm">{{instanceList.length}}</span>
                            <span class="ml-1 font-lg">Accounts</span>
                        </div>
                        <div class="w-25">
                            <search-box [searchValue]="currentCriteria.searchValue"
                                (searched)="onSearched($event)"></search-box>
                        </div>
                        <div class="d-flex justify-content-end align-items-center">
                            <button class="btn btn-sm btn-warning mx-2 font-500" type="button" (click)="add()"
                                accessControl moduleName="Ticket Management" accessType="Manage Tickets"
                                elementType="btn">
                                <span class="fas fa-plus"></span>
                                <span class="ml-1 font-sm">Account</span>
                            </button>
                            <button class="btn btn-pill btn-warning pull-right btn-sm" type="button" container="body"
                                (click)="goBack()"><i class="fa fa-arrow-left"></i>
                            </button>
                            <data-refresh-btn [page]="currentCriteria.pageNo"
                                (refresh)="refreshData($event)"></data-refresh-btn>
                        </div>
                    </div>
                    <div class="card-body py-2">
                        <table class="table table-sm text-left">
                            <thead class="bg-light">
                                <tr>
                                    <th>Instance Name</th>
                                    <th>Email</th>
                                    <th>JIRA URL</th>
                                    <th>Acccess Type</th>
                                    <th>Default</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let view of instanceList">
                                    <td>{{view.name}}</td>
                                    <td>{{view.email}}</td>
                                    <td>{{view.jira_url}}</td>
                                    <td>{{view.access_type}}</td>
                                    <td>{{view.is_default}}</td>
                                    <td>
                                        <!-- <button class="action-icons mb-0 fa fa-list-ul font-sm ml-1"
                                            tooltip="Go to ticket management" (click)="goTo(view)">
                                        </button> -->
                                        <button class="action-icons mb-0 fas fa-ticket-alt font-sm ml-1"
                                            tooltip="Go to ticket management" (click)="goTo(view)">
                                        </button>
                                        <button class="action-icons mb-0 fas fa-tasks font-sm ml-1" tooltip="Projects"
                                            (click)="showProjects(view)" accessControl moduleName="Ticket Management"
                                            accessType="Manage Tickets" elementType="actionbtn">
                                        </button>
                                        <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1"
                                            tooltip="Edit Account" (click)="edit(view)" accessControl
                                            moduleName="Ticket Management" accessType="Manage Tickets"
                                            elementType="actionbtn">
                                        </button>
                                        <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1"
                                            tooltip="Delete Account" (click)="delete(view)" accessControl
                                            moduleName="Ticket Management" accessType="Manage Tickets"
                                            elementType="actionbtn">
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="text-center text-muted py-4" *ngIf="!instanceList.length">No Instances available.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<usi-jira-crud (onCrud)="onCrud($event)"></usi-jira-crud>
