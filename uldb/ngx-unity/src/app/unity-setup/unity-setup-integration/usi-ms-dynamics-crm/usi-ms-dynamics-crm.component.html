<app-main-tab [tabItems]="tabItems"></app-main-tab>
<div class="container-fluid">
  <div class="animated fadeIn">
    <div class="row">
      <div class="col">
        <div class="card rounded-0 border-top-0">
          <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
            <div class="d-flex justify-content-center align-items-center font-500">
              <span class="badge badge-secondary font-sm">{{viewData.length}}</span>
              <span class="ml-1 font-lg">Accounts</span>
            </div>
            <div class="w-25">
              <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
            </div>
            <div class="d-flex justify-content-end align-items-center">
              <button class="btn btn-sm btn-warning mx-2 font-500" type="button" (click)="add()" accessControl
                moduleName="Ticket Management" accessType="Manage Tickets" elementType="btn">
                <span class="fas fa-plus"></span>
                <span class="ml-1 font-sm">Account</span>
              </button>
              <button class="btn btn-pill btn-warning pull-right btn-sm" type="button" container="body"
                (click)="goBack()"><i class="fa fa-arrow-left"></i>
              </button>
              <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
            </div>
          </div>
          <div class="card-body py-2">
            <table class="table tabl-sm text-left">
              <thead class="bg-light">
                <tr>
                  <th>Account Name</th>
                  <th>User Name</th>
                  <th>Instance URL</th>
                  <th>Acccess Type</th>
                  <th>Default</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let view of viewData">
                  <td>{{view.name}}</td>
                  <td>{{view.username}}</td>
                  <td>{{view.crm_url}}</td>
                  <td>{{view.access_type}}</td>
                  <td>{{view.is_default}}</td>
                  <td>
                    <button class="action-icons mb-0 fa fa-list-ul font-sm ml-1" tooltip="Go to ticket management"
                      (click)="goTo(view)">
                    </button>
                    <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" tooltip="Edit Account"
                      (click)="edit(view)" accessControl moduleName="Ticket Management" accessType="Manage Tickets"
                      elementType="actionbtn">
                    </button>
                    <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" tooltip="Delete Account"
                      (click)="delete(view)" accessControl moduleName="Ticket Management" accessType="Manage Tickets"
                      elementType="actionbtn">
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
            <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="count">
            </table-entries>
            <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
              [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
            <div class="text-center text-muted py-4" *ngIf="!viewData.length">No Accounts available.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<usi-ms-dynamics-crm-crud (onCrud)="onCrud($event)"></usi-ms-dynamics-crm-crud>
