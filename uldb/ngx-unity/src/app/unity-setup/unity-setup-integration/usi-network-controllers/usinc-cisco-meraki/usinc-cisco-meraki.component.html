<div class="row mx-1 mt-3">
  <div class="col-12">
    <div class="card rounded">
      <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
          <span class="badge badge-secondary font-sm">{{count}}</span>
          <span class="ml-1 font-lg">Accounts</span>
        </div>
        <div class="d-flex justify-content-end align-items-center">
          <button class="btn btn-pill btn-sm btn-warning font-500" type="button" (click)="goToMerakiaAdd()"
            accessControl moduleName="Datacenter" accessType="Manage Datacenter" elementType="btn">
            <span class="font-xs-sm mx-1">Create Account</span>
          </button>
          <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
          <button class="btn btn-pill btn-warning pull-right ml-2 btn-sm" type="button" container="body"
            (click)="goBack()" tooltip="Back"><i class="fa fa-arrow-left"></i>
          </button>
        </div>
      </div>
      <div class="card-body py-2">
        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
          <div class="w-25">
            <search-box [searchValue]="currentCriteria.searchValue" (searched)="onSearched($event)"></search-box>
          </div>
          <div class="d-flex justify-content-between align-items-center w-30">
            <multiselect-dropdown class="form-control p-0 w-35" style="height:auto;" [options]="scheduleTypesList"
              [settings]="scheduleSettings" [texts]="scheduleTexts" (dropdownClosed)="onFilterChange()"
              [(ngModel)]="currentCriteria.multiValueParam.schedule"></multiselect-dropdown>

            <multiselect-dropdown class="form-control p-0 w-35" style="height:auto;" [options]="statusList"
              [settings]="StatusSettings" [texts]="statusTypeTexts" (dropdownClosed)="onFilterChange()"
              [(ngModel)]="currentCriteria.multiValueParam.status"></multiselect-dropdown>
            <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
              (pageSizeChange)="pageSizeChange($event)"></table-page-size>
          </div>
        </div>
        <table class="table table-sm text-left">
          <thead class="bg-light">
            <tr>
              <th>Name</th>
              <th>URL</th>
              <th>Port</th>
              <th>Schedule</th>
              <th>Status</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let view of viewData" truncateText>
              <td class="tdw-20">
                <div [tooltip]="view.name">{{view.name}}</div>
              </td>
              <td class="tdw-20">
                <div [tooltip]="view.accountUrl">{{view.accountUrl}}</div>
              </td>
              <td class="tdw-20">
                <div [tooltip]="view.port">{{view.port}}</div>
              </td>
              <td class="tdw-20">
                <div [tooltip]="view.schedule">{{view.schedule}}</div>
              </td>
              <td class="w-8">
                <shared-device-status [status]="view.deviceStatus"></shared-device-status>
              </td>
              <td class="action-icons-column text-center">
                <button class="action-icons mb-0 fas fa-sync font-sm mr-1" (click)="syncNow(view)"
                  [tooltip]="view.syncInProgress ? 'In Progress': 'Sync Now'"
                  [ngClass]="{'action-icons-disabled fa-spin': view.syncInProgress}" accessControl
                  moduleName="Datacenter" accessType="Manage Datacenter" elementType="actionbtn">
                </button>
                <button class="action-icons mb-0 fas fa-eye font-sm mr-1" tooltip="View Details"
                  (click)="goToViewDetails(view)"></button>
                <button class="action-icons mb-0 fas fa-history font-sm" tooltip="View History"
                  (click)="goToViewHistory(view)"></button>
                <span dropdown placement="bottom right" container="body">
                  <button id="button-container" class="action-icons mb-0 fa fa-ellipsis-h font-sm ml-1"
                    data-toggle="dropdown" aria-controls="icons-dropdown-container" dropdownToggle (click)="false"
                    [tooltip]="'More Actions'" container="body"></button>
                  <div container="body" id="icons-dropdown-container"
                    class="dropdown-menu dropdown-menu-right text-center mt-2" *dropdownMenu
                    aria-labelledby="button-container">
                    <button class="action-icons mt-2 mb-1 fas fa-pencil-alt font-sm" (click)="goToMerakiaEdit(view)"
                      tooltip="Edit" container="body" accessControl moduleName="Datacenter"
                      accessType="Manage Datacenter" elementType="actionbtn"></button>
                    <button class="action-icons mt-1 mb-1 fas fa-trash-alt font-sm" tooltip="Delete"
                      (click)="delete(view)" container="body" accessControl moduleName="Datacenter"
                      accessType="Manage Datacenter" elementType="actionbtn"></button>
                    <button class="action-icons mt-1 mb-2 fas fa-ticket-alt font-sm" tooltip="Create Ticket"
                      (click)="createTicket(view)" container="body"></button>
                  </div>
                </span>
              </td>
            </tr>
          </tbody>
        </table>
        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="count">
        </table-entries>
        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
          [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No Meraki accounts available.</div>
      </div>
    </div>
  </div>
</div>

<ng-template #confirmdelete>
  <div class="card mb-0">
    <div class="card-header">
      Confirm Delete
      <div class="card-header-actions">
        <a class="card-header-action btn-close" (click)="confirmDeleteModalRef.hide()">
          <i class="fas fa-times"></i>
        </a>
      </div>
    </div>
    <div class="card-body">
      This Meraki Account will be deleted. Are you sure you want to delete?
    </div>
    <div class="card-footer">
      <button class="btn btn-sm btn-success pull-right ml-1" type="button" (click)="confirmDelete()">Yes</button>
      <button class="btn btn-sm btn-danger pull-right" (click)="confirmDeleteModalRef.hide()" type="button">No</button>
    </div>
  </div>
</ng-template>
