<div class="container-fluid mt-3">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col">
                <div class="card rounded-0 border-top-0">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                        <div class="d-flex justify-content-center align-items-center font-500">
                            <span class="badge badge-secondary font-sm">{{count}}</span>
                            <span class="ml-1 font-lg">Nutanix Clouds</span>
                        </div>
                        <div class="d-flex justify-content-end align-items-center">
                            <button class="btn btn-pill btn-sm btn-warning mx-2 px-3 font-500" type="button"
                                (click)="add()" accessControl moduleName="Private Cloud"
                                accessType="Manage Private Cloud" elementType="btn">
                                <span class="font-sm">Add Cloud</span>
                            </button>
                            <button class="btn btn-pill btn-warning btn-sm ml-2" (click)="goBack()" tooltip="Back">
                                <i class="fa fa-arrow-left"></i>
                            </button>
                            <data-refresh-btn (refresh)="refreshData()"></data-refresh-btn>
                        </div>
                    </div>
                    <div class="card-body py-2">
                        <table class="table table-sm text-left">
                            <thead class="bg-light">
                                <tr>
                                    <th>Name</th>
                                    <!-- <th>Storage</th>
                                    <th>Memory</th> -->
                                    <th>Datacenter</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let view of viewData" truncateText>
                                    <td class="text-primary tdw-35 pointer-link" (click)="viewDevices(view)">
                                        <div [tooltip]="view.name">{{view.name}}</div>
                                    </td>
                                    <td class="tdw-35">
                                        <div [tooltip]="view.colocation_cloud">{{view.colocation_cloud}}</div>
                                    </td>
                                    <td class="action-icons-column">
                                        <button class="action-icons mb-0 fas fa-pencil-alt font-sm"
                                            tooltip="Edit Account" (click)="edit(view)" accessControl
                                            moduleName="Private Cloud" accessType="Manage Private Cloud"
                                            elementType="actionbtn">
                                        </button>
                                        <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1"
                                            tooltip="Delete Account" (click)="deleteInstance(view)" accessControl
                                            moduleName="Private Cloud" accessType="Manage Private Cloud"
                                            elementType="actionbtn">
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No accounts available.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<pc-crud [isAddorEditEnabled]="false" (onCrud)="refreshData()"></pc-crud>

<ng-template #changePasswordRef>
    <div class="card mb-0">
        <div class="card-header">
            Change Password
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="modalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            <form *ngIf="changePasswordForm" [formGroup]="changePasswordForm">
                <div class="row">
                    <div class="col-12 form-group">
                        <label for="form-col-form-label"> Password<em>*</em></label>
                        <input class="form-control" id="secret_key" type="password" formControlName="secret_key"
                            placeholder="Password" [ngClass]="{'is-invalid' : changePasswordFormErrors.secret_key}">
                        <div class="invalid-feedback" *ngIf="changePasswordFormErrors.secret_key">
                            {{changePasswordFormErrors.secret_key}}
                        </div>
                    </div>
                    <div class="col-12 form-group">
                        <label for="form-col-form-label"> Confirm Password<em>*</em></label>
                        <input class="form-control" id="secret_key_confirm" type="password"
                            formControlName="secret_key_confirm" placeholder="Confirm Password"
                            [ngClass]="{'is-invalid' : changePasswordFormErrors.secret_key_confirm}">
                        <div class="invalid-feedback" *ngIf="changePasswordFormErrors.secret_key_confirm">
                            {{changePasswordFormErrors.secret_key_confirm}}</div>
                    </div>
                </div>
            </form>
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button"
                (click)="confirmChangePassword()">Change
                Password</button>
            <button class="btn btn-sm btn-danger pull-right" type="button" (click)="modalRef.hide()">Cancel</button>
        </div>
    </div>
</ng-template>

<ng-template #confirm>
    <div class="card mb-0">
        <div class="card-header">
            Confirm Delete
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="modalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            Are you sure you want to delete?
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button" (click)="confirmDelete()">Yes</button>
            <button class="btn btn-sm btn-danger pull-right" (click)="modalRef.hide()" type="button">No</button>
        </div>
    </div>
</ng-template>
