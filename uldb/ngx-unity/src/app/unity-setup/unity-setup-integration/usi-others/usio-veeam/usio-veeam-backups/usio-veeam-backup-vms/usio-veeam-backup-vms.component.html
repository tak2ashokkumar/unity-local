<div class="container-fluid mt-3">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                        <div class="d-flex justify-content-center align-items-center font-500">
                            <span class="badge badge-secondary font-sm">{{count}}</span>
                            <span class="ml-1 font-lg">Virtual Machines</span>
                        </div>
                        <div class="d-flex justify-content-end align-items-center">
                            <data-refresh-btn [page]="currentCriteria.pageNo"
                                (refresh)="refreshData($event)"></data-refresh-btn>
                            <button class="btn btn-pill btn-warning pull-right ml-2 btn-sm" type="button"
                                container="body" (click)="goBack()" tooltip="Back"><i class="fa fa-arrow-left"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body pt-2">
                        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                            <div class="w-25">
                                <search-box [searchValue]="currentCriteria.searchValue"
                                    (searched)="onSearched($event)"></search-box>
                            </div>
                            <div>
                                <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                                    (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                            </div>
                        </div>
                        <table class="table table-sm text-left">
                            <thead class="bg-light">
                                <tr>
                                    <th>Name</th>
                                    <th class="text-center">Status</th>
                                    <th>Type</th>
                                    <th>Operating System</th>
                                    <th>Management IP</th>
                                    <th>Cloud</th>
                                    <th>Tags</th>
                                    <th>Last Backup Time</th>
                                    <th class="text-center">Backup Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let view of viewData" truncateText>
                                    <td class="tdw-10">
                                        <button class="btn btn-link text-decoration-none p-0 table-column-btn"
                                            type="button" [tooltip]="view.name">{{view.name}}</button>
                                    </td>
                                    <td class="tdw-5 text-center">
                                        <shared-device-status [status]="view.vmStatus"></shared-device-status>
                                    </td>
                                    <td class="tdw-5">
                                        <div [tooltip]="view.type">{{view.type}}</div>
                                    </td>
                                    <td class="tdw-12">
                                        <div [tooltip]="view.osName">{{view.osName}}</div>
                                    </td>
                                    <td class="tdw-15">
                                        <div [tooltip]="view.managementIp">{{view.managementIp}}</div>
                                    </td>
                                    <td class="tdw-10">
                                        <div [tooltip]="view.cloudName">{{view.cloudName}}</div>
                                    </td>
                                    <td class="tdw-10">
                                        <ng-container [ngTemplateOutlet]='tagsList'
                                            [ngTemplateOutletContext]="{tags:view.tags}"></ng-container>
                                    </td>
                                    <td class="tdw-15">
                                        <div [tooltip]="view.lastBackupTime">{{view.lastBackupTime}}</div>
                                    </td>
                                    <td class="w-10 text-center">
                                        <span class="fa" [ngClass]="view.backupStatusIcon"
                                            [tooltip]="view.backupStatusTooltip"></span>
                                    </td>
                                    <td class="action-icons-column">
                                        <button class="action-icons mb-0 fas fa-history font-sm" container="body"
                                            tooltip="History" (click)="goToBackupVMsHistory(view)">
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                            [totalCount]="count"></table-entries>
                        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                            [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                            (pageChange)="pageChange($event)"></table-pager>
                        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No Backup vms were found.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #tagsList let-tags="tags">
    <div [popoverContext]="{ tags: tags }" [popover]="tagsTooltipTmpl" triggers="mouseenter:mouseleave" placement="top">
        <span *ngFor="let tag of tags" class="badge badge-pill badge-primary">{{tag}}</span>
    </div>
    <div *ngIf="!tags.length">N/A</div>
</ng-template>
