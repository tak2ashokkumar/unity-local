<div class="container-fluid mt-3">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                        <div class="d-flex justify-content-center align-items-center font-500">
                            <span class="badge badge-secondary font-sm">{{count}}</span>
                            <span class="ml-1 font-lg">Backups</span>
                        </div>
                        <div class="d-flex justify-content-end align-items-center">
                            <data-refresh-btn [page]="currentCriteria.pageNo"
                                (refresh)="refreshData($event)"></data-refresh-btn>
                            <button class="btn btn-pill btn-warning pull-right ml-2 btn-sm" type="button"
                                container="body" (click)="goBack()" tooltip="Back"><i class="fa fa-arrow-left"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body pt-2">
                        <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                            <div class="w-25">
                                <search-box [searchValue]="currentCriteria.searchValue"
                                    (searched)="onSearched($event)"></search-box>
                            </div>
                            <div class="d-flex justify-content-between align-items-center w-22">
                                <multiselect-dropdown class="form-control p-0 w-60" style="height:auto;"
                                    [options]="statusList" [settings]="StatusSettings" [texts]="statusTypeTexts"
                                    (dropdownClosed)="onFilterChange()"
                                    [(ngModel)]="currentCriteria.multiValueParam.backup_job_status"></multiselect-dropdown>

                                <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                                    (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                            </div>
                        </div>
                        <table class="table table-sm text-left">
                            <thead class="bg-light">
                                <tr>
                                    <th>Name</th>
                                    <th>Cloud Type</th>
                                    <th>Status</th>
                                    <th>Last Run</th>
                                    <th class="text-center">Last Result</th>
                                    <th>Next Run</th>
                                    <th>Target</th>
                                    <th>VM Count</th>
                                    <th>Description</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let view of viewData" truncateText>
                                    <td class="tdw-15">
                                        <button class="btn btn-link text-decoration-none p-0 table-column-btn"
                                            type="button" [tooltip]="view.name">{{view.name}}</button>
                                    </td>
                                    <td class="tdw-10">
                                        <img class="text-truncate" [src]="view.platformTypeImgURL"
                                            [alt]="view.platformType" style="height: 25px;
                                max-width: -webkit-fill-available; max-height: -webkit-fill-available;" />
                                    </td>
                                    <td class="tdw-10">
                                        <div [tooltip]="view.status">{{view.status}}</div>
                                    </td>
                                    <td class="tdw-10">
                                        <div [tooltip]="view.lastRun">{{view.lastRun}}</div>
                                    </td>
                                    <td class="w-10 text-center">
                                        <span class="fa" [ngClass]="view.lastResultIcon"
                                            [tooltip]="view.lastResultTooltip"></span>
                                    </td>
                                    <td class="tdw-10">
                                        <div [tooltip]="view.nextRun">{{view.nextRun}}</div>
                                    </td>
                                    <td class="tdw-10">
                                        <div [tooltip]="view.target">{{view.target}}</div>
                                    </td>
                                    <td class="tdw-10">
                                        <div [tooltip]="view.vmCount">{{view.vmCount}}</div>
                                    </td>
                                    <td class="tdw-10">
                                        <div [tooltip]="view.description">{{view.description}}</div>
                                    </td>
                                    <td class="action-icons-column">
                                        <button class="action-icons mb-0 fas fa-eye font-sm" container="body"
                                            tooltip="View Details" (click)="goToBackupVMs(view)">
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                            [totalCount]="count"></table-entries>
                        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                            [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                            (pageChange)="pageChange($event)"></table-pager>
                        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No Backups were found.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
