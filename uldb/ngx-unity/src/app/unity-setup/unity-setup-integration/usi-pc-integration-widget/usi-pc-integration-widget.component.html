<div class="row">
    <div class="col-3 mb-3">
        <div class="card round-edge equalize-card">
            <div class="card-body p-1">
                <div class="row mx-0">
                    <div class="col-6">
                        <img [src]="privateClouds.esxi.imageURL" class="w-100" [alt]="'ESXI'"
                            style="height: 36px; max-width: -webkit-fill-available; max-height: -webkit-fill-available;" />
                    </div>
                </div>
                <div class="row border-top pt-1 pb-0 mx-0">
                    <div class="col-6 d-flex align-items-center">
                        <ng-container *ngIf="privateClouds.esxi.length">
                            <button class="btn btn-pill btn-sm btn-primary font-xs">{{privateClouds.esxi.length}}
                                Instances</button>
                        </ng-container>
                    </div>
                    <div class="col-6">
                        <ng-container *ngIf="privateClouds.esxi.length">
                            <button class="action-icons mb-0 fas fa-eye font-sm ml-1 pull-right"
                                [tooltip]="viewtooltipMsg" (click)="goToEsxiViewDetails()" accessControl
                                moduleName="Private Cloud" accessType="View Private Cloud" elementType="actionbtn">
                            </button>
                        </ng-container>
                        <button class="action-icons mb-0 fas fa-tools font-sm ml-1 pull-right" [tooltip]="addtooltipMsg"
                            (click)="addEsxiPvtCloud()" accessControl moduleName="Private Cloud"
                            accessType="Manage Private Cloud" elementType="actionbtn">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
