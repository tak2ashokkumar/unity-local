<div class="container-fluid mt-4">
  <div class="animated fadeIn">
    <div class="row">
      <div class="col">
        <div class="card rounded-0 border-top-0">
          <div
            class="card-header bg-transparent border-bottom-0 d-flex justify-content-between align-items-center py-2">
            <div class="d-flex justify-content-center align-items-center">
              <span class="badge badge-secondary font-sm font-500">{{count}}</span>
              <span class="ml-1">Resources</span>
            </div>
            <div class="d-flex justify-content-end align-items-center">
              <button class="btn btn-pill btn-warning btn-sm mr-2" tooltip="Back" (click)="goBack()">
                <i class="fa fa-arrow-left"></i>
              </button>

              <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                (pageSizeChange)="pageSizeChange($event)"></table-page-size>

              <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
            </div>
          </div>
          <div class="card-body pt-0">
            <table class="table table-sm text-left">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Type</th>
                  <th>Operating System</th>
                  <th>Management ip</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let view of viewData" truncateText>
                  <!-- <td class="text-primary tdw-35 pointer-link" (click)="loadResourceData(view)"> -->
                  <td class="text-primary tdw-35">
                    <div [tooltip]="view.name">
                      <img [src]="view.iconPath" width="17" height="17" *ngIf="view.iconPath">
                      <span class="ml-2">{{view.name}}</span>
                    </div>
                  </td>
                  <td class="tdw-15">
                    <div [tooltip]="view.type">{{view.type}}</div>
                  </td>
                  <td class="tdw-25">
                    <div [tooltip]="view.osName">{{view.osName}}</div>
                  </td>
                  <td class="tdw-15">
                    <div [tooltip]="view.managementIp">{{view.managementIp}}</div>
                  </td>
                </tr>
              </tbody>
            </table>
            <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
              [totalCount]="count"></table-entries>
            <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
              [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
            <div class="text-center text-muted py-4" *ngIf="!viewData.length">No Resources available.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
