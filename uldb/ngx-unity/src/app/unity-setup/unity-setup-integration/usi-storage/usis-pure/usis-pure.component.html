<div class="container-fluid mt-3">
    <div class="animated fadeIn">

        <div class="card round-edge">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                <div class="d-flex justify-content-center align-items-center font-500">
                    <span class="badge badge-secondary font-sm">{{count}}</span>
                    <span class="ml-1 font-lg">Storage Devices</span>
                </div>
                <div class="d-flex justify-content-end align-items-center">
                    <button class="btn btn-pill btn-sm btn-warning font-500" type="button" (click)="addPureStorage()"
                        accessControl moduleName="Datacenter" accessType="Manage Datacenter" elementType="btn">
                        <span class="fas fa-plus"></span>
                        <span class="font-xs-sm mx-1">Storage</span>
                    </button>
                    <data-refresh-btn [page]="currentCriteria.pageNo"
                        (refresh)="refreshData($event)"></data-refresh-btn>
                    <button class="btn btn-pill btn-warning pull-right ml-2 btn-sm" type="button" container="body"
                        (click)="goBack()" tooltip="Back"><i class="fa fa-arrow-left"></i>
                    </button>
                </div>
            </div>
            <div class="card-body py-2">
                <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                    <div class="w-25">
                        <search-box [searchValue]="currentCriteria.searchValue"
                            (searched)="onSearched($event)"></search-box>
                    </div>
                    <div>
                        <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                            (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                    </div>
                </div>
                <table class="table table-sm text-left">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>OS</th>
                            <th>IP Address</th>
                            <th>Storage</th>
                            <th>Modified On</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let view of viewData; let i = index;" truncateText>
                            <td class="tdw-15">
                                <div [tooltip]="view.name">{{view.name}}</div>
                            </td>
                            <td class="tdw-17">
                                <div [tooltip]="view.os">{{view.os}}</div>
                            </td>
                            <td class="tdw-15">
                                <div [tooltip]="view.ip">{{view.ip}}</div>
                            </td>
                            <td class="tdw-23">
                                <span *ngIf="view.storageSpinner"><i class="fa fa-spinner fa-spin">&nbsp;</i></span>
                                <span *ngIf="view.showNA">N/A</span>
                                <div class="row" *ngIf="view.showGraph">
                                    <div class="col ml-auto mb-1">
                                        <small class="text-muted utilization-font-size">Capacity:
                                            {{view.storage.capacity}}</small>
                                    </div>
                                    <div class="col-12">
                                        <div class="progress">
                                            <div class="progress-bar" [ngClass]="view.storage.usedBarColor"
                                                role="progressbar" [style.width.%]="view.storage.usedPercentage"
                                                aria-valuenow="percentData.active" aria-valuemin="0"
                                                aria-valuemax="100"></div>

                                            <div class="progress-bar bg-secondary" role="progressbar"
                                                [style.width.%]="view.storage.freePercentage"
                                                aria-valuenow="percentData.unknown" aria-valuemin="0"
                                                aria-valuemax="100"></div>
                                        </div>
                                    </div>
                                    <div class="col">
                                        <small class="text-muted utilization-font-size">Used:
                                            {{view.storage.used}}</small>
                                    </div>
                                    <div class="col ml-auto text-right">
                                        <small class="text-muted utilization-font-size">Free:
                                            {{view.storage.freePercentage}}%</small>
                                    </div>
                                </div>
                            </td>
                            <td class="tdw-15">
                                <div [tooltip]="view.updatedAt">{{view.updatedAt}}</div>
                            </td>
                            <td class="action-icons-column text-center">
                                <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" tooltip="Edit"
                                    (click)="editInstance(view)" accessControl moduleName="Datacenter"
                                    accessType="Manage Datacenter" elementType="actionbtn">
                                </button>
                                <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" tooltip="Delete"
                                    (click)="deleteInstance(view)" accessControl moduleName="Datacenter"
                                    accessType="Manage Datacenter" elementType="actionbtn">
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                    [totalCount]="count"></table-entries>
                <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                    [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                    (pageChange)="pageChange($event)"></table-pager>
                <div class="text-center text-muted py-4" *ngIf="!viewData.length">No associated Storage
                    Devices
                    found.</div>
            </div>
        </div>
    </div>
</div>

<usi-pure-storage-crud (onCrud)="onPureStorageCrud($event)"></usi-pure-storage-crud>
