<div class="row">
    <div class="col-12 px-3 mt-2">
        <div class="card" style="min-height: 600px">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2">
                <span class="h6 mb-0 font-500">{{action}} UnityOne ITSM Table</span>
                <button class="btn btn-pill btn-warning btn-sm" tooltip="Back" (click)="goBack()">
                    <i class="fa fa-arrow-left"></i>
                </button>
            </div>
            <div class="card-body py-2 text-muted">
                <form *ngIf="form" [formGroup]="form">
                    <div class="form-group col-12 text-center">
                        <!-- <div class="invalid-credentials" *ngIf="nonFieldErr">{{nonFieldErr}}</div> -->
                    </div>
                    <div class="form-group row">
                        <label for="name" class="col-2 text-right col-form-label">Name<em>* </em> :</label>
                        <div class="col-4">
                            <input id="name" class="form-control text-dark" type="text" formControlName="name"
                                placeholder="Enter Name" [class.is-invalid]="formErrors.name">
                            <div class="invalid-feedback" *ngIf="formErrors.name">
                                {{formErrors.name}}</div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="name" class="col-2 text-right col-form-label">Description :</label>
                        <div class="col-4">
                            <input id="description" class="form-control text-dark" type="text"
                                formControlName="description" placeholder="Enter description">
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="ticket_id_prefix" class="col-2 text-right col-form-label">Ticket ID Prefix<em>*
                            </em>
                            :</label>
                        <div class="col-4">
                            <input id="ticket_id_prefix" class="form-control text-dark" type="text"
                                formControlName="ticket_id_prefix" placeholder="Enter Ticket ID Prefix"
                                [class.is-invalid]="formErrors.ticket_id_prefix">
                            <div class="invalid-feedback" *ngIf="formErrors.ticket_id_prefix">
                                {{formErrors.ticket_id_prefix}}</div>
                        </div>
                    </div>

                    <div class="form-group row d-flex">
                        <label class="col-2 text-right col-form-label">Status :</label>
                        <div class="col-4">
                            <div class="d-inline-block">
                                <ul class="d-flex px-0 mb-0">
                                    <li>
                                        <label class="pointer-link" [class.active]="form.controls.is_enabled.value">
                                            <input type="radio" [value]="true" formControlName="is_enabled">
                                            <span class="font-sm mr-2">Enable</span>
                                        </label>
                                    </li>
                                    <li>
                                        <label class="pointer-link" [class.active]="!form.controls.is_enabled.value">
                                            <input type="radio" [value]="false" formControlName="is_enabled">
                                            <span class="font-sm mr-2">Disable</span>
                                        </label>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="form-group row" *ngIf="!fields.length">
                        <label class="col-2 text-right col-form-label">Fields<em>*</em> :</label>
                        <div class="col-4">
                            <button type="button" class="btn btn-sm text-primary border-primary w-50"
                                (click)="addField()">+ Add Field</button>
                        </div>
                    </div>

                    <!-- Fields Array -->
                    <div *ngIf="fields.length">
                        <div class="form-group row">
                            <label class="col-2 text-right col-form-label">Fields<em>*</em> :</label>

                            <div class="col-9">
                                <div class="row mx-0 border rounded p-3 position-relative">

                                    <div formArrayName="fields" class="col-12">
                                        <div class="row mb-1 pl-2">
                                            <div class="col-2">
                                                <div class="text-dark">Label</div>
                                            </div>
                                            <div class="col-2">
                                                <div class="text-dark">Field Name</div>
                                            </div>
                                            <div class="col-2">
                                                <div class="text-dark">Field Type</div>
                                            </div>
                                        </div>
                                        <div *ngFor="let f of fields.controls; let i = index; let attrLast=last;"
                                            [formGroupName]="i" class="mb-2">

                                            <!-- ROW 1 -->
                                            <div class="row">
                                                <div class="col-2">
                                                    <input class="form-control text-dark" formControlName="label"
                                                        placeholder="Enter Label"
                                                        [class.is-invalid]="formErrors.fields[i]?.label">
                                                    <div class="invalid-feedback" *ngIf="formErrors.fields[i]?.label">
                                                        {{ formErrors.fields[i].label }}
                                                    </div>
                                                </div>

                                                <div class="col-2">
                                                    <input class="form-control text-dark" formControlName="field_name"
                                                        placeholder="Enter Field Name"
                                                        [class.is-invalid]="formErrors.fields[i]?.field_name">
                                                    <div class="invalid-feedback"
                                                        *ngIf="formErrors.fields[i]?.field_name">
                                                        {{ formErrors.fields[i].field_name }}
                                                    </div>
                                                </div>

                                                <div class="col-2">
                                                    <select class="form-control text-dark" formControlName="field_type"
                                                        [class.is-invalid]="formErrors.fields[i]?.field_type">
                                                        <option value="">Select Field Type</option>
                                                        <option value="TEXT">Text</option>
                                                        <option value="TEXTAREA">Text Area</option>
                                                        <option value="NUMBER">Number</option>
                                                        <option value="BOOLEAN">Boolean</option>
                                                        <option value="DATE">Date</option>
                                                        <option value="DATETIME">DateTime</option>
                                                        <option value="DROPDOWN">Dropdown</option>
                                                        <option value="REFERENCE">Reference</option>
                                                        <option value="JSON">JSON</option>
                                                        <option value="COMMENTS">Comment</option>
                                                    </select>
                                                    <div class="invalid-feedback"
                                                        *ngIf="formErrors.fields[i]?.field_type">
                                                        {{ formErrors.fields[i].field_type }}
                                                    </div>
                                                </div>

                                                <div class="col-2" *ngIf="getFieldType(i) === 'REFERENCE'">
                                                    <select class="form-control text-dark"
                                                        formControlName="reference_table">
                                                        <option value="">Select Reference</option>
                                                        <option *ngFor="let r of refernce" [value]="r.uuid">{{ r.name }}
                                                        </option>
                                                    </select>
                                                    <!-- <div class="invalid-feedback" *ngIf="formErrors.fields[i]?.reference_table">
                                        {{ formErrors.fields[i].reference_table }}
                                    </div> -->
                                                </div>

                                                <div class="col-2 mt-2">
                                                    <div class="form-check d-flex">
                                                        <input type="checkbox" formControlName="is_required"
                                                            id="req-{{i}}">
                                                        <label class="form-check-label ml-1"
                                                            for="req-{{i}}">Required</label>
                                                    </div>
                                                </div>

                                                <div class="col-2">
                                                    <div class="w-100 d-flex justify-content-start align-items-center">
                                                        <button type="button"
                                                            class="action-icons fas fa-minus font-sm ml-1"
                                                            (click)="removeField(i)" tooltip="Remove"></button>
                                                        <button tooltip="Add Field"
                                                            class="action-icons fas fa-plus font-sm ml-1"
                                                            *ngIf="attrLast" (click)="addField(i)"></button>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- ROW 2 : dropdown options -->
                                            <div class="row mt-1" *ngIf="getFieldType(i) === 'DROPDOWN'">
                                                <div class="col-4 offset-4">
                                                    <div formArrayName="options">
                                                        <div *ngFor="let opt of optionsAt(i).controls; let j = index; let dropLast=last;"
                                                            class="d-flex align-items-center mb-1">
                                                            <input class="form-control mr-2 text-dark"
                                                                [formControlName]="j" placeholder="Enter Option value">
                                                            <div
                                                                class="w-100 d-flex justify-content-start align-items-center">
                                                                <button type="button"
                                                                    class="action-icons fas fa-minus font-sm ml-1"
                                                                    (click)="removeOption(i, j)"
                                                                    tooltip="Remove"></button>
                                                                <button *ngIf="dropLast" type="button"
                                                                    class="action-icons fas fa-plus font-sm ml-1"
                                                                    (click)="addOption(i)" tooltip="Add">
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
                <div class="d-flex justify-content-center">
                    <button class="btn btn-md btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
                    <button class="btn btn-md btn-success ml-2" type="button"
                        (click)="confirmTaskCreate()">Submit</button>
                </div>
            </div>
        </div>
    </div>
</div>
