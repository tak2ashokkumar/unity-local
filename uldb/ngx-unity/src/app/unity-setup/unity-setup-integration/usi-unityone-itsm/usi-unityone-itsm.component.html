<div class="row p-2">
    <div class="col">
        <div class="card">
            <div class="card-header bg-transparent px-0 d-flex justify-content-between align-items-center py-2 mr-2">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="ml-2 text-left align-middle"><span
                            class="badge badge-secondary font-sm">{{count}}</span>&nbsp;<span
                            class="font-lg font-500">UnityOne ITSM Tables
                        </span></span>
                </div>
                <div class="d-flex justify-content-end align-items-center">
                    <button class="btn btn-pill btn-sm btn-warning font-500" type="button"
                        (click)="createUnityOneITSM()" accessControl [moduleName]="'Ticket Management'"
                        [accessType]="'View Tickets'" [elementType]="'actionbtn'">
                        <span class="fas fa-plus"></span>
                        <span class="font-xs-sm mx-1">Table</span>
                    </button>
                    <data-refresh-btn [page]="currentCriteria.pageNo"
                        (refresh)="refreshData($event)"></data-refresh-btn>
                    <button class="btn btn-pill btn-warning pull-right btn-sm ml-2" type="button" container="body"
                        (click)="goBack()"><i class="fa fa-arrow-left"></i>
                    </button>
                </div>
            </div>
            <div class="card-body py-2">
                <div class="row d-flex justify-content-between pb-2 mx-0">
                    <div class="col-12 p-0 mb-2">
                        <div class="d-flex justify-content-between align-items-center w-100">
                            <div class="w-80">
                                <div class="w-20">
                                    <table-search-box [searchValue]="currentCriteria.searchValue"
                                        (searched)="onSearched($event)"></table-search-box>
                                </div>
                            </div>
                            <div class="w-10">
                                <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                                    (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                            </div>
                        </div>
                    </div>
                    <table class="table table-sm text-left" sortableTable (sorted)="onSorted($event)">
                        <thead class="bg-light">
                            <tr>
                                <th>Name</th>
                                <th>Description</th>
                                <!-- <th>Ticket ID Template</th> -->
                                <th class="text-center">Status</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let view of viewData">
                                <td>{{view.name}}</td>
                                <td>{{view.description}}</td>
                                <!-- <td>{{view.idTemplate}}</td> -->
                                <td class="text-center">
                                    <div class="d-inline-block" accessControl moduleName="DevOps Automation"
                                        accessType="Manage Tasks" elementType="div">
                                        <ul class="d-flex px-0 mb-0 ml-4">
                                            <li>
                                                <label class="pointer-link" [class.active]="view.status">
                                                    <input type="radio" [value]="true"
                                                        (click)="toggleStatus(true, view)">
                                                    <span class="font-sm">Enable</span>
                                                </label>
                                            </li>
                                            <li>
                                                <label class="pointer-link" [class.active]="!view.status">
                                                    <input type="radio" [value]="false"
                                                        (click)="toggleStatus(false, view)">
                                                    <span class="font-sm">Disable</span>
                                                </label>
                                            </li>
                                        </ul>

                                    </div>
                                </td>
                                <td class="text-center">
                                    <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" tooltip="Edit"
                                        (click)="editUnityOneITSM(view)" accessControl
                                        [moduleName]="'Ticket Management'" [accessType]="'View Tickets'"
                                        [elementType]="'actionbtn'"></button>
                                    <button class="action-icons mb-0 far fa-trash-alt font-sm ml-1" tooltip="Delete"
                                        (click)="deleteUnityOneITSM(view.uuid)" accessControl
                                        [moduleName]="'Ticket Management'" [accessType]="'View Tickets'"
                                        [elementType]="'actionbtn'"></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                        [totalCount]="count"></table-entries>
                    <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                        [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                        (pageChange)="pageChange($event)"></table-pager>
                    <div class="col-12 text-center text-muted py-4" *ngIf="!viewData.length">No UnityOne ITSM Table
                        available.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #edit>
    <div class="card mb-0">
        <div class="card-body">
            <div class="row">
                <div class="col-12">
                    Are you sure want to edit the UnityOne ITSM?
                </div>
            </div>
            <div class="col-12 text-center mt-3">
                <button class="btn btn-pill btn-warning btn-sm pl-3 pr-3" type="button" (click)="confirmEdit()">Yes
                </button>
                <button class="btn btn-pill btn-outline-warning btn-sm ml-2" type="button"
                    (click)="editModelRef.hide()">Cancel
                </button>
            </div>
        </div>
    </div>
</ng-template>

<ng-template #confirmdelete>
    <div class="card mb-0">
        <div class="card-header">
            Confirm Delete
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="deleteModalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            This UnityOne ITSM will be deleted. Are you sure you want to delete?
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button"
                (click)="confirmUnityOneITSMDelete()">Yes</button>
            <button class="btn btn-sm btn-danger pull-right" (click)="deleteModalRef.hide()" type="button">No</button>
        </div>
    </div>
</ng-template>
