<div class="container-fluid mt-3">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div
                        class="card-title mb-2 px-2 py-2 border-bottom d-flex justify-content-between font-weight-bold">
                        <span class="h6 pt-1 font-500">Integration</span>
                        <button class="btn btn-pill btn-warning btn-sm text-right" (click)="goBack()" tooltip="Back">
                            <i class="fa fa-arrow-left"></i>
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-4 offset-4 d-flex justify-content-between pt-2">
                                <div class="d-flex flex-column align-items-center step">
                                    <span class="badge icon-wrap pointer-link"
                                        [class.active]="activeForm == 'vaultsConfigForm'"
                                        (click)="manageActiveForm('vaultsConfigForm')">
                                        <span class="fas fa-cog font-xl"></span>
                                    </span>
                                    <label class="mt-1 font-md">Configuration</label>
                                </div>
                                <div class="d-flex flex-column align-items-center step">
                                    <span class="badge icon-wrap pointer-link"
                                        [class.active]="activeForm == 'rotatePasswordForm'"
                                        (click)="manageActiveForm('rotatePasswordForm')">
                                        <span class="fas fa-clock font-xl"></span>
                                    </span>
                                    <label class="mt-1 font-md">Rotate Password</label>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-4 offset-4 divider-wrap">
                                <hr class="divider-line w-90 ml-0">
                            </div>
                        </div>
                        <div class="row mt-4">
                            <div class="col">
                                <ng-container [ngSwitch]="activeForm">
                                    <ng-container *ngSwitchCase="'vaultsConfigForm'">
                                        <ng-container *ngTemplateOutlet="vaultsConfigFormRef"></ng-container>
                                    </ng-container>
                                    <ng-container *ngSwitchCase="'rotatePasswordForm'">
                                        <ng-container *ngTemplateOutlet="rotatePasswordFormRef"></ng-container>
                                    </ng-container>
                                </ng-container>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #vaultsConfigFormRef>
    <div class="card border-0">
        <div class="card-body">
            <div class="row">
                <div class="col-8 offset-2">
                    <form *ngIf="vaultsConfigForm" [formGroup]="vaultsConfigForm">
                        <!-- Non-field Error -->
                        <div class="form-group" *ngIf="nonFieldErr">
                            <div class="invalid-credentials">{{ nonFieldErr }}</div>
                        </div>

                        <div class="row">
                            <!-- NAME -->
                            <div class="col-6 form-group">
                                <label for="name" class="form-col-form-label">Name<em>*</em></label>
                                <input id="name" class="form-control" type="text" formControlName="name"
                                    placeholder="Enter Name" [class.is-invalid]="vaultsConfigFormErrors.name" />
                                <div class="invalid-feedback" *ngIf="vaultsConfigFormErrors.name">
                                    {{ vaultsConfigFormErrors.name }}
                                </div>
                            </div>

                            <!-- BASE URL -->
                            <div class="col-6 form-group">
                                <label for="base_url" class="form-col-form-label">Base URL<em>*</em></label>
                                <input id="base_url" class="form-control" type="text" formControlName="base_url"
                                    placeholder="Enter Base URL" [class.is-invalid]="vaultsConfigFormErrors.base_url" />
                                <div class="invalid-feedback" *ngIf="vaultsConfigFormErrors.base_url">
                                    {{ vaultsConfigFormErrors.base_url }}
                                </div>
                            </div>

                            <!-- APPLICATION ID -->
                            <div class="col-6 form-group">
                                <label for="app_id" class="form-col-form-label">Application ID<em>*</em></label>
                                <input id="app_id" class="form-control" type="text" formControlName="app_id"
                                    placeholder="Enter Application ID"
                                    [class.is-invalid]="vaultsConfigFormErrors.app_id" />
                                <div class="invalid-feedback" *ngIf="vaultsConfigFormErrors.app_id">
                                    {{ vaultsConfigFormErrors.app_id }}
                                </div>
                            </div>

                            <!-- COLLECTOR -->
                            <div class="col-6 form-group">
                                <label for="collector" class="form-col-form-label">Collector<em>*</em></label>
                                <select id="collector" class="form-control" formControlName="collector"
                                    [ngClass]="{ 'is-invalid': vaultsConfigFormErrors.collector }">
                                    <option [value]="''" disabled>Select Collector</option>
                                    <option *ngFor="let cl of collectors" [value]="cl.id">{{ cl.name }}</option>
                                </select>
                                <div class="invalid-feedback" *ngIf="vaultsConfigFormErrors.collector">
                                    {{ vaultsConfigFormErrors.collector }}
                                </div>
                            </div>

                            <!-- VAULT NAME -->
                            <!-- <div class="col-6 form-group">
                                <label for="safe" class="form-col-form-label">Vault Name</label>
                                <input id="safe" class="form-control" type="text" formControlName="safe"
                                    placeholder="Enter Vault Name" [class.is-invalid]="vaultsConfigFormErrors.safe" />
                                <div class="invalid-feedback" *ngIf="vaultsConfigFormErrors.safe">
                                    {{ vaultsConfigFormErrors.safe }}
                                </div>
                            </div> -->

                            <!-- USERNAME -->
                            <!-- <div class="col-6 form-group">
                                <label for="username" class="form-col-form-label">Username</label>
                                <input id="username" class="form-control" type="text" formControlName="username"
                                    placeholder="Enter Username" [class.is-invalid]="vaultsConfigFormErrors.username" />
                                <div class="invalid-feedback" *ngIf="vaultsConfigFormErrors.username">
                                    {{ vaultsConfigFormErrors.username }}
                                </div>
                            </div> -->

                            <!-- DEVICE NAME -->
                            <!-- <div class="col-6 form-group">
                                <label for="device_name" class="form-col-form-label">Device Name</label>
                                <input id="device_name" class="form-control" type="text" formControlName="device_name"
                                    placeholder="Enter Device Name"
                                    [class.is-invalid]="vaultsConfigFormErrors.device_name" />
                                <div class="invalid-feedback" *ngIf="vaultsConfigFormErrors.device_name">
                                    {{ vaultsConfigFormErrors.device_name }}
                                </div>
                            </div> -->

                            <!-- OBJECT NAME -->
                            <!-- <div class="col-6 form-group">
                                <label for="object_name" class="form-col-form-label">Object Name</label>
                                <input id="object_name" class="form-control" type="text" formControlName="object_name"
                                    placeholder="Enter Object Name"
                                    [class.is-invalid]="vaultsConfigFormErrors.object_name" />
                                <div class="invalid-feedback" *ngIf="vaultsConfigFormErrors.object_name">
                                    {{ vaultsConfigFormErrors.object_name }}
                                </div>
                            </div> -->

                            <!-- ACCOUNT ID -->
                            <!-- <div class="col-12 form-group">
                                <label for="account_id" class="form-col-form-label">Account ID</label>
                                <input id="account_id" class="form-control" type="text" formControlName="account_id"
                                    placeholder="Enter Account ID"
                                    [class.is-invalid]="vaultsConfigFormErrors.account_id" />
                                <div class="invalid-feedback" *ngIf="vaultsConfigFormErrors.account_id">
                                    {{ vaultsConfigFormErrors.account_id }}
                                </div>
                            </div> -->

                            <!-- IS DEFAULT -->
                            <div class="col-12 form-group d-flex align-items-center">
                                <!-- <input id="is_default" type="checkbox" class="form-check-input"
                                    formControlName="is_default" /> -->
                                <input id="is_default" class="ut-checkbox" type="checkbox" formControlName="default">
                                <label for="is_default" class="primary mb-0">Default </label>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Footer Buttons -->
        <div class="card-footer bg-white border-top-0 d-flex justify-content-center py-3">
            <button class="btn btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
            <button class="btn btn-success ml-3" type="button" (click)="onSubmitAccountDetailsForm()">Next</button>
        </div>
    </div>
</ng-template>


<ng-template #rotatePasswordFormRef>
    <div class="card border-0">
        <div class="card-body">
            <div class="row">
                <div class="col-10 offset-1">
                    <div class="form-group" *ngIf="nonFieldErr">
                        <div class="invalid-credentials">{{nonFieldErr}}</div>
                    </div>
                    <unity-schedule></unity-schedule>
                </div>
            </div>
        </div>
        <div class="card-footer bg-white border-top-0 d-flex justify-content-center py-3">
            <button class="btn btn-outline-danger" type="button" (click)="goBack()">Cancel</button>
            <button class="btn btn-success ml-3" type="button" (click)="onSubmit()">Submit</button>
        </div>
    </div>
</ng-template>
