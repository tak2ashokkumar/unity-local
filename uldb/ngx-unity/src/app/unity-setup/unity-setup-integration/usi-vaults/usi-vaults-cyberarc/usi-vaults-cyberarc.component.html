<div class="container-fluid mt-2 px-2">
    <div class="animated fadeIn">
        <div class="row">
            <div class="col">
                <div class="card rounded-0 border-top-0">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-2">
                        <div class="d-flex justify-content-center align-items-center font-500">
                            <span class="badge badge-secondary font-sm">{{viewData.length}}</span>
                            <span class="ml-1 font-lg">Configurations</span>
                        </div>
                        <div class="d-flex justify-content-end align-items-center">
                            <button class="btn btn-pill btn-sm btn-warning font-500" type="button"
                                (click)="goToCreate()" accessControl moduleName="User Management"
                                accessType="Manage Users" elementType="btn">
                                <span class="fas fa-plus"></span>
                                <span class="font-xs-sm mx-1">Configuration</span>
                            </button>
                            <button class="btn btn-pill btn-warning btn-sm ml-2" type="button" container="body"
                                (click)="goBack()"><i class="fa fa-arrow-left"></i>
                            </button>
                            <data-refresh-btn [page]="1" (refresh)="refreshData($event)"></data-refresh-btn>
                        </div>
                    </div>
                    <div class="card-body py-2">
                        <div class="row pb-2">
                            <div class="col-2">
                                <search-box [searchValue]="currentCriteria.searchValue"
                                    (searched)="onSearched($event)"></search-box>
                            </div>
                            <div class="col">
                                <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                                    (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                            </div>
                        </div>
                        <table class="table table-sm text-left">
                            <thead class="bg-light">
                                <tr>
                                    <th>Name</th>
                                    <th>Base URL</th>
                                    <!-- <th>Vault Name</th> -->
                                    <!-- <th>Object Name</th> -->
                                    <!-- <th>Username</th> -->
                                    <!-- <th>Device Name</th> -->
                                    <th>Collector</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let view of viewData" truncateText>

                                    <td class="tdw-33">
                                        <div [tooltip]="view.name">{{view.name}}</div>
                                    </td>
                                    <td class="tdw-33">
                                        <div [tooltip]="view.baseUrl">{{view.baseUrl}}</div>
                                    </td>
                                    <!-- <td class="">
                                        <div [tooltip]="view.safe">{{view.safe}}</div>
                                    </td> -->
                                    <!-- <td class="">
                                        <div [tooltip]="view.objectName">{{view.objectName}}</div>
                                    </td> -->
                                    <!-- <td class="">
                                        <div [tooltip]="view.username">{{view.username}}</div>
                                    </td> -->
                                    <!-- <td class="">
                                        <div [tooltip]="view.deviceName">{{view.deviceName}}</div>
                                    </td> -->
                                    <td class="tdw-33">
                                        <div [tooltip]="view.collector">{{view.collector}}</div>
                                    </td>
                                    <td class="action-icons-column">
                                        <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1"
                                            tooltip="Edit Config" (click)="goToEdit(view)" accessControl
                                            moduleName="Integrations" accessType="Manage Integrations"
                                            elementType="actionbtn">
                                        </button>
                                        <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1"
                                            tooltip="Delete Config" (click)="delete(view)" accessControl
                                            moduleName="Integrations" accessType="Manage Integrations"
                                            elementType="actionbtn">
                                        </button>

                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                            [totalCount]="count"></table-entries>
                        <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                            [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                            (pageChange)="pageChange($event)"></table-pager>
                        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No Cyberarc Config were found.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #deleteConfirm>
    <div class="card mb-0">
        <div class="card-header">
            Confirm Delete
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="deleteModalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            Are you sure you want to delete?
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button" (click)="confirmDelete()">Yes</button>
            <button class="btn btn-sm btn-danger pull-right" (click)="deleteModalRef.hide()" type="button">No</button>
        </div>
    </div>
</ng-template>
