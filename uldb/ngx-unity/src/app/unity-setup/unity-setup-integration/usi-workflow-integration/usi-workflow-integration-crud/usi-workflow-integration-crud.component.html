<div class="row">
    <div class="col-12 px-4 mt-3">
        <div class="card round-edge">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2">
                <span class="h6 mb-0 font-500">{{action}} Workflow</span>
                <button class="btn btn-pill btn-warning btn-sm" (click)="goBack()" tooltip="Back">
                    <i class="fa fa-arrow-left"></i>
                </button>
            </div>
            <div class="card-body py-2">
                <form *ngIf="workFlowForm" [formGroup]="workFlowForm">
                    <div class="form-group col-12 text-center">
                        <div class="invalid-feedback d-block" *ngIf="nonFieldErr">{{nonFieldErr}}</div>
                    </div>
                    <div class="form-group row mb-2">
                        <label for="name" class="col-2 col-form-label text-right">Name<em>*</em> :
                        </label>
                        <div class="col-4">
                            <input id="name" class="form-control" type="text" formControlName="name"
                                placeholder="Enter Name" [ngClass]="{'is-invalid' : workFlowFormErrors.name}">
                            <div class="invalid-feedback" *ngIf="workFlowFormErrors.name">
                                {{workFlowFormErrors.name}}</div>
                        </div>
                    </div>
                    <div class="form-group row mb-2">
                        <label for="category" class="col-2 col-form-label text-right">Category<em>*</em> :
                        </label>
                        <div class="col-4">
                            <input id="category" class="form-control" type="text" formControlName="category"
                                placeholder="Enter category" [ngClass]="{'is-invalid' : workFlowFormErrors.category}">
                            <div class="invalid-feedback" *ngIf="workFlowFormErrors.category">
                                {{workFlowFormErrors.category}}</div>
                        </div>
                    </div>
                    <div class="form-group row mb-2">
                        <label class="col-2 text-right col-form-label ">Type<em>*</em> : </label>
                        <div class="col-3">
                            <select id="task_type" class="form-control" formControlName="task_type"
                                [class.is-invalid]="workFlowFormErrors.task_type">
                                <option value="" disabled>Select Type</option>
                                <option value="TASK" selected>Task</option>
                                <option value="WORKFLOW">Workflow</option>
                            </select>
                            <div class="invalid-feedback " *ngIf="workFlowFormErrors.task_type">
                                {{workFlowFormErrors.task_type}}</div>
                        </div>
                    </div>
                    <div class="form-group row mb-2" *ngIf="workFlowForm.get('task_type')?.value == 'TASK'">
                        <label class="col-2 text-right col-form-label ">Task<em>*</em> : </label>
                        <div class="col-3">
                            <select id="task" class="form-control" formControlName="task"
                                [class.is-invalid]="workFlowFormErrors.task">
                                <option value="" disabled>Select Task</option>
                                <option *ngFor="let task of taskList" [value]="task.uuid">{{task.name}}</option>
                            </select>
                            <div class="invalid-feedback " *ngIf="workFlowFormErrors.task">
                                {{workFlowFormErrors.task}}</div>
                        </div>
                    </div>
                    <div class="form-group row mb-2" *ngIf="workFlowForm.get('task_type')?.value == 'WORKFLOW'">
                        <label class="col-2 text-right col-form-label ">Workflow<em>*</em> : </label>
                        <div class="col-3">
                            <select id="workflow" class="form-control" formControlName="workflow"
                                [class.is-invalid]="workFlowFormErrors.workflow">
                                <option value="" disabled>Select Workflow</option>
                                <option *ngFor="let workflow of workflowList" [value]="workflow.uuid">
                                    {{workflow.workflow_name}}</option>
                            </select>
                            <div class="invalid-feedback " *ngIf="workFlowFormErrors.workflow">
                                {{workFlowFormErrors.workflow}}</div>
                        </div>
                    </div>
                    <div class="form-group row mb-2">
                        <label for="external_id_field" class="col-2 col-form-label text-right">External Id
                            Attribute :
                        </label>
                        <div class="col-4">
                            <input id="external_id_field" class="form-control" type="text"
                                formControlName="external_id_field" placeholder="Enter External Id Attribute">
                        </div>
                    </div>
                    <!-- <div class="form-group row mb-2">
                        <label for="parameter_maps" class="col-2 ml-5 col-form-label text-right">Parameter
                            Mapping<em>*</em> :</label>
                        <div class="col-8">
                            <textarea id="parameter_maps" class="form-control" type="text"
                                formControlName="parameter_maps" placeholder="Enter Parameter Mapping"
                                style="height: 300px; overflow-y: auto;"
                                [ngClass]="{'is-invalid' : workFlowFormErrors.parameter_maps}"></textarea>
                            <div class="invalid-feedback" *ngIf="workFlowFormErrors.parameter_maps">
                                {{workFlowFormErrors.parameter_maps}}
                            </div>
                        </div>
                    </div> -->
                    <div class="form-group row mb-2" *ngIf="workFlowForm.get('workflow')?.value || workFlowForm.get('task')?.value">
                        <label for="parameter_maps" class="col-2 col-form-label text-right">Parameter
                            Mapping<em>*</em> :</label>
                        <div class="col-10">
                            <div class="col mx-0 border rounded p-3 position-relative">
                                <div formArrayName="parameter_maps">
                                    <div *ngFor="let paramMap of parameterMaps.controls; let i = index"
                                        [formGroupName]="i">
                                        <div class="row mb-3">
                                            <div class="col-2">
                                                <label *ngIf="i==0">Input Parameter<em>*</em></label>
                                                <input class="form-control form-control-sm" type="text" formControlName="param_name" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].param_name"
                                                    placeholder="Parameter Name" readonly />
                                            </div>
                                            <div class="col-2">
                                                <label *ngIf="i==0">Request Data Mapping<em>*</em></label>
                                                <input class="form-control form-control-sm" type="text"
                                                    formControlName="request_attribute" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].request_attribute"
                                                    placeholder="Request Attribute" />
                                            </div>
                                            <div class="col-2">
                                                <label *ngIf="i==0">Mapping Type<em>*</em></label>
                                                <select class="form-control form-control-sm" formControlName="mapping_type" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].mapping_type">
                                                    <option value="SIMPLE">Simple</option>
                                                    <option value="CONDITIONAL">Conditional</option>
                                                </select>
                                            </div>

                                            <div class="col-2">
                                                <label *ngIf="i==0">Default Value</label>
                                                <input class="form-control form-control-sm" type="text" formControlName="default_value"
                                                    placeholder="Default Value" />
                                            </div>
                                        </div>

                                        <!-- Conditional Mapping -->
                                        <div *ngIf="paramMap.get('conditions') as conditionsArray">
                                            <div class="d-flex align-items-start">
                                                <div class="conditional-fields w-100">
                                                    <div formArrayName="conditions">
                                                        <div *ngFor="let condition of conditionsArray.controls; let j = index"
                                                            [formGroupName]="j" class="row mb-4">
                                                            <div class="col-2 pr-0 d-flex justify-content-end">
                                                                <div [ngClass]="{'dot-line': true, 'first-dot': j === 0}" class="w-70"></div>
                                                            </div>
                                                            <div class="col-2">
                                                                <label *ngIf="j==0">Conditional Operator<em>*</em></label>
                                                                <select class="form-control form-control-sm"
                                                                    formControlName="condition_operator" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].conditions[j].condition_operator">
                                                                    <option [value]="''" disabled>Select Condition
                                                                        Operator</option>
                                                                    <option *ngFor="let op of conditionalOperator"
                                                                        [value]="op.value">{{op.label}}</option>
                                                                </select>
                                                            </div>
                                                            <div class="col-2">
                                                                <label *ngIf="j==0">Conditional Value<em>*</em></label>
                                                                <input class="form-control form-control-sm" type="text"
                                                                    formControlName="condition_value" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].conditions[j].condition_value"
                                                                    placeholder="Value" />
                                                            </div>
                                                            <div class="col-2">
                                                                <label *ngIf="j==0">Output Type<em>*</em></label>
                                                                <select class="form-control form-control-sm"
                                                                    formControlName="result_type" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].conditions[j].result_type">
                                                                    <option [value]="''" disabled>Select Output
                                                                        Type</option>
                                                                    <option *ngFor="let op of outputType"
                                                                        [value]="op.value">{{op.label}}</option>
                                                                </select>
                                                            </div>
                                                            <div class="col-2">
                                                                <label *ngIf="j==0">Output<em>*</em></label>
                                                                <ng-container
                                                                    *ngIf="condition.get('result_type')?.value === 'TASK'">
                                                                    <select class="form-control form-control-sm"
                                                                        formControlName="result_value" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].conditions[j].result_value">
                                                                        <option [value]="''" disabled>Select Task
                                                                        </option>
                                                                        <option *ngFor="let task of taskAndWorkflowList2D[i][j]"
                                                                            [value]="task.uuid">
                                                                            {{ task.name }}
                                                                        </option>
                                                                    </select>
                                                                </ng-container>
                                                                <ng-container
                                                                    *ngIf="condition.get('result_type')?.value === 'WORKFLOW'">
                                                                    <select class="form-control form-control-sm"
                                                                        formControlName="result_value" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].conditions[j].result_value">
                                                                        <option [value]="''" disabled>Select Workflow
                                                                        </option>
                                                                        <option *ngFor="let workflow of taskAndWorkflowList2D[i][j]"
                                                                            [value]="workflow.uuid">
                                                                            {{ workflow.workflow_name }}
                                                                        </option>
                                                                    </select>
                                                                </ng-container>
                                                                <ng-container
                                                                    [ngSwitch]="condition.get('result_type')?.value">
                                                                    <ng-container *ngSwitchCase="'STRING'">
                                                                        <input class="form-control form-control-sm" type="text"
                                                                            formControlName="result_value" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].conditions[j].result_value"
                                                                            placeholder="Enter value" />
                                                                    </ng-container>
                                                                    <ng-container *ngSwitchCase="'NUMBER'">
                                                                        <input class="form-control form-control-sm" type="number"
                                                                            formControlName="result_value" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].conditions[j].result_value"
                                                                            placeholder="Enter value" />
                                                                    </ng-container>
                                                                    <ng-container *ngSwitchCase="'BOOLEAN'">
                                                                        <input class="form-control form-control-sm" type="string"
                                                                            formControlName="result_value" [class.is-invalid]="workFlowFormErrors.parameter_maps[i].conditions[j].result_value"
                                                                            placeholder="Enter value" />
                                                                    </ng-container>
                                                                </ng-container>
                                                            </div>
                                                            <div class="col-2" [ngClass]="{'mt-1': j === 0}">
                                                                <button *ngIf="j <= conditionsArray.controls.length - 1 && j > 0"
                                                                    class="action-icons flex-shrink-0 fas fa-minus font-sm ml-2" [ngClass]="{'mt-4': j === 0}" 
                                                                    (click)="removeCondition(conditionsArray,i, j)"
                                                                    tooltip="Remove Condition">
                                                                </button>
                                                                <button
                                                                    *ngIf="j === conditionsArray.controls.length - 1"
                                                                    class="action-icons flex-shrink-0 fas fa-plus font-sm ml-2" [ngClass]="{'mt-4': j === 0}" 
                                                                    (click)="addCondition(conditionsArray,i,j)"
                                                                    tooltip="Add Condition">
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- <button (click)="addParameterMap()">Add Parameter Map</button> -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group row mb-2">
                        <label for="webhook_url" class="col-2 col-form-label text-right">Webhook URL :</label>
                        <div class="col-4">
                            <div class="input-group">
                                <input id="webhook_url" class="form-control" type="text" formControlName="webhook_url"
                                    readonly>
                                <div class="input-group-append">
                                    <button class="btn btn-secondary" type="button"
                                        (click)="copyToClipboard('webhook_url', 'URL')">
                                        <i class="fa fa-copy"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="enabled" class="col-2 text-right col-form-label">Status<em>*</em> :</label>
                        <div class="col-4">
                            <div class="d-inline-block">
                                <ul class="d-flex px-0 mb-0">
                                    <li>
                                        <label class="pointer-link"
                                            [class.active]="workFlowForm.get('enabled').value === true">
                                            <input type="radio" [value]="true" (click)="toggleStatus(true)">
                                            <span class="font-sm">Enable</span>
                                        </label>
                                    </li>
                                    <li>
                                        <label class="pointer-link"
                                            [class.active]="workFlowForm.get('enabled').value === false">
                                            <input type="radio" [value]="false" (click)="toggleStatus(false)">
                                            <span class="font-sm">Disable</span>
                                        </label>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </form>
                <div class="d-flex justify-content-center">
                    <button class="btn btn-md btn-success" type="button" (click)="onSubmitWorkflow()">Submit</button>
                    <button class="btn btn-md btn-danger ml-1" type="button" (click)="goBack()">Cancel</button>
                </div>
            </div>
        </div>
    </div>
</div>
