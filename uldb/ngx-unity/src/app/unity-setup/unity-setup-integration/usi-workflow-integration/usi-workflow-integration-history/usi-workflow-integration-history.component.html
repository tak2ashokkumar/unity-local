<div class="row mx-2 mt-3">
    <div class="col-12">
        <div class="card round-edge rounded-2 border-top-0">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2">
                <div class="d-flex align-items-center">
                    <span class="mx-2 text-left align-middle"><span
                            class="badge badge-secondary font-sm">{{count}}</span></span>
                    <div class="font-lg font-500">History</div>
                </div>
                <div class="d-flex justify-content-end align-items-center">
                    <data-refresh-btn [page]="currentCriteria.pageNo"
                        (refresh)="refreshData($event)"></data-refresh-btn>
                    <button class="btn btn-pill btn-warning pull-right btn-sm mr-2 ml-1" type="button" container="body"
                        (click)="goBack()"><i class="fa fa-arrow-left"></i></button>
                </div>
            </div>
            <div class="card-body py-2">
                <div class="d-flex justify-content-between mb-2">
                    <div style="min-width: 250px;"><search-box [searchValue]="currentCriteria.searchValue"
                            (searched)="onSearched($event)"></search-box></div>
                    <div class="d-flex align-items-center ml-2">
                        <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                            (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                    </div>
                </div>
                <table class="table table-sm text-left">
                    <thead>
                        <tr class="bg-light">
                            <th>Request ID</th>
                            <th>External Request ID</th>
                            <th>Requested On</th>
                            <th>Started On</th>
                            <th>Completed On</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let view of viewData">
                            <td>{{view.requestId}}</td>
                            <td>{{view.externalRequestId}}</td>
                            <td>{{view.requestedOn}}</td>
                            <td>{{view.startedOn}}</td>
                            <td>{{view.completedOn}}</td>
                            <td><i [class]="view.statusIcon" [tooltip]="view.tooltipMessage"></i></td>
                            <td class="action-icons-column">
                                <button class="action-icons mb-0 fas fa-eye font-sm ml-1" tooltip="View Payload"
                                    (click)="viewPayload(view)"></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
                    [totalCount]="count"></table-entries>
                <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo"
                    [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                    (pageChange)="pageChange($event)"></table-pager>
                <div *ngIf="!viewData.length" class="d-flex py-5 justify-content-center align-items-center">
                    No Workflow Integration History available.
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #payload>
    <div class="card mb-0">
        <div class="card-header font-lg">
            Payload
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="payloadModelRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-12">
                    <textarea id="description" class="form-control static" rows='8' readonly
                        [(ngModel)]="payloadJson"></textarea>
                </div>
            </div>
        </div>
        <div class="card-footer text-right">
            <div class="btn btn-outline-danger" type="button" (click)="payloadModelRef.hide()">Close</div>
        </div>
    </div>
</ng-template>
