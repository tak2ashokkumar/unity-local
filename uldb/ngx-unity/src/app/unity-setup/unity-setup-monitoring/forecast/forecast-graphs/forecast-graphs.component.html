<div class="row">
    <div class="col-12">
        <div class="card round-edge mt-3 w-100">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-1">
                <div class="font-lg font-500 ml-1">Graph</div>
                <form class="form-inline d-flex flex-wrap justify-content-end align-items-center w-100"
                    [formGroup]="filterForm" *ngIf="filterForm">
                    <div class="form-group col-2">
                        <multiselect-dropdown [options]="graphList" [settings]="mySettings"
                            class="form-control p-0 w-100" style="height:auto;" formControlName="graph_list"
                            [ngClass]="{'is-invalid' : formErrors.graph_list}"></multiselect-dropdown>
                        <div class="invalid-feedback" *ngIf="formErrors.graph_list">{{formErrors.graph_list}}</div>
                    </div>
                    <div class="form-group mr-2">
                        <select class="form-control" formControlName="period" [class.is-invalid]="formErrors.period">
                            <option [value]="graphRange.LAST_24_HOURS">Last 24 Hours</option>
                            <option [value]="graphRange.YESTERDAY">Yesterday</option>
                            <option [value]="graphRange.LAST_WEEK">Last Week</option>
                            <option [value]="graphRange.LAST_MONTH">Last Month</option>
                            <option [value]="graphRange.LAST_YEAR">Last Year</option>
                            <option [value]="graphRange.CUSTOM">Custom</option>
                        </select>
                        <div class="invalid-feedback" *ngIf="formErrors.period">{{formErrors.period}}</div>
                    </div>
                    <div class="form-group mx-2">
                        <div class="input-group">
                            <label for="from" class="mr-1">From:</label>
                            <owl-date-time #from [hour12Timer]="true"></owl-date-time>
                            <input class="form-control" formControlName="from" [owlDateTimeTrigger]="from"
                                [owlDateTime]="from" type="text" placeholder="from" [max]="now">
                            <div class="input-group-append" [owlDateTimeTrigger]="from">
                                <span class="input-group-text bg-white">
                                    <i class="fas fa-calendar-alt"></i>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group mx-2">
                        <div class="input-group">
                            <label for="to" class="mr-1">To:</label>
                            <owl-date-time #to [hour12Timer]="true"></owl-date-time>
                            <input class="form-control" formControlName="to" [owlDateTimeTrigger]="to"
                                [owlDateTime]="to" type="text" placeholder="to" [min]="filterForm.controls.from.value"
                                [max]="now">
                            <div class="input-group-append" [owlDateTimeTrigger]="to">
                                <span class="input-group-text bg-white">
                                    <i class="fas fa-calendar-alt"></i>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group ml-2">
                        <button class="btn btn-warning btn-pill" [disabled]="filterForm.invalid"
                            (click)="onSubmit()">Update</button>
                    </div>
                    <button class="btn btn-pill btn-warning btn-sm ml-2" (click)="goBack()" tooltip="Back">
                        <i class="fa fa-arrow-left"></i>
                    </button>
                </form>
            </div>

            <div class="card-body">
                <div class="col-12">
                    <div class="card border-0 rounded-0 graph-card" *ngFor="let view of viewData">
                        <app-spinner [name]="view.graphid"></app-spinner>
                        <div class="card-body">
                            <h5 class="card-title text-warning">{{view.name}}</h5>
                            <div class="row">
                                <img class="img-fluid pointer-link" *ngIf="view.image"
                                    [src]="'data:image/png;base64,'+view.image">
                            </div>
                        </div>
                    </div>
                    <div class="card border-0 rounded-0 graph-card" *ngIf="!viewData.length">
                        <div class="card-body">
                            <coming-soon [message]="'No graphs were found'"></coming-soon>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
