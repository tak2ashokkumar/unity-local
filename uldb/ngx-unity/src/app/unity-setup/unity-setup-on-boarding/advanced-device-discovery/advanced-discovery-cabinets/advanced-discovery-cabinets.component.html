<div class="card text-center border-0 mb-0">
  <div class="card-header bg-transparent d-flex justify-content-between align-items-center px-0 py-2">
    <div class="d-flex justify-content-center align-items-center font-500">
      <span class="badge badge-secondary font-sm">{{count}}</span>
      <span class="ml-1 font-lg">Cabinets</span>
    </div>
    <div class="d-flex justify-content-end align-items-center">
      <button class="btn btn-pill btn-sm btn-warning mx-2 px-3 font-500" type="button" (click)="add()" accessControl
        moduleName="Datacenter" accessType="Manage Datacenter" elementType="btn">
        <span class="font-sm">Add cabinet</span>
      </button>
      <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
    </div>
  </div>
  <div class="card-body px-0 pt-0">
    <table class="table table-sm text-left">
      <thead class="bg-light">
        <tr>
          <th>Name</th>
          <th>Datacenter</th>
          <th>Model</th>
          <th>Available Units</th>
          <th>Capacity</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let view of viewData; let i = index" setTableColumnWidth>
          <td>
            <div [tooltip]="view.name">{{view.name}}</div>
          </td>
          <td>
            <div [tooltip]="view.datacenter">{{view.datacenter}}</div>
          </td>
          <td>
            <div [tooltip]="view.model">{{view.model}}</div>
          </td>
          <td>
            <div [tooltip]="view.available_size">{{view.available_size}}</div>
          </td>
          <td>
            <div [tooltip]="view.capacity">{{view.capacity}}</div>
          </td>
          <td class="action-icons-column">
            <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" tooltip="Edit Cabinet" (click)="edit(i)"
              accessControl moduleName="Datacenter" accessType="Manage Datacenter" elementType="actionbtn">
            </button>
            <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" tooltip="Delete Cabinet"
              (click)="delete(view)" accessControl moduleName="Datacenter" accessType="Manage Datacenter"
              elementType="actionbtn">
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="row">
      <div class="col-12">
        <div class="text-center text-muted py-4" *ngIf="!viewData.length">No Cabinets were found.</div>
        <br>
      </div>
      <div class="col">
        <advanced-discovery-next-prev></advanced-discovery-next-prev>
      </div>
    </div>
  </div>
</div>
<cabinet-crud (onCrud)="onCrud($event)"></cabinet-crud>
