<ng-container>
  <div class="card text-center border-0 mb-0 data-card">
    <div class="card-header bg-white border-0 p-0 text-right">
      <div class="btn-group pull-right" role="group">
        <button class="btn btn-outline-primary" [class.active]="viewType == viewTypes.SUMMARY" type="button"
          (click)="changeView(viewTypes.SUMMARY)">
          Summary
        </button>
        <button class="btn btn-outline-primary" [class.active]="viewType == viewTypes.NETWORK" type="button"
          (click)="changeView(viewTypes.NETWORK)" accessControl moduleName="Network Topology"
          accessType="View Network Topology" elementType="btn">
          Network Topology
        </button>
      </div>
    </div>
    <div class="card-body px-0 pt-1" [ngSwitch]="viewType">
      <ng-container *ngSwitchCase="viewTypes.SUMMARY">
        <advanced-discovery-summary-view></advanced-discovery-summary-view>
      </ng-container>

      <ng-container *ngSwitchCase="viewTypes.NETWORK">
        <!-- <advanced-discovery-summary-network-view></advanced-discovery-summary-network-view> -->
         <advanced-discovery-network-topology></advanced-discovery-network-topology>
      </ng-container>

      <div class="row">
        <div class="col">
          <advanced-discovery-next-prev></advanced-discovery-next-prev>
        </div>
      </div>
    </div>
  </div>

</ng-container>
