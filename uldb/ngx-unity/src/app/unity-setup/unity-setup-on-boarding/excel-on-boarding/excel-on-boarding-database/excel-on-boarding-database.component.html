<div class="card text-center border-0 mb-0">
    <div class="card-header bg-transparent d-flex justify-content-between align-items-center px-0 py-2">
        <div class="d-flex justify-content-center align-items-center font-500">
            <span class="badge badge-secondary font-sm">{{viewData.length}}</span>
            <span class="ml-1 font-lg">Databases</span>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive" tableStickyScroll>
            <table class="table table-sm text-left">
                <thead class="bg-light">
                    <tr>
                        <th>Name<em>*</em></th>
                        <th>Management IP</th>
                        <th>Type<em>*</em></th>
                        <th>Port<em>*</em></th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let view of viewData; let i = index">
                        <ng-container [formGroup]="view.form" *ngIf="view.form">
                            <td>
                                <div>
                                    <i class="fas fa-check" [ngClass]="view.onboardedClass"></i>
                                    <input id="{{i}}-name" class="form-control" type="text" formControlName="name"
                                        [class.is-invalid]="view.formErrors.name"
                                        style="max-width: calc(100% - 24px);float: right;" accessControl
                                        moduleName="Onboarding" accessType="Manage Onboarding" elementType="formelem">
                                    <div class="invalid-feedback" style="margin-left: 24px;"
                                        *ngIf="view.formErrors.name">{{view.formErrors.name}}
                                    </div>
                                    <div class="invalid-credentials" style="margin-left: 24px;"
                                        *ngIf="view.nonFieldErr">{{view.nonFieldErr}}</div>
                                </div>
                            </td>
                            <td>
                                <div>
                                    <input id="{{i}}-management_ip" class="form-control" type="text"
                                        formControlName="management_ip"
                                        [class.is-invalid]="view.formErrors.management_ip" accessControl
                                        moduleName="Onboarding" accessType="Manage Onboarding" elementType="formelem">
                                    <div class="invalid-feedback" *ngIf="view.formErrors.management_ip">
                                        {{view.formErrors.management_ip}}
                                    </div>
                                </div>
                            </td>
                            <td>
                                <div>
                                    <select id="{{i}}-db_typeid" class="form-control" formControlName="db_type"
                                        [class.is-invalid]="view.formErrors.db_type" accessControl
                                        moduleName="Onboarding" accessType="Manage Onboarding" elementType="formelem">
                                        <option value="" disabled>Database Type</option>
                                        <option *ngFor="let type of dbTypes" [ngValue]="type">
                                            {{type.name}}</option>
                                    </select>
                                    <div class="invalid-feedback" *ngIf="view.formErrors.db_type">
                                        {{view.formErrors.db_type}}</div>
                                </div>
                            </td>
                            <td>
                                <div>
                                    <input id="{{i}}-port" class="form-control" type="text" formControlName="port"
                                        [class.is-invalid]="view.formErrors.port" accessControl moduleName="Onboarding"
                                        accessType="Manage Onboarding" elementType="formelem">
                                    <div class="invalid-feedback" *ngIf="view.formErrors.port">
                                        {{view.formErrors.port}}
                                    </div>
                                </div>
                            </td>
                        </ng-container>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="row">
            <div class="col-12">
                <div class="text-center text-muted py-4" *ngIf="!viewData.length">No associated Databases available.
                </div>
                <br>
            </div>
            <div class="col">
                <excel-on-boarding-next-prev></excel-on-boarding-next-prev>
                <button class="btn btn-sm btn-success pull-right" type="button" (click)="submit()">Submit</button>
            </div>
        </div>
    </div>
</div>
