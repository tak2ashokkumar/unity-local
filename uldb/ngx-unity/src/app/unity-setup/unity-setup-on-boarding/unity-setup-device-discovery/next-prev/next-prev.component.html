<button class="btn btn-sm btn-primary pull-right ml-1" *ngIf="!isNextDisabled()" type="button"
    (click)="goNext()">Next</button>
<button class="btn btn-sm btn-primary pull-right ml-1" *ngIf="!isPrevDisabled() && !isNextDisabled()" type="button"
    (click)="goPrev()">Prev</button>
<button class="btn btn-sm btn-primary pull-right ml-1" *ngIf="isNextDisabled()" type="button" (click)="gotToDashboard()"
    accessControl moduleName="Dashboard" accessType="View Dashboard" elementType="btn">Go
    to Dashboard</button>
