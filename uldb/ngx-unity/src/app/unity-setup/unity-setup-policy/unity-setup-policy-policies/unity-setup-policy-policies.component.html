<div class="row mt--3 ">
    <div class="col-12 px-0">
        <div class="card">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center p-2">
                <div class="d-flex align-items-center">
                    <span class="mx-2 text-left align-middle"><span
                            class="badge badge-secondary font-sm">{{count}}</span></span>
                    <div class="font-lg font-500">Policies</div>
                </div>
                <div class="d-flex justify-content-end align-items-center">
                    <button class="btn btn-pill btn-warning btn-sm text-right ml-2" (click)="createBudget()"
                        accessControl [moduleName]="'Policy'" [accessType]="'Manage Policy'" [elementType]="'btn'">
                        Create
                        Policy
                    </button>
                    <data-refresh-btn [page]="currentCriteria.pageNo"
                        (refresh)="refreshData($event)"></data-refresh-btn>
                </div>
            </div>
            <div class="card-body py-2">
                <div class="row mx-0 d-flex justify-content-between align-items-center pb-2">
                    <div class="d-flex justify-content-start w-20">
                        <div class="w-100">
                            <search-box [searchValue]="currentCriteria.searchValue" [customClass]="'form-control-sm'"
                                (searched)="onSearched($event)"></search-box>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end w-80">
                        <div class="w-15 mx-2">
                            <select class="form-control form-control-sm"
                                [(ngModel)]="currentCriteria.params[0].is_enabled" (ngModelChange)="onFilterChange()">
                                <option [value]="''">Select status</option>
                                <option [value]="'true'">Enabled</option>
                                <option [value]="'false'">Disabled</option>
                            </select>
                        </div>
                        <div>
                            <table-page-size *ngIf="policyViewData.length" [currentPageSize]="currentCriteria.pageSize"
                                [totalCount]="count" (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                        </div>
                    </div>
                </div>
                <table class="table table-sm text-left">
                    <thead class="bg-light">
                        <tr>
                            <th>Name</th>
                            <th>Policy Type</th>
                            <th>Scope</th>
                            <th class="text-center">Scope Identifier</th>
                            <th class="text-center">Notification</th>
                            <th class="text-center">Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let view of policyViewData; let i = index" truncateText>
                            <td class="text-primary">{{view.name}}</td>
                            <td>{{view.policyType}}</td>
                            <td>{{view.scope}}</td>
                            <td class="text-center">{{view.scopeIdentifier}}</td>
                            <td class="text-center">{{view.notificationEnabled}}</td>
                            <td class="tdw-15">
                                <div class="d-inline-block" style="vertical-align: middle !important">
                                    <ul class="d-flex justify-content-center px-0 mb-0">
                                        <li>
                                            <label class="pointer-link" [class.active]="view.isEnabled">
                                                <input type="radio" [value]="true" (click)="toggleStatus(i,true)">
                                                <span class="font-sm">Enable</span>
                                            </label>
                                        </li>
                                        <li>
                                            <label class="pointer-link" [class.active]="!view.isEnabled">
                                                <input type="radio" [value]="false" (click)="toggleStatus(i,false)">
                                                <span class="font-sm">Disable</span>
                                            </label>
                                        </li>
                                    </ul>
                                </div>
                            </td>
                            <td class="action-icons-column">
                                <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" tooltip="Edit"
                                    (click)="editPolicy(view)"></button>
                                <button class="action-icons mb-0 far fa-trash-alt font-sm ml-1" tooltip="Delete"
                                    (click)="deletePolicy(view.uuid)"></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <table-entries *ngIf="policyViewData.length" [pageNo]="currentCriteria.pageNo"
                    [pageSize]="currentCriteria.pageSize" [totalCount]="count">
                </table-entries>
                <table-pager *ngIf="policyViewData.length" [pageNo]="currentCriteria.pageNo"
                    [pageSize]="currentCriteria.pageSize" [totalCount]="count"
                    (pageChange)="pageChange($event)"></table-pager>
                <div *ngIf="!policyViewData.length" class="text-center text-muted py-4">
                    No Policies available.
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #confirmdelete>
    <div class="card mb-0">
        <div class="card-header">
            Confirm Delete
            <div class="card-header-actions">
                <a class="card-header-action btn-close" (click)="policyDeleteModalRef.hide()">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </div>
        <div class="card-body">
            Are you sure you want to delete the policy?
        </div>
        <div class="card-footer">
            <button class="btn btn-sm btn-success pull-right ml-1" type="button"
                (click)="confirmBudgetDelete()">Yes</button>
            <button class="btn btn-sm btn-danger pull-right" (click)="policyDeleteModalRef.hide()"
                type="button">No</button>
        </div>
    </div>
</ng-template>
