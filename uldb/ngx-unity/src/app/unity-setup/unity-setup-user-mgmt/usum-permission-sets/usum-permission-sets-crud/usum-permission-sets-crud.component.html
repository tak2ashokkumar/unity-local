<div class="row">
    <div class="col">
        <div class="card">
            <div class="card-header bg-transparent justify-content-between align-items-center p-2">
                <span class="ml-2 font-weight-bold font-lg">{{action}} Permission Set</span>
                <button class="btn btn-pill btn-warning pull-right btn-sm" type="button" container="body"
                    (click)="goBack()"><i class="fa fa-arrow-left"></i>
                </button>
            </div>
            <div class="card-body px-2">
                <form class="form-horizontal" *ngIf="form" [formGroup]="form">
                    <div class="form-group text-center" *ngIf="nonFieldErr">
                        <div class="invalid-credentials" *ngIf="nonFieldErr">{{nonFieldErr}}</div>
                    </div>
                    <div class="form-group row mx-0">
                        <div class="col-1 text-right px-0">
                            <span class="text-muted">Name</span><em>*</em>
                            <span class="text-muted pl-1">:</span>
                        </div>
                        <div class="col-4">
                            <input id="name" class="form-control form-control-sm" type="text" formControlName="name"
                                autocomplete="off" placeholder="Enter Name" [class.is-invalid]="formErrors.name">
                            <div class="invalid-feedback" *ngIf="formErrors.name">{{formErrors.name}}
                            </div>
                        </div>
                    </div>
                    <div class="form-group row mx-0">
                        <div class="col-1 text-right px-0">
                            <span class="text-muted">Description</span><em>*</em>
                            <span class="text-muted pl-1">:</span>
                        </div>
                        <div class="col-8">
                            <textarea id="description" rows="2" class="form-control form-control-sm no-resize"
                                formControlName="description" placeholder="Enter Description"
                                [class.is-invalid]="formErrors.description"></textarea>
                            <div class="invalid-feedback" *ngIf="formErrors.description">
                                {{formErrors.description}}
                            </div>
                        </div>
                    </div>
                    <div class="form-group row mx-0">
                        <div class="col-1 text-right px-0">
                            <span class="text-muted">Permission Set</span><em>*</em>
                            <span class="text-muted pl-1">:</span>
                        </div>
                        <div class="col-11 pr-0">
                            <div class="border permission-sets-border-radius">
                                <div *ngFor="let mps of modulePermissionSets; let i=index; let f=first; let l=last">
                                    <div class="row mx-0 d-flex align-items-center" [ngClass]="{'border-bottom': !last}">
                                        <div class="col-2 text-right py-3 px-0">
                                            <span class="text-muted">{{mps.moduleName}}</span>
                                            <span class="text-muted pl-2">:</span>
                                        </div>
                                        <div class="col py-3">
                                            <div class="row mx-0">
                                                <div class="col-4 pointer-link" [class.pt-2]="j > 2"
                                                    *ngFor="let ps of mps.permissionSets; let j=index;">
                                                    <input class="ut-checkbox" type="checkbox" id="{{i}}-{{j}}-permission"
                                                        [value]="ps.isSelected" [checked]="ps.isSelected"
                                                        (change)="selectPermission(mps, ps)">
                                                    <label for="{{i}}-{{j}}-permission"
                                                        class="primary permission-name-text-shadow mb-0">
                                                        {{ps.permission}}
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group row mx-0">
                        <div class="col-1 text-right px-0">
                            <span class="text-muted">Entity Group</span>
                            <span class="text-muted pl-1">:</span>
                        </div>
                        <div class="col-3">
                            <multiselect-dropdown [options]="entityGroupTypes" *ngIf="entityGroupTypes.length"
                                [settings]="entityGroupTypeSettings" class="form-control form-control-sm p-0" style="height:auto;" formControlName="entity_groups" [ngClass]="{'is-invalid' : formErrors.entity_groups}">
                            </multiselect-dropdown>
                            <div class="invalid-feedback" *ngIf="formErrors.entity_groups">{{formErrors.entity_groups}}
                            </div>
                        </div>
                    </div>                    
                </form>
                
                <div class="d-flex justify-content-center mt-3">
                    <button class="btn btn-md btn-outline-danger" (click)="goBack()">Cancel</button>
                    <button class="btn btn-success ml-2" (click)="onSubmit()" *ngIf="!permissionSetId">Create</button>
                    <button class="btn btn-success ml-2" (click)="onSubmit()" *ngIf="permissionSetId">Update</button>
                </div>
            </div>
        </div>
    </div>
</div>
