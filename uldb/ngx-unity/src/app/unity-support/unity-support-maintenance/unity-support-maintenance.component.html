<div class="container-fluid mt-3">
  <div class="animated fadeIn">
    <div class="row">
      <div class="col-12">
        <div class="card round-edge">
          <div class="card-header card-header bg-transparent d-flex justify-content-between align-items-center py-2">
            <div class="d-flex justify-content-center align-items-center">
              <span class="badge badge-secondary font-lg font-500">{{count}}</span>
              <span class="ml-1 font-lg">Maintenance Schedules</span>
            </div>
            <div class="d-flex justify-content-end align-items-center">
              <button class="btn btn-warning mr-2" (click)="addMaintenance()" accessControl moduleName="Maintenance"
                accessType="Manage Maintenance" elementType="btn">
                <i class="fas fa-plus"></i> &nbsp;Maintenance</button>
              <data-refresh-btn [page]="currentCriteria.pageNo" (refresh)="refreshData($event)"></data-refresh-btn>
            </div>
          </div>
          <div class="card-body pt-0">
            <div class="row mt-3 mb-2">
              <div class="col-2">
                <search-box (searched)="onSearched($event)"></search-box>
              </div>
              <div class="col-10">
                <div class="row justify-content-end">
                  <div class="col-3">
                    <div class="input-group-append " [owlDateTimeTrigger]="from">
                    </div>
                    <owl-date-time #from [hour12Timer]="true" [pickerType]="'calendar'"></owl-date-time>
                    <input class="form-control rounded-left text-center" [owlDateTimeTrigger]="from"
                      [owlDateTime]="from" type="text" name="from" placeholder="from" [(ngModel)]="logDateRange"
                      [selectMode]="'range'" (dateTimeInput)="setDates()">
                  </div>
                  <div class="col-2">
                    <select class="form-control" type="text" [(ngModel)]="currentCriteria.params[0].status"
                      (ngModelChange)="onFilterChange()">
                      <option [value]="''">Select status</option>
                      <option [value]="'enable'">Enabled</option>
                      <option [value]="'disable'">Disabled</option>
                    </select>
                  </div>
                  <div class="mx-2">
                    <table-page-size [currentPageSize]="currentCriteria.pageSize" [totalCount]="count"
                      (pageSizeChange)="pageSizeChange($event)"></table-page-size>
                  </div>
                </div>
              </div>
            </div>
            <table class="table text-left" sortableTable (sorted)="onSorted($event)">
              <thead class="bg-light">
                <tr>
                  <th>Name</th>
                  <th>Schedule Start</th>
                  <th>Schedule End</th>
                  <th>Description</th>
                  <th class="col-2">Created By</th>
                  <th>Status</th>
                  <th class="text-center">Action</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let view of viewData; let i = index" truncateText>
                  <td class="text-primary tdw-15">
                    <div [tooltip]="view.name">{{view.name}}</div>
                  </td>
                  <td class="tdw-15">
                    <div [tooltip]="view.scheduleStart">{{view.scheduleStart}}</div>
                  </td>
                  <td class="tdw-15">
                    <div [tooltip]="view.scheduleEnd">{{view.scheduleEnd}}</div>
                  </td>
                  <td class="tdw-15">
                    <div [tooltip]="view.description">{{view.description}}</div>
                  </td>
                  <td class="tdw-10">
                    <div [tooltip]="view.createdByName">{{view.createdByName}}</div>
                  </td>
                  <td>
                    <div class="d-inline-block" accessControl moduleName="Maintenance" accessType="Manage Maintenance"
                      elementType="div">
                      <ul class="d-flex px-0 mb-0">
                        <li>
                          <label class="pointer-link" [class.active]="view.maintenanceStatus">
                            <input type="radio" [value]="true" (change)="toggleSettings(view,true)">
                            <span class="font-sm">Enable</span>
                          </label>
                        </li>
                        <li>
                          <label class="pointer-link" [class.active]="!view.maintenanceStatus">
                            <input type="radio" [value]="false" (change)="toggleSettings(view,false)">
                            <span class="font-sm">Disable</span>
                          </label>
                        </li>
                      </ul>
                    </div>
                  </td>

                  <td class="action-icons-column text-center">
                    <button class="action-icons mb-0 fas fa-pencil-alt font-sm ml-1" tooltip="Edit" (click)="edit(view)"
                      accessControl moduleName="Maintenance" accessType="Manage Maintenance"
                      elementType="actionbtn"></button>
                    <button class="action-icons mb-0 fas fa-trash-alt font-sm ml-1" tooltip="Delete"
                      (click)="delete(view)" accessControl moduleName="Maintenance" accessType="Manage Maintenance"
                      elementType="actionbtn"></button>
                  </td>
                </tr>
              </tbody>
            </table>
            <table-entries [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize" [totalCount]="count">
            </table-entries>
            <table-pager *ngIf="viewData.length" [pageNo]="currentCriteria.pageNo" [pageSize]="currentCriteria.pageSize"
              [totalCount]="count" (pageChange)="pageChange($event)"></table-pager>
            <div *ngIf="!viewData.length" class="d-flex py-4 justify-content-center align-items-center">
              No Schedules available.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #confirm>
  <div class="card round-edge mb-0">
    <div class="card-body text-center pb-2">
      <div>Are you sure you want to Delete ?</div>
    </div>
    <div class="card-footer bg-white d-flex justify-content-center border-top-0">
      <button class="btn btn-sm btn-pill btn-warning mr-2" type="button" (click)="confirmDelete()">Delete</button>
      <button class="btn btn-sm btn-pill btn-outline-warning" type="button" (click)="modalRef.hide()">Cancel</button>
    </div>
  </div>
</ng-template>

<ng-template #popTemplate>
  <div *ngFor="let name of popOverList">{{name}}</div>
</ng-template>
