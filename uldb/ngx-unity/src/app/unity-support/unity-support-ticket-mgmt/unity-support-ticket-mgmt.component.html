<ng-conatiner *ngIf="!tabItems.length">
    <div class="container-fluid">
        <div class="animated fadeIn">
            <div class="row">
                <div class="col-12" *ngIf="!tabItems.length">
                    <div class="text-center pt-5">No Ticket Management accounts were found.</div>
                </div>
            </div>
        </div>
    </div>
</ng-conatiner>

<ng-container *ngIf="tabItems.length">
    <app-main-tab [tabItems]="tabItems"></app-main-tab>
    <div class="container-fluid">
        <div class="animated fadeIn">
            <div class="row">
                <div class="col-12">
                    <scrollable-tab [selector]="'active'">
                        <div class="nav-item border-right border-light" #scrollLeft>
                            <a class="nav-link bg-secondary rounded-top border-bottom-0"><i
                                    class="fa fa-angle-left"></i></a>
                        </div>
                        <ul class="nav nav-tabs nav-tabs custom-nav-container border-bottom-0" #tabContent
                            role="tablist">
                            <li class="nav-item bg-secondary rounded-top" *ngFor="let tab of tabData">
                                <a class="nav-link" [ngClass]="isActive(tab)" (click)="goTo(tab)">{{tab.name}}</a>
                            </li>
                        </ul>
                        <div class="nav-item border-left border-light" #scrollRight>
                            <a class="nav-link bg-secondary rounded-top border-bottom-0"><i
                                    class="fa fa-angle-right"></i></a>
                        </div>
                    </scrollable-tab>
                    <ng-container *ngIf="tabData">
                        <ng-container *ngIf="tabData.length">
                            <div class="tab-content">
                                <div class="tab-pane active pt-2">
                                    <router-outlet></router-outlet>
                                </div>
                            </div>
                        </ng-container>
                    </ng-container>
                    <ng-container *ngIf="tabData">
                        <ng-container *ngIf="!tabData.length">
                            <router-outlet></router-outlet>
                        </ng-container>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>
</ng-container>
