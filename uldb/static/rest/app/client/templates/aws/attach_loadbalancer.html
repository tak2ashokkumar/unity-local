
<form class="form-horizontal ng-pristine ng-scope ng-invalid ng-invalid-required ng-valid-maxlength">
    <div class="form-group ng-scope">
        <label class="col-sm-3 control-label ng-binding" for="blockName">Loadbalancer *</label>
        <div class="col-sm-9 ng-scope">
            <select ng-if="rows6.loadbalancer_list == ''" ng-options="row.load_balancer as row.load_balancer for row in rows6.loadbalancer_list" class="form-control" ng-model="obj.loadbalancer" disabled>
                <option selected="selected" value="">-- no loadbalancer present --</option>
            </select>
            <select ng-if="rows6.loadbalancer_list != ''" ng-options="row.load_balancer as row.load_balancer for row in rows6.loadbalancer_list" class="form-control" ng-model="obj.loadbalancer">
                <option selected="selected" value="">-- choose an loadbalancer --</option>
            </select>
        </div>
        <div class="col-sm-9" style="float: right;">
            <label class="errormsg" ng-if="obj['grouperr']">{{ obj['groupMsg'] }}</label>
        </div>
    </div>
    <p>Are you sure you want to attach {{obj.instance_id}} ?</p>
</form>
