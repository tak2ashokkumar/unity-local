
<div class="modal-header">
    <h3 class="modal-title">AWS Instance Details</h3>
</div>
<div class="modal-body" id="modal-body">
    <div class="row">
        <div class="col-xs-12">
            <div class="panel">
                <div class="panel-body">
                    <table class="table">
                        <thead>
                        <tr ng-repeat="col in aws_instance_details_headers">
                            <td class="col-md-4">
                                <div>{{ col.title }}</div>
                            </td>
                            <td class="col-md-8">
                                <div ng-if="col.title != 'Tags'"><strong>{{ aws_instance_details_list_content[col.key] }}</strong></div>
                                <div ng-if="col.title == 'Tags'"><table class="table table-bordered"><tr><th>Key</th><th>Value</th></tr><strong><tr ng-repeat="val in aws_instance_details_list_content[col.key]"><td>{{val.Key}}</td><td>{{val.Value}}</td></tr></strong></table></div>
                            </td>
                        </tr>
                        </thead>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-cancel" ng-click="cancel()">Close</button>
</div>
