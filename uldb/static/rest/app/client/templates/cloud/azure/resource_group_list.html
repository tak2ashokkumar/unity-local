<loading loader="{{loader}}"></loading>
<div class="row dashboard-admin">
    <div class="col-md-12">
        <div class="col-md-12">

            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                <div class="row db-info shadow-btm"> </div>
            </div>


            <div class="row" ng-show="azure_resource_group.data">
                <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 content-wrapper" >
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 content-wrapper padding_right5px">
                        <div class="col-xs-7 col-sm-7 col-md-7 col-lg-7">
                            <h1>Resource Groups</h1>
                        </div>
                        <div class="col-xs-2 col-sm-2 col-md-2 col-lg-2">
                            <div class="action-bar" ng-show="azure_resource_group_modeldata != undefined">
                                <button class="btn btn-default" type="button" ng-click="add_rsgroup__model()"> 
                                    <span> + Add Resource Group</span>
                                </button>
                            </div>
                        </div>
                        <div class="col-xs-3 col-sm-3 col-md-3 col-lg-3 search-widget pull-right">
                            <form class="navbar-form">
                                <div class="form-group">
                                    <input class="form-control" type="text" ng-model="searchKeyword"
                                    placeholder="Enter keyword" ng-model-options="{debounce: {'default': 100, 'blur': 0 }}"
                                    ng-disabled="(azure_resource_group.data.length === 0)">
                                    <button class="btn btn-search top5px" type="submit">
                                        <i class="fa fa-search"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <section id="no-more-tables" class="margintop20 middle-wrapper">
                        <table id="example" class="example table table-condensed cf">
                            <thead class="cf">
                                <tr>
                                    <th ng-repeat="row in azure_resource_group_headers"> {{ row.title }} </th>
                                    <th ng-if="azure_resource_group.actions != undefined">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr ng-repeat="row in azure_resource_group.data | filter: searchKeyword" ng-show="azure_resource_group.data.length > 0">
                                    <td ng-repeat="row_data in azure_resource_group_headers">
                                        <span ng-if="row_data.key != 'region'">
                                            <span ng-if="row_data.key != 'tags' ">
                                              {{row[row_data.key] || 'NA'}}
                                            </span>
                                            <span ng-if="row_data.key == 'tags'">
                                                {{ row[row_data.key].display || 'NA'}}
                                            </span>
                                        </span>
                                    </td>
                                    <td ng-if="azure_resource_group.actions != undefined">
                                        <div class="action-icons">
                                            <a ng-click="view_resources(row)" class="fa fa-users" tooltip-class="customClass" uib-tooltip="View Resources" ></a>
                                            <a class="fa fa-plus-square" tooltip-class="customClass" uib-tooltip="Create Virtual Machine" ng-click="create_vm_model(row)" ></a>
                                            <a class="fa fa-list" tooltip-class="customClass" uib-tooltip="View Virtual Machines" ng-click="view_vms(row)" ></a>
                                            <a class="fa fa-plus-circle" tooltip-class="customClass" uib-tooltip="Create Nic" ng-click="create_nic_model(row)"></a>
                                            <a class="fa fa-trash-o" tooltip-class="customClass" uib-tooltip="Delete" 
                                            ng-click="delete_rsgroup_model(row)"></a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div ng-show="((azure_resource_group.data.length) === 0 || ((azure_resource_group.data | filter: searchKeyword).length === 0))" class="content-wrapper">
                            <no-records-found message="No Resource Group available in your account"></no-records-found>
                        </div>
                    </section>
                </div>
            </div>
            <modal visible="showModal">
                <ng-include src="azure_resource_group_modeldata.page"></ng-include>
            </modal>
            <modal1 visible="showModal1">
                <ng-include src="azure_create_virtual_machine.page"></ng-include>
            </modal1>
            <modal2 visible="showModal2" >
                <ng-include src="azure_create_nic_modeldata.page"></ng-include>
            </modal2>
            <deletemodal visible="showDeleteConfirm"></deletemodal>

            <viewazureresourcelist ng-show ="resource_list"></viewazureresourcelist>

            <viewazurevmlist ng-show ="vm_list"></viewazurevmlist>
        </div>  
    </div>
</div>
