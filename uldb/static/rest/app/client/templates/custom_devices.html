<style type="text/css">
  .uptime_status i{
    font-size: 15px;
  }
</style>
<loading loader="{{loader}}"></loading>
<div class="page_wrapper" style="float:left">
  <div>
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 content-wrapper bg-color">
      <div class="col-xs-8 col-sm-8 col-md-8 col-lg-8 search-widget">
        <form class="navbar-form">
          <div class="form-group">
            <input class="form-control" type="text" placeholder="Enter keyword" ng-model-options="{debounce: 1000}" ng-model="searchkey" id="searchKeyword" ng-change="getSearchResults(searchkey)">
            <button class="btn btn-search" type="submit" style="top: 4px;">
              <i class="fa fa-search"></i>
            </button>
          </div>
        </form>
      </div>
      <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4 padding_top15px">
          <div class="action-bar pull-right">
              <span class="count">{{ (custom_devices_result | filter: searchKeyword).length }}</span>
              <span class="count-text"> Other Devices</span>
          </div>
      </div>
    </div>

    <div ng-if="custom_devices_result.length > 0">
      <div infinite-scroll='loadPageData()'>
        <table class="Summary-box table table-condensed">
          <thead>
              <tr>
                  <th custom-sort order="name" sort="sort" ng-mouseover="order = 'name'"> Name </th>
                  <th> Device Status</th>                  
                  <th> Friendly Name </th>
                  <th> Description</th>
                  <th> Type </th>
                  <th> Actions</th>
              </tr>
          </thead>
          <tbody>
            <tr ng-repeat="device in custom_devices_result | filter: searchKeyword">
              <td>
                <a tabindex="0"  popover-trigger="'focus'" uib-popover-template="customdevicedetailspopoverobj.templateUrl"
                popover-class="pdu_popover" href="javascript:void(0)" popover-placement="top-left"
                ng-click="show_uptime_details(device)">
                {{device.name}}
                </a>
              </td>
              <td class="uptime_status">
                <span ng-if="!angular.isDefined(device.details.status)">
                    <i class="fa fa-spinner fa-spin"></i>
                </span>

                <span ng-if="device.details.status === 'up'">
                  <device-up></device-up>
                </span>
                <span ng-if="device.details.status === 'down'">
                  <device-down></device-down>
                </span>
                <span ng-if="device.details.status === 'paused'">
                  <i class="fa fa-pause-circle-o yellow"></i> Paused
                </span>
                <span ng-if="device.details.status === 'not checked yet'">
                  <i class="fa fa-exclamation-circle-o yellow"></i> Not checked yet
                </span>
                <span ng-if="device.details.status === 'seems down'">
                  <i class="fa fa-exclamation-circle-o yellow"></i> Seems down
                </span>
              </td>
              <td>
                <span ng-if="!angular.isDefined(device.details.status)">
                    <i class="fa fa-spinner fa-spin"></i>
                </span>
                <span>
                  {{device.details.friendly_name}}</td>
                </span>
              <td>{{device.description}}</td>
              <td>{{device.type}}</td>
              <td>
                <div class="action-icons">
                  <span>
                    <a class="fa fa-info-circle" tooltip-class="customClass" uib-tooltip="Other Device Info"
                     ng-click="show_customdevice_details(device)"></a>
                  </span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div ng-if="(custom_devices_result | filter: searchKeyword).length == 0" class="content-wrapper ">
      <div>
        <no-records-found message="No associated Other Devices were found"></no-records-found>
      </div>
    </div>
  </div>
</div>
<script type="text/ng-template" id="customdevicedetailstemplate.html">
    <div class="row">
        <table class="table">
            <tbody>
                <tr>
                    <th class="col-md-4 table_no_top_border">   
                        <div ng-if="device_details.up_since">Uptime</div>
                        <div ng-if="device_details.down_since">Downtime</div>
                    </th>
                    <td class="table_no_top_border">
                        <div ng-if="device_details.up_since">{{device_details.up_since | unityObserviumTime}}</div>
                        <div ng-if="device_details.down_since">{{device_details.down_since | unityObserviumTime}}</div>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="col-xs-12" ng-show="angular.isDefined(device_details) && (device_details === null)" style="padding : 20px">
            <p>Device not Configured in Uptime Robot</p>
        </div>
    </div>
</script>
