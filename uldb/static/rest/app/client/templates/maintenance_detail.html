<div class="modal-header">
    <h3 class="modal-title">Ticket Details</h3>
</div>
<div class="modal-body" id="modal-body">
    <div class="row">
        <div class="panel panel-default">
            <div class="panel-body">
                <table class="table">
                    <tbody>
                    <tr ng-repeat="row in ticket_rows" ng-if="row.hasValue == undefined || row.hasValue(eventDetails) !== false">
                        <td class="col-md-4">
                          <div>{{ row.description }}</div>
                        </td>
                        <td>
                          <div ng-if="row.opaque === undefined && row.type != 'date'">{{ eventDetails[row.name] }}</div>
                          <div ng-if="row.opaque === undefined && row.type == 'date'">{{ eventDetails[row.name] | unityDate : $root.users_timezone }}</div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-cancel" ng-click="cancel()">Close</button>
</div>
