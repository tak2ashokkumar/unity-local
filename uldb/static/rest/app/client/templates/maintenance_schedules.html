<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 main-content-wrapper" style="float:left">
  <loading object="{{ mschedules.results }}"></loading>
  <page-title title="Maintenance Schedules"></page-title>
  <div class="pagemargin">
      <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 content-wrapper bg-color top_shadow" ng-show="mschedules.results !== undefined">
          <div class="col-xs-8 col-sm-8 col-md-8 col-lg-8 search-widget">
              <form class="navbar-form">
                  <div class="form-group width100">
                      <input class="form-control" type="text" ng-model="searchKeyword" ng-model-options="{debounce: 1000}" id="searchKeyword" placeholder="Enter keyword" ng-change="getSearchResults(searchKeyword)">
                      <button class="btn btn-search" type="submit" style="top: 4px;">
                         <i class="fa fa-search"></i>
                      </button>
                  </div>
              </form>
          </div>
          <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4" ng-class="{'padding_top15px' : disable_action_btn}">
              <div class="action-bar pull-right" ng-class="{'table-button' : !disable_action_btn}">
                  <span class="count">{{model_count}}</span>
                  <span>
                    <a class="btn btn-default" ng-click="manageMS('Add')">  + Add</a>
                  </span>
              </div>
          </div>
      </div>
  </div>

<div class="row content-wrapper">
  <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 page_wrapper">
      <section ng-if="model.count !== 0" id="no-more-tables" class="margintop20 middle-wrapper">
          <table class="table table-condensed table-hover" ng-if="mschedules.count > 0" infinite-scroll='loadMoreResults()'>
              <thead class="cf">
                  <tr>
                      <th custom-sort order="description" sort="sort" ng-mouseover="order = 'description'"> Description </th>
                      <th custom-sort order="status" sort="sort" ng-mouseover="order = 'status'"> Status</th>
                      <th> Datacenter </th>
                      <th custom-sort order="start_date" sort="sort" ng-mouseover="order = 'start_date'"> Start Date </th>
                      <th custom-sort order="end_date" sort="sort" ng-mouseover="order = 'end_date'"> End Date </th>
                      <th> Actions </th>
                  </tr>
              </thead>
              <tbody>
                  <tr ng-repeat="row in mschedules.results">
                      <td>
                        {{row.description}}
                      </td>
                      <td>
                        {{row.status}}
                      </td>
                      <td>
                        {{row.colo_cloud.name}}
                      </td>
                      <td>
                        {{row.start_date | unityDate : $root.users_timezone}}
                      </td>
                      <td>
                        {{row.end_date | unityDate : $root.users_timezone}}
                      </td>
                      <td>
                        <div class="action-icons">
                          <a class="fa fa-pencil blue-text ng-scope" tooltip-class="customClass" uib-tooltip="Edit" ng-click="manageMS('Edit', row, $index)"></a>
                          <a class="fa fa-trash-o blue-text ng-scope" tooltip-class="customClass" uib-tooltip="Delete" ng-click="manageMS('Delete', row, $index)"></a>
                        </div>
                      </td>
                  </tr>
              </tbody>
          </table>
      </section>
      <div ng-if="mschedules.results.length === 0" class="content-wrapper">
        <no-records-found message="No Maintenance Schedules were found !!"></no-records-found>
      </div>
  </div>
</div>

<script type="text/ng-template" id="editMaintenanceSchedule.html">
  <div class="modal-content">
    <form role="form" name="modalform" novalidate ng-submit="modalform.$valid && onSubmit()">
      <div class="modal-header">
          <h4 class="modal-title">Add</h4>
      </div>
      <div class="modal-body" style="padding:20px 40px; padding-bottom: 0px;">
          <div class="modal-form">
                  <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                      <div class="paddingR col-xs-6 col-sm-6 col-md-6 col-lg-6">
                          <div class="form-group">
                              <label>
                                Description*
                              </label>
                              <span class="errormsg" ng-if="(modalform.$submitted && modalform.description.$invalid)">
                                ( This Field is Required )
                              </span>
                              <input type="text" name="description" class="form-control" ng-model="mschedule.description" ng-required="true">
                          </div>
                      </div>

                      <div class="paddingR col-xs-6 col-sm-6 col-md-6 col-lg-6">
                          <div class="form-group">
                              <label>
                                Status*
                              </label>
                              <span class="errormsg" ng-if="(modalform.$submitted && modalform.status.$invalid)">
                                ( This Field is Required )
                              </span>
                              <select name="status" class="form-control" ng-model="mschedule.status" ng-required="true">
                                <option label="Future Plan" value="Future Plan">Future Plan</option>
                                <option label="Ongoing" value="Ongoing">Ongoing</option>
                                <option label="Completed" value="Completed">Completed</option></select>
                          </div>
                      </div>
                  </div>
                  <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                      <div class="form-group">
                          <label>
                            Datacenter*
                          </label>
                          <span class="errormsg" ng-if="(modalform.$submitted && modalform.datacenter.$invalid)">
                            ( This Field is Required )
                          </span>
                          <span class="errormsg" ng-if="colo_cloud_err">
                            {{colo_cloud_err}}
                          </span>
                            <input class="form-control"
                                   ng-model="mschedule.colo_cloud"
                                   ng-change="getDatacenters(mschedule.colo_cloud)"
                                   uib-typeahead="dc as dc.name for dc in data_centers"
                                   name="datacenter" 
                                   ng-required="true">
                      </div>
                  </div>
                  <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                      <div class="paddingR col-xs-6 col-sm-6 col-md-6 col-lg-6">
                          <div class="form-group">
                              <label>
                                Start Date*
                              </label>
                              <span class="errormsg" ng-if="(modalform.$submitted && modalform.start_date.$invalid)">
                                ( This Field is Required )
                              </span>

                              <a class="dropdown-toggle" id="dropdownStart" role="button" data-toggle="dropdown" data-target="#">
                                <div class="input-group date">
                                    <input type="text" name="start_date" class="form-control" data-date-time-input="D MMM, YYYY h:mm A" ng-model="mschedule.start_date" ng-required="true">
                                    <span class="input-group-addon"><i class="glyphicon glyphicon-calendar"></i></span>
                                </div>
                              </a>
                              <ul class="dropdown-menu" role="menu" aria-labelledby="dLabel">
                                <datetimepicker ng-model="mschedule.start_date"
                                                ng-required="col.required" dynamic-name="col.description"
                                                data-datetimepicker-config="{ dropdownSelector: '#dropdownStart', renderOn: 'start-date-changed'}" autoclose="true">
                                </datetimepicker>
                              </ul>
                          </div>
                      </div>
                      <div class="paddingR col-xs-6 col-sm-6 col-md-6 col-lg-6">
                          <div class="form-group">
                              <label>
                                End Date*
                              </label>
                              <span class="errormsg" ng-if="(modalform.$submitted && modalform.end_date.$invalid)">
                                ( This Field is Required )
                              </span>
                              <span class="errormsg" ng-if="end_date_err">
                                {{end_date_err}}
                              </span>
                              <a class="dropdown-toggle" id="dropdownEnd" role="button" data-toggle="dropdown" data-target="#">
                                <div class="input-group date">
                                    <input type="text" name="end_date" class="form-control" data-date-time-input="D MMM, YYYY h:mm A" ng-model="mschedule.end_date" ng-required="true">
                                    <span class="input-group-addon"><i class="glyphicon glyphicon-calendar"></i></span>
                                </div>
                              </a>
                              <ul class="dropdown-menu" role="menu" aria-labelledby="dLabel">
                                <datetimepicker ng-model="mschedule.end_date"
                                              ng-required="col.required" dynamic-name="col.description"
                                              data-datetimepicker-config="{ dropdownSelector: '#dropdownEnd', renderOn: 'end-date-changed'}">
                                </datetimepicker>
                              </ul>
                          </div>
                      </div>
                  </div>
          </div>
      </div>
      <div class="modal-footer modal-buttons">
          <div class="modal-footer modal-buttons">
              <button type="button" class="btn btn-cancel" ng-click="cancel()">
                Cancel
              </button>
              <button type="submit" class="btn btn-default">
                Save
              </button>
          </div>
      </div>
    </form>
  </div>
</script>

<script type="text/ng-template" id="deleteConfirm.html">
  <div class="modal-content">
      <div class="modal-header" style="text-align: center;">
          <h4 class="modal-title">Confirm Delete</h4>
      </div>
    <form role="form" name="modalform" novalidate ng-submit="modalform.$valid && wrap(obj, list)">
      <div class="modal-body" style="text-align: center;">
          Are you sure you want to delete?
      </div>
      <div class="modal-footer modal-buttons">
          <div class="modal-footer modal-buttons"  style="text-align: center;">
              <button type="button" class="btn btn-cancel" ng-click="cancel()">
                Cancel
              </button>
              <button type="button" class="btn btn-default" ng-click="mschedulesDelete()">
                Confirm
              </button>
          </div>
      </div>
    </form>
  </div>
</script>
