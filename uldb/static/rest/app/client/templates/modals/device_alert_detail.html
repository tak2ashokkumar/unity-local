<div>
  <div class="row modal-header">
    <div class="col-xs-12 " style="text-align: center;">
      <h1>{{alert_device_name}} Alerts</h1>
    </div>
  </div>
  <div class="modal-body" style="float:left;">
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 table-responsive" style="max-height: 300px !important;" ng-if="device_alerts_popup">
      <section id="no-more-tables" class="margintop20 middle-wrapper table-responsive">
        <table class="table table-hover margin0">
          <thead>
            <tr>
              <th>Alert</th>
              <th>Status</th>
              <th>Checked</th>
              <th>Changed</th>
              <th>Alerted</th>
              <th>Entity ID</th>
              <th>Entity Type</th>
            </tr>
          </thead>
          <tbody>
            <tr ng-repeat="(alertid,alert) in device_alerts_popup.alerts">
              <td>{{alert.alert_name}}</td>
              <td>{{alert.status}}</td>
              <td>
                <span ng-bind-html="alert.checked"></span>
              </td>
              <td>
                <span ng-bind-html="alert.changed"></span>
              </td>
              <td>
                <span ng-bind-html="alert.alerted"></span>
              </td>
              <td>{{alert.entity_id}}</td>
              <td>{{alert.entity_type}}</td>
            </tr>
          </tbody>
        </table>
        <div ng-if="!device_alerts_popup.alerts" class="content-wrapper">
          <no-records-found message="No Alerts to display"></no-records-found>
        </div>
      </section>
    </div>
  </div>
  <div class="modal-footer modal-buttons">
    <button class="btn btn-cancel" ng-click="close_modal()" type="button" style="background-color: #e87b04 !important; color: white !important">Close</button>
  </div>
</div>

<style type="text/css">
  td {
    white-space: nowrap;
  }

  .modal-dialog{
    width: 65% !important;
  }
</style>
