<div class="modal-header">
    <h3 class="modal-title">{{ modal_obj.method }} Datacenter</h3>
</div>

<div class="modal-form">
    <form class="form-horizontal" role="form">
        <div class="form-group">
            <label for="name" class="control-label">
              Datacenter Name*
            </label>
            <span class="errormsg" ng-if="name_errmsg">({{ name_errmsg }})</span>
            <input id="name" class="form-control" type="text" required="required" ng-model="modal_obj.name">
        </div>
        <div class="form-group">
            <label for="location" class="control-label">
              Location
            </label>
            <span class="errormsg" ng-if="location_errmsg">({{ location_errmsg }})</span>
            <input id="location" class="form-control" type="text" ng-model="modal_obj.location">
        </div>
    </form>
</div>

<div class="modal-footer">
    <button class="btn btn-cancel" type="button" ng-click="cancel()">
        Cancel
    </button>
    <button class="btn btn-default" type="button" ng-click="manage_datacenter_obj()">
        <span ng-bind="modal_obj.method"></span>
    </button>
</div>
