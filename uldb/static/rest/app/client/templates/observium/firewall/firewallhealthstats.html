<div class="row tabs-level1" style="margin-top: 10px;height: 35px;" ng-show="submenutabs">
    <div class="col-xs-10 col-sm-10 col-md-8 col-lg-8" style="padding-left: 5px !important;">
        <div class="ui-selectee">
            <nav class="column subtabs">
                <uib-tabset ng-show="submenutabs" active="activeSubTab">
                    <uib-tab ng-repeat="subtab in submenutabs" index="$index" heading="{{subtab.tabname}}"
                    select="getHealthtabSubtabsData(subtab);"></uib-tab>
                </uib-tabset>
            </nav>
        </div>
    </div>
</div>


<!-- PDU Health Stats OverView -->
<div class="row" ng-show="!showDetailsView">
     <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 page_wrapper">
        <div class="row" ng-repeat="graph_obj in graph_data">
            <sub-title title="{{graph_obj.displayName}}"></sub-title>
            <table>
                <tbody>
                    <tr ng-click="getGraphforDefaultDateRange(graph_obj)">
                        <td>
                            <img class="pduhealthgraphsimg" ng-src="data:image/png;base64,{{ graph_obj.graphDetails.graph_by_day }}">
                        </td>
                        <td>
                            <img class="pduhealthgraphsimg" ng-src="data:image/png;base64,{{ graph_obj.graphDetails.graph_by_week }}">
                        </td>
                        <td>
                            <img class="pduhealthgraphsimg" ng-src="data:image/png;base64,{{ graph_obj.graphDetails.graph_by_month }}">
                        </td>
                        <td>
                            <img class="pduhealthgraphsimg" ng-src="data:image/png;base64,{{ graph_obj.graphDetails.graph_by_year }}">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<observium-graph-details ng-show="showDetailsView"></observium-graph-details>
