<div class="row">

    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <div class="row db-info shadow-btm"> </div>
    </div>

    <div class="row page_wrapper">
        <!--Tabs Level 1 End-->
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 content-wrapper">
                <div class="col-xs-7 col-sm-7 col-md-7 col-lg-7">
                    <h1> Users</h1>
                </div>
                <div class="col-xs-3 col-sm-3 col-md-3 col-lg-3 search-widget pull-right">
                    <form class="navbar-form">
                        <div class="form-group">
                            <input class="form-control" style="max-width: 100%" type="text" placeholder="Enter keyword" ng-model="searchKeyword" ng-disabled="(aws_user_list_content.data.length === 0)">
                            <button class="btn btn-search" type="submit" style="top: 3px;">
                                <i class="fa fa-search"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <section id="no-more-tables" class="margintop20 middle-wrapper table-responsive">
                <table id="example" class="example table table-condensed cf" ng-show="aws_user_list_content.data.length > 0">
                    <thead class="cf">
                        <tr>
                            <th ng-repeat="aws_user_list_header in aws_user_list_headers"
                            custom-sort order="{{aws_user_list_header.key}}" sort="sort">{{ aws_user_list_header.title }}</th>
                            <th> Actions </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr ng-repeat="(index, aws_user) in aws_user_list_content.data | filter: searchKeyword | orderBy: sortkey">
                            <td class="normal">{{aws_user.UserName}}</td>
                            <td class="normal">{{aws_user.CreateDate | unityDate : $root.users_timezone}}</td>
                            <td class="normal">{{aws_user.Arn}}</td>

                            <td ng-if="aws_user_list_content.actions != undefined">
                                <div class="action-icons">
                                    <span ng-repeat="action in aws_user_list_content.actions">
                                        <a ng-if="(action.name === 'Show User Groups')" class="fa fa-object-group" tooltip-class="customClass" uib-tooltip="{{action.name}}" ng-click="showUserGroups(aws_user)"></a>
                                        <a ng-if="(action.name === 'Show User Details')" class="fa fa-info-circle" tooltip-class="customClass" uib-tooltip="{{action.name}}" ng-click="showUserData(aws_user)"></a>
                                    </span>
                                </div>
                            </td>

                        </tr>
                    </tbody>
                </table>
                <div ng-if="((aws_user_list_content.data.length) === 0 || ((aws_user_list_content.data | filter: searchKeyword).length === 0))" class="content-wrapper">
                    <no-records-found message="No Users available in this region"></no-records-found>
                </div>
            </section>
        </div>
    </div>

</div>
