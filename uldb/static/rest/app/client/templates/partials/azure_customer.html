<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
    <div class="row db-info shadow-btm"> </div>
</div>


<div class="row" ng-show="tabledata">
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 content-wrapper" >
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 content-wrapper" style="padding-right:5px !important">
            <div class="col-xs-7 col-sm-7 col-md-7 col-lg-7">
                <h1>{{heading}}</h1>
            </div>
            <div class="col-xs-2 col-sm-2 col-md-2 col-lg-2">
                <div class="action-bar" ng-show="modeldata != undefined">
                    <button class="btn btn-default" type="button" ng-click="openModal('Add')"> 
                    + <span ng-show="heading == 'Azure Accounts'">Add Account</span>
                    <span ng-show="heading == 'Resource Groups'">Add Resource Group</span>
                    </button>
                </div>
                <div class="action-bar" ng-show="showclosebutton != undefined">
                    <button class="btn btn-default" type="button" ng-click="openModal('close')">Close</button>
                </div>
            </div>
            <div class="col-xs-3 col-sm-3 col-md-3 col-lg-3 search-widget pull-right">
                <form class="navbar-form">
                    <div class="form-group">
                        <input class="form-control" type="text" ng-model="searchKeyword"
                        placeholder="Enter keyword" ng-model-options="{debounce: {'default': 100, 'blur': 0 }}"
                        ng-disabled="(tabledata.length === 0)">
                        <button class="btn btn-search" type="submit" style="top:3px">
                            <i class="fa fa-search"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <section id="no-more-tables" class="margintop20 middle-wrapper">
            <table id="example" class="example table table-condensed cf">
                <thead class="cf">
                    <tr>
                        <th ng-repeat="row in headers"> {{ row.title }} </th>
                        <th ng-if="actions != undefined">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="row in tabledata | filter: searchKeyword" ng-show="tabledata.length > 0">
                        <td ng-repeat="row_data in headers">
                            <span ng-if="row_data.key != 'region'">
                                <span ng-if="row_data.key != 'tags' ">
                                  {{row[row_data.key] || 'NA'}}
                                </span>
                                <span ng-if="row_data.key == 'tags'">
                                    {{ row[row_data.key].display || 'NA'}}
                                </span>
                            </span>
                        </td>
                        <td ng-if="actions != undefined">
                            <div class="action-icons" ng-if="heading=== 'Azure Accounts'">
                                <a ng-click="resource_grps(row)" class="fa fa-users" tooltip-class="customClass" uib-tooltip="View Resource Group" ></a>
                                <a class="fa fa-pencil" tooltip-class="customClass" uib-tooltip="Edit" 
                                ng-click="openModal('Edit',row)" ></a>
                                <a class="fa fa-trash-o" tooltip-class="customClass" uib-tooltip="Delete" 
                                ng-click="openModal('Delete',row)"></a>
                                <a class="fa fa-key" tooltip-class="customClass" uib-tooltip="Change password" ng-click="openModal('change_password',row)"></a>
                            </div>
                            <div class="action-icons" ng-if="heading=== 'Resource Groups'">
                                <a ng-click="openModal('view_resource',row)" class="fa fa-users" tooltip-class="customClass" uib-tooltip="View Resources" ></a>
                                <a class="fa fa-plus-square" tooltip-class="customClass" uib-tooltip="Create Virtual Machine" ng-click="openModal('create_vm',row)" ></a>
                                <a class="fa fa-list" tooltip-class="customClass" uib-tooltip="View Virtual Machines" ng-click="openModal('view_vm',row)" ></a>
                                <a class="fa fa-plus-circle" tooltip-class="customClass" uib-tooltip="Create Nic"
                                ng-click="openModal('create_nic',row)"></a>
                                <a class="fa fa-trash-o" tooltip-class="customClass" uib-tooltip="Delete" 
                                ng-click="openModal('Delete',row)"></a>
                            </div>
                            <div class="action-icons" ng-if="heading=== 'Virtual Machines'">
<!--                                 <a ng-click="openModal('attach_lb',row)" class="fa fa-balance-scale" tooltip-class="customClass" uib-tooltip="Attach Loadbalancer" ></a>
 -->                                <a class="fa fa-trash-o" tooltip-class="customClass" uib-tooltip="Delete" 
                                ng-click="openModal('delete',row)"></a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div ng-show="((tabledata.length) === 0 || ((tabledata | filter: searchKeyword).length === 0))" class="content-wrapper">
                <no-records-found message="No {{heading}} available in your account"></no-records-found>
            </div>
        </section>
    </div>
</div>
<modal visible="showModal">
    <ng-include src="modeldata.page"></ng-include>
</modal>
<modal1 visible="showModal1">
    <ng-include src="modeldata1.page"></ng-include>
</modal1>
<modal2 visible="showModal2" >
    <ng-include src="modeldata2.page"></ng-include>
</modal2>
<deletemodal visible="showDeleteConfirm"></deletemodal>
