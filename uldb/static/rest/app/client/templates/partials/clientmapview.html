<tab>
    <div class="col-sm-12 panelbodyborder box-container map_canvas " id="map_canvas" ng-controller="ClientDashboardController">
        <br/> 
        <ui-gmap-google-map
                center="map.center"
                zoom="map.zoom"
                draggable="map.draggable"
                options="options"
                bounds="map.bounds"
                events="map.events"
                control="map.control">
            <ui-gmap-marker
                    ng-repeat="marker in map.markers"
                    coords="marker.coords"
                    idkey="marker.id"
                    icon="marker.icon"
                    click="clickMarker(marker)"
                    >
                <ui-gmap-window
                        show="false">
                    <div>{{marker.title}}</div>
                </ui-gmap-window>
            </ui-gmap-marker>
            <ui-gmap-polyline
                    ng-repeat="p in polylines"
                    path="p.path"
                    stroke="p.stroke"
                    visible='p.visible'
                    geodesic='p.geodesic'
                    fit="false"
                    editable="p.editable"
                    draggable="p.draggable"
                    icons='p.icons'
                    clickable="p.clickable"
                    events="p.events">
            </ui-gmap-polyline>
        </ui-gmap-google-map>
    </div>
</tab>
