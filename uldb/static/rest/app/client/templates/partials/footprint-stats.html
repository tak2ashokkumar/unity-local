<div class="col-lg-12 pad-small">
  <div class="progress-item">
    <div class="col-md-5 device-text progress-text">Hosts</div>
    <div class="progress col-md-7 ">
      <div class="progress-bar progress-bar-success" role="progressbar"
           style="width:{{ host_widths['normal'] }}%">{{ footprint.host_stats.normal }}</div>
      <div class="progress-bar progress-bar-warning" role="progressbar"
           style="width:{{ host_widths['warning'] }}%">{{ footprint.host_stats.warning }}</div>
      <div class="progress-bar progress-bar-danger" role="progressbar"
           style="width:{{ host_widths['critical']  }}%">{{ footprint.host_stats.critical }}</div>
    </div>
  </div>
</div>
<div class="col-md-12 pad-small">
  <div class="progress-item">
    <div class="col-md-5 device-text progress-text">
      Services
    </div>
    <div class="progress col-md-7 ">
      <div class="progress-bar progress-bar-success" role="progressbar"
           style="width:{{ serv_widths['normal'] }}%">{{ footprint.service_stats.normal }}</div>
      <div class="progress-bar progress-bar-warning" role="progressbar"
           style="width:{{ serv_widths['warning'] }}%">{{ footprint.service_stats.warning }}</div>
      <div class="progress-bar progress-bar-danger" role="progressbar"
           style="width:{{ serv_widths['critical'] }}%">{{ footprint.service_stats.critical }}</div>
    </div>
  </div>

  <div class="progress-item">
    <div class="col-md-5 device-text progress-text">
      Throughput
    </div>
    <div class="col-md-7 ">
      <span>{{ round_throughput(footprint.throughput) }}</span>
    </div>
  </div>
</div>
