<div class="row dashboard-admin" ng-controller="PieCtrl">
    <div class="col-lg-12">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <div class="row">
                    <div class="col-md-6 pinnewcustitle pull-left">
                        <i class="fa fa-clock-o fa-fw"></i>
                        {{chart_heading}}
                    </div>
                </div>
            </div>

            <div class="panel-body">
                <div>
                  <!--canvas id="pie" class="chart chart-pie"
                    chart-data="data" chart-labels="labels" chart-series="series" chart-options="options" >
                  </canvas-->
                  <canvas id="pie" chart-options="options" class="chart chart-pie chart-xs ng-isolate-scope"
                          height="95" width="240" chart-data="data" chart-labels="labels" chart-legend="true"
                          chart-options="options">

                  </canvas>
                </div>

            </div>
        </div>
    </div>
</div>

<div class="row dashboard-admin" ng-controller="BarCtrl">
    <div class="col-lg-12">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <div class="row">
                    <div class="col-md-6 pinnewcustitle pull-left">
                        <i class="fa fa-clock-o fa-fw"></i>
                        {{chart_heading}}
                    </div>
                </div>
            </div>

            <div class="panel-body" >
                <div>
                  <!--canvas id="pie" class="chart chart-pie"
                    chart-data="data" chart-labels="labels" chart-series="series" chart-options="options" >
                  </canvas-->
                  <canvas id="bar" chart-options="options" class="chart chart-line chart-xs ng-isolate-scope" chart-colors="colors"
                          chart-data="data" chart-labels="labels" chart-dataset-override="datasetOverride" chart-click="onClick"
                          chart-options="options">

                  </canvas>
                </div>

            </div>
        </div>
    </div>
</div>
