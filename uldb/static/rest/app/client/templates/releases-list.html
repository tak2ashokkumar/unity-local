<div class="page_wrapper" style="float:left">
    <div class="row" ng-show="release_list_content" style="padding: 20px; margin-left: 50px !important;" ng-if="release_list.length">
            <ul>
                <li ng-repeat="release in release_list | orderBy: '-release_date'" style="padding: 5px; font-size: 14px; !important">
                    <a href="" ng-click="show_release_content(release.file_url)">{{release.name}}</a>&nbsp;&nbsp;&nbsp;
                    <span style="color: gray;">{{release.release_date | date}}</span>
                </li>
            </ul>
    </div>

    <div class="row" ng-if="(release_list && release_list.length == 0)" style="padding : 20px;">
        <no-records-found message="No previous Releases documents available currently."></no-records-found>
    </div>

</div>
<div class="row">
    <div class="row tabs-level1" ng-show="release_content">
       <div class="col-xs-9 col-sm-9 col-md-9 col-lg-9 subtitleclass">
       </div>
       <div class="col-xs-3 col-sm-3 col-md-3 col-lg-3 company-name" style="padding-right: 15px !important;">
           <a href="" ng-click="cancel()">
             <i  style="font-size: 15px; padding-top: 7px;padding-right: 5px;" class="fa fa-arrow-left" aria-hidden="true"></i>
             <span style="font-size:17px;">Back</span>
           </a>
       </div>
    </div>
    <div class="row" ng-show="release_content">
        <div class="row" id="pdf">
            <iframe id="frame"
            ng-src="{{active_file_url}}" style="width : 100%; height : 100%;" frameborder="0"></iframe>
        </div>

        <style>
            #pdf {
                width: 100%;
                height: 2400px;
                margin-bottom : 30px;
            }
            canvas {
                display: block !important;
            }
        </style>
    </div>
</div>
