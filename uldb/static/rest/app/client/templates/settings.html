

<div class="row">
  <div class="col-sm-8">
    <h3>Account</h3>
    <span>
      <small ng-repeat="crumb in bread.crumbs">
        <span ng-if="$index > 0">&lt;</span> <a href="{{ crumb.url }}">{{ crumb.name }}</a>
      </small>
    </span>
  </div>
  <div class="col-sm-4" >
	<span class="form-inline" style="float:right;margin-top:20px;">
	<i class="fa fa-th fa-eraser fa-1x"></i> <a class="changepwd" ng-click="changePassword()">Change Password</a>
	
	</span>
  </div>
</div>

<div class="alert alert-info" role="alert" ng-if="showmessage == true" ng-click="closeAlert()">{{alertMsg}}</div>

<div class="row">
  
  <div class="col-sm-12 col-md-12 col-lg-12">
    <panelhalf heading="Organization Profile"><detailtable cols="orgprofilecols" result="orgprofileresult"></detailtable></panelhalf>
  </div>
 
</div>

<div class="row">
   <div class="col-sm-12 col-md-12 col-lg-6">
    <panelhalf heading="Access List">
    <ul style="line-height: 38px;">
    	<li ng-repeat = "acclist in accessresult">{{acclist.description}}</li>
    </ul>
    </panelhalf>
  </div>
  <div class="col-sm-12 col-md-12 col-lg-6"> 
    <panelhalf heading="Recent Activity"><detailtable cols="recentactivitycols" result="recentactivityresult"></detailtable></panelhalf>
  </div>
</div>
