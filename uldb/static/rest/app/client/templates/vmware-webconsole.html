<ui-breadcrumbs displayname-property="Management Console" template-url=""></ui-breadcrumbs>
<aside id="side-wrapper" ng-scrollbars ng-scrollbars-config="scrollbarConfig" style="height: 100%;">
    <div ng-if="!user_org_logo">
        <img alt="United Layer" id="Image-175275" src="static/images/Unity-AI.png" 
        style="width:100%; background-color:#ffffff; padding-top:20px; padding-bottom:10px;"/>
    </div>
    <div ng-if="user_org_logo" class="text-align-center" >
        <img ng-src="data:image/png;base64,{{ user_org_logo }}" style="width:100%;"/>
    </div>
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <div uib-accordion close-others="oneAtATime" ng-if="device_name">
                <ul class="nav nav-pills nav-stacked demo collapsed united-panel" id="tree-menu" uib-accordion-group is-open="open[0]">
                    <li uib-accordion-heading ng-class="{isOpen: status.isOpen}">
                        <div class="leftnav">
                            <div class="row"><span class="leftnav-title">{{device_type_label}} : </span> <span>{{device_name}}</span></div>
                        </div>
                    </li>
                </ul>
        </div>
        <div uib-accordion close-others="oneAtATime" ng-if="ip_address">
                <ul class="nav nav-pills nav-stacked demo collapsed united-panel" id="tree-menu" uib-accordion-group is-open="open[0]">
                    <li uib-accordion-heading ng-class="{isOpen: status.isOpen}">
                        <div class="leftnav">
                            <div class="row"><span class="leftnav-title">IP Address : </span> <span>{{ip_address}}</span></div>
                        </div>
                    </li>
                </ul>
        </div>
        <div uib-accordion close-others="oneAtATime" ng-if="username">
                <ul class="nav nav-pills nav-stacked demo collapsed united-panel" id="tree-menu" uib-accordion-group is-open="open[0]">
                    <li uib-accordion-heading ng-class="{isOpen: status.isOpen}">
                        <div class="leftnav">
                            <div class="row"><span class="leftnav-title">Username : </span> <span>{{username}} </span></div>
                        </div>
                    </li>
                </ul>
        </div>
        <div uib-accordion close-others="oneAtATime" ng-if="port">
                <ul class="nav nav-pills nav-stacked demo collapsed united-panel" id="tree-menu" uib-accordion-group is-open="open[0]">
                    <li uib-accordion-heading ng-class="{isOpen: status.isOpen}">
                        <div class="leftnav">
                            <div class="row"><span class="leftnav-title">Port : </span> <span>{{port}} </span></div>
                        </div>
                    </li>
                </ul>
        </div>

        <div uib-accordion close-others="oneAtATime" ng-if="last_login">
                <ul class="nav nav-pills nav-stacked demo collapsed united-panel" id="tree-menu" uib-accordion-group is-open="open[0]">
                    <li uib-accordion-heading ng-class="{isOpen: status.isOpen}">
                        <div class="leftnav">
                            <div class="row"><span class="leftnav-title">Last Login : </span> <span>OCT 27th 2017 </span></div>
                        </div>
                    </li>
                </ul>
        </div>
    </div>
</aside>

<span id="vm_error"  style="color:red"></span>
<div id="terminal-container" ng-if="!iframe"></div>
<div id="terminal-container" ng-if="iframe" class="xterm-container"></div>
<style type="text/css">
    .cg-busy {
        top : 0px !important;
        left : 0px !important;
    }
</style>
<script type="text/ng-template" id="vmAuthentcicate.html">
  <div class="modal-content">
    <form role="form" name="modalform">
      <div class="modal-header">
          <h4 class="modal-title">{{console_header}}</h4>
      </div>
      <div class="modal-body" cg-busy="{promise:myPromise, message:'Loading...', backdrop:true, delay:0, minDuration:500}" style="padding:20px 40px;">
         <div class="modal-form">
                <div class="form-group" ng-if="errorMsg">
                  <label style="color:red" class="col-sm-10">{{ errorMsg }}</label>
                </div>
                <div class="form-group" ng-if="disableAccess != undefined">
                  <label style="color:red" class="col-sm-10">Management IP Address not Assigned.</label>
                </div>
                <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12" ng-if="disableAccess == undefined">
                    <div class="paddingR"
                        ng-class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
                        <div class="form-group">
                          <label for="request.hostname" class="col-sm-2 control-label">
                            IP Address
                          </label>

                          <div>
                             <input type="text"
                                   class="form-control"
                                   ng-model="request.hostname"
                                   placeholder="Hostname" disabled>
                                   <!-- {#management_ip#} -->
                          </div>
                        </div>

                        <div class="form-group">
                          <label for="request.port" class="col-sm-2 control-label">
                            Port Number
                          </label>

                          <div>
                            <input type="number"
                                   min=0
                                   class="form-control"
                                   ng-model="request.port"
                                   placeholder="Port Number">
                          </div>
                        </div>

                        <div class="form-group">
                          <label for="request.username">
                            Username*
                          </label>
                          <span class="errormsg" ng-if="loginUsernameErrMsg">{{loginUsernameErrMsg}}</span>

                          <div>
                            <input type="text"
                                   class="form-control"
                                   ng-model="request.username"
                                   placeholder="Username"
                                   autofocus
                                   ng-class="{'has-error_inputbox': loginUsernameErr }" />
                          </div>
                        </div>

                        <div class="form-group">
                          <label for="request.password">
                            Password*
                          </label>
                          <span class="errormsg" ng-if="loginPasswordErrMsg">{{loginPasswordErrMsg}}</span>

                          <div>
                            <input type="password"
                                   class="form-control"
                                   ng-model="request.password"
                                   placeholder="Password"
                                   ng-class="{'has-error_inputbox': loginPasswordErr}" />
                          </div>
                        </div>
                    </div>
                </div>
        </div>
      </div>
      <div class="modal-footer modal-buttons">
          <div class="modal-footer modal-buttons" ng-if="disableAccess == undefined">
              <button type="button" class="btn btn-cancel" ng-if="iframe" ng-click="goBack()">
                Cancel
              </button>
              <button type="button" class="btn btn-cancel" ng-if="!iframe" ng-click="closeTab()">
                Close
              </button>
              <button type="submit" class="btn btn-default" ng-click="create(request)">
                Login
              </button>
          </div>
      </div>
    </form>
  </div>
</script>
