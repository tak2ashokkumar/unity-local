<style type="text/css">
    .pagemargin .page_wrapper {
        background-color: #FFFFFF;
        width: 100%;
        -webkit-box-shadow: 0px 2px 5px 0px rgba(0, 0, 0, 0.14);
        -moz-box-shadow: 0px 2px 5px 0px rgba(0, 0, 0, 0.14);
        box-shadow: 0px 2px 5px 0px rgba(0, 0, 0, 0.14);
        padding: 20px;
        padding-bottom: 60px;
        padding-top: 0px;
    }

    .dataTables_filter input[type="search"] {
        border: 2px solid #E4E4E4;
        border-radius: 2px;
        height: 30px;
        margin-left: 3px;
    }

    .dataTables_length select {
        border: 1px solid #E4E4E4;
        height: 30px;
        margin-left: 3px;
    }

    .table th {
        padding-top: 8px !important;
        padding-bottom: 8px !important;
        /*height: 50px !important;*/
    }

    .table td {
        padding: 8px 13px !important;
    }
</style>

<div cg-busy="{promise:myPromise, message:'Loading...', backdrop:true, delay:0, minDuration:500}">
    <loading object={{sources}}></loading>
    <div class="pagemargin">
        <div class="col-xs-12 content-wrapper bg-color top_shadow" ng-if="sources" style="padding-left:0px;">
            <div class="col-xs-4 pull-right">
                <div class="action-bar pull-right table-button">
                    <button class="btn btn-primary" type="button" ng-click="add()" style="margin-left:20px;"> Add
                    </button>
                </div>
            </div>
        </div>
        <div class="page_wrapper" style="float:left">
            <section ng-if="sources" id="no-more-tables" class="margintop20">
                <table class="example table  table-condensed cf" ng-if="sources.length">
                    <thead class="cf">
                        <tr>
                            <th>Source</th>
                            <th class="numeric">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr ng-repeat="s in sources">
                            <td>{{s.name}}</td>
                            <td>
                                <div class="action-icons">
                                    <a class="fa fa-pencil blue-text" tooltip-class="customClass" uib-tooltip="Edit"
                                        ng-click="edit(s)"></a>
                                    <a class="fa fa-trash-o blue-text" tooltip-class="customClass" uib-tooltip="Delete"
                                        ng-click="delete(s)"></a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div ng-if="!sources.length" class="content-wrapper text-center" style="padding-top:30px">
                    <span class="no-record-text">No sources to display</span>
                </div>
            </section>
        </div>
    </div>
</div>

<script type="text/ng-template" id="source.html">
    <div class="modal-header">
        <button type="button" class="close" ng-click="cancel()">&times;</button>
        <span class="modal-title"> {{method}} Customer Source Mapping</span>
    </div>
    <div class="modal-form">
        <form role="form">
            <div class="col-xs-12">
                <label style="color:red" ng-if="err">{{ error }}</label><br>
                <div class="form-group">
                    <label for="instance">Source Name*</label>
                    <input class="form-control" id="instance" ng-model="obj.name" required>
                </div>
            </div>
            <div class="form-group col-xs-6">
                <label for="source">Source</label>
                <input class="form-control" id="source" type="text" ng-model="obj.source"/>
            </div>
            <div class="form-group col-xs-6">
                <label for="template">Templates*</label>
                <select class="form-control" id="template" ng-model="obj.template_id" required
                ng-options="tmpl.template_id as tmpl.name for tmpl in templates"></select>
            </div>
        </form>
    </div>
    <div class="modal-footer modal-buttons">
        <button class="btn btn-danger" ng-click="cancel()" type="button">Cancel</button>
        <button class="btn btn-success" ng-click="onSubmit()" type="submit"> Submit</button>
    </div>
</script>

<script type="text/ng-template" id="deleteCustomerSourceMapping.html">
    <div class="modal-header" style="text-align: center;">
        <button type="button" class="close" ng-click="cancel()">&times;</button>
        <h4 class="modal-title">Confirm Delete</h4>
    </div>
    <div class="modal-content">
      <form role="form" name="modalform" novalidate ng-submit="modalform.$valid && wrap(obj, list)">
        <div class="modal-body" style="text-align: center;">
            Are you sure you want to delete this customer source Mapping ?
        </div>
        <div class="modal-footer modal-buttons">
            <div class="modal-footer modal-buttons"  style="text-align: center;">
                <button type="button" class="btn btn-cancel" ng-click="cancel()"> Cancel </button>
                <button type="button" class="btn btn-default" ng-click="confirmDelete()"> Confirm </button>
            </div>
        </div>
      </form>
    </div>
</script>
