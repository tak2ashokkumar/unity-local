<style type="text/css">
    .pagemargin .page_wrapper {
        background-color: #FFFFFF;
        width: 100%;
        -webkit-box-shadow: 0px 2px 5px 0px rgba(0, 0, 0, 0.14);
        -moz-box-shadow: 0px 2px 5px 0px rgba(0, 0, 0, 0.14);
        box-shadow: 0px 2px 5px 0px rgba(0, 0, 0, 0.14);
        padding: 20px;
        padding-bottom: 60px;
        padding-top: 0px;
    }

    .dataTables_filter input[type="search"] {
        border: 2px solid #E4E4E4;
        border-radius: 2px;
        height: 30px;
        margin-left: 3px;
    }

    .dataTables_length select {
        border: 1px solid #E4E4E4;
        height: 30px;
        margin-left: 3px;
    }

    .table th {
        padding-top: 8px !important;
        padding-bottom: 8px !important;
        /*height: 50px !important;*/
    }

    .table td {
        padding: 8px 13px !important;
    }

    .panel .fa {
        margin-top: 5px;
    }
</style>

<div cg-busy="{promise:myPromise, message:'Loading...', backdrop:true, delay:0, minDuration:500}">
    <loading object={{sources}}></loading>
    <div class="pagemargin">
        <div class="col-xs-12 content-wrapper bg-color top_shadow" ng-if="sources" style="padding-left:0px;">
            <div class="row" style="margin-top:20px;">
                <div ng-repeat="s in sources" class="col-xs-4">
                    <div class="panel panel-info">
                        <div class="panel-heading" style="height:40px;">
                            <span>{{s.name}}</span>
                        </div>
                        <div class="panel-body">

                            <div class="panel panel-default" style="margin-bottom:0px;">
                                <div class="panel-heading">
                                    <span>Customers</span>
                                    <a class="fa fa-plus pull-right" tooltip-class="customClass" uib-tooltip="Add"
                                        ng-click="addMapping(s)"></a>
                                </div>
                                <div class="panel-body">
                                    <span ng-if="isCustomersLoaded">
                                        <span ng-if="customers.length">
                                            <span ng-if="s.customers_linked.length">
                                                <ul class="list-group" style="margin-bottom:0px;">
                                                    <li class="list-group-item" ng-repeat="c in s.customers_linked">
                                                        <a class="fa fa-trash-o pull-right" tooltip-class="customClass"
                                                            uib-tooltip="Delete" ng-click="deleteMapping(s, c)"></a>
                                                        <a class="fa fa-pencil pull-right" tooltip-class="customClass"
                                                            uib-tooltip="Edit" ng-click="editMapping(s, c)"></a>
                                                        {{c.name}}
                                                    </li>
                                                </ul>
                                            </span>
                                            <span ng-if="!s.customers_linked.length">
                                                NA
                                            </span>
                                        </span>
                                        <span ng-if="!customers.length">
                                            NA
                                        </span>
                                    </span>
                                    <span ng-if="!isCustomersLoaded">
                                        <span class="fa fa-spinner fa-spin"></span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div ng-if="!sources.length" class="content-wrapper text-center" style="padding-top:30px">
                    <span class="no-record-text">No sources to display</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/ng-template" id="source.html">
    <div class="modal-header">
        <button type="button" class="close" ng-click="cancel()">&times;</button>
        <span class="modal-title"> {{method}} Source</span>
    </div>
    <div class="modal-form">
        <form role="form">
            <div class="col-xs-12">
                <label style="color:red" ng-if="err">{{ error }}</label><br>
                <div class="form-group">
                    <label for="instance">Source Name*</label>
                    <input class="form-control" id="instance" ng-model="obj.name" required>
                </div>
            </div>
        </form>
    </div>
    <div class="modal-footer modal-buttons">
        <button class="btn btn-danger" ng-click="cancel()" type="button">Cancel</button>
        <button class="btn btn-success" ng-click="onSubmit()" type="submit"> Submit</button>
    </div>
</script>

<script type="text/ng-template" id="deleteSource.html">
    <div class="modal-header" style="text-align: center;">
        <button type="button" class="close" ng-click="cancel()">&times;</button>
        <h4 class="modal-title">Confirm Delete</h4>
    </div>
    <div class="modal-content">
      <form role="form" name="modalform" novalidate ng-submit="modalform.$valid && wrap(obj, list)">
        <div class="modal-body" style="text-align: center;">
            Are you sure you want to delete source <b>{{obj.name}}</b> ?
        </div>
        <div class="modal-footer modal-buttons">
            <div class="modal-footer modal-buttons"  style="text-align: center;">
                <button type="button" class="btn btn-cancel" ng-click="cancel()"> Cancel </button>
                <button type="button" class="btn btn-default" ng-click="confirmDelete()"> Confirm </button>
            </div>
        </div>
      </form>
    </div>
</script>

<script type="text/ng-template" id="customerSourceMapping.html">
    <div class="modal-header">
        <button type="button" class="close" ng-click="cancel()">&times;</button>
        <span class="modal-title"> {{method}} Customer Source Mapping</span>
    </div>
    <div class="modal-form">
        <form role="form">
            <!-- <div class="col-xs-12">
                <label style="color:red" ng-if="err">{{ error }}</label><br>
                <div class="form-group">
                    <label for="instance">Source Name*</label>
                    <input class="form-control" id="instance" ng-model="obj.name" required>
                </div>
            </div>
            <div class="form-group col-xs-6">
                <label for="source">Source</label>
                <input class="form-control" id="source" type="text" ng-model="obj.source"/>
            </div> -->
            <div class="form-group col-xs-6">
                <label for="customer">Customer*</label>
                <select class="form-control" id="customer" ng-model="obj.customer" required
                ng-options="c.id as c.name for c in customers"></select>
            </div>
        </form>
    </div>
    <div class="modal-footer modal-buttons">
        <button class="btn btn-danger" ng-click="cancel()" type="button">Cancel</button>
        <button class="btn btn-success" ng-click="onSubmitMapping()" type="submit"> Submit</button>
    </div>
</script>

<script type="text/ng-template" id="deleteCustomerSourceMapping.html">
    <div class="modal-header" style="text-align: center;">
        <button type="button" class="close" ng-click="cancel()">&times;</button>
        <h4 class="modal-title">Confirm Delete</h4>
    </div>
    <div class="modal-content">
      <form role="form" name="modalform" novalidate ng-submit="modalform.$valid && wrap(obj, list)">
        <div class="modal-body" style="text-align: center;">
            Are you sure you want to delete this customer source Mapping ?
        </div>
        <div class="modal-footer modal-buttons">
            <div class="modal-footer modal-buttons"  style="text-align: center;">
                <button type="button" class="btn btn-cancel" ng-click="cancel()"> Cancel </button>
                <button type="button" class="btn btn-default" ng-click="confirmDeleteMapping()"> Confirm </button>
            </div>
        </div>
      </form>
    </div>
</script>
