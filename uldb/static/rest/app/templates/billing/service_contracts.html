<span>
  <small ng-repeat="crumb in bread.crumbs">
    <span ng-if="$index > 0">&lt;</span> <a href="{{ crumb.url }}">{{ crumb.name }}</a>
  </small>
</span>

<div class="row">
  <div class="col-sm-12">
    <form class="form-horizontal">
      <div class="form-group">
        <div class="col-xs-12">
          <input class="form-control ng-valid ng-dirty"
                 type="text" id="searchKeyword"
                 ng-model="searchKeyword" placeholder="Search by server name, type, OS, etc."
                 ng-model-options="{debounce: {'default': 100, 'blur': 0 }}">
        </div>
      </div>
    </form>
  </div>
</div>

<div class="alert alert-info" role="alert" ng-if="message" ng-click="closeAlert()">{{ alertMsg }}</div>

<table class="display" cellspacing="0" width="100%">
  <tr>
    <td>

      <table class="table table-condensed">
        <thead>
        <tr>
          <th ng-repeat="col in cols">{{ col.name }}</th>
        </tr>
        </thead>
        <tbody>
        <tr ng-repeat="product in model.products | filter: searchKeyword">
          <td ng-repeat="col in cols">{{ product[col.name] }}</td>
        </tr>
        </tbody>
      </table>
    </td>
  </tr>
</table>
