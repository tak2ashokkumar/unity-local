
  <div class="modal-header">
    <h3 class="modal-title">Change Api Keys</h3>
  </div>
  <div class="modal-body">
    <form class="form-horizontal">


      <div class="form-group">
        <label for="request.access_id" class="col-sm-3 control-label">
          Access Id *
        </label>

        <div class="col-sm-9">
          <input type="text"
                 class="form-control"
                 ng-model="request.access_id"
                 placeholder="Access Id">
        </div>
        <div class="col-sm-9" style="float: right;">
          <label class="errormsg" ng-if="access_id_errmsg">{{ access_id_errmsg }}</label>
        </div>
      </div>

        <div class="form-group">
        <label for="request.access_key" class="col-sm-3 control-label">
          Access Key *
        </label>

        <div class="col-sm-9">
          <input type="password"
                 class="form-control"
                 ng-model="request.access_key"
                 placeholder="Access Key">
        </div>
        <div class="col-sm-9" style="float: right;">
          <label class="errormsg" ng-if="access_key_errmsg">{{ access_key_errmsg }}</label>
        </div>
      </div>



    </form>
  </div>

  <div class="modal-footer">
    <button class="btn btn-danger pull-left" type="button" ng-click="cancel()">
      Cancel
    </button>
    <button class="btn btn-success pull-right" type="button" ng-click="change_api_keys(request)">
      Update
    </button>
  </div>
</script>
