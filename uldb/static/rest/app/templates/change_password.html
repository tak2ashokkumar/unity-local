
  <div class="modal-header">
    <h3 class="modal-title">Change password</h3>
  </div>
  <div class="modal-body">
    <form class="form-horizontal">


      <div class="form-group">
        <label for="request.password" class="col-sm-3 control-label">
          New Password *
        </label>

        <div class="col-sm-9">
          <input type="password"
                 class="form-control"
                 ng-model="request.password"
                 placeholder="Password">
        </div>
        <div class="col-sm-9" style="float: right;">
          <label class="errormsg" ng-if="password_errmsg">{{ password_errmsg }}</label>
        </div>
      </div>

        <div class="form-group">
        <label for="request.confirm_password" class="col-sm-3 control-label">
          Confirm Password *
        </label>

        <div class="col-sm-9">
          <input type="password"
                 class="form-control"
                 ng-model="request.confirm_password"
                 placeholder="Confirm password">
        </div>
        <div class="col-sm-9" style="float: right;">
          <label class="errormsg" ng-if="confirm_password_errmsg">{{ confirm_password_errmsg }}</label>
        </div>
      </div>



    </form>
  </div>

  <div class="modal-footer">
    <button class="btn btn-danger pull-left" type="button" ng-click="cancel()">
      Cancel
    </button>
    <button class="btn btn-success pull-right" type="button" ng-click="change_password(request)">
      Change Password
    </button>
  </div>
</script>
