<alerts></alerts>
<div class="row">
    <span ng-if="!vm_snapshots">
    <img src="/static/img/v3/loading_icon.gif" class="ajax-loader">
    </span>
    <!--<div class="dataTable_wrapper content_settings">-->
    <span ng-if="vm_snapshots.length == 0">
    <h3 class="align-center">No records to display</h3>
    </span>
    <span ng-if="vm_snapshots.length != 0">
     <!-- Removed float-thead="{top: 20, position: 'absolute', scrollContainer: true};" from table to avoid table header becoming fixed at left -->
      <table
          class="table table-hover"
          id="dataTables-example"
          ng-model="vm_snapshots">
          <thead>
              <tr>
                  <th ng-repeat="row in vm_backup_headers" class="fixed_th">{{ row.title }}</th>
              </tr>
          </thead>
          <tbody>
              <tr ng-repeat="row in vm_snapshots">
                  <td ng-repeat="row_data in vm_backup_headers">
                      <span ng-if="row_data.key == 'updated_at' || row_data.key == 'backup_date'">
                        {{row[row_data.key]| date:'medium'}}
                      </span>
                      <span ng-if="row_data.key == 'size'">
                          {{(row[row_data.key]/(1024*1024))|number: 1}}
                      </span>
                      <span ng-if="row_data.key == 'state' || row_data.key == 'last_known_state'">
                          {{ row[row_data.key]| powerState}}
                      </span>
                      <span ng-if="row_data.key != 'updated_at' && row_data.key != 'backup_date' && row_data.key != 'openstack_actions' && row_data.key != 'size' && row_data.key != 'vmware_actions' && row_data.key != 'state' && row_data.key != 'last_known_state' ">
                        {{row[row_data.key]}}
                      </span>

                      <span ng-if="row_data.key == 'openstack_actions'">
                          <div class="btn-group">
                            <button type="button" class="btn btn-dropdown btn-default" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <span class="caret"></span>
                            </button>
                            <ul class="dropdown-menu action-button">
                                <li><a href ng-click="backupOpenStackVm(row.id, 'AWS', $index)"  >AWS S3 Backup</a></li>
                                <li><a href ng-click="backupOpenStackVm(row.id, 'Azure', $index)"  >Azure Backup</a></li>
                                <li><a href ng-click="backupHistory(row.id, 'OpenStack', $index)"  >Backup History</a></li>
                            </ul>
                          </div>
                      </span>
                      <span ng-if="row_data.key == 'vmware_actions'">
                          <div class="btn-group">
                            <button type="button" class="btn btn-dropdown btn-default" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <span class="caret"></span>
                            </button>
                            <ul class="dropdown-menu action-button">
                                <li><a href ng-click="backupVMWareVm(row.instance_id, 'AWS', $index)"  >AWS S3 Backup</a></li>
                                <li><a href ng-click="backupVMWareVm(row.instance_id, 'Azure', $index)"  >Azure Backup</a></li>
                                <li><a href ng-click="backupHistory(row.id, 'VMware', $index)"  >Backup History</a></li>
                            </ul>
                          </div>
                      </span>
                  </td>
              </tr>
          </tbody>
      </table>
    </span>
</div>
