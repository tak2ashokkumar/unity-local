<alerts></alerts>
<div>
  <form class="form-inline">
    <div class="form-group leftpan">
      <label for="orgName">Organization : </label>
        <input id="orgName" class="form-control ticketing"
               ng-model="org"
               placeholder="Type org to search..."
               uib-typeahead="org as org.name for org in getOrgs($viewValue)"
               force-null="col.nullify">
    </div>
    <button type="button" class="btn btn-success ticketing" ng-click="getClouds(org)">Get Clouds</button>
    <div class="form-group rightpan" ng-show="cloud_list_select">
      <div class="col-sm-4"></div>
      <div class="col-sm-4" >
          <select ng-change="load_db_instance(cloud_list_select)" ng-options="option.long for option in cloud_list track by option.short.uuid"
                  class="form-control ng-touched" ng-model="cloud_list_select"
                         >
              <option value="">-- Select Cloud --</option>
          </select>
      </div>
    </div>
  </form>
</div>

<br/>
<br/>

<span ng-if="cloud_list && !db_instances && !db_instance_message">
    <img src="/static/img/v3/loading_icon.gif" class="ajax-loader">
</span>
<span ng-if="db_instance_message">
  <h3 class="align-center">{{db_instance_message}}</h3>
</span>
<div ng-if="db_instances">
    <div class="row">
      <table class="table">
        <thead>
        <tr>
          <th>Virtual Machine Name</th>
          <th>RAM Size (MB)</th>
          <th>CPUs</th>
          <th>Hostname</th>
          <th>Internal IP</th>
          <th>Private IP</th>
          <th>Database</th>
          <th>Creation Date</th>
        </tr>
        </thead>
        <tbody>
        <tr ng-repeat="d in db_instances">
          <td>{{ d.vm_name }}</td>
          <td>{{ d.ram_size }}</td>
          <td>{{ d.cpus }}</td>
          <td>{{ d.hostname }}</td>
          <td>{{ d.internal_ip }}</td>
          <td>{{ d.routable_ip }}</td>
          <td>{{ d.database }}</td>
          <td><span ng-if="d.created_at">{{ d.created_at | date : 'medium' }}</span><span ng-if="!d.created_at">{{ d.status }}</span></td>
        </tr>
        </tbody>
      </table>
    </div>
    <div>
      <button class="btn btn-primary" ng-click="createDbInstance()">Add</button>
    </div>
</div>
<script type="text/ng-template" id="createDbInstance.html">
  <div class="modal-header">
    <h3 class="modal-title">Create DB Instance</h3>
  </div>
  <div class="modal-body">
    <form class="form-horizontal">
      <div class="form-group">
        <label for="request.vm_name" class="col-sm-2 control-label">
          Database Type
        </label>

        <div class="col-sm-10">
         <select class="form-control" ng-model="request.database">
           <option value="MYSQL">MYSQL</option>
         </select>
        </div>
      </div>

      <div class="form-group">
        <label for="request.vm_name" class="col-sm-2 control-label">
          VM Name
        </label>

        <div class="col-sm-10">
          <input type="text"
                 class="form-control"
                 ng-model="request.vm_name"
                 placeholder="Virtual Machine Name">
        </div>
      </div>

      <div class="form-group">
        <label for="request.vm_name" class="col-sm-2 control-label">
          Host Name
        </label>

        <div class="col-sm-10">
          <input type="text"
                 class="form-control"
                 ng-model="request.hostname"
                 placeholder="Host Name"
                 ng-pattern="/^[a-zA-Z0-9]*$/">
        </div>
      </div>

      <div class="form-group">
        <label for="request.ram_size" class="col-sm-2 control-label">
          RAM Size
        </label>

        <div class="col-sm-10">
          <input type="number"
                 min=0
                 class="form-control"
                 ng-model="request.ram_size"
                 placeholder="RAM Size in GB">
        </div>
      </div>

      <div class="form-group">
        <label for="request.cpus" class="col-sm-2 control-label">
          CPUs
        </label>

        <div class="col-sm-10">
          <input type="number"
                 min=0
                 class="form-control"
                 ng-model="request.cpus"
                 placeholder="No. of CPU Cores">
        </div>
      </div>

      <div class="form-group">
        <label for="request.vm_name" class="col-sm-2 control-label">
          Internal IP
        </label>

        <div class="col-sm-10">
          <input type="text"
                 class="form-control"
                 ng-model="request.internal_ip"
                 placeholder="Ex : 192.168.254.60"
                 ng-pattern='/^([0-9]{1,3})[.]([0-9]{1,3})[.]([0-9]{1,3})[.]([0-9]{1,3})$/'>
        </div>
      </div>


      <div class="form-group">
        <label for="request.vm_name" class="col-sm-2 control-label">
          Private IP
        </label>

        <div class="col-sm-10">
          <input type="text"
                 class="form-control"
                 ng-model="request.routable_ip"
                 placeholder="Ex : 209.237.238.90"
                 ng-pattern='/^([0-9]{1,3})[.]([0-9]{1,3})[.]([0-9]{1,3})[.]([0-9]{1,3})$/'>
        </div>
      </div>

    </form>
  </div>

  <div class="modal-footer">
    <button class="btn btn-danger pull-left" type="button" ng-click="cancel()">
      Cancel
    </button>
    <button class="btn btn-success pull-right" type="button" ng-click="create(request)">
      Create
    </button>
  </div>
</script>
