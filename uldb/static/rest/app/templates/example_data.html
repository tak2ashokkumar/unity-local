<div class="panel-primary">
  <div class="panel-heading">
    ExampleData
  </div>
  <div class="panel-body">
    <table class="table">
      <thead>
      <tr>
        <th class="col-xs-6">name</th>
        <th>value</th>
      </tr>
      </thead>
      <tbody>
      <tr ng-repeat="example in examples">
        <td>{{ example.name }}</td>
        <td>{{ example.value }}</td>
      </tr>
      </tbody>
    </table>
  </div>
  <div class="panel-footer">
    <button class="btn btn-danger" ng-click="getExampleData()">Get Django model data</button>
    <button class="btn btn-danger" ng-click="saveAngularModel()">Save</button>
  </div>
</div>

<div>
  <pre>{{ currentModel | json }}</pre>
</div>

<div class="panel-primary">
  <div class="panel-heading">
    Switch/Interface lookup
  </div>
  <div class="panel-body">
    <form role="form">
      <input type="text" ng-model="host" placeholder="Host name">
      <input type="text" ng-model="interface" placeholder="interface">
      <button class="btn btn-primary" ng-click="getPortInfo()">Get Port</button>
    </form>
    <pre>{{ result | json }}</pre>
  </div>
</div>

<div>
  <pre>{{ host }}</pre>
  <pre>{{ interface }}</pre>
</div>
