<div class="row">
  <div class="col-sm-12">
    <h3>{{ result.name }}</h3>
  </div>
</div>

<alerts></alerts>

<div class="row">
  <div class="col-sm-12 col-md-12 col-lg-6">
    <panelhalf heading="Properties"><detailtable cols="cols" result="result"></detailtable></panelhalf>
  </div>
  <div class="col-sm-12 col-md-12 col-lg-6" ng-if="inheritedCols">
    <panelhalf heading="Inherited Properties"><inheritedtable cols="inheritedCols" model="inheritedColumnsModel"></inheritedtable></panelhalf>
  </div>
</div>

<div class="row" ng-if="relatedCols">
  <div class="col-sm-12 col-md-12 col-lg-6">
    <panelhalf heading="Related">
      <table class="table table-striped">
          <thead>
            <tr>
              <th ng-repeat="col in relatedCols">{{ col.description }}</th>
            </tr>
          </thead>

          <tbody>
            <tr ng-repeat="vm in server.vms">
              <td ng-repeat="col in relatedCols">
                <div ng-if="col.opaque === undefined">{{ vm[col.name] }}</div>
                <div ng-if="col.opaque === 'stringTransform'">
                  {{ col.read(vm) }}
                </div>
                <div ng-if="col.opaque === 'link'">
                  <a href="{{ col.read(vm).url }}">{{ col.read(vm).innerText }}</a>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
    </panelhalf>
  </div>
</div>





<script type="text/ng-template" id="genericModal.html">
  <div class="modal-header">
    <h3 class="modal-title">{{ method }} {{ title.singular }}</h3>
  </div>

  <div class="modal-body" style="height: 400px;">
    <form class="form-horizontal">

      <div class="form-group" ng-repeat="row in rows" ng-if="row.required">
        <label for="blockName" class="col-sm-2 control-label">
          {{ row.description }}
        </label>

        <div class="col-sm-10" ng-if="row.opaque === undefined">
          <input type="text" class="form-control" ng-model="obj[row.name]">
        </div>

        <div class="col-sm-10" ng-if="row.opaque !== undefined">
          <input type="text" class="form-control" ng-model="obj[row.name]"
                 placeholder=""
                 uib-typeahead="obj as obj[row.subfield] for obj in row.render($viewValue)">
        </div>
      </div>
    </form>

   

  </div>
</script>
