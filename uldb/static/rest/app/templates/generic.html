<div class="row">
  <div class="col-sm-6 col-sm-offset-6">
    <button class="btn btn-primary" ng-click="ctrl.add()" style="float:right;">Add</button>
  </div>
</div>

<alerts></alerts>

<div class="row">
  <div class="col-sm-12">
    <form class="form-horizontal" ng-keyup="openSingleton($event)">
      <div class="form-group">
        <div class="col-xs-12">
          <input class="form-control ng-valid ng-dirty"
                 type="text" id="searchKeyword"
                 ng-model="searchKeyword"
                 placeholder="Search by name, type, OS, etc."
                 ng-model-options="{debounce: {'default': 100, 'blur': 0 }}">
        </div>
      </div>
    </form>
  </div>
</div>
<div>
  <div ng-if="!model">
    <img src="/static/img/v3/loading_icon.gif" class="ajax-loader">
  </div>
  <div ng-if="model.results.length === 0">
    <h3 class="align-center">No records to display</h3>
  </div>
  <div ng-if="model.results.length != 0">
    <table class="table">
      <thead>
      <tr>
        <th ng-repeat="row in rows" class="{{ row.class }}" ng-if="!(row.hide)" ng-class="(row.cls)||''">
          <div ng-if="row.hide === undefined">{{ row.description }}</div>
        </th>
        <th>Actions</th>
      </tr>
      </thead>

      <tbody>
      <tr ng-repeat="result in model.results | filter: searchKeyword as filtered"
          ng-click="selection.selected = result; selection.index = $index"
          ng-class="{'selected': result === selection.selected}">
        <td ng-repeat="row in rows" ng-if="!(row.hide)" >
          <div ng-if="row.opaque === undefined && row.opaquelist === undefined && row.hide === undefined">
            {{ result[row.name] }}</div>
          <div
              ng-if="(row.opaque === true || row.opaque === 'stringTransform') && row.opaquelist === undefined && row.hide === undefined">
            {{ row.read(result) }}
          </div>
          <div ng-if="(row.opaquelist === true || row.opaquelist === 'stringTransform') && row.hide === undefined">
            {{ row.read(result) }}
          </div>
          <div ng-if="row.opaque === 'link' && row.hide === undefined">
            <a href="{{ row.read(result).url }}">{{ row.read(result).text }}</a>
          </div>
        </td>
        <td>
          <div class="btn-group">
            <button type="button" class="btn btn-dropdown btn-default" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
              <span class="caret"></span>
            </button>
            <ul class="dropdown-menu action-button">
              <li><a href ng-click="ctrl.edit(result, $index)">Edit</a></li>
              <li><a href ng-click="ctrl.remove(result, $index)" confirm>Delete</a></li>
            </ul>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<!--<uib-pagination total-items="model.count" items-per-page="pageSize"
                ng-model="model.currentPage" ng-change="pageChanged()"></uib-pagination>-->

<uib-pagination total-items="model.count"
                max-size="5" rotate="false"
                items-per-page="pageSize"
                ng-model="model.currentPage" ng-click="pageChanged()"></uib-pagination>


<script type="text/ng-template" id="genericModal.html">
  <div class="modal-header">
    <h3 class="modal-title">{{ method }} {{ title.singular }}</h3>
  </div>

  <div class="modal-body">
    <form class="form-horizontal">

      <div class="form-group" ng-repeat="row in rows" ng-if="row.required">

        <label for="blockName" class="col-sm-2 control-label" ng-if="DescriptionChange == false">
          {{ row.description }}
        </label>

        <label for="blockName" class="col-sm-2 control-label"
               ng-if="DescriptionChange && row.alterdescription === undefined">
          {{ row.description }}
        </label>

        <label for="blockName" class="col-sm-2 control-label"
               ng-if="DescriptionChange && row.alterdescription !== undefined">
          {{ row.alterdescription }}
        </label>

        <div class="col-sm-10"
             ng-if="row.opaque === undefined && row.opaquelist === undefined && row.opaquedate === undefined && row.opaqueselect === undefined && row.ischeck === undefined && row.passwordfield === undefined && row.changepasswordfield === undefined">
          <input type="text" class="form-control" ng-model="obj[row.name]">
        </div>

        <div class="col-sm-10"
             ng-if="row.opaque === undefined && row.opaquelist === undefined && row.opaquedate === undefined && row.opaqueselect === undefined && row.ischeck === undefined && row.passwordfield === undefined && row.changepasswordfield !== undefined && DescriptionChange == false">

          <input class="form-control" type="password" ng-model="obj[row.name]"></input>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaque === undefined && row.opaquelist === undefined && row.opaquedate === undefined && row.opaqueselect === undefined && row.ischeck === undefined && row.passwordfield !== undefined && row.changepasswordfield === undefined && DescriptionChange == false">

          <input ng-show="showpassword" ng-disabled="!resetpassword" class="form-control" type="text"
                 ng-model="obj[row.name]"></input>
          <input ng-hide="showpassword" ng-disabled="!resetpassword" class="form-control" type="password"
                 ng-model="obj[row.name]">      </input>
          <input type="checkbox" ng-model="showpassword" ng-checked="false"><label>Show Password </label></input>
          <input type="checkbox" ng-model="resetpassword" ng-checked="false"> <label>Reset Password </label></input>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaque === undefined && row.opaquelist === undefined && row.opaquedate === undefined && row.opaqueselect === undefined && row.ischeck === undefined && (row.passwordfield !== undefined || row.changepasswordfield !== undefined) && DescriptionChange">

          <input type="checkbox" ng-model="resetpasswordEdit"
                 ng-change="obj[row.name] = resetpasswordEdit == false ? undefined : obj[row.name]"> <label>Reset
          Password </label></input>
          <input ng-hide="!resetpasswordEdit" class="form-control" type="password" ng-model="obj[row.name]"></input>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaque === undefined && row.opaquelist === undefined && row.opaquedate === undefined && row.opaqueselect === undefined && row.ischeck !== undefined && row.passwordfield === undefined && row.changepasswordfield === undefined">
          <label><input class="ckeckbox cbox_view" ng-model="obj[row.name]" name="obj[row.name]"
                        type="checkbox"> {{ row.checkvalue }}</label>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaque !== undefined && row.opaquelist === undefined && row.opaquedate === undefined && row.opaqueselect === undefined && row.rendermethod === undefined">
          <input type="text" class="form-control" ng-model="obj[row.name]"
                 placeholder=""
                 uib-typeahead="obj as obj[row.subfield] for obj in row.render($viewValue)">
        </div>
        <div class="col-sm-10"
             ng-if="row.opaque !== undefined && row.opaquelist === undefined && row.opaquedate === undefined && row.opaqueselect === undefined && row.rendermethod !== undefined">
          <input type="text" class="form-control" ng-model="obj[row.name]"
                 placeholder="" typeahead-on-select="getGroupssByOrg($item)"
                 uib-typeahead="obj as obj[row.subfield] for obj in row.render($viewValue)">
        </div>

        <div class="col-sm-10"
             ng-if="row.opaquelist === undefined && row.opaque === undefined && row.opaquedate === undefined && row.trackby === undefined && row.shownamefield === undefined && row.shownamesubfield === undefined && row.opaqueselect !== undefined">
          <select class="form-control" ng-model="obj[row.name]"
                  ng-options="obj as obj[row.subfield] for obj in row.list track by obj[row.subfield]">
            <option value="">Please select</option>
          </select>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaquelist === undefined && row.opaque === undefined && row.opaquedate === undefined && row.trackby === undefined && row.opaqueselect !== undefined && row.shownamefield !== undefined && row.shownamesubfield !== undefined">
          <select class="form-control" ng-model="obj[row.name]"
                  ng-options="obj as obj[row.shownamefield] + '/' + obj[row.shownamesubfield] for obj in row.list track by obj[row.subfield]">
            <option value="">Please select</option>
          </select>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaquelist !== undefined && row.opaque === undefined && row.opaquedate === undefined && row.trackby === undefined && row.opaqueselect === undefined && row.fillbyobj === undefined">
          <select class="form-control" ng-model="obj[row.name]"
                  ng-options="obj as obj[row.subfield] for obj in row.list track by obj[row.subfield]"
                  multiple></select>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaquelist !== undefined && row.opaque === undefined && row.opaquedate === undefined && row.trackby !== undefined && row.opaqueselect === undefined && row.fillbyobj === undefined">
          <select class="form-control" ng-model="obj[row.name]"
                  ng-options="obj as obj[row.subfield] for obj in row.list track by obj[row.trackby]" multiple></select>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaquelist !== undefined && row.opaque === undefined && row.opaquedate === undefined && row.trackby !== undefined && row.opaqueselect === undefined && row.fillbyobj === 'groups'">
          <select class="form-control" ng-model="obj[row.name]"
                  ng-options="obj as obj[row.subfield] for obj in grouplist track by obj[row.trackby]"
                  multiple></select>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaquelist !== undefined && row.opaque === undefined && row.opaquedate === undefined && row.trackby === undefined && row.opaqueselect === undefined && row.fillbyobj === 'roles'">
          <select class="form-control" ng-model="obj[row.name]"
                  ng-options="obj as obj[row.subfield] for obj in rolelist track by obj[row.subfield]"
                  multiple></select>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaquelist !== undefined && row.opaque === undefined && row.opaquedate === undefined && row.trackby === undefined && row.opaqueselect === undefined && row.fillbyobj === 'access'">
          <select class="form-control" ng-model="obj[row.name]"
                  ng-options="obj as obj[row.subfield] for obj in accesslist track by obj[row.subfield]"
                  multiple></select>
        </div>

        <div class="col-sm-10"
             ng-if="row.opaquelist === undefined && row.opaque === undefined && row.opaquedate !== undefined && row.opaqueselect === undefined">
          <div class="dropdown">
            <a class="dropdown-toggle" id="dropdown2" role="button" data-toggle="dropdown" data-target="#" href="">
              <div class="input-group">
                <input type="text" class="form-control" data-ng-model="obj[row.name]"
                       data-date-time-input="DD/MM/YYYY hh:mm">
                <span class="input-group-addon"><i class="glyphicon glyphicon-calendar"></i></span>
              </div>
            </a>
            <ul class="dropdown-menu action-button" role="menu" aria-labelledby="dLabel">
              <datetimepicker data-ng-model="obj[row.name]"
                              data-datetimepicker-config="{ dropdownSelector: '#dropdown2' }">
              </datetimepicker>
            </ul>
          </div>
        </div>

      </div>
    </form>

  </div>

  <div class="modal-footer">
    <button class="btn btn-danger" type="button" ng-click="cancel()">
      No, not right now.
    </button>
    <button ng-if="method === 'Add'" class="btn btn-primary" type="button" ng-click="add(obj)">
      Create!
    </button>
    <button ng-if="method === 'Edit'" class="btn btn-primary" type="button" ng-click="edit(obj, selection.index)">
      Save changes!
    </button>
  </div>
</script>
