
<form class="form" ng-submit="hijack(user)" action="{{ hijackAction() }}" method="post">
  <input type="hidden" name="csrfmiddlewaretoken" value="{{  token }}">
  <div class="form-group">
      <input class="form-control"
             ng-model="user"
             uib-typeahead="user as user.email for user in getUsers($viewValue)"
             typeahead-select-on-blur="true"
             typeahead-select-on-exact="true"
             placeholder="Email of user you would like to impersonate.">

  </div>
  <input type="submit" style="visibility: hidden">
  <div class="form-group">
    <button class="btn btn-primary">Impersonate {{ user.email }}</button>
  </div>
</form>
