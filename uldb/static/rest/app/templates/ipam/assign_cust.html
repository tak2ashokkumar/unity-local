<div class="modal-header">
  <h3 class="modal-title">Edit {{ currentAssignment.prefix }}/{{ currentAssignment.prefixlen }}</h3>
</div>
<div class="modal-body">
  <form class="form-horizontal">

    <div class="form-group">
      <label for="obj.org" class="col-sm-2 control-label">
        Organization
      </label>

      <div class="col-sm-10">
        <input type="text" class="form-control"
               ng-model="obj.customer"
               placeholder="Type the name of an Organization to search..."
               force-null
               uib-typeahead="org as org.name for org in getOrgs($viewValue)">
      </div>
    </div>

    <div class="form-group">
      <label for="obj.description" class="col-sm-2 control-label">
        Description
      </label>
      <div class="col-sm-10">
        <input type="text" class="form-control" ng-model="obj.description">
      </div>
    </div>
  </form>
</div>
<div class="modal-footer">
  <button class="btn btn-warning" type="button" ng-click="cancel()">
    Cancel
  </button>
  <button class="btn btn-success" type="button" ng-click="assign(obj)">
    Update
  </button>
</div>
