<div class="row">
  <div class="col-sm-6">
   <span ng-if="breadCrumb">
      <small ng-repeat="crumb in bread.crumbs">
        <span ng-if="$index > 0">&lt;</span> <a href="{{ crumb.url }}">{{ crumb.name }}</a>
      </small>
    </span>
  </div>
</div>

<alerts></alerts>

<div class="location-table">
  <div class="col-sm-8">
    <card>
      <div class="row">
        <div class="col-sm-12">
            <h4>Information about {{ ipBlock }} ({{ block.related.customer.organization_name || "Unassigned" }})</h4>
          <div class="row">
            <div class="col-sm-5">
              <strong>Address</strong>
            </div>
            <div class="col-sm-3">
              <!--<strong>Device</strong>-->
            </div>
          </div>
          <div ng-repeat="address in block.addresses | orderBy: 'address_int'" class="zone-table">
            <div class="row"
                 ng-click="selectAddress(address, $index)"
                 ng-class="{'assignment-active': isSelectedAddress(address)}">
              <div class="col-sm-5">
                {{ address.address }}
              </div>
              <div class="col-sm-3">
                <!--{{ address.device.name }}-->
              </div>
            </div>
          </div>
        </div>
      </div>
    </card>
  </div>
  <div class="col-sm-4 detail-level">
    <div ng-if="selectionExists()">
      <h4>{{ selectedAddress.address.address }}</h4>
      <table class="table table-responsive">
        <tbody>
        <tr>
          <th>ARIN Allocation</th>
          <td>
            <span>{{ block.name }}</span>
          </td>
        </tr>
        </tbody>
        <tbody>
        <tr>
          <th>Parent</th>
          <td>
            <span>{{ block.prefix }}/{{ block.prefixlen }}</span>
          </td>
        </tr>
        </tbody>
        <tbody>
        <tr>
          <!--<th>Associated Device</th>
          <td>
            <span>{{ selectedAddress.address.device.name }}</span>
          </td>-->
        </tr>
        </tbody>
        <tbody>
        <tr>
          <!--<th>Device Type</th>
          <td>
            <span>{{ selectedAddress.address.device | title }}</span>
          </td>-->
        </tr>
        </tbody>
      </table>
      <!--<p>
        <button class="btn btn-info" ng-click="setDevice()">Assign Device</button>
      </p>
      <p>
        <button class="btn btn-danger" ng-click="">Remove Device</button>
      </p>-->
    </div>
  </div>
</div>
