<div class="modal-header">
  <h3 class="modal-title" ng-if="method === 'Add'">Add New IPv4 Block</h3>
  <h3 class="modal-title" ng-if="method === 'Edit'">Edit IPv4 Block</h3>
</div>

<div class="modal-body" style="height: 400px;">
  <form class="form-horizontal">

    <div class="form-group">
      <label for="blockName" class="col-sm-2 control-label">
        New Block Name
      </label>

      <div class="col-sm-10">
        <input type="text" class="form-control" ng-model="obj.name">
      </div>
    </div>

    <div class="form-group">
      <label for="blockName" class="col-sm-2 control-label">
        ARIN Handle
      </label>

      <div class="col-sm-10">
        <input type="text" class="form-control" ng-model="obj.arin_handle">
      </div>
    </div>

    <div class="form-group">
      <label for="blockName" class="col-sm-2 control-label">
        Prefix
      </label>

      <div class="col-sm-10">
        <input type="text" class="form-control" ng-model="obj.prefix">
      </div>
    </div>

    <div class="form-group">
      <label for="blockName" class="col-sm-2 control-label">
        Prefix Length
      </label>

      <div class="col-sm-10">
        <input type="text" class="form-control" ng-model="obj.prefixlen">
      </div>
    </div>

    <div class="form-group">
      <label for="blockName" class="col-sm-2 control-label">
        Description
      </label>

      <div class="col-sm-10">
        <input type="text" class="form-control" ng-model="obj.description">
      </div>
    </div>

  </form>

</div>

<div class="modal-footer">
  <button ng-if="method === 'Add'" class="btn btn-success" type="button" ng-click="add(obj)">
    Create this IP block!
  </button>
  <button ng-if="method === 'Edit'" class="btn btn-success" type="button" ng-click="edit(obj, selection.index)">
    Save changes!
  </button>
  <button class="btn btn-warning" type="button" ng-click="cancel()">
    No, not right now.
  </button>
</div>
