<div class="modal-header">
  <h5 class="modal-title">UL Asset Management</h5>
</div>
<div class="modal-body">
  {{alertMsg}}
</div>
<div class="modal-footer">
  <button class="btn btn-success" type="button" ng-if="showDelete" ng-click="ConfirmDelete()">Delete</button>
  <button class="btn btn-success" type="button" ng-if="showOK" ng-click="cancel()">OK</button>
  <button class="btn btn-danger" type="button" ng-if="showCancel" ng-click="cancel()">Cancel</button>
</div>
