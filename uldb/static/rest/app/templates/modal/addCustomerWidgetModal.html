<div class="modal-header">
  <h3 class="modal-title">
    <span>Add Customer Widget</span>
  </h3>
</div>

<div class="modal-body">
  <form class="form-horizontal" ng-submit="pinCustomer(customer)">
    <div class="form-group">
      <label class="col-sm-2 control-label">
        Organization
      </label>
      <div class="col-sm-10">
        <organization-input model-container="obj"></organization-input>
      </div>
    </div>
    <input type="submit" style="visibility: hidden">
  </form>
</div>

<div class="modal-footer">
  <button class="btn btn-danger" type="button" ng-click="cancel()">
    Cancel
  </button>
  <button class="btn btn-primary" type="button" ng-click="approve(obj)">
    Confirm
  </button>
</div>
