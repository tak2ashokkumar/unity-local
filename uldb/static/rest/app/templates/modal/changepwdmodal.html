<div class="modal-header">
  <h5 class="modal-title">Change Password</h5>
</div>
<div class="modal-body">
  <alerts></alerts>
  <div class="form-group">
    <label for="id_old_password" class="required">Current password:</label>
    <input id="id_old_password" class="form-control" ng-model="pwd.old_password"
           type="password" ng-keypress="ClearValidation()" autofocus autocomplete="off">
    <label class="errormsg" ng-if="oldpwderr">{{ oldpwdMsg }}</label>
  </div>
  <div class="form-group">
    <label for="id_new_password1" class="required">New password:</label>
    <input id="id_new_password1" class="form-control" ng-model="pwd.new_password1" ng-keypress="ClearValidation()"
           type="password" ng-blur="check()" autocomplete="off">
    <label class="errormsg" ng-if="newpwd1err">{{ newpwd1Msg }}</label>
  </div>
  <div class="form-group">
    <label for="id_new_password2" class="required">Confirm New Password:</label>
    <input id="id_new_password2" class="form-control ch-pass-textbox" ng-model="pwd.new_password2" ng-keypress="ClearValidation()"
           type="password" ng-blur="check()" autocomplete="off">
    <label class="errormsg" ng-if="newpwd2err">{{ newpwd2Msg }}</label>
    <label class="errormsg" ng-if="err">{{ error }}</label>
  </div>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-danger" ng-click="cancel()">Cancel</button>
  <button class="btn btn-success" ng-click="changePassword()" type="button">Update</button>
  <div ng-if="servererror"><br/></div>
  <label class="errormsg" ng-if="servererror">{{ msg }}</label>
</div>
