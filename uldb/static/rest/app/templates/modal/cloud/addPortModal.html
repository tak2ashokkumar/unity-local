<div class="modal-header">
  <h3 class="modal-title">
    <span>Add Port</span>
  </h3>
</div>

<div class="modal-body">
  <form class="form-horizontal" ng-submit="addPort(cloud, port)">
    <div class="form-group">
      <label class="col-sm-2 control-label">
        Port
      </label>
      <div class="col-sm-10">
        <input class="form-control"
               ng-model="port"
               uib-typeahead="port as port.switch.name + ' ' + port.interface_name for port in portSearch($viewValue)">
      </div>
    </div>
    <input type="submit" style="visibility: hidden">
  </form>
</div>

<div class="modal-footer">
  <button class="btn btn-danger" type="button" ng-click="cancel()">
    Cancel
  </button>
  <button class="btn btn-primary" type="button" ng-click="addPort(cloud, port)">
    Add Port
  </button>
</div>
