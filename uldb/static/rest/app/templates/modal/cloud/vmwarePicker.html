<div class="modal-header">
  <h3 class="modal-title">
    <span>{{ modalTitle }}</span>
  </h3>
</div>

<div class="modal-body">
  <form class="form-horizontal" ng-submit="linkChoice(selectedUnityObject, choice)" ng-if="loaded">
    <div class="form-group">
      <label class="col-sm-2 control-label">
        Link To
      </label>
      <div class="col-sm-10">
        <select class="form-control"
              ng-model="$parent.choice"
              ng-options="choice as choice_format(choice) for choice in choices"></select>
      </div>
    </div>
    <input type="submit" style="visibility: hidden">

    <pre>{{ choice | json }}</pre>
  </form>
  <div ng-if="!loaded" style="height:100px">
    <spinner></spinner>
  </div>
</div>

<div class="modal-footer">
  <button class="btn btn-danger" type="button" ng-click="cancel()">
    Cancel
  </button>
  <button class="btn btn-primary" type="button" ng-click="linkChoice(selectedUnityObject, choice)">
    Confirm
  </button>
</div>
