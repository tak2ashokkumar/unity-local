<div class="modal-header">
  <h3 class="modal-title">
    Adding {{ item_type }}
  </h3>
</div>

<div class="modal-body">
  <form class="form-horizontal">
    <div class="form-group">
      <label class="col-sm-2 control-label">
        {{ item_type }}
      </label>
      <div class="col-sm-10">
        <input class="form-control"
               ng-model="obj[item_type]"
               uib-typeahead="o as o.name for o in getItems(item_type)($viewValue)">
      </div>
    </div>


    <input type="submit" style="visibility: hidden">
  </form>
</div>


<div class="modal-footer">
  <button class="btn btn-danger" type="button" ng-click="cancel()">
    Cancel
  </button>
  <button class="btn btn-primary" type="button" ng-click="create(obj)">
    Create
  </button>
</div>
