<div class="modal-header">
  <h3 class="modal-title">
    <span>{{ title }}</span>
  </h3>
</div>

<div class="modal-body">
  <form class="form-horizontal" ng-submit="addPort(cloud, port)">
    <div class="form-group" ng-repeat="f in fields">
      <label class="col-sm-2 control-label">
        {{ f.display }}
      </label>
      <div class="col-sm-10">
        <label class="errormsg" ng-if="obj[f.err_msg]">{{ obj[f.err_msg] }}</label>
        <input class="form-control" ng-model="obj[f.name]">
      </div>
    </div>
    <input type="submit" style="visibility: hidden">
  </form>
</div>

<div class="modal-footer">
  <button class="btn btn-danger" type="button" ng-click="cancel()">
    Cancel
  </button>
  <button class="btn btn-primary" type="button" ng-click="approve(obj)">
    Confirm
  </button>
</div>
