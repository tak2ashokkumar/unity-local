<alerts></alerts>

<uib-tabset active="activeTab" type="pills">
  <uib-tab ng-repeat="tab in tabs" index="$index" heading="{{ tab.name }}">
    <ng-include src="tab.url"></ng-include>
  </uib-tab>
</uib-tabset>


<script type="text/ng-template" id="currentNagiosData.html">
  <h3>Current Status</h3>
  <div class="row">
    <div class="col-xs-6">
      <h4>Hosts</h4>
      <donut data="host_data"></donut>


    </div>
    <div class="col-xs-6">
      <h4>Services</h4>
      <donut data="service_data"></donut>

    </div>
  </div>

  <h3>Current Problems</h3>
  <div class="row">
    <div class="col-xs-6">
      <h4>Hosts</h4>
      <donut data="host_data_problems_only"></donut>


    </div>
    <div class="col-xs-6">
      <h4>Services</h4>
      <donut data="service_data_problems_only"></donut>

    </div>
  </div>

  <h3>Current Checks</h3>
  <div class="row">
    <div class="col-xs-12">
      <h4>Problem Hosts</h4>
      <table class="table">
        <thead>
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>Time</th>
        </tr>
        </thead>
        <tbody>
        <tr ng-repeat="host in problem_hosts">
          <td>{{ host.nagios_display_name }}</td>
          <td>{{ host.last_known_state | nagios_host_state }}</td>
          <td>{{ host.last_checked | date:'medium'}}</td>
        </tr>
        </tbody>
      </table>
      <h4>Problematic Services</h4>
      <table class="table table-condensed">
        <thead>
        <tr>
          <th>Name</th>
          <th>Check</th>
          <th>Status</th>
          <th>Desc</th>
        </tr>
        </thead>
        <tbody>
        <tr ng-repeat="host in problem_services">
          <td>{{ host.host_name }}</td>
          <td>{{ host.description }}</td>
          <td>{{ host.status | nagios_service_state }}</td>
          <td>{{ host.plugin_output }}</td>
        </tr>
        </tbody>
      </table>

    </div>
  </div>
</script>

<script type="text/ng-template" id="historicalNagiosData.html">
  <h3>Historical Data</h3>
  <div class="row">
    <div class="col-xs-6">
      <h4>Host Checks</h4>
      <nagios-host-summary interval="intervals['t']"></nagios-host-summary>
    </div>
    <div class="col-xs-6">
      <h4>Service Checks</h4>
      <nagios-service-summary interval="intervals['t']"></nagios-service-summary>
    </div>
  </div>

  <observium-interval-picker interval="intervals['t']"></observium-interval-picker>
</script>

<script type="text/ng-template" id="linkedNagiosData.html">
  <h3>Monitored Hosts</h3>
  <model-results></model-results>

  <div>
    <button class="btn btn-primary" ng-click="ctrl.add()">Add</button>
  </div>
</script>


<script type="text/ng-template" id="nagiosModal.html">
  <div class="modal-header">
    <h3 class="modal-title">{{ method }}</h3>
  </div>

  <div class="modal-body" style="height: 400px;">
    <form class="form-horizontal">

      <div class="form-group" ng-repeat="row in rows" ng-if="row.required">
        <label for="blockName" class="col-sm-2 control-label">
          {{ row.description }}
        </label>

        <div class="col-sm-10" ng-if="row.opaque === undefined">
          <input type="text" class="form-control" ng-model="obj[row.name]">
        </div>

        <div class="col-sm-10" ng-if="row.opaque !== undefined">
          <input ng-if="row.simple === undefined"
                 type="text" class="form-control"
                 ng-model="obj[row.name]"
                 placeholder=""
                 uib-typeahead="obj as obj[row.subfield] for obj in row.render($viewValue)">
          <input ng-if="row.simple"
                 type="text" class="form-control"
                 ng-model="obj[row.subfield]"
                 placeholder=""
                 uib-typeahead="obj[row.simple] for obj in row.render($viewValue)">
        </div>
      </div>
    </form>
  </div>

  <div class="modal-footer">
    <button ng-if="method === 'Add'" class="btn btn-success" type="button" ng-click="addObj(obj)">
      Create!
    </button>
    <button ng-if="method === 'Edit'" class="btn btn-success" type="button" ng-click="editObj(obj, selection.index)">
      Save changes!
    </button>
    <button class="btn btn-warning" type="button" ng-click="cancel()">
      No, not right now.
    </button>
  </div>
</script>
