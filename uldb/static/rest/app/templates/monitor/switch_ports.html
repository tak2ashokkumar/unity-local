<div layout="row" ng-controller="SwitchPortMapController" ng-cloak>
    <div flex="10"></div>
 
    <div flex="80" class='m-20px-0'>
 
        <!-- page title & 'create product' button -->
        <md-toolbar class="md-hue-2">
            <div class="md-toolbar-tools">
                <!-- page title -->
                <div flex md-truncate>
                    <h3 class="md-headline">Switch Ports</h3>
                </div>
 
                <!-- 'create' product button will be here -->
            </div>
        </md-toolbar>
 
        <!-- 'search' bar will be here -->
 
        <md-content flex>
            <md-list ng-init="readSwitchPorts()">
                <md-list-item class="md-3-line" ng-repeat="port in switch_ports">
 
                    <!-- product information -->
                    <div class="md-list-item-text">
                        <h3>{{port.switch}}</h3>
                        <h4>{{port.customer}}</h4>
                        <p>{{port.ports}</p>
                    </div>
 
                    <div class="md-secondary-container">
                        <!-- 'read one' button will be here -->
                        <!-- 'edit' button will be here -->
                        <!-- 'delete' button will be here -->
                    </div>
                    <md-divider ng-if="!$last"></md-divider>
                </md-list-item>
            </md-list>
        </md-content>
    </div>
 
    <div flex="10"></div>
</div> <!-- end row -->
