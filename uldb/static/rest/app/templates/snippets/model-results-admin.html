<div class="page_wrapper" style="float:left">
  <section ng-if="model.results !== undefined" id="no-more-tables" class="margintop20">
    <table datatable="ng" dt-options="dtOptions" ng-if="model.results.length > 0" id="example" class="example table  table-condensed cf">
      <thead class="cf">
        <tr>
          <th ng-repeat="f in fields" class="{{ f.class }}" ng-if="!(f.hide)">
            <span ng-if="f.hide === undefined" class="{{f.name}}">{{ f.description }}</span>
          </th>
          <th class="numeric" ng-if="!disable_actions">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr ng-repeat="result in model.results">
          <td ng-repeat="f in fields" ng-if="!(f.hide)" ng-switch="f.opaque">
            <div ng-switch-when="link">
              <a href="{{ linkify(result, f).url }}">{{ linkify(result, f).text }}</a>
            </div>
            <div ng-switch-when="stringTransform">{{ desub(result, f) }}</div>
            <div ng-switch-when="choices">{{ result[f.name] }}</div>
            <div ng-switch-when="arbitraryLink">{{ f.func(result) }}</div>
            <div ng-switch-when="multiple">
              <div ng-repeat="r in result[f.name]">
                <p><a ng-if='f.uriPrefix' href="{{ f.uriPrefix }}{{r[f.idField]}}">{{ r.name }}</a><span ng-if='!f.uriPrefix'>{{
                    r.name }}</span></p>
              </div>
            </div>
            <div ng-switch-when="newType">
              <uldb-field result="result" field="f"></uldb-field>
            </div>
            <div ng-switch-default class="{{result.logo}}">
              <span ng-if="f.name != 'logo'">{{ result[f.name] }}</span>
              <span ng-if="result.logo && f.name == 'logo'">
                <img class="companylogo" ng-src="{{ result.logo }}" ng-click="show_logo(result.logo)">
              </span>
            </div>
          </td>
          <td ng-if="!disable_actions">
            <div class="action-icons">
              <a class="fa fa-pencil blue-text" tooltip-class="customClass" uib-tooltip="Edit" ng-click="selection.selected = result; selection.index = $index;ctrl.edit(result, $index)"></a>

              <a ng-if="can_delete!==false" class="fa fa-trash-o blue-text" tooltip-class="customClass" uib-tooltip="Delete"
                ng-click="selection.selected = result; selection.index = $index;ctrl.dailog_box(result, $index)"></a>
              <span ng-repeat="act in additional_actions">
                <a class="fa fa-lock blue-text" ng-if="act.name === 'Change Password' || act.name === 'Change Api Keys'"
                  tooltip-class="customClass" uib-tooltip="{{ act.name }}" href ng-click="act['func'](result, $index)"></a>
                <a class="fa fa-external-link-square" ng-if="act.name !== 'Change Password' && act.name !== 'Manage in New Tab' && act.name !== 'Change Api Keys'"
                  tooltip-class="customClass" uib-tooltip="{{ act.name }}" href ng-click="act['func'](result, $index)"></a>
                <a class="fa fa-external-link" ng-if="act.name === 'Manage in New Tab'" tooltip-class="customClass"
                  uib-tooltip="{{ act.name }}" href ng-click="act['func'](result, $index)"></a>
              </span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <div ng-if="model.results.length === 0" class="content-wrapper">
      <no-records-found message="No {{title}} to display"></no-records-found>
    </div>
  </section>
</div>
