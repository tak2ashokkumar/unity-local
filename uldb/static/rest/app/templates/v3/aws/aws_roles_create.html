<form role="form">
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <div class="form-group" ng-repeat="row in rows">
            <div ng-if="(row.required && !( method == 'Edit' && (row.type == 'password' || row.name == 'access_key' || row.name == 'secret_key')))">
                <span ng-if= "row.type != 'hidden'">
                    <label for="blockName">{{ row.description }}*</label>
                </span>
                <div ng-if="row.name=='user'" ng-if="(row.type == 'text') || (row.type == 'checkbox') || (row.type == 'number') || (row.type == 'file') || (row.type == 'password')">
                    <input type="{{ row.type }}" class="form-control" maxlength="128" ng-model="obj[row.name]"
                    placeholder="" typeahead-on-select="getGroupssByOrg($item)"
                    uib-typeahead="obj as obj.email for obj in row.render($viewValue)" value="{{row.value}}" required>
                </div>
                <div ng-if="(row.type == 'text' && row.name!='user') || (row.type == 'checkbox') || (row.type == 'number') || (row.type == 'file') || (row.type == 'password')">
                    <input type="{{ row.type }}" class="{{ row.class }}" maxlength="128" ng-model="obj[row.name]" value="{{row.value}}" required>
                </div>
                <div ng-if=" row.type == 'textarea' ">
                    <textarea type="{{ row.type }}" class="{{ row.class }}" ng-model="obj[row.name]" value="{{row.value}}" rows="4" maxlength="128" cols="40" required></textarea>
                </div>
                <div ng-if=" row.type == 'select' ">
                    <select ng-options="option.long for option in row.options" class="{{ row.class }}" ng-model="obj[row.name]" required>
                        <option value="">-- select {{ row.description | lowercase }} --</option>
                    </select>
                    <span class="select-arrow"></span>
                </div>
                <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
            </div>
            <div ng-if="!row.required">
                <div ng-if="row.depends == undefined">
                    <span ng-if= "row.type != 'hidden'">
                        <label for="blockName">{{ row.description }}</label>
                    </span>
                    <div ng-if="(row.type == 'text') || (row.type == 'checkbox') || (row.type == 'number') || (row.type == 'file') || (row.type == 'password')">
                        <input type="{{ row.type }}" class="{{ row.class }}" maxlength="128" ng-model="obj[row.name]" value="{{row.value}}">
                    </div>
                    <div ng-if=" row.type == 'textarea' ">
                        <textarea type="{{ row.type }}" class="{{ row.class }}" ng-model="obj[row.name]" value="{{row.value}}" rows="4" maxlength="128" cols="40"></textarea>
                    </div>
                    <div ng-if=" row.type == 'select' ">
                        <select ng-options="option for option in row.options" class="{{ row.class }}" ng-model="obj[row.name]">
                            <option value="">-- select {{ row.description | lowercase }} --</option>
                        </select>
                        <span class="select-arrow"></span>
                    </div>
                    <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
                </div>
                <div ng-if="row.depends != undefined">
                    <div ng-if="row.depends">
                        <span ng-if= "row.type != 'hidden'">
                            <label for="blockName">{{ row.description }}</label>
                        </span>
                        <div ng-if="(row.type == 'text') || (row.type == 'checkbox') || (row.type == 'number') || (row.type == 'file')">
                            <input type="{{ row.type }}" class="{{ row.class }}" ng-model="obj[row.name]" maxlength="128" value="{{row.value}}">
                        </div>
                        <div ng-if=" row.type == 'textarea' ">
                            <textarea type="{{ row.type }}" class="{{ row.class }}" ng-model="obj[row.name]" value="{{row.value}}" rows="4" maxlength="128" cols="40"></textarea>
                        </div>
                        <div ng-if=" row.type == 'select' ">
                            <select ng-options="option for option in row.options" class="{{ row.class }}" ng-model="obj[row.name]">
                                <option value="">-- select {{ row.description | lowercase }} --</option>
                            </select>
                            <span class="select-arrow"></span>
                        </div>
                        <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
