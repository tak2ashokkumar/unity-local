<alerts></alerts>
<form role="form">
   <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <div class="form-group">
            <label for="blockName">Name</label>
            <input class="form-control ng-empty ng-invalid ng-invalid-required" type="text" ng-model="obj.aws_user" disabled>
            <label class="errormsg" ng-if="obj['customererr']">{{ obj['customerMsg'] }}</label>
        </div>
        <div class="form-group">
            <label for="blockName">Region</label>
            <select ng-options="option.long for option in rows1[rows1.length - 1].options" class="form-control" ng-model="obj.region">
                <option value="">-- select {{ row.description | lowercase }} --</option>
            </select>
            <span class="select-arrow"></span>
            <label class="errormsg" ng-if="obj['regionerr']">{{ obj['regionMsg'] }}</label>
        </div>
   </div>
</form>
