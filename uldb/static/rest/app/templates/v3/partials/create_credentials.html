<form class="form-horizontal ng-pristine ng-scope ng-invalid ng-invalid-required ng-valid-maxlength">
    <div class="form-group ng-scope">
        <span class="ng-scope">
            <label class="col-sm-3 control-label ng-binding" for="blockName">
                User
                <span ng-if="row.required">*</span>
            </label>
        </span>
        <div class="col-sm-9 ng-scope">
            <input class="form-control ng-empty ng-invalid ng-invalid-required" type="text" required="" value="" ng-model="obj.user_id">
            <div class="col-sm-9" style="float: right;">
                <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
            </div>

        </div>
    </div>
    <div class="form-group" ng-repeat="row in rows">
        <span class="ng-scope">
            <label class="col-sm-3 control-label ng-binding" for="blockName">
                {{ row.description }}
                <span ng-if="row.required">*</span>
            </label>
        </span>
        <div class="col-sm-9" ng-if=" row.type == 'select' && row.name == 'id' ">
            <select ng-options="option.id as option.name for option in row.options" class="{{ row.class }}" ng-model="obj[row.name]" required>
                <option value="">-- select {{ row.description | lowercase }} --</option>
            </select>
            <div class="col-sm-9" style="float: right;">
                <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
            </div>
        </div>
    </div>
    <div class="form-group ng-scope">
        <span class="ng-scope">
            <label class="col-sm-3 control-label ng-binding" for="blockName">
                Access
                <span ng-if="row.required">*</span>
            </label>

        </span>
        <div class="col-sm-9 ng-scope">
            <input class="form-control ng-empty ng-invalid ng-invalid-required" type="text" required="" value="" ng-model="obj.access">
            <div class="col-sm-9" style="float: right;">
                <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
            </div>
        </div>
    </div>
     <div class="form-group ng-scope">
        <span class="ng-scope">
            <label class="col-sm-3 control-label ng-binding" for="blockName">
                Secret
                <span ng-if="row.required">*</span>
            </label>
        </span>
        <div class="col-sm-9 ng-scope">
            <input class="form-control ng-empty ng-invalid ng-invalid-required" type="password" required="" value="" id="secret" ng-model="obj.secret" >
            <div class="col-sm-9" style="float: right;">
                <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
            </div>
        </div>
    </div>
     <div class="form-group ng-scope">
        <span class="ng-scope">
            <label class="col-sm-3 control-label ng-binding" for="blockName">
                Confirm Secret
                <span ng-if="row.required">*</span>
            </label>
        </span>
        <div class="col-sm-9 ng-scope">
            <input  my-directive class="form-control ng-empty ng-invalid ng-invalid-required" type="password"  id="confirmsecret" onkeyup="credentials_checkPass('secret','confirmsecret'); return false;" >
            <div class="col-sm-9" style="float: right;">
                <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
            </div>
        </div>
         <span id="confirmMessage" style="margin-left: 164px"></span>
    </div>
    <div class="form-group ng-scope">
        <span class="ng-scope">
            <label class="col-sm-3 control-label ng-binding" for="blockName">
                Type
                <span ng-if="row.required">*</span>
            </label>
        </span>
        <div class="col-sm-9 ng-scope">
            <select class="form-control ng-empty" ng-model="obj.cred_type">
                <option label="select type" value="select type" selected="selected">-- select type --</option>
                <option label="ec2" value="ec2">ec2</option>
                <option label="cert" value="cert">cert</option>
            </select>
            <div class="col-sm-9" style="float: right;">
                <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
            </div>
        </div>
    </div>
</form>
