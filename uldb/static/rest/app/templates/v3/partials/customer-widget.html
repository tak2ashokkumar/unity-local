<div layout="row" class="customer-widget-area">
  <div layout="column" flex-gt-xs="50">
    <customer-widget ng-repeat="(index, selname) in CustomersWidgetData.data.info track by $index"
                     ng-if="$index % 2 === 0"></customer-widget>
    <customer-widget-add ng-if="CustomersWidgetData.data.info.length % 2 === 0"></customer-widget-add>
  </div>
  <div layout="column" flex-gt-xs="50">
    <customer-widget ng-repeat="(index, selname) in CustomersWidgetData.data.info track by $index"
                     ng-if="$index % 2 === 1"></customer-widget>
    <customer-widget-add ng-if="CustomersWidgetData.data.info.length % 2 === 1"></customer-widget-add>
  </div>

  <div layout="column" flex-gt-xs="33">

                     ng-if="$index % 3 === 2"></customer-widget>
    <customer-widget-add ng-if="placeholder.idx % 3 === 2"></customer-widget-add>
  </div>
  -->
</div>
