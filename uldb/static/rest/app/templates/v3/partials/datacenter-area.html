<div layout="row">
  <div layout="column" flex="50">
    <datacenter-widget ng-repeat="(index, dcenter) in datacenternames.data.info" ng-if="$index % 2 === 0"
                       dcenter="dcenter"></datacenter-widget>
  </div>
  <div layout="column" flex="50">
    <datacenter-widget ng-repeat="(index, dcenter) in datacenternames.data.info" ng-if="$index % 2 === 1"
                       dcenter="dcenter"></datacenter-widget>
  </div>
</div>
