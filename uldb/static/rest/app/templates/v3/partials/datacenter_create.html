<form class="form-horizontal">
    <div class="form-group" ng-repeat="row in rows" ng-if="row.required">
        <label for="blockName" class="col-sm-3 control-label">{{ row.description }}</label>
        <div class="col-sm-9"><input type="text" class="form-control" ng-model="obj[row.name]"></div>
    </div>
</form>
