<div class="row dashboard-admin">
  <div class="col-lg-12">
    <div class="panel panel-default">
      <div class="panel-heading">
        <div class="col-md-5 pinnewcustitle"><i class="fa fa-clock-o fa-fw"></i> {{heading }}</div>
        <div class="col-md-3">
          <div ng-if="modeldata != undefined">
              <a class="fa fa-plus-square fa-2x pull-right" aria-hidden="true" ng-click="openModal('Add')" style="float: right;"></a>
          </div>
        </div>
        <div class="col-md-4 pinnewcus">
            <input class="form-control custom_search_field" type="text" ng-model="searchKeywordTicket" placeholder="Search by name.." ng-model-options="{debounce: {'default': 100, 'blur': 0 }}">
        </div>
      </div>
      <div class="panel-body">
        <div class="dataTable_wrapper  ">
          <table class="table table-striped table-bordered table-hover" id="dataTables-example">
            <thead>
              <tr>
                <th ng-repeat="row in headers">
                  <div ng-if="row.hide === undefined">
                    {{ row }}
                  </div>
                </th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="row in tabledata">
                <td ng-repeat="row_data in headers">
                  {{row[row_data]}}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<modal title="{{modeldata.title}}" visible="showModal">
  <ng-include src="modeldata.page"></ng-include>
</modal>
