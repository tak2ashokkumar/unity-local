<div class="row">
    <div class="col-lg-12">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <div class="col-md-8 pinnewcustitle no-sides-padding"><i class="fa fa-clock-o fa-fw"></i>
                    MAINTAINCE SCHEDULES TOP ({{tabledata.length}})
                </div>
                <div class="col-md-1" >
                    <a class="fa fa-plus-square fa-2x btn-primary pull-right" aria-hidden="true" href=""></a>
                </div>
                <div class="col-md-4 pinnewcus">
                    <input class="form-control custom_search_field" type="text" ng-model="searchKeyword"
                           placeholder="Search by name.." ng-model-options="{debounce: {'default': 100, 'blur': 0 }}">
                </div>
            </div>
            <!-- /.panel-heading -->
            <div class="panel-body">
                <div class="dataTable_wrapper cscrolldiv">
                    <table class="table table-striped table-bordered table-hover" id="dataTables-example">
                        <thead>
                        <tr>
                            <th ng-repeat="row in headers">
                                <div ng-if="row.hide === undefined">{{ row | uppercase }}</div>
                            </th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr ng-repeat="row in tabledata | filter: searchKeyword" class="odd gradeX">
                            <td>
                                <div>{{ row.date }}</div>
                            </td>
                            <td>
                                <div>{{ row.description }}</div>
                            </td>
                            <td>
                                <div>{{ row.data_center }}</div>
                            </td>
                            <td>
                                <div>{{ row.impacted_customer }}</div>
                            </td>
                            <td>
                                <div>{{ row.status }}</div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
