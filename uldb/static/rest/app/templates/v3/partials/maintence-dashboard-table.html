

<div class="row dashboard-admin">
  <div class="col-lg-12">
    <div class="panel panel-primary">
      <div class="panel-heading">
        <div class="row">
          <div class="col-md-6 pinnewcustitle pull-left">
            <i class="fa fa-clock-o fa-fw"></i>
            {{ heading }}
          </div>
          <div ng-if="modeldata != undefined">
            <div class="col-md-1">
              <a class="fa fa-plus-square fa-2x pull-right" aria-hidden="true" ng-click="openModal('Add')"></a>
            </div>
          </div>
          <div ng-if="addbutton != undefined">
            <div class="col-md-1" ng-if="addbutton == 'ms_add'">
              <a class="text-primary" aria-hidden="true" href="/admin#/maintenance-schedules"><i class="fa fa-plus-square fa-2x "></i></a>
            </div>
          </div>
          <div class="col-md-4 pinnewcus pull-right">
            <input
                class="form-control custom_search_field"
                type="text"
                ng-model="searchKeyword"
                placeholder="Search.."
                ng-model-options="{debounce: {'default': 100, 'blur': 0 }}">

          </div>
        </div>
      </div>

      <div class="panel-body">
        <div ng-if="!tabledata">
          <img src="/static/img/v3/loading_icon.gif" class="ajax-loader">
        </div>
        <div class="dataTable_wrapper content_settings">

          <table
              class="table table-hover"
              id="dataTables-example"
              float-thead="{top: 20, position: 'absolute', scrollContainer: true};"
              ng-model="tabledata"
              ng-if="tabledata.length != 0">
            <thead>
            <tr>
              <th ng-repeat="row in headers" class="fixed_th">{{ row.title }}</th>
              <th ng-if="actions != undefined" class="fixed_th">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr ng-repeat="row in tabledata | filter: searchKeyword">
              <td ng-repeat="row_data in headers">
                <div ng-if="row_data.decorator == undefined">
                                            <span ng-if="row_data.key == 'impacted_customer'">
                                               <div ng-repeat="customer in row[row_data.key]">{{ customer.name }}</div>
                                            </span>
                  <span ng-if="row_data.key == 'datacenter'">
                                               <div>{{ row[row_data.key].name }}</div>
                                            </span>
                  <span ng-if="row_data.key != 'impacted_customer' && row_data.key != 'datacenter'">
                                              {{ row[row_data.key]| date:'medium'}}
                                            </span>
                </div>
                <div ng-if="row_data.decorator">
                  {{ decorate(row_data.decorator,row[row_data.key])}}
                </div>
              </td>
            </tr>
            </tbody>
          </table>

          <div ng-if="tabledata.length == 0">
            <h3 class="align-center">No records to display</h3>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
