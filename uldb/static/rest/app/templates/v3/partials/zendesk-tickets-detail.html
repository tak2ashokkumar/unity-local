 <div class="row dashboard-admin">
    <div class="col-lg-12">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <div class="row">
                    <div class="col-md-6 pinnewcustitle pull-left">
                        <i class="fa fa-clock-o fa-fw"></i>
                        {{heading}}
                    </div>
                    <div ng-if="modeldata != undefined" >
                        <div class="col-md-1" >
                            <a class="fa fa-plus-square fa-2x pull-right" aria-hidden="true" ng-click="openModal('Add')"></a>
                        </div>
                    </div>
                    <div ng-if="addbutton != undefined" class="pull-right" >
                        <div class="col-md-1" ng-if="addbutton == 'ms_add'" >
                            <a class="fa fa-plus-square fa-2x" aria-hidden="true" href="/main#/maintenance-schedules"></a>
                        </div>
                    </div>
                    <div class="col-md-4 pinnewcus pull-right">
                        <input
                            class="form-control custom_search_field"
                            type="text"
                            ng-model="searchKeyword"
                            placeholder="Search.."
                            ng-model-options="{debounce: {'default': 100, 'blur': 0 }}">
                    </div>
                </div>
            </div>

            <div class="panel-body">
                <span ng-if="!tabledata">
                  <img src="/static/img/v3/loading_icon.gif" class="ajax-loader">
                </span>
                <div class="dataTable_wrapper content_settings">
                    <span ng-if="tabledata.length == 0">
                      <h3 class="align-center">No records to display</h3>
                    </span>
                    <span ng-if="tabledata.length != 0">
                        <table
                            class="table table-hover"
                            ng-model="tabledata">
                            <thead>
                            <tr>
                                <th ng-repeat="row in headers" class="fixed_th">{{ row.title }}</th>
                                <th ng-if="actions != undefined" class="fixed_th">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                                <tr ng-repeat="row in tabledata | filter: searchKeyword" class="odd gradeX">

                                    <td>
                                        <div>
                                        <a href="/main#/zendesk/ticket/{{ row.ticket_id}}">
                                        {{ row.ticket_id}}
                                        </a>
                                        </div>
                                    </td>
                                    <td>
                                        <div>{{ row.subject }}</div>
                                    </td>
                                    <td>
                                        <div>{{ row.customer }}</div>
                                    </td>
                                    <td>
                                        <div>{{ row.datacenter }}</div>
                                    </td>
                                    <td>
                                        <div>{{ row.status }}</div>
                                    </td>
                                    <td>
                                        <div>{{ row.priority }}</div>
                                    </td>
                                    <td>
                                        <div>{{ row.last_updated | unityDate : $root.users_timezone}}</div>
                                    </td>

                                </tr>
                            </tbody>
                        </table>

                    </span>
                </div>
            </div>
        </div>
        <br>
    </div>
</div>
<br/>
