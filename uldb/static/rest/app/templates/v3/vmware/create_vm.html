<form class="form-horizontal">
    <div class="form-group" ng-repeat="row in rows5">
        <div ng-if="row.required">
            <span ng-if= "row.type != 'hidden'">
                <label for="blockName" class="col-sm-3 control-label">{{ row.description }}*</label>
            </span>
            <div class="col-sm-9" ng-if="(row.type == 'text') || (row.type == 'checkbox') || (row.type == 'number') || (row.type == 'file')">
                <input type="{{ row.type }}" class="{{ row.class }}" ng-model="obj[row.name]" value="{{row.value}}" required>
            </div>
            <div class="col-sm-9" ng-if=" row.type == 'textarea' ">
                <textarea type="{{ row.type }}" class="{{ row.class }}" ng-model="obj[row.name]" value="{{row.value}}" rows5="4" maxlength="255" cols="40" required></textarea>
            </div>
            <div class="col-sm-9" ng-if=" row.type == 'select' ">
                <select ng-options="option for option in row.options" class="{{ row.class }}" ng-model="obj[row.name]" required>
                    <option value="">-- Select {{ row.description  }} --</option>
                </select>
            </div>
            <div class="col-sm-9" style="float: right;">
                <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
            </div>
        </div>
        <div ng-if="!row.required">
            <div ng-if="row.depends == undefined">
                <span ng-if= "row.type != 'hidden'">
                    <label for="blockName" class="col-sm-3 control-label">{{ row.description }}</label>
                </span>
                <div class="col-sm-9" ng-if="(row.type == 'text') || (row.type == 'checkbox') || (row.type == 'number') || (row.type == 'file')">
                    <input type="{{ row.type }}" class="{{ row.class }}" ng-model="obj[row.name]" value="{{row.value}}">
                </div>

                    <select ng-options="option for option in row.options" class="{{ row.class }}" ng-model="obj[row.name]">
                        <option value="">-- Select {{ row.description  }} --</option>
                    </select>
                </div>
                <div class="col-sm-9" style="float: right;">
                    <label class="errormsg" ng-if="obj[row.err_id]">{{ obj[row.err_msg] }}</label>
                </div>
            </div>
            <div ng-if="row.depends != undefined">
                <div ng-if="obj[row.depends.depends_on] == row.depends.value">
                    <span ng-if= "row.type != 'hidden'">
                        <label for="blockName" class="col-sm-3 control-label">{{ row.description }}</label>
                    </span>
                    <div class="col-sm-9" ng-if="(row.type == 'text') || (row.type == 'checkbox') || (row.type == 'number') || (row.type == 'file')">

                    </div>
                    <div class="col-sm-9" ng-if=" row.type == 'textarea' ">
                        <textarea type="{{ row.type }}" class="{{ row.class }}" ng-model="obj[row.name]" value="{{row.value}}" rows5="4" maxlength="255" cols="40"></textarea>
                    </div>
                    <div class="col-sm-9" ng-if=" row.type == 'select' ">
                        <select ng-options="option for option in row.options" class="{{ row.class }}" ng-model="obj[row.name]">
                            <option value="">-- Select {{ row.description  }} --</option>
                        </select>
                    </div>
                    <div class="col-sm-9" style="float: right;">

                    </div>
