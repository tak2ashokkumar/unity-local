<alerts></alerts>
<div>
  <form class="form-inline">
    <div class="form-group leftpan">
      <label for="orgName">Organization : </label>
        <input id="orgName" class="form-control ticketing"
               ng-model="org"
               placeholder="Type org to search..."
               uib-typeahead="org as org.name for org in getOrgs($viewValue)"
               force-null="col.nullify">
    </div>
    <button type="button" class="btn btn-success ticketing" ng-click="getClouds(org)">Get Clouds</button>
    <div class="form-group rightpan" ng-show="cloud_list_select">
      <div class="col-sm-4"></div>
      <div class="col-sm-4" >
          <select ng-change="load_vm_list(cloud_list_select)" ng-options="option.long for option in cloud_list track by option.short.uuid"
                  class="form-control ng-touched" ng-model="cloud_list_select"
                         >
              <option value="">-- Select Cloud --</option>
          </select>
      </div>
    </div>
  </form>
</div>

<br/>
<br/>

<span ng-if="cloud_list && !virtual_machines && !vm_list_message">
  <img src="/static/img/v3/loading_icon.gif" class="ajax-loader">
</span>
<span ng-if="((virtual_machines.length == 0) && (openstack_loaded) && (vmware_loaded))">
  <h3 class="align-center">{{vm_list_message}}</h3>
</span>
<span ng-if="virtual_machines.length != 0">
    <table
        class="table table-hover"
        id="dataTables-example"
        ng-model="virtual_machines">
        <thead>
        <tr>
            <th ng-repeat="row in vm_headers" class="fixed_th">{{ row.title }}</th>
        </tr>
        </thead>
        <tbody>
            <tr ng-repeat="row in virtual_machines">
                <td ng-repeat="row_data in vm_headers">
                    <span ng-if="row_data.key == 'migration_date'">
                      {{ row[row_data.key]| date:'medium'}}
                    </span>
                    <span ng-if="row_data.key == 'size'">
                        {{(row[row_data.key]/(1024*1024))|number: 1}}
                    </span>
                    <span ng-if="row_data.key == 'state' || row_data.key == 'last_known_state'">
                      {{ row[row_data.key]| powerState}}
                    </span>
                    <span
                        ng-if="row_data.key != 'updated_at' && row_data.key != 'migration_date' && row_data.key != 'state' && row_data.key != 'last_known_state' && row_data.key != 'openstack_actions' && row_data.key != 'vmware_actions'">
                      {{ row[row_data.key]}}
                    </span>
                    <span ng-if="row_data.key == 'openstack_actions'">
                        <div class="btn-group">
                          <button type="button" class="btn btn-dropdown btn-default" data-toggle="dropdown" aria-haspopup="true"
                                  aria-expanded="false">
                              <span class="caret"></span>
                          </button>
                          <ul class="dropdown-menu action-button">
                              <li><a href ng-click="migrate_vm_to_aws(row.instance_id, row.name, 'openstack', 'AWS', row.last_known_state, $index)">Migrate (AWS EC2)
                                </a></li>
                            <!-- <li><a href ng-click="migrateOpenStackVm(row.instance_id, 'Azure', $index)"  >Azure Backup</a></li> -->
                            <!-- <li><a href ng-click="backupHistory(row.instance_id, 'OpenStack', $index)"  >Backup History</a></li> -->
                          </ul>
                        </div>
                    </span>
                    <span ng-if="row_data.key == 'vmware_actions'">
                        <div class="btn-group">
                          <button type="button" class="btn btn-dropdown btn-default" data-toggle="dropdown" aria-haspopup="true"
                                  aria-expanded="false">
                              <span class="caret"></span>
                          </button>
                          <ul class="dropdown-menu action-button">
                              <li><a href ng-click="migrate_vm_to_aws(row.instance_id, row.name, 'vmware', 'AWS', row.state, $index)">Migrate (AWS EC2)</a></li>
                            <!-- <li><a href ng-click="migrateVMWareVm(row.instance_id, 'Azure', $index)"  >Azure Backup</a></li> -->
                            <!-- <li><a href ng-click="backupHistory(row.instance_id, 'VMware', $index)"  >Backup History</a></li> -->
                          </ul>
                        </div>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>
</span>

<script type="text/ng-template" id="awsAccountSelection.html">
  <div class="modal-header">
    <h3 class="modal-title">Select AWS Bucket</h3>
  </div>
  <div class="modal-body">
    <form class="form-horizontal">
      <div class="form-group">
        <label for="request.account_name" class="col-sm-3 control-label">
          AWS Account *
        </label>
        <div class="col-sm-9">
          <select ng-change="loadAwsRegionList(request.aws_account_list)" ng-options="option.long for option in aws_account_list track by option.short" class="form-control"
                  ng-model="request.aws_account_list" required >
                  <option value="">-- Select aws account --</option>
          </select>
        </div>
        <div class="col-sm-9" style="float: right;">
            <label class="errormsg" ng-if="aws_account_list_errmsg">{{ aws_account_list_errmsg }}</label>
        </div>

      </div>

      <div class="form-group">
        <label for="request.ram_size" class="col-sm-3 control-label">
          Region *
        </label>

        <div class="col-sm-9">
          <select ng-change="loadAwsBucketList(request.aws_region_list)" ng-options="option.long for option in aws_region_list track by option.short" class="form-control"
                  ng-model="request.aws_region_list" required>
                  <option value="">-- Select Region --</option>
          </select>

        </div>
        <div class="col-sm-9" style="float: right;">
            <label class="errormsg" ng-if="aws_region_list_errmsg">{{ aws_region_list_errmsg }}</label>
        </div>
      </div>

      <div class="form-group">
        <label for="request.ram_size" class="col-sm-3 control-label">
          Bucket *
        </label>

        <div class="col-sm-9">
          <select ng-change="" ng-options="option.long for option in aws_bucket_list track by option.short" class="form-control"
                  ng-model="request.aws_bucket_list" required>
                  <option value="">-- Select bucket --</option>
          </select>
        </div>
        <div class="col-sm-9" style="float: right;">
            <label class="errormsg" ng-if="aws_bucket_list_errmsg">{{ aws_bucket_list_errmsg }}</label>
        </div>
      </div>


    </form>
  </div>

  <div class="modal-footer">
    <button class="btn btn-danger pull-left" type="button" ng-click="cancel()">
      Cancel
    </button>
    <button class="btn btn-success pull-right" type="button" ng-click="create(request)">
      Create
    </button>
  </div>
</script>
