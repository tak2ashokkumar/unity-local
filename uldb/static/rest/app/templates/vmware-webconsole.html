<span ng-if="loader">
	<img src="/static/img/v3/loading_icon.gif" class="ajax-loader">
</span>

<span id="vm_error"  style="color:red"></span>
<div ng-if="!iframe">
  <div id="terminal-container" style="position:absolute;width:100%;height:100%;top:0;left:0"></div>
</div>
<div ng-if="iframe">
<div id="terminal-container" class="xterm-container"></div>
</div>

<script type="text/ng-template" id="vmAuthentcicate.html">
  <div class="modal-header">
    <h3 class="modal-title">VMware VM Authenticate</h3>
  </div>
  <div class="modal-body">
    <form class="form-horizontal">
      <div class="form-group" ng-if="errorMsg">
        <span class="col-sm-2 control-label"></span>
      	<span style="color:red" class="col-sm-10">{{ errorMsg }}</span>
      </div>
      <div class="form-group">
        <label for="request.hostname" class="col-sm-2 control-label">
          IP Address
        </label>

        <div class="col-sm-10">
         <input type="text"
                 class="form-control"
                 ng-model="request.hostname"
                 placeholder="Hostname" disabled>
          <!-- {#management_ip#} -->
        </div>
      </div>

      <div class="form-group">
        <label for="request.port" class="col-sm-2 control-label">
          Port Number
        </label>

        <div class="col-sm-10">
          <input type="number"
                 min=0
                 class="form-control"
                 ng-model="request.port"
                 placeholder="Port Number">
        </div>
      </div>

      <div class="form-group">
        <label for="request.username" class="col-sm-2 control-label">
          Username
        </label>

        <div class="col-sm-10">
          <input type="text"
                 class="form-control"
                 ng-model="request.username"
                 placeholder="Username">
        </div>
      </div>

      <div class="form-group">
        <label for="request.password" class="col-sm-2 control-label">
          Password
        </label>

        <div class="col-sm-10">
          <input type="password"
                 class="form-control"
                 ng-model="request.password"
                 placeholder="Password">
        </div>
      </div>

    </form>
  </div>

  <div class="modal-footer">
    <button class="btn btn-success pull-left" ng-if="iframe" type="button" ng-click="goBack()">
      Cancel
    </button>
    <button class="btn btn-success pull-left" ng-if="!iframe" type="button" ng-click="closeTab()">
      Close
    </button>
    <button class="btn btn-success pull-right" type="button" ng-click="create(request)">
      Submit
    </button>
  </div>
</script>
